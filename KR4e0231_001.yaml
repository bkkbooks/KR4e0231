body:
  text: 學古緒言卷一明婁堅撰序十二首重刻元氏長慶集序序者敘所以作之指也蓋始於子夏之序詩其後劉向以較書為職每一編成即為之序文極雅馴矣左思既賦三都自以名不甚著求序於皇甫謐自是綴文之士多有託於人以傳者皆汲汲於名而唯恐人之不吾知也至於其傳既久刻本之存者或漫漶不可讀有繕寫而重刻之則又復序之是宜敘所以刻之意可也而今之述者非追論昔賢妄為優劣之辨即過稱好事多設游揚之辭皆吾所不取也唐之文章至元和而極盛矣元白二氏創為新體以相倡和各極才人之致皆以編次於穆宗朝題曰長慶集惜其傳之久而不無漫漶以訛也馬巽甫從豫遊未冠即好古文辭嘗欲募工合刻以行於世而尤以微之之文世人知愛之者尤少乃刻自元始而以序見屬豫觀微之序樂天集稱其所長可謂極備而卒未嘗求敘於白者豈自越移鄂以至於卒官之日年僅踰艾將有待而未暇歟後白為銘墓而終亦不序其遺文何歟當白在潯陽元在通州時其寄詩往復之書固已畢見其所志矣則雖不為之敘可也世所傳集刻於宋宣和中建安劉氏收拾於缺逸之餘功已勤矣然考唐書藝文志元氏長慶集凡一百卷又小集十卷而所與白書自敘年十六時至元和七年有詩八百餘首凡十體二十卷七年已後又二百五十首此其二十餘年之作也計其還朝至殁不知復幾百首今已雜見於集矣而古詩不過百三十餘律詩不過三百餘共三十卷又他文三十卷類次既非其舊卷帙半減於前蓋詩之亡者已不翅如其所傳則他文之不見於集者又可知也嗟夫昔之君子所以疲耗心力於言語文字之間者蓋多以不為時用而優游於筆硯以舒寫其感憤無聊之意故其文之多且工若是士之淺陋不學未有甚於今日者也幸而得志於有司則又自多其才以謂雖不學而可試於用反詆好古之士為澗逺不識時務及其見於行事苟且滅裂無足怪者間或沾沾焉欲以言語自見則皆浮游無用之辭耳夫孰知文章為經世之大業哉如元氏者世多訾其為人蓋摧折困頓之餘躁於求進比之樂天懸矣然吾以其言求之知其卓然有可用於世者未嘗不為之歎惜焉至若巽甫之用心於斯文旁搜博采苟力所及殆無一字之遺且為考其歲月而附見當時之事不亦已勤也歟白氏長慶集序白氏集較刻完而巽甫復屬豫序其端豫曰白之所以為文者元序之詳矣子之合刻二氏者嚮已具言其槩矣竊嘗尚論其世以謂二君子當元和長慶之間以才力敏贍相敵相推無倡不和少或二韻多至千言實詩人次韻之所從始其於作者之指無所不窺而尤以杜子美為宗師雖渾涵雄偉未足庶幾要為能言其所欲言矣觀白公之所以自見其意者尤在於諷諭樂府諸篇則夫以聲調格律而論其髙下者亦未為深知之者也世徒知論公於出處之際蓋進而幾於大用者屢矣而公每徊翔容與終於乞身以行其志雖以牛李之相軋公居其間頗不為李所容而卒能不受其禍以是為達人之髙致而至於公之忠誠鯁亮敢於劘上而切於論事必不能以一毫之媕阿少徇乎人者雖時見於言語文章而世能知之者鮮矣抑吾於公尤自有感也當公之退居於洛裴晉公方留守東都數與同詩酒宴遊之樂歡然無間吾意如晉公者即微之尚存必不以元故有纎芥於樂天也李衛公一與牛隙遂至不欲見公詩文且曰見便當愛此豈宰相之語哉蓋於是益知晉公之賢逺於人矣豫又以為非公恬於進取或以楊李之援驟見用於太和開成則㑹昌之世亦或有不能自全者矣公嘗有詩云麒麟作脯龍為醢何似塗中曳尾龜早退先知非徒言之實允蹈之終唐之世獨公以賢達見稱有以哉故豫嘗謂士大夫若能為公雖微之之構於裴思黯之憾於李公皆與厚善而不能為之纍而為大臣者但當若晉公之休休毋使賢達如公而亦不免於見忌則豫所以序斯文之意也萬厯丙午孟秋序讀史商語序崑山王駕部淑士自南都還示豫讀史商語俾一畢其愚蓋君在郎署時曹務頗簡意不欲以江山之勝博奕宴遊之歡而虛耗其心力也於是日偕其同志以讀史為事至秦漢而下訖於五代之季必先求之正史而參以司馬氏之資治通鑑錯綜其說而折衷之日有記月有編其考據詳而核其持論確而平其剖析簡而辨豫既受而卒業竊喜學術久壞之日猶及見士大夫能留意經世之學為世針砭而稍起雕刻無用剽竊無根之沈痼豈非衰晚之厚幸歟乃為叙之曰古今之變聖人之所不能違也而史於是焉重固得失之林而法戒之所從出也史蓋莫備於周既經秦火而其書不盡傳漢初藏於民間者相繼復出於時老生宿儒往往亦口傳筆授若春秋一經而公羊穀梁左氏専門之學凡三家並行於世非周監二代一何文之郁郁若是盛哉遷固以降何代無史氏何國無史書至天下分為南北而史益蹐駁然至於今而猶得論其世者固賴夫史之各有傳也是故勝國之緒餘而興王必垂紀録前人之臧否而後嗣亟為之敘次懼夫跡之湮而遂至於無可考耳此誠王者所以垂憲百代之深意也顧其時代漸逺卷袠寖繁即使家有其書或不暇於遍觀又況其書尤不易得也哉通鑑之書㑹粹衆史而更定為紀年一編縱橫貫穿一覽暸然而學者欲知古今之變亦賴以有考矣其後儒者爭務標榜而髙談性命以為多學而識仲尼所非吾第求得其本而萬事理矣一倡羣和至於今日益趨苟簡成敗無考於前而是非紛出於臆獨於經義更好為新奇背經叛聖幾乎不知所云而世且目無鹽以西子識者憂之雖有資性警敏頗知涉獵古今者而其力固未暇也不過以資其談言潤其手筆而已而實無可施用用之則必至於僨事蓋頃已微見其兆矣豈不可歎也哉豫慵且駑每顧影自慙所幸不為世用得藏其拙然數為年少有志者言之且以為朂今者商語之編一出向之沈痼其有瘳乎顧復念士人之習必由科舉而程試之文必由主司安知世無大人先生傷今文敝而愓然有生心害政之憂言之於朝廷仍還經義五題之舊使其一日之力無憂於不給而考文章者必先於論策之文觀其識四六之文觀其學而經義則但以理為權衡不必于繡其鞶帨也庶幾豪傑之士爭自奮勵濯磨為有用之學而文詞之髙雅亦可以無愧於前代不亦勸學之盛事歟則斯編也雖謂之才士之嗃矢可也麗句集序友人許君伯隆以博覽强記有聲江南北久矣昨歲之暮復自黃州東下示豫以所纂麗句集屬為序之蓋上溯秦漢下逮隋唐其披攬博而詮擇精問以積日力幾何而成僅數月耳微獨才敏而功専良由途之熟也故力有餘鑒之明也故緒易就如豫者年踰七十則舊學已荒性耽暇逸而腐毫久謝且幼之所聞蚤已成癖時之所尚或匪同塗雖欲質疑將無召鬧歟夫四六之文濫觴於後漢而瀾倒於六朝以故實為鋪張差得炫其浮藻以援引為規切或未忤於褊衷代以相㳂久而益敝嗟乎此武侯出師二表彭澤歸去來詞所以超然獨邁於流俗者也自後唐宋之初皆接踵前靡逮貞元中昌黎倡為古文栁李皇甫和之而逺紹秦漢之作天聖中歐陽變其少作三蘇曽王繼之而復尋中唐之緒顧此非所論於儷偶之文也如以菁華藻麗而已凡伯隆之所詮擇皆其尤也雖然即以四六言之韓歐諸君子之作不逈異於時之人乎豫考歐之初登第也所為投謁陳謝之篇敷華振響蓋極追尋已乃盡出於馴雅至其稱蘇氏父子能以四六述敘委曲精盡正恐此後無復能繼且以前後得相及為幸此豈過為譽而重自暴哉蓋於斯文有深憂焉嗟乎文之敝於前代也以浮以靡而其敝於今日也以贋以龎獨四六之文猶為去之未逺蓋其在儷偶音響之間乎今者伯隆之編出譬之採明月於碧海鮮有纇焉抽上乘於列駟無或蹶焉其為攄華者搜材也可謂巨且麗矣功不亦偉乎若夫溯流而窮源得魚兔而忘筌蹄是在善讀斯編者而已小字録補序余友沈公路自頃歲積痾無復當世之意若遂忘其疇昔之勤者以為今日所須唯藥物耳而草木性偏吾疾而既偏矣豈宜力與之爭其唯作無益以恱有涯乎嘗一寄情於絲竹焉初若有適久之則又憬然悟曰此所謂益多者也欲以藥吾偏而藥之偏愈甚求其若存若亡可作可輟而聊以寄吾心者獨書而已往往客至語合以忘其病去則淡然獨居發篋陳書而婆娑其間少疲即又置之以為常無幾何而蟲天志成矣又未幾而纂小字録補有向之適而無其勞徐徐于于飲噉有加而霍然可知也豫以謂君之為此編非獨以廣異聞而已凡人品之髙下與時事之得失而興亡之鑒戒亦略見其概焉嗟乎父母之生子也甫三月而命之名年十六而又有字以尊其名自童子而漸教之以成人之禮蓋如此也當夫乳哺孩提之日顧之復之不勝其愛憐之也而别命之小名子未有知也聞呼其名則應之以笑至於能言而唯阿能行而步趨且教之誦詩教之舞勺舞象愛彌深則誨彌殷而防間之彌切夫豈獨曰吾幸有子焉而已吾父吾祖之幸有後焉而已不忍其賤且貧也則祝之以貴富其幸而遭時也則又望之譽聞彰而功烈著唯恐其一失足而陷於不義以為父母羞斯尤君子之異於庸衆人也而為之子者亦必思其所以報也鼎食不足以為養公卿不足以為榮而必且貽之令名卓然與流俗異趣而後可以無負於吾親此人子之大孝也蓋自童稚而逮於衰老中間所蚤作夜休以自效於時以有傳於後未有不自命名始矣其尋常無聞與鳥獸草木同朽腐者蓋不足論也夫孰使百世而下誦其言語考其行事而想像如景星慶雲和風甘雨海涵而嶽峙者乎又孰使聞其姓名則唾且罵迹其所為如封豕如長蛇如妖狐射工猶忿忿為當時之人怒目而切齒者乎嗟乎賤不如貴貧不如富夫非恆情也歟而及其變也富乃不如其貧貴乃不如其賤是以君子必顧名而思義也而沒沒者乃謂不能垂芳亦當遺臭一何不愛其名之甚也夫獨非人子乎哉昔者夫子之論孝曰父母唯其疾之憂蓋其所不憂有大焉者矣是可以為孝矣若夫公路之意以為疾吾無如之何也有慎之而已所以慰二親於地下又孰為大乎名乎名乎可不慎乎此其所以補是録之微旨也吾行當見子之疾雖勿藥可焉重刻衍極序沈行叔年甫踰冠而富有六書之學其所剖析務極於微眇上遡篆籀下逮隸分有遘必收有蓄必奇嘗得元人鄭子經衍極一編有當於心將刻而公之同志猥以序見屬書凡五篇豫得而論次其概焉首言至朴原始也而所列十三人下逮伯髙君謨同稱作者疑非其倫壁藏古文豈無雜揉何知尼父緣飾為之比于盤銘所未見也季札墓碣豈其然乎其次書要著法也而篇首諧聲意在尊元訓纂滂喜於法無當書衡較近包蒙吾不知其要也又次造書似與前二端復采托往籍摹擬成文設為問答竊比子雲又次古學觀其持論獨於北海碑記訾以作俑創為此論良所服膺然實是僧懷仁髙正臣始也虞歐及褚自晉而變各擅厥長未可輕議張草顏正誠務極筆勢不拘晉法而自臻其妙莆陽以飛白作草亦旭素渴筆之遺也曽見數帖筆似徑耳結字豈能望素奴僕之誚得無過歟南宋而後何足置評最後天五衍極所由名也其論石鼓夾漈是憑刀漆之辨可垂後來若夫用筆執筆謂篆用直分用側隸乃間出是固然矣而寸以內字法在掌指寸以外字法兼肘腕尤極分明閣帖之辨於好事家眯目庶有瘳乎鄭之此書文辭頗簡得劉之釋其用乃𢎞行叔以為世人侈言博洽而問之六書茫無所解使家有是編人知書學亦可無以淺陋譏矣然而好古之士或遂欲以篆籀之文入之今隸是猶却胡床而還席地脫巾帽而冠竹皮無乃生今反古有戾同文之化乎徐氏宗譜序吾吳之人以文學為世所推重士大夫仕而登朝有名聲於時者不為少矣然至言世澤故家聚族而居即甚疏逺猶與同其休戚則邑不能數姓族不能過百人也此唯吳為然雖世所號為能文章者欲一見其譜牒而不可得也問之則曰世逺而湮已矣或有以鄰郡邑相識創為同宗則其人非貴即富終不及於賤貧往往反為人所姍笑友人徐汝益傷之念其世之逺而族屬之繁也不早為之譜後將遂至於湮乃以再從父原和先生之命倣蘇氏族譜而敘之加詳集録纍世所得錫命之辭與夫碑志之文悉附於後而又以平日誦讀所得自中材而下皆可使口誦耳聞而入者上自經史而下逮於當世凡一言之合咸録而傳之永以為子若孫訓且以自見其志亦良可尚已蓋豫嘗深思其故以謂吳人之不能聚族者非其性然習俗使之也俗之失有二曰鄙曰奢奢則不務循乎分故益冒於利鄙則不務潔乎名故輕去其宗凡貴盛之家所賴其力而與之昵者雖親兄弟或不如僮奴也及勢去家落遭不肖子蕩然不復顧其家世容有不再傳而去為人奴者矣嗟夫不變其俗則何族之能聚哉徐氏自中丞公父子皆以嚮用之年致其官歸為當時所重後世子孫雖不甚貴顯然而詩書之澤逺矣如豫所交汝益兄弟多敦行好學泊然自守家傳儒雅之風人羞綺紈之習其能使族之人不胥而奢且鄙也決矣又邑唯徐氏能行宗法故有祠堂在遺第左偏歲時嘗再合饗必以宗子主之諸父雖耋老逡逡陪其後唯謹每歲之朝宗子者必蚤作而待事及禮成諸父必先升宗子之堂行賀歲禮然後還受宗子之賀蓋邑唯徐氏一姓能如是而已今汝益又能為之譜以遺於後吾知徐氏之族不湮矣敬為序其端以致欣慕之私焉且曰自徐氏而及於邑之人自一邑而及於凡吳之人庶有興乎子曰德不孤必有鄰吾以此徵之矣論語駁異序夫學孔氏者必之乎論語論語之書皆聖賢所與問答平實切近之旨不可以𤣥逺求也生乎夫子之後而尊信其遺言以教於後世蓋孟氏其醇矣然其詞旨激昻尚有類好辨而求勝者況於近代儒者乎至束之以一家之疏導之以求用之途則已離況復駭其舛也而目為才幸其得也而矜為巧則彌甚其又可望於雅馴耶友人王辰玉傷之以謂紛紛之是非其卒無定乎抑自有是非之至者乎嘗試虛心而思之唯至當之求焉凡世之好為異者吾不暇縱與之辨也必也姑極其謬悠而徐以一言駁正之庶幾盲者瞭寐者覺其不復墮于廣莫之野入於藂棘之林而徐行於方軌之塗必矣于是遍閲諸家之言或得其解矣而世未必知也則揭而行之或妄為解也而衆且同眩焉則剃而絶之至所自得亦時附見於篇末方具草而疾作病三年而竟以夭臨殁以屬其子時敏曰此吾志之所存也以一葦而障狂瀾其克濟乎雖草創未成汝其問序於吾友刻而存之以俟夫真學孔氏者豫既受其書反覆觀之喟然廢書而歎以今政教休明俊民用章而學術文章之敝乃似日趨於妄庸者何哉將孟子之所謂生心亂政殆空言歟不然則學道用世之君子其果能勿憂也歟如君之汲汲乎憂孔孟之將墜當世宜有賴焉顧其所確然自守者欲以一言自見其意而尚未克也豈不可惜哉論語之終篇曰不知言無以知人也有能因是書以知君之言亦可以得其為人之概矣或有語其子盍櫝而藏之必俟夫能知者而後出焉殆非君之所以汲汲之意也夫德不孤必有鄰紛紛之論或於是焉定容可以厚誣當世也耶重較四書集注序太倉金氏績較刻四書集注而王太常敬美先生序之大抵言近世無復小學故多不得其句讀音義而嘉績之獨勤於是書也自歲壬午距今三十年所板刻漫漶而讀者或續訂其訛舛復得數條於是邑人周纘虞輒改定而重刻之來以序請豫於宋之說經者得二人焉或盡廢専門之學創為獨斷而當時遂用以取士者王介甫之新學也或頗本師承之緒自許折衷而至今行之不廢者朱元晦之集注也蓋介甫以得君顯當時之不與者衆故驟行而旋廢元晦以講學名其徒之推崇者力故派逺而彌彰亦勢之所趨也間嘗讀王洪範傳竊以為非苟然者思一見其全書而不可得而勝國儒者若吳幼清金吉甫皆號為精詣其說時與朱相出入蓋有助焉而世亦莫之講也昔者聞通儒之論以謂聖人之經宜存衆多異同之說以待讀者之自得且漢人去古尚近學有承受其說決不可盡廢當國初儒學之臣不能將順明主之德意而狃於所聞一切抹摋此與介甫之新學何異今之舉子業自當以朱傳為宗若好古博雅之士似宜斟酌古今之間不容守其固陋而已世有讐較漢唐之遺文如金氏周氏之於是書者豫雖老矣猶願執筆而陪其後歸太僕應試論策集序昔人之論謂朝董公孫皆有科舉之纍然則應試之文其皆不足以語於古歟豫以為苟得古人之意雖降而應試不害為古不然即規摹泰漢要為世俗之文耳文章自漢東京漸以衰弱迄於唐宋作者再振起之其才氣之秀傑與所自得於古豈減賈馬二劉揚班之儔哉而或者乃謂古文之法亡於韓不知彼所謂古者何等也蘇氏之譏陋於文而劣於識目以兒童信非過矣昆山歸熙甫先生少而邃於經術於注疏無所不讀厭薄時之文力追大雅尤好左氏太史公書平生丹鉛其旁提要鉤𤣥不啻數本雖繁簡少異要於先求指歸次及菁藻而唐宋六氏之作則皆所沈浸而取裁也間語其門人吾久不讀歐蘇文輒自謂庶幾及取讀之不覺瞪乎後矣然至其得意於曽王亦不多讓焉又言吾為舉子業信筆縱橫而世多以為奇至為古文辭必謹於程度不敢少自弛顧其深知我者舉世僅數公而已先生嘗為人序其文中有妄庸之譏或曰妄誠有之未必庸也先生曰子未之思耳唯庸故妄唯妄益庸聞者莫不心厭焉當是時吳之以髙文稱者曰王司寇元美其始不無異同及歸自留都從其家求畫像摹為小幅系以傳贊屬豫書之蓋曰千載有公繼韓歐陽豫豈異趨久而始傷而司寇季子時為豫言公之歸也嘗讀蘇應詔諸篇顧語之曰此乃可謂策耳吾晉楚録文豈能及哉豫以是歎服司寇晚年識益髙而心益下蓋如此而世之君子或未必知之也先生之從季弟有達非聞甫薈粹其應試論策若干首刻而傳之而其孫昌世文休甫謂余居常服膺先生之文於今時特為真正又所聞於其門人者頗詳因屬為之序夫先生之所自得於古而豫之獲聞緒言略窺見其概者蓋古文辭非科舉之文也顧其時出緒餘以應有司之試者要自超然亦不同於流俗人之作矣父執傅士凱張茂仁兩先生嘗見語曰吾師之論泰伯至德聖人之心無窮場屋之文未有其比若其縱談理學出入於南宋諸儒㑹通其說而發之以汪洋超忽殆得之莊子他人莫能企而及也又曰先生少嘗就試論袁安任隗自言學未成史書未淹貫不能破的而世已爭傳誦之況其得之審諦者乎又況其他文之髙雅者乎竊念豫即有論說不足以盡先生而私喜其姓名得附見于兹集則姑述夙昔所聞以復於文休庶幾以俟後之君子當有讀是集而悠然㑹心識其與時之人異者若其終以襞積故實雕繪語句為工則斯文雖勿刻可也石巖先生淡語序老子曰道之出口淡乎其無味夫無味也而猶言之所謂强而名之曰道也吾夫子不云乎豫欲無言又曰吾無行而不與而釋氏之書亦稱默然無言是真實不二法門然則詞彌繁意彌廣其皆道之所不存歟雖然以言語文字求之即單詞片語要為賸耳若夫領之於心措之於躬由博而之乎約雖洋洋纚纚安在其不為淡乎論語記孔子之答問可謂要言不煩矣顧其詳乃在於刪述六經而要歸於平實所以為儒者宗也君子由之上而達於道小人由之下而達於器器之所不可知不可言者道也以俟能者從焉固不容誣也此夫子無言之指也老氏之𤣥蓋為尹喜著書所言皆道德之意進乎器矣不然彼獨非孔子所從問禮者耶若釋氏之洸洋宏肆崇虛者溺之執有者非之而儒之能通其說者至謂與易論語合然則離之而三可也合之而一可也其為六經耶五千言耶十二部耶靡不味其腴而未始不合於淡以不言言之以無味味之門戶不分諍論不立而道乃𤣥同矣石巖先生之為是編也由孔氏而之於二氏蓋舉世之能為言者皆咀嚼而飫其膏矣然後疏其所自得以託於大方名之曰淡語而屬為序之豫以謂調五味而侑五齊斯亦味之美已而必曰大羹𤣥酒云者為其未離乎味也口用是爽醇用是醨矣則莫若淡然一泯之於無酸醎甘苦曽莫得而名之而猶譊譊焉號易牙以羞於人者吾知先生之所必不許也北海集後序代自昔以文章名世而傳於後者或終老無所遇即遇也或連蹇不得志以殁其幸而進用舉世望之以為顯榮雖其人亦自謂遭時而中所蓄積果獲自效於用者不亦鮮哉豈立功與言固不可得兼歟夫古之君子修之於身見之於行事發之為言語文章一而已矣其君知之與之儕者能容之吾何敢負也於是焉不得已而功成君弗知也與之異而擠排之者衆也無所望於進而思有所垂於後於是乎不得已而言出豈有二哉自科舉之學興而士不必有其志言不必施於用其法屢變而屢窮薄詩賦而求之以明經以論策似也而士且日趨於苟簡以徼幸一日之遇其平居相與疲精竭思以為之者一遇於時而皆置之於無用即有過人之才非蚤獲自見又幸為詞學之臣者其無乃以政學乎雖遇之早矣進而窺金匱石室之藏矣其用與舍未可期也若上方嚮用而用之未盡其才乃又以中道夭閼者攬其遺文豈不深可惜哉故禮部尚書北海馮公弱冠登朝及强而二冢宰分别賢不肖以肅吏治以佐天子惠養元元又先後數考文章登用俊良備朝廷器使世咸以為能舉其職上方將用公於調燮而公不及待以殁矣當公在經筵欲借講說以規切時事上自戰國下逮東漢之季為通鑑直講一編反覆諄切其言簡而明讀之凜然庶幾繹而改乎斯日月以冀矣時朔方强徑之師東西擾攘忠憤所發皆見於其書及身為大僚而礦稅之使侵官蠧民凡所以調護其間皆詞婉意深默有回天之力焉公之不獲盡其才用也豈非天哉使公得永年上之能盡公與否所不可知其不勝世道之憂而見於論列者又當何如也某昔薦於南省實出公門下今方為吏東吳得公遺集較而刻之獨惜公之早達受知人主實深顧不獲盡見於行事而猶託於文字以傳也若夫序公之詩若文者則有宗伯于公之言在學古緒言卷一
