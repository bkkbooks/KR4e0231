body:
  text: 學古緒言卷二明婁堅撰序十五首緱山先生集序夫士志於當世其遇則名實加於上下一時言論風采垂之後世咸考信焉其不遇則屏居自晦已耳然中有未忘猶數詠歌先王自見其意於言表者蓋多有之若夫遭時顯名矣而徒揚其芬未茹其實乃僅僅託於語言文字以有傳於後良足悲矣嗚呼此豫於王君辰玉之遺文所為攬涕而敘之者也豫之識君自其甫冠坦然以夷邈然以逺不可得而親疏者也既而與之習悉其內行淳備平居於物無所好而獨好觀古人之書終日矻矻丹鉛其傍而識之敏而加勤學日益而意愈下其為文章頃刻千言若江河決而日星明也少喜為詩出入古今之間初若不拘拘而卒與之合要歸於刻露駿發非苟然也年垂壯始舉於鄉又十餘年而以進士第二人擢官編修念文肅公之老也旋上疏乞終養奉親之暇將益究心當世之務曽未幾而病困頓數年竟以不起悲夫病革手疏告其子皆生人之大節於忠孝尤惓惓也且曰吾於古詩文能窺其藩未造其域也然詩似差勝他日發篋以屬執友某某詮擇而敘之亦吾志之所存也蓋余昔嘗語君文不當以時代論也凡人之傑然者其識髙其自得者深雖卒然而吐其中所欲言必有異於流俗斯以為可傳而已如陸宣公其文詞豈有異時之人哉而至今稱其奏議與賈生埒何歟以公之所言皆切於匡主濟時鑿然有所不可易耳故曰文章經世之大業也而區區焉以世之先後詞之難易論者一何陋歟君慨然歎曰今之世其誰復可告以斯言者乎故余敘君之文獨惜其志在當世而不及於施用其詞或鬱紆悲憤或慷慨激昂蓋直取以寄焉進未能矯中世士大夫之習而砭其膏肓退不獲抉古聖賢人之奧以為時耳目徒負其才抗其志而泯泯以殁使人咨嗟歎息而不能已固豫所以序斯文之指也君詩文凡若干卷皆録其大略而已曰緱山先生者君少時頗有游仙之志所嘗以自號也遜之蓋不勝悼念以謂君之才與其志行之不苟既幸遭時而終無所效於世意今者或已游其神於大虛寥廓乎則猶有足慰者乎故以是名其集於乎其亦可悲也已錢密緯寒玉齊詩序昨歲豫遊京口於友人陳仲醇舟中與密緯相識因得覽其文意深而緒密非敏且勤弗能也明日獲共若沖先生登眺從容夜深乃别雖𤣥心質行非造次可盡知其超然脫去世俗而游於埃壒之表也為賦長句四韻五言古三十韻以寄其慨慕焉自後密緯數過從未嘗不言詩出其詩數篇驟讀之如風雨過而晴日在軒庭開霽人也豫為言今之經義與詞賦迥然分途即才能兼之有得於此必有妨於彼吾見其兩乖矣未見其並詣也頗疑經義屢變而彌淺是可贋售也非若詞賦似靡而源逺不可襲取也盍先為可售而徐及於深造庶幾終有合乎蓋豫嘗折臂於斯矣密緯不以余言為忤而低回首肯者久之别一年所聞其復不售於有司方為悵然而寒玉齊一編至矣夫遇不遇固非人之所得為也然彼是各一途而吾欲迫而强合之亦非力之所能及也以密緯之勤敏而求合有司之尺度又三年希有不中程矣則吾願與子終言詩必也博綜以濬其源深思以極其趣毋昡於俗以需中之自得毋急於名以俟衆之自歸持論則母狃於時代而但諦觀其所就取裁則母矜於華靡而務力遡其所從苟能是即漢魏晉唐之遺音將亦時見於宋之作者而喋喋焉沿襲口耳以輕肆詆訾者或實未有窺也密緯以為然耶不耶吾觀昔賢之論譬文章於懸衡今子之詩固已使豫服膺而俯他日功益専增益重吾首之至地夫何疑顧如余駑鈍既拙於爭時又恧於虛名終身窮初不自悔終身學老而無成又以是薦之密緯何也易經程墨文選序六經皆聖人之書易為最幽深矣揚子雲作太𤣥以擬之儒者譏焉然要為能知易者自漢儒之易不傳而王韓之說獨行於世逮宋程朱二氏出而學者又廢王韓不復講今之為文以應有司之求者名為推本朱氏而往往謬襲時師之曲說苟以邀一旦之遇而已然則薈粹而録之又屬為序之其亦可以已乎曰是一代之制而士所由以進也其言不必為傳翼也言不必翼傳而上以此取士故讀仲鳴之所詮次而其人可知也自成化𢎞治而迄於今文辭之在録者可以觀世焉昔之朴直者未必是而今之藻繢者未必非也有司者第甲乙而登進之四方之學者爭操觚而擬之又務為新特以勝之亦其宜矣然自朴而之藻勢之所必趨也藻極而反於朴猶挽江河而之西也今又當變矣將變而何之乎此實世道之憂已唐詩之溫許皮陸宋文之吕楊陳廖其言語非不工也當時以為儀的焉自今而讀之今昔之變將孰置是非於其問乎曰是存乎辭而不在乎傳之合與否也夫昔人之才豈反不逮今而今人之才豈皆能出乎古然而必務勝乎其前是果能有勝乎昔者唯斤斤焉有所守而不敢肆故寧不盡其才今且過求於力之所不及矣其詞彌誕其陋彌彰耳彼以為非是不足以爭時也士以是日趨於譸張譎詭而敦朴近於遲鈍平淡近於枮寂反擯而莫之收此孔子所謂不知言無以知人也豈不亦可惜哉往時歸熙甫先生鋭意經學工力甚苦至為應試之文伸紙疾書初未嘗經意也然今之言經義者必推歸卒未有能逮也豈非積之厚者不求異而人自異之耶若夫易吾不能知也向嘗讀歐陽永叔童子問而是之既又得蘇子瞻易解蓋其說始於明允彼所自謂有易以來未之有也志乎易者其無廢王韓而以歐蘇之說參考之可焉吾與仲鳴游最習相與論文頗數數姑以是塞其請不知仲鳴以為然乎否也吳江沈祖均選刻鉤𤣥録序鉤𤣥録者沈子下帷修業之所輯也或曰𤣥之為言幽深微渺之名也而以稱斯編何歟夫性與天道孔氏之及門者猶不得聞今之文直義疏之餘耳而烏在其𤣥乎若果𤣥也則無乃離其本歟昔人作𤣥以擬易舉世僅一二人知之今之業文者欲求知於人人而乃託於人所不能知之𤣥又得無與希世之術謬歟豫應之曰沈子之所為輯也時之人以為𤣥則從而𤣥之已耳夫臭腐神奇之迭變至於斯藝而極今時則又甚焉凡與於編者其人皆已售於當世既有司以為工而天下之人亦翕然趨之不必深於撰述之旨也而其言皆有枝葉靡靡焉以為恱於目而快於心也則宜謂之𤣥矣蓋昔有編詩而以極𤣥又𤣥名其或與之類歟是又不然昔之𤣥合一代之作者而鉤之也今之𤣥就一時之能者而鉤之也假令後先錯列則震澤毗陵二先生幾同揚子之覆瓿矣雖然前人之作歷百年而未有能繼之者今雖五尺童子試一操觚而衆且詫為奇焉則今昔之異當孰處𤣥乎夫𤣥不𤣥非吾所能知也飲食不可無鹽梅而味嘗在醎酸之外若此者𤣥耶不耶與是編者有合焉不耶易牙之調世或不嗜焉時之所為也沈子以為世之君子非其才不足以與於斯文而謭謭拘拘以是古非今為者要為無意於當世故其所詮擇云爾必欲就斯編而詰其所以為𤣥者微獨吾與沈子不能言雖其人亦不能自知之也夫如是則吾將以其不可知而名之曰𤣥矣二王公車義序豫嘗謂文之工拙如百物在市肆咸有定價雖復低昻以獲售要於其常終不得而易也世乃欲以愛憎之蔽而混美惡之常不已過乎雖然工與拙則必有分矣而特不可論於進取夫士不必短於才也雖得號為工文辭者未能無蹶也主司不必劣於識也雖得號為有鑒裁者未能無爽也士或稱心以言有合有離上之人操程度而求之其得者十五六焉略𤣥黃而取之其得者十二三焉是猶有一二人者在必不得之數也如使得失眩其中而卒迫困其外於纍黍未必合而天機未必動也庸可徒冀人以格外之賞哉雖然其在於今則又有異焉上唯恐才士之失也見似才者而輒收之寧過而離毋不及而合也甚且以不及之實而飾為過之形者亦往往誤見録焉士徼幸於詭遇則妄意以投主司之好上之人以憐才受欺而下之人以苟得長僞世亦皆知病之而其流幾於不可返矣若兩王生伯栩間仲抑可謂不惑於流俗者也自乙未北還出篋中文示豫豫讀而歎曰夫二君者則誠工於文矣蓋伯栩之長在橫溢而間仲之長在組織其程度其天機世無工倕亦知其不失尺寸也世無伯樂亦知其超逸絶塵也而不能必之於有司則豈非文之工拙誠不可以論進取乎哉然而二君之文固在也雖不能盡知其奇者亦不謂我好之而昻其直也韓退之有言吾文自謂大好人必大笑之夫如是雖或有疵二君文者容何傷乎夫以千金享敝帚者非也見世有寶燕石者而遽疑璞玉之難售亦非待價而沽之道也余久困場屋念當遂棄去而二君以平日之雅顧令敘所為文夫豫言之不足重二君審矣抑老子曰知常曰明吾試言其常以俟世之能知二君者焉張伯隅稿序豫嘗論制舉之文意不必創而依於傳注法不必古而束於排偶然而能者亦往往微見其胸中之奇讀之知為傑然者也非好學深思需之以歲月而中有所自得則莫能為之若夫勝人而取於人斯有不得而必者矣自學術日衰世多以貪常嗜瑣得之遂謂文固宜然烏用好古而不適於時為哉而炫奇之士則又託𤣥虛以為髙爭鉤棘以為工羣聚而姗笑曰文何必雅馴而坐令自困若此夫濬發巧心受嗤拙目從古已然而乃以區區之得失定其工拙亦過甚矣乎友人張伯隅聞而是之相與礪鏃括羽之日久其文之豐蔚如其先司馬公而潛思詣極蓋進而未已也既連擯於有司而氣益鋭功益専今伯隅既得之矣吾請以伯隅之所以自得質之伯隅往時有司之考文章也唯程度之拘故文之竄竊而萎苶者得幸進焉伯隅雖學為溫潤綿密而竟不能得也於是益務去其芒角以求合於時幾不能自持者比就試而掉鞅無前若鷙鳥之擊不極其力不止而㑹典試者冀得偉異之才棄瑕求瑜苟駭於目無不收者以伯隅之宕而能法贍而能潔宜不後人而一時同舉於鄉先之者且若干人豈其文盡出伯隅右哉則是既能得之而猶有不可必也其不當較量於得失之間審矣伯隅將盡出其槖中之文以觀於人人而豫為之序蓋喜伯隅之遭而并以解於世俗之相笑者也二陸讀禮草序友人陸孟祥仲鳴兄弟居憂之明年既小祥矣痛念泰初先生白首場屋不遇以殁相與茹哀績學其文日益工同社之友遂合其小試諸篇録而授之梓孟祥文若渥窪名駒不可控制而乃能抑受銜勒仲鳴文若芙蕖出水特為鮮妍而時雜宋人楮葉文若是其遇於時必矣顧吾不獨喜其文辭而已夫二君者之為之也異乎不忍讀父之書歟乃所謂如有聞其音聲者歟豫猶憶侍先生酒酣慷慨敘說生平及論為文利病皆鑿然可據暮年壯心隱隱見眉睫間也辛卯之秋攜二子試留都聞人傳一題不移晷即袖其文以示逮三場皆盡夜而出豫私憐其意以為士之志於當世者豈好自苦哉其中心有所感激誠不能自已耳既咸擯於有司間一過從則先生病欲殆矣嗟夫使二君者而徇禮之末不早自奮以畢先生之志世之訾議必有歸矣今以其哀悲慘戚之懷一寓之於文以求合於時故能若是工也雖然二君固為豫言之矣曰吾兄弟之嘔心而為此非徒以夸世而競名也懼吾今之未必然而功力之或未至冀夫愛我者之朂我而以慰吾之心也子可無為我一言乎因述其意以為讀禮草敘三侯日課小引侯氏三少如兒駒驟風聨翩並騖豫昔有詩贈之時則長者舞象少才九齡耳又二歲丙午而同日補博士弟子員閭里歎羡比於河東之薛且謂璩㻛機雲猶讓一焉今將彚其所課求四方是正而謬以士安見推請為之序夫將為名乎吾少非濫竽晚復罷瑟衆所同去也而何名可借將以為實乎浮洲渚者不以艨艟穿林麓者不以列駟又實之所不在矣雖然今之談經義者吾亦能言之指趣為宗標格為異菁藻為華不越此三矣夫聖賢之微奧經百家而傳注莫能窮也經生之帖括率三年而面目為一變也苟徒以拾唾為解悟學步為矜奇不已恧乎然則何塗之從耶唯氣與辭咸謂殆庶盛氣而前則當之者辟易不必其儒雅也擇言而吐則聞之者解頥不必其諦當也此於工拙利鈍宜有合矣而或又相左何歟吾嘗試揣之必也似之而非乎其非也所以出之而易為工其似也所以投之而易為入斯言也其必為達人所姗笑抑有命焉不可得而力爭也而豈為三俊少願之乎聊以寓衰世之感而已頃者尋繹孟氏知言合之於世道人心而豁然以悟悚然以懼然後知吾向之未始讀孟子也何時當相與劇談此義而姑以此塞今日之請戊申冬杪通家老友某敘嘉定縣均役册序代嘉定於吳為瀕海下邑沙浮而川涸常仰食於四方之穫種宜木棉然而夏秋之交或熇以枯或潦而腐加以颶風乘潮所摧折飄蕩畝無留莖而鄰壤之粳稌自如也蓋某始受事而聞於邑之人者如此及按籍而稽之田之在戶者凡一百三十萬畝而贏其役於官者歲以二十五萬畝而足士大夫之不往役者民之役而得代者貧不任役者常有八十萬畝之餘而海壖之潟鹵蘆葦之所藂生不與焉蓋自漕折以來迄於今其歲額類如此去歲庚戌御史中丞徐公某以巡撫涖治三吳圖政之巨餽運為先裕國之儲賦斂為亟江以南賦最重而吳又江南之尤也向者患占田不實役使不均民之瘼矣害且貽之國家甚非所以恤下而忠上也具疏言之於朝請依㑹典限田之制而酌議免役焉品官而下以次為之等差靡不有加然後率所贏田而役其丁壯與庶民均已得旨下所部州縣盡發花詭宿蠧與之更始獨嘉定令缺前後來署事者數更易桀黠反緣為奸利公又燭厥隱蔽行縣覆簡核而某適受朝命來為公屬吏於是勾稽剔抉復得花分詭寄之田十七萬五千餘畝各歸之於户而定其重輕之役凡五年以請於公而行之民間計役之田視昔加十萬焉始之譁者終而恱服籍成刋而布之某宜敘公之德意以垂於久逺有來諗曰漕不折役不以排年吾民不死而徙耳今者賴天子之恩得安於田畝役之不均殆未若鄰境之亟乎應之曰爾之鄰譬病甚而以藥石起之效在邇邑之人譬病起而以梁肉養之利在逺而必欲湔洗腸胃漱滌五臟以見功乎吾恐秦越人之不數遇也則又曰是固然矣夫籍田而役之役各視所當其劇易已分且歲更故均之易計畝而賦之賦不能無逋其急緩或偏且日棼故均之難往者獲奉上俞旨蠲漕之諸費派徵視鄰邑懸矣已又均派而别以其剩抵他所徵則已淆又或徴且輸矣而不入於司農後又責之民或用軍興加編事已而次第減免矣猶復徵之復輸之則非法或量田之腴瘠而為之則矣而受賕骫法者髙下在心長吏不能詰也毒良惠頑且滋擾凡若此者皆在事者之所宜先也亟圖之則政之平如役矣某於是懵然未有以應也竊以謂朝廷設官理人自州縣之長已得比於古諸侯上至中丞而綦貴矣實古連率之任也任重則德施普而所圖於民者大若概之於平也必自斛焉斗升可勿問矣位卑則痌瘝切而所圖於民者詳若鏹之在藏也一而數之即萬億自此覩矣公今既先其大者某也敢不黽勉於其詳以庶幾從公之後且一塞言者之意乎選刻邑學諸生經義序代豫始至嘉定士或謁豫而談治河其指畫舊坊與今日疏導之宜如親至其地者且曰夫學猶是也不循其源不足以合於道不通其塞不足以適於時豫聞而心異之有過從者與語移時叩其中所欲言往往令人解頤古所稱南方之學得其精華信矣已問知其舉於鄉者率不能過十人私怪士之售者少也及試禮部則此十人之中其得薦者又不後於郡之人焉豈其技誠然耶抑有幸不幸耶有儒一生詣余而請曰先生亦知工與拙存乎人得與失懸乎天此不同途而趨也能必其果相值歟世以其不相值也而獻嘲吾以其適相值也而自解皆惑矣以為得之者工耶其所以得者文具在也或羣一世而詆訾焉以為不得者拙耶是固然矣假令以其言而筆之得之者之牘或亦過而賞焉且此一文也一人焉以為工又一人焉以為拙必是與非分焉夫安知考文章者之必出於是歟吾以謂言語之工未必適用之具也要以匪是則末由詮擇焉耳夫如是雖有幸而得不幸以失者猶未為害也士亦務吾學而已夫苟學其用於世者而不務修其詞以求其合是亦吾罪也辭之修矣其得與失不與吾事焉先生以為然乎否耶豫曰子言類有道者疇昔之言治河殆子之徒歟故豫從蔣先生次第諸生之文姑就豫所見而以質於人人不敢言利鈍也有棄其本而以爭時為得計吾恐狂瀾之潰隄防汨陵谷以至於禍天下也因識其說以附於末簡若夫邑人士之學問淵源與師帥者之造就則有二先生之言在選刻邑學諸生經義後序代今天下文學之士江以南為最若東吳又江南之尤也豫生長於粵雖刻苦自力常恨不得游於四方以開發其意歲乙未始獲以資至京師浮江涉淮過齊魯之郊經塗萬里耳目所聞見日新往往聞人稱說江東山川土風之美與其賢士大夫之清華妙麗輒思一遊焉弔延陵季子之遺而訪問六朝遺蹟且觀古今人相去逺不逺也已謁選得蘇之嘉定學訓導以行竊念豫之朴鄙而為吳士人師中不能無慙然夙昔所懷一朝慰之實所自幸而快意者也比至未幾奉督學陳公檄率其儶二十人試於合肥與俱往返極登臨觴詠之適中殊灑然還而諸生以次來謁雍雍愈愈進止皆可觀已從㑹稽趙先生後得覽觀其文辭雖所詣不同要非生於文盛之邦不克至是也而是時慈溪王公為邑之日久矣務為作興長育以成人士之才不概以齊民之役折困之以故士得殫其力於藝文而趙先生素得號為能文章胡先生又自泗州來佐之故以豫之不敏而獲樂觀其成焉兹録也自去年夏以迄於今諸生之文之工者人各採擇以見其大凡或學成而方圓合度如大匠巧運規矩之中或才美而縱逸不羈如駿馬方騁康莊之足蓋豫向之想慕其地而欲一至焉者得從容與其人遊而又得遍觀其文且以暇為之品第焉此固豫所深愧而且自以為慰者也夫吳子游之鄉也其文學淵源必卓然有異而粵之文章自唐元和栁栁州始有師法其相去固已逺矣栁之言曰文以明道非苟為炳炳琅琅而已吾鄉學者至於今尊之不廢而豫之得聞於長老者如是儻其指亦無以異乎如曰古今人不相及而務為俗學焉唯繡其鞶帨是務則非豫所望於文士之尤者也武先生挍士録序代自士以剽竊為文索意愈深而實離屬辭愈妍而實陋主司亦能知之而誤揣以為才也反亟收之其人之得者因不復自知而世且妄推之謂是嘗勝於人而取於人矣且相與倣效以為之及他日在事則又撡是以為衡嗟夫此昔人之所以歎訛種相承也非一朝一夕之故矣邑故多老師宿儒凡讀書論文多得之歸太僕先生歸既晚達其才不能逮而效之者益更濶疏坐是或終困世之能捷得者遂用相詆訾謂得失果在我不聞詭遇可以獲禽乎於是邑之少俊咸思改轍而從焉去年冬華亭王先生既北上試於禮部而溧水武先生獨留課諸生於二三月間得文若干首選而刻之謂是可與世之巧捷者並驅而爭先矣乃不以屢蹶而棄之猥屬為之序某也質魯而意逺好古而不宜於今其何足以知之辭不敢當先生笑曰子之玉未嘗獻而足固未嘗刖也姑試之庸何傷竊以謂唯耕而穫獵而饗者乃可以論於稼穡之利摶擊之能耳終不敢開口而論以重為世俗之所譁獨諸君子之塗轍更矣其必將騁驥足於康莊無疑也若夫區區之所守譬之資章甫而適越雖不悔亦不敢以進也三先生選刻經義序代豫為嘉定之三年而蔣先生來自嶺右未期月胡先生自淮南渡江先後至為諸生師其明年六月㑹稽趙先生應聘為考官山西已中進士乙榜擢知桂陽州以去當是時二先生實左提右挈數進諸生試之拔其文之尤捐俸入刻焉以致其奬借之意而率諸生來問序於豫豫以謂士之用世其討論古今而擘畫當世之務見諸行事而間發為文章以潤飾太平獨經義幾於無用然而非精研傳注之學以求合於聖賢之旨則其文多不能工而施於用者亦往往鹵莽而不得其當故經義於取士為先且重然其體率數年而小變變而之盛則朴鄙者以華然拘牽者以超然而萎苶者以傑然其變而衰則求為麗適得靡焉求為奇適得誕焉求為健適得礦焉迭相勝而互相非其大凡也至於雕鏤之極朴以漸喪藻繢之過質以無餘又其騖於得者鋭情帖括而謂博宗者迂専事剽剝而謂獨創者愚漸染成風識者有隱憂焉嘉定僻在吳東偏俗號簡質其人多負氣有志節而出仕於時皆能有所自樹若沒沒焉以愧其鄉之人者未有聞焉蓋自王文恪公時已稱其長材秀民有出於他郡邑之上者而舉業之文則金式之先生其尤也雅自負與文恪爭鳴逮選於禮部名即相亞今又百二十餘年矣風氣日益以開而學問獨有淵源不隨俗汨沒以故變而未即於衰雖然吾懼夫燁然者之未幾而靡也超然者之未幾而誕以礦也夫士患不能何患莫知苟能矣而或不見知是有命焉不可得而强也士苟為炫飾之文以競時而爭名世俗必以為然其他日者之用於世能無苟且而冒沒者希矣今諸生之文具在也其所致力於學而求為可知者必能自信其何如也有二先生以策勵之又從而揚其名聲於時勉之哉毋苟為變而不虞其衰毋急於名而遂遺其實其所成就決不止於進士髙第也審矣夫豈獨二先生之志抑亦吏於兹土者之光也錢士孫射評序友人錢士孫既撰次射評寄示豫且屬為之序豫不能知射也而烏能言之顧往時見士孫與其友孫履正履和兄弟數聚而較射未嘗不往觀焉射畢韜弓囊矢相與追論其所以曰如此而得如此而失三人者亦未嘗不相視而笑也豫又從問之則曰吾豈能為不知者言耶即言之君亦欣然而賞之其不可得而言者君終不能盡之也豫退而思其言歎曰事固有習之而不能知者乃欲以不習知耶今夫貴人之家耳非不厭八音口非不厭五味也至問其所以宫商相宣酸醎相和者彼有惘然而已況於窶夫望屠門而大嚼聞管弦而竊歎者顧可以語此哉天下聰明絶異之資往往用之於言語文章雖世所號為能者童而習之逮老而好之尚不足以窺作者之用心況下此者乎然豫不辭為士孫序之者自以少即好學書每觀古人之論輒三復而思之聞有古人之遺蹟輒往求觀之若饑渴然豫之不能書蓋天限之也若心固能通其理矣士孫之射固已得之於心應之於手豈獨天性實由積習而然宜其能言之也古之言射者如所云貫蝨之心去楊葉百步而百中正如書家之言徑寸千字皆極論其妙非必盡然也唯中石沒鏃不數十步內不輕發此則誠然耳士孫以為然乎否耶夫士孫既以才勇用於當世摧折方張之敵立功絶域之外矣一不為世俗所容年未及衰去士伍而侣田夫方將灌畦種樹求為尋常無聞之人以自老特以其所自得於射者與世之所習聞者異不得已而筆之於書竊意知者見之當如孫氏兄弟之莫逆於心即不能知如豫者亦必不至於疑怪其言也昔士孫未第時與二孫就試郡城於時四郡之士咸集而見其射者無不嘖嘖歎息以為能士孫既免歸而履正夭死履和今尚未為時用豈士之遇合果不在於能也歟近聞士孫好種植又往往能言人之所不能言豈其天性敏妙如易牙之於味師曠之於聲故其知之為獨易也歟士孫或又出一編將復為序之若豫者殆所謂徒好言之實不能知之者也贈王先生試禮部序華亭王先生來教嘉定三年矣歲十月當偕計上南宫與諸生别酒半有執爵而言者曰唯先生績學纘言著美名而負屈稱以淹於兹土唯吾黨從先生游由所聞知自勤勵無怠然至有司考文章凡先生之所知售者十而一豈果不合於時之程度歟夫為有司者懼士之以奇邪進也寧失才務謹守其師說是則然矣竊以為士患不學不患其好為異也誠學矣即有所異同要不詭於聖賢人之指則何以拘拘謭謭為主司患不知也不必張一目以為羅也苟唯拘拘焉謭謭焉不務得士而若出於繩士以求自為解此亦非知言者之所出也蓋士嘗進而妄號為奇矣或誤以為才而收焉已而漸厭薄之士又將退而妄託於平若又誤而收焉是士終謬為形以應而主司直虛為名以自解也等謬與虛耳豈可謂能得哉先生行矣將卒守其學唯在我者之信焉不虞失時乎將亦少貶而詭為之形歟夫非獨奇者詭也雖平亦詭也是猶鄉願之託於中庸詭遇而獲學道者不以為恧乎先生􅋏然曰吾平日相與語者謂何其棄之也懲於往而不必諧於今告於人而不必持於已不知命無以為君子且吾不幸不蚤遇於時猶幸與二三子優游以從事於斯文也夫亦中有樂焉非獨以人之見收為已榮也且向之妄為奇者寧能盡有合乎吾終不敢以欺有司矣或有笑而應者曰先生慎之哉今之文章以襞積故實為有學以雕繢語句為精新此昔人之所嗤也世更相與慕效之而尚莫克以為況於守吾之學而又安所之耶則又有整冠捉襟而前者曰請觴之夫上之人謂士無實學易下之人謂上無知言難且子之言以為世卒無有能知者激也先生之言以為自信其是而姑有待焉正也先生今將遇矣謂世果無良有司能知言者焉吾不敢誣也於是先生起執爵而釂之曰敬受賜衆咸謂某宜敘次其言以竊比於古人之贈處遂不辭而書之學古緒言卷二
