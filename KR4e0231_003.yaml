body:
  text: 學古緒言巻三明婁堅撰贈行序十一首贈邑侯韓使君考績序淄川韓侯為予邑之期月政令肅然慢者知戢邑無逋賦又二年則廢墜畢舉俗用丕變雖小人罔不革面矣報政於朝廷得受訓辭以其官封其父母於是邑之搢紳先生思所以頌厥盛美而屬予為之敘夫侯之所施設朝堂皇而暮四境捷於風行草偃者予固不能悉知而具陳也獨念邑之難治其賢者學道而篤於信古其不肖者騖利而敢于扞網其侗以愿則稟上之令跼蹐而求免其身其桀以黠則伺上之微隂陽而嘗試其巧夫使信古者袖手而熟觀其所為愿樸者安居而不見其所苦雖不肖以黠騖於利而猶知顧其害巧於伺而終不敢輕有所嘗非其所施設真有以大慰人之心而能然乎哉葢唯公平不頗務於求民之瘼不急於就一時之功而後足以與此嗚呼此侯之所以能為吾邑者歟往者邑多賢宰然自南昌萬公而後逮今四十餘年之間其為邑人所思慕者則嘉禾朱公廣安熊公其尤也葢朱以清簡熊以悃愊皆仁心為質而行之以無擾今侯又繼之雖其因時布政不必同於二公要為邑之所庇賴均矣豈非瘠土疲氓之厚幸哉雖然邑之難為在事者凡幾變矣至於今而尤有厪侯之用心者予竊願有請也葢始者邑嘗困於稅額矣而均則之議行已尚困於兌運也而折漕之奏下自是雖單丁下户亦得充賦役以不至於困踣然而民不加饒俗以日偷又何歟葢嘗深思而得其故以謂人之賢者必不勝不肖之衆也其愿者必不勝桀黠之衆也且夫朝廷之寛政又必不勝里閭之薄俗也今侯已糾其慢矣計自兹以往其去此而為京朝官也尚需二三年則所深慮而亟圖之以終惠吾邑者意必先於化導乎夫以子產治鄭孔子所謂古之遺愛者而猶曰衆人之母能食之不能教也則求化民成俗於今之世不已迂乎蓋此聖賢人之所憂而王道之所不得已也故曰君子學道則愛人小人學道則易使也自邑之免於漕而理人者其政不格於勢其澤易被於民以侯之賢加以課最之後則今日之所宜先者將必出於此矣語有之夫事易成者名小難成者功大願侯之卒為其難予將執筆以竢以紀侯之徳政垂之無窮使後之謳吟而思慕者將有考焉矣是為序贈明府胡公改任長洲序齊安胡公來為邑之二年訟清事簡桀黠稍戢孱懦獲安方將窮簿書之紛糅剔租賦之姦蠧孰為病良而惠頑期掃而更之貽邑人永利而當路者嘉其治辦謂宜亟旌以勸移咨吏部改令長洲於是邑之大夫士庶咸惜公未究厥施欲叩閽留之而不可得也相與侈為文辭稱道盛美以贈其行且以致夫眷戀不忍舎之情而諸生若而人尤以受公特達之知不當苟同於衆人已也而以齒見屬為序則請言士人之職業以質於公退而與二三子共朂焉以終其惠教之意庶幾乎在諸生亦言諸生而已竊惟朝廷之所以求士而士之用於世者為其立身行已具有本末又以熟觀古今之故通變適時舉而措之可以利安元元為我國家樹不抜之基也羅之以庠序董之以師儒將長養之使有成焉欲知其材品之髙下也則試之以文章生於其心而筆之於書於以知其素所蓄積而需將來之用或十得二三焉若今日之所以養士取士者何如也士所以待其身不過苟慕貴富之鄙夫而已上所以求於士不過幸徼科目之時文而已一旦爵命於朝而責之以事任欲使忘其身圖而専意公家之事豈可得哉吳之士號為好囂而負氣而實不然也其偶詿於文法直一二輕躁少不更事之人若論其大凡往往狃於尋常而不自樹立騖於進取而不知本原欲求堅忍耿介不隨世汨没者殆累數百人而未有遇也昔者君之戒其臣曰無效某人之飲酒遊山也而吳之俗至以此自喜夫飲酒遊山固未足以累賢達豈不猶賢於恣睢足欲而無所忌憚者哉不知由君子觀之是二人者之無用於世正相等也而一且為衆所訾垢一且為世所艷慕是孰當垂誡也哉昔有侍歐陽文忠怪其多言塵俗閒事而不及於文史公曰吾嘗謫官夷陵逺地無書可讀得故牘一篋反覆觀之悉究其所以由此識日益進古之君子好用其心蓋若此而近世仕者嗤簿書為俗乃耗其精於鞶帨學者務㔄竊為文至辱其身於躁競一何陋且左也吾觀聖王之世雖其頑且讒不出於忠直猶以侯明撻記而又識之書要於欲其並生焉而今也上方謂士驁故摧抑之士又謂上戾復心非之表率之不先習尚之愈下尚何暇知學之本原恥自夷於尋常而卓然能有所樹哉堅也懐此久矣將俟公政成徐及於稽古禮文之事然後一畢其愚以諗於同志而孰意公之不終惠斯人也雖然長洲吳巖邑也四方取則焉下邑之人拭目以俟譬之赤子方去慈母之懐慈母豈遽忘之哉所以衣食其饑寒而風勵其行誼詩人之歌孔邇豈有間於去留哉若吾諸生進而古人為師退而内顧其安勉勉焉求所以不負公之知者乃所以報也贈署縣事郡丞吳公還署司理序江右吳公來貳吳郡之又明年㑹邑長侯官陳公以入覲留内臺當道者憫潟鹵凋瘁之氓則以噢咻屬之公遭歳之凶方厪公憂民且恃以為命而直指房公以行部闕理官又奪公還署其事里父老惜公之不終惠於疲氓也謁予而請序公之徳政以贈其行葢父老之言曰以吾土之瘠也力耕而常不足於食賦之繁也急斂而或益之以蠧俗之嚚也無辜而横困之以獄吾儕小人病之長人者未必遽知也即知之非遲以歳月未易紓其疾苦也維公始至恒雨為菑民號而籲之公為言於上官若恫之在身往者歳嘗凶矣幸而朝廷寛之久之遂不復征今或連二三年取盈於一旦察公之意似常留意於急緩不忍以一切求也凡民之黠者多為械悍者輕犯刑聚羣不逞以眩上之聴而僥幸於一螫而公察之若觀火懲之若加砭枉挫直信民且歸而安其田畆庶幾其漸蘇乎而孰意公之遽去吾民也其何可無一言以識斯人之不忘乎予聞古之為政者在時其威惠而善用之今公之惠如和風甘雨之於嘉禾將使根培而實茂焉而其威若鋤稂莠若驅蟊賊唯恐一日留為吾禾之害以數月之間而所施於人者已若是則予之為里父老序之雖謂頌而無諂可也且以諗來者俾有觀焉亦公終惠斯人之意也夫贈長洲胡侯入覲序胡侯為長洲三年將以上計朝于京師於是嘉定之諸生相與荷其甄陶庇覆者咸謂侯既去而不忘吾儕勤施無倦今兹行矣將躡其後而送之江滸子受知最深其可無一言以贈予葢聞侯之改長洲也有謂奪其已信之民而閼其漸深之澤仁人君子或亦有不樂焉是固然矣顧吾海濱之俗其君子務自簡而莫肯相朂以誠其小人務自潤而莫知相怵以法以故見徳易久成難豈若試之通邑大都即不遽孚久必大洽俄而聞長洲之政則已曰稂莠除而嘉禾可殖也未幾則又曰脂膏逺而中飽可絶也其最後則曰隄防完而疑駭者且胥為頌也以長洲劇縣而侯之治辦若此非獨仁足以惠養才足以剸割而已亦曰亷靜無擾能自克於已必有孚於人故舉而措之不難耳然而歳中侯毎書來必殷勤諮訪顧予拙不適時慙無以應則嘗為毛舉細瑣以自託於不敢自外葢在布衣之交有不必盡者而侯終不訝其迂且愚也毎感慨而策勵之何耶其所欲加惠之心無窮宜其不以芻蕘而有遺耳昔者仲尼之門天下賢俊之所聚也其或果或達或藝皆從政之才夫子葢亟稱之至問其仁而皆曰不知所稱三月不違者獨顏氏子而已耳以是知不仁之不可恒與不恒之不可為仁一也今侯之仁施於二邑矣進而立于朝所得伸其志者非銓曹即言官耳夫是二者其責彌重則其於仁尤大且難賢不肖之分途而是非得失之相左日接於吾也見賢焉而用之其不賢則去之見可也而持之其不可則排之此孰不謂然者而未必其果有合也必也平心而察之公聴而參之無眩於似無牽於情無動於氣無奪於利害始乎一人而可以對於天下行乎一時而可以信於異日夫是之謂不違仁不然乖於獨則偏見耳殉於同則阿黨耳非誤於不能知即失於不自克也欲無違仁不亦鮮乎是故君子必學古以精其鑒必虚中以持其衡必厚自待以樹其基必慎所與以防其蔽力此四者故全也嗚呼世之苟以通顯為榮者其中之媿負多矣有以斯言進且謂是病狂耳然則非胡侯其何以發予之狂言哉既以告於諸子退而書之以為贈卓明府奏最受秩䝉恩褒贈序上即位之明年壬戌天下郡邑之長咸以述職朝正京師而吾吳之賢令用撫按重臣疏請得不行者二人一為長洲葉侯其境四達舟車日常輳集且督撫之行臺在焉上事下輯加以過客之求稱而一以清靜簡易處之謐如也一為吾嘉定卓侯邑東瀕海常虞跋浪土田不宜禾歳仰給於境外之糴又其俗嚚訟苟力足以求勝顛倒是非猝難得其要領侯為之再期月以勤敏亷辨著稱既而秩滿於秋八月奉上璽書褒稱賜之秩榮及其親於是邑之人士撰文辭道盛美以攄其三年之佩服者踵相接也若黌舎三先生咸荷庇宇下亦既焜耀厥辭矣又辱使一畢其愚辭讓不獲輒畧陳惠政之大凡因僭及於侯之勸學作人而士之所宜黽勉報稱者以為贈葢昔人之論治其言流俗之弊莫甚於犯上亡等矣而今者蚩蚩之氓自改漕而折幸賴我朝廷數十年休養生息之恩與良有司之調劑緩急而沃以膏澤撫以抑搔自是邑多墾熟之田人受更生之賜而懵焉忘其所自不急於上供而顧輕耗於衣食且競騖於諍訟營窟於簿書因而相誇耀相仇怨以没於案牘之深淵以膏於刀筆之銛鋒一何戾哉夫非獨蚩蚩然也甘諍訟之鴆毒而蹈傾危之坎穽者比比是也是何異貧兒苦饑以賃舂積緡錢而盡捐之博徒幾何其不溝壑以斃也於此有人焉提耳而訓之爾其勤拮据乎毋飽食以嬉乎且急病讓夷乎此則長吏之赤子吾民者如侯今日之政是也若其學於古訓已得號為士人者而猶然不知戒焉是豈可不深長思乎請得具陳今昔之勢與吏治之難而後徐及於造士葢嘗聞之父老嘉靖之季年邑嘗中倭矣於時僅積土為城耳賊之慓悍勢若風雨然卒能固守使賊倦而被創以退者徒以倉有積粟可恃為守故也自折漕至今民之逋逃者以歸地之荒蕪者以墾下無所患苦而上亦易以撫循顧乃城無歳月之儲鄉有侈靡之習昨歳販糴少梗米價驟騰葢四隣咸為震悚而小東尤極憂惶幾於開釁幸而漸蘇有如頃者齊南魯北小蠢為患而創殘至今未息亦足慮也夫不憂空城而徒憂羣盜必無及矣竊謂憂盜起不若憂無儲懲倉卒之變未若懲積漸之媮此非齊民所能知而在事者不可不早慮也非侯之賢而孰任之非深為桑梓計而孰肯以斯言進苟為今日計向者媮惰苟且之習其亦可以一振刷矣而其暇莫急於勸學作人是賢士之模範而名公卿之所從發跡也登於朝則為世梁棟處於鄉則為衆表儀夫士而以經義求之正為其材品其學殖有可得之於文詞耳而今之人士唯浮華是炫務於爭時而已是可以為世用乎否也故欲勸學必先明經明經必守其師說似也尤當進而求之於古以廣其識無以株守隘之無以新異汨之即如詩子衿說者葢云刺學校廢也世亂則學校不修其留者思其散而去者則曰寧能不嗣音乎風雨思君子也當亂世則思君子不改其常度如風雨之晨而雞猶不失其喈喈也古之人葢有所本矣自儒者之以意說經棄古而自用而今之經義漸不難以剿說炫矣夫明經三先生之所以教也亦侯所以作新一邑之士而可推之於天下者也堅也竊謂頌侯之徳政者多矣或未有及於此輒不量而一吐其狂愚儻亦有可以療宴安之鴆毒坊瀾倒之横流者乎毋曰此腐迂不適於用也而擯之則於加惠非淺鮮矣非三先生而又孰為進之贈少府丘侯擢宰景寧序吳郡於東南為沃壤賦倍於他郡邑獨嘉定僻在海隅土髙而瘠不宜秔稌多種木綿又夏旱秋澇之逓仍幾至不給於上供當神祖初幸奉有俞旨民間得輸金以代漕漸以少蘇顧其俗頗嚚訟强者忮害弱者悁忿在事者懲而兩妨也頗為調劑以解之則過客之慕羶者又踵相接故其長吏必清節幹畧兼乃能稱塞矧於丞哉閩之上杭丘侯以諸生髙等謁選來為丞古者丞以佐令於邑之政皆得與聞而今且與簿尉分曹至専以詰除為職直尉耳丞之名於是焉虚非獨與前代異即在國朝建官之初制固不若是輕也陵遲至此而欲責以守官非其人素知自愛加以才堪治辦弗勝也是豈可多得哉始侯甫涖官即以亷辨著稱毎於日短民隩率其徒隸以夜分巡行閭巷而所由亦懾不敢肆為奸弊故為邑者得倚以不患盜葢其克勤於官類若此既秩滿考功績其薦剡擢為處州之景寧令以行於其别也予友數輩來屬為贈言夫予向之為丞鞅鞅不得比於令者侯今且為真矣以彼佐劇縣而優況永嘉所領下邑其俗又崇讓力田而鮮獄訟於卧治何有又其境東南與臨汀接壤風氣不相逺而人情易為調不待涖事久而政聲著已逆知其易於反掌矣以予所聞侯少師事李文節公歐冶之鑄何虞缺折良樂之眄必無泛駕且異日者為人佐而優今幸得自展而寧有弗辦哉顧獨有一言欲質之於侯今之君子不嘗曰善事上官無失名譽乎夫所謂善事者何等也將為朘削以充餽遺乎則小邑貧民弗給也且君亦弗屑也將以工窺覘善逢迎乎則時之人未遽為動也若曰是在吾居官何如耳則君將出於燁然者乎抑悶悶焉已乎夫悶悶之不逮燁然也已久矣即求以夸世炫俗亦似不易則曷若行侯之所學於文節者乎當李公在朝廷士之欲躪公以干進者不啻多口今其人皆何如而於日月固無傷也是在侯審之而已顧予數年以來衰嬾杜門不獲數聆緒言以為恨而穉子復聞纔學弄筆乃重為侯所歎賞數稱於人人豈腐迂之家學儻亦有合於文節之所授乎輒不辭讓吐所欲言而質之且以為侯贈贈申美中北上序萬厯丁未春予友申君美中以進士試禮部程文為主司所賞甲乙巳定發巻得君姓名矣及索第三塲巻於簾外久之不能得遂相與歎息置之人皆謂君或忌而擠乎君獨曰胥史之誤容時有之吾不幸適與之㑹耳且得失命也早暮時也寧可厚為人誣耶又三年庚戌君復束裝偕計北上道病而還則又歎曰此豈復人所為乎吾時尚未至故也聞者莫不韙之兹歳秋杪君行有期於是君之懿親徐元嘏爾常屬予為贈行之詞予以謂古今之變若寒暑之迭更而人情未嘗變也昔者韋賢相漢實啟𤣥成至唐李徳裕宋韓維皆以任子進用致位宰相莫或輕之以視今日豈不去古逺哉然以李之才氣勲業尤三人中之傑然者而未免介介於科名人情之常古今一揆斯可覩矣今君之行也詞學日益富而志意不少衰其遇合必矣如予駑鈍自分為太平之不遇人而辱與之游久益相習竊嘗窺見一二使君獲遇其所樹立於他日當必有本末非苟然而已自君受室於徐中間盛衰之故存殁之感為不少矣當宗伯公之無恙也歳中僅一再至少留即别去逮老成云亡競爽繼謝而勤渠有加葢猶以外姑存焉至於夫人之喪遺祚煢煢然後見君之不改其度不愛其力誠非世俗之君子所可及也予以是知君必能自力以顯功名於世豈肯隨世汨没者哉然予觀文饒之為相在太和中則困於相軋不能安其身於朝廷至㑹昌嚮用然後勲名日著以是知君臣之際苟不能盡其才猶弗用耳方今當國家全盛固非若唐之中葉然而否隔之勢豈獨庸庸者無所措其手足士生斯時而猶汲汲於一日之遇必非苟慕富貴而誠欲有所自見審矣則將何以哉爾常數稱君平生不妄交一人唯以著述為事此於用世誠豫之矣獨未知他日所以得盡其才者能自必與否耳猶記初相識時君甫踰冠予已壯盛忽不自覺荏苒以老而君亦及於服政之年矣斯行也遇合未可前期而試用咸所慫恿若予之贈行獨有慨然於太和㑹昌之際而已贈别王遜之尚寳詩序蓋聞邁種之英趾美之彥其才皆有大過乎人以故通方之論未嘗或軒輊焉夫寒士毎困於無資然而憂患之玉成為不少矣世胄每憑於有藉然而宴安之鴆毒亦多有之譬之方舟而溯拾級而登雖遲以勩何虞溺且躓哉若夫順流張帆走坂以馬十有一危能勿懼乎今吾遜之以甫冠之年承祖父之緒人謂世徳之難求也薄俗之難諧也弱齡之難立也咸為疑之乃未幾以䖍恪無惰媮稱於族姻矣又未幾以精警無滯碍稱於賢士大夫矣向之羣疑化為多譽行且涉江淮越齊魯而遊大都揖讓公卿之間雍容清華之署譬懐珠玉而走市肆必有賈胡挾重貲而議其價不翅鄉閭之譽而已於以趾美祖父不足重歟始予勸遜之勿為經生之學宜専力於前史史之書莫要於司馬氏通鑑此治身之藥石而醫國之俞跗也逮今三年矣遜之識益明才益裕則又將進之於學道夫道非他即史之所載有險有夷有經有權而皆不詭於正無動於氣無牽於情無懾於勢不失其本心者是已吾嘗怪李文饒相業盡掩時彥有光前人卒以懻忮之私釀朋黨之禍旋至身竄國危惜乎有才如是而於道未有聞也遜之儻不以予言為迂乎則其於讀史也彌博彌精矣吾二三子之自託於贈言叔達既序於篇首而余復申之以見拳拳於遜之如此者知必有以大慰之也送程孟陽遊楚詩序孟陽以是歳冬首將為楚遊與之善者咸謂孟陽性愛佳山水遇所快意嘗獨留經時況自吳適楚溯江而西南浮洞庭歴衡湘而返數千里之遥怪奇偉麗之觀皆平生之所未遇也又得賢主人焉從之遊豈復如兒女子眷眷焉戀不能别乎哉於是咸賦詩以贈别而屬予序之予以為吾黨之交或壯或衰或久或近各稱情言之靡不見乎辭矣予又何敘焉無已則以規乎自予方壯而獲交孟陽今衰甚矣其始葢得之於詩知其能不為世俗之文也既而愛其為人超然逺韻固非予之鈍頑所得而友也晚與讀釋氏之書皆信以為實然自是觀於身世常思漸解纒縛而孟陽困於謀生予衰始抱子知其莫可如何則愈益信其言雖有姍笑不為動也顧吾兩人獨自有不釋然者予之疚在多岐而神不得寧孟陽之癖在愛奇而意有偏溺葢其志初若甚逺顧往往心知其非而終不能割吾兩人實自媿之其為人之姍笑宜也今兹之别未知相見在何歳月毎念此身各自有役誰能解免但能澄懐觀妙即千里同風若長為習氣錮而留之將嗜慾日深而天機日淺即相隨若形影亦曷足貴哉試相與反而循其本予之疚孟陽之癖是安從生哉多岐生於自擾而愛奇生於自喜苟有一焉横於胸中欲坐進此道其可得乎葢非獨予以潦倒廢雖孟陽之髙抗絶俗亦恐其齟齬而不相入也斯言也以贈子行且以自朂不知復何以處我予雖不敏將唯子言之從以慰子他日相見各得澹然洒然庶幾乎相與於無相與云爾贈大理朱公北上序檇李朱公自去下邑官南曹一出視江右學政以能得士擢亞南光禄潔清公忠之譽播傳於天朝俄晉大理丞丁外艱歸服除當北上需次諸生某辱知最深以久牽小舟送之吳門從容而言曰國家以政事責成六卿雖與密勿之謀謨者不兼是任官不尊焉至其與六卿並重者都察院以總憲也通政司以納言也而大理寺與列為三夫掌邦刑而詰奸慝者大司㓂職也理官不以為屬而獨得以駁議參聴槐棘之下豈非聖人重民命而恤刑罰之意歟今天下獄成而上歳得旨決者有幾至所遣恤刑之官平反纍囚凡幾當不翅十倍之也則幾無寃民矣顧其不麗於法而貪殘之吏馮怒榜笞以死者何可勝計無乃加詳於疑似而顧鹵莽於無辜歟夫若此者在廷之臣不得而與知也則曰非吾責也雖有能舉其職者不能及於所不見不聞也雖然輦轂之下無辜而籲天者為不少矣吾既聞且見之矣而不以言姑縱舎一二微罪以博寛平之名謂能舉其職乎否也且世有居是官者一以直道黜則後來者希有能繼之矣然則君子之欲行其志也如之何曰審所重輕而以去就當之其始也務婉而爭焉其卒也無詭而隨焉若曰潔其身而汙其君信於獨而毁於同君子必不爾為也要自有吾所得為者矣夫子曰舉爾所知爾所不知人其舎諸夫用人固然況於闗人命之至重哉其毋以不肖之心逆待天下之人而盡心焉以為士大夫倡則必自明清單辭而務審克之庶幾乎國家所以重任理官之意請以是為公贈贈明府韓侯擢兵部序蓋聞君子之取人也唯其果有異於庸衆而不求備乎才其人之受知者亦不以一時之知為榮而常以中之無媿為樂是故可以相信而不疑也淄川韓侯為邑凡六年而擢為兵部郎於其行也咸侈為文辭以贈之大要頌其守官勤民六年如一日能使四境之内室廬櫛比向之潟鹵比為膏腴若侯之賢固非一邑之所得私也某於諸生中受知最深自以樸遫小材無足比數而侯常欲嘘之既枯庶幾使有聞焉將所以取之不在乎其才歟抑以為士苟有以自信其幸而遭時或可終不負歟則某也願有陳於前其果以是而取焉否也某閒居讀書好觀古人之奇節偉行而尤注意於經世捄時之畧嘗以謂豪傑之士雖目不知書而能坐策成敗無一爽然則苟才矣雖不學可焉若其泥古而不知適時一旦為事任所屬幾何而不僨哉昔者孟荀二子同時號為大儒而一則追論唐虞三代一則曰法後王二子者豈誠有異耶夫古今勢殊譬猶江河之不可挽而西也然而古人之所以待其身與推而用之當世者其意終不可失也是猶水之坊也以舊坊為無用而壊之者必有水患士之銳於集事而不能深惟其後者豈不自負以為一世之才儁哉彼其中之所守與學道之君子異矣唐之季世非李文饒不能輔成㑹昌之治今觀其才殆過於裴晉公而勛名終有媿焉亦其意之不廣也某也顧其駑鈍不敢希望於古之才儁以為得賢者而從其後量力而處之或可以少有補於時不幸不為時用則直已守道求以不媿於心庶幾不為賢人君子之所棄如是而已矣今韓侯不以其衰廢無用而常思振其不逮將所以取之者或在是乎不然侯之聰明絶異宜不可一世豈必某之潦倒而後為無當哉侯行矣將佐尚書為我國家籌制馭四夷之策夫兵事常先機權其倏忽變幻如雷霆風雨之驟至尤不可以蹈常襲故為也吾固知侯之處此不難矣昔人之言曰不求有功不得已而功成故天下安之噫嘻非某之好古而不適時孰肯為斯言非侯之虚懐樂善素有意乎其人亦何從而發其狂言哉某也年加衰道不益修自今以往雖其姓名亦不願人之知之獨於侯數年之知中不能無媿而尤欲質其所守以自樂於田野之閒也於是乎言學古緒言巻三
