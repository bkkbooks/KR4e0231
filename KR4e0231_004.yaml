body:
  text: 學古緒言卷四明婁堅撰碑記七首婁塘里别建邑侯朱公生祠碑代嘉邑於吳最僻以遐竟東北為海壖尤潟鹵磽薄穫不償勞民以疲􅒵剽輕鷙悍之徒輒相聚為賊盜縱橫村落間無所忌自嘉禾朱公來涖兹土撫循刮摩稍稍復蘇其民三年奏最擢為南儀部郎邑人咸追思之謁大宗伯徐公請紀其德政於碑碑在治城西三里所固已鏗鍧焜耀傾動人耳目而婁塘里獨處北偏相去十里而遙里人念往時終歲拮据莫克內贍其私啼饑號寒户相屬也而催科之吏又日經其門叫噪索食飲逮日晏方息乃鄰里復相戒唯不免其機杼雞犬以為憂今之優游田畝父子相保以幸一日之生者繄公之賜於是鳩工聚材為三楹肖公像其中尸而祝之而屬豫為記豫家里中嘗從里父老言民所疾苦以壤地髙下錯髙者無所受水不宜禾其庳下則蓄而不泄往往漫為陂池乃禾之費煩顧不若木綿之利饒貧民益甘心焉而以歲委之雨暘歲穰即寬然有餘具酒食㑹閭里為樂然莫為卒歲之儲歲儉即相寇敓語難夜聚曉散日操鋤犂與平民雜處耕作人畏之咸搖首縮舌噤莫敢出聲吏亦知而不能詰今天子御宇之七年吳中大祲於時主計者方急東南之賦有司奉行若束濕尫羸就斃之民而以箠楚令乃十年之秋瀕海如掃幸而不飄蕩淹沒則又病疫以死公始至之日與時休息行之期年民大和㑹乃搜奸剔蠧鋤其强不顧化為民蟊賊者十數輩而吾里乃晏然以安既又行視其地喟然歎曰夫民孰不顧其父母妻子顧為饑寒所驅則身之不遑恤吾當為開其長利焉里中故北受海潮其東北别滙為雙河度通之可溉田數百頃化疏惡為膏腴民永以庇賴決策行之㑹公歸朝廷不克以為而繼公者今廣安熊公竟成公志庶幾為百年之利余惟公之潔亷慈惠一試於閩漳再試於吾嘉方日益光顯究其所施設豈窮陬僻壤得而私之哉顧昔之君子如朱邑既去桐鄉猶眷焉不忘夫民之安其治也則公或尚惠顧焉況於赤子之念慈母幸得見其倣佛者何能無藉於斯因紀所以建祠之意而系之以詩詩曰澤國瀰瀰湖海絡維厥田下下唯稌則宜曽是瘠土雜髙以卑孰菑孰畬以卒莫治其髙伊何彌望斯茅其庳伊何有泳斯鰷民亦勞止盡室嗷嗷或張之喙躑躅咆哮天降灾沴歲比不登以饑以饉奮敓朋興孰弱是綏孰强是懲顯允我侯洵惠且明侯來自南時靡有息詬之吹之衽而席之摧之刈之擾而迪之肆以敉寧化其額額侯歸朝廷未究厥猶有來代之步武之求爰疏爰瀹合于下流匪乾匪溢迄可有秋有湎流水言搆之堂朱甍繡戶華煜其光維侯之像象服斯皇唯侯之德穹碑在旁吳淞守禦所建中丞周公去思碑文代王文肅公作國家自御史臺簡命撫臣文武兼資外控四夷內輯諸夏凡若而人而兩京兆洎外藩長以下咸受轄焉蓋中外臂指之勢居重馭輕故督撫中丞最為尊官而重寄然獨南都特以糧儲勑之者豈非以三吳財賦之區尤重其責故耶顧其地帶江環湖北界河淮而東瀕海兼魚鹽之利則剽敓時有鄰島嶼之夷則門户為虞非守文之吏可從容以簿書治也故治軍與民為並重豫觀昔之郡守皆兼軍政得稱帥而今制獨委重於督撫如藩臬之有巡守畿輔之有備兵反若専於彈壓郡縣為法紀之司至於兵戎不過期㑹之間耳五六十年以來幸當重熙纍洽之運海波不驚萑蒲易撲民間恬然幾不知有兵一旦猝有帆檣駕浪之警於以辦賊難矣頃歲中丞周公奉命巡撫江南至則按行故事深究利病歎曰凡吾所職國之儲民之衛也兩者治則兼賴敝則俱妨今吳民勞於野士疲於伍譬之琴瑟不調意嚮者其急於下而緩於上乎殆不可以復鼓所以更張之不在今日歟夫民有不足於耕吾不能督之輸也兵有不給於餉吾不能驅之戰也必也若養苗然厚培其根而務去其蟊賊乃克有濟於是條為方略與民之牧士之帥矢共守之蓋三年而前之勞者安於堵垣疲者朂於步伐有彤弓之右饗無鴻鴈之哀鳴政成俗和朝廷方用公於治河代者將至而公以請告去吳吳之為文辭以紀盛美者多矣而總戎鄭君印率其屬夏君永昌謁豫而請為去思之文以勒之石以識將吏之不忘豫以謂凡公之施於民者非兹文之所悉也雖其所以治軍亦未暇更僕也吾嘗聞之自公在事而不以束濕繩武吏使咸得展其材用良楛辨而黜陟公以故卒旅之長母敢以不肖之心驁於其軍而拳力之士亦毋敢以不逞之氣譁於其伍凡下之所欲不謁而皆有以慰其心凡上之所驅不約而皆有以倡其勇如是而軍乃大治史稱杜預鎮襄陽勤講武嚴戍守引水通漕公私咸利意預之學長於春秋左氏傳其經文緯武優於幹略宜矣今公之撫吳儻亦出其武庫之緒餘乎公名孔教江西之臨川人起家萬厯庚辰進士嘉定縣吳淞所新建吳侯通渠記代凡吏於吳者所以修民之急有三曰賦斂也獄訟也溝渠也而嘉定東瀕海其土田薄其人多憃以嚚其地髙不受江湖之潤潮汐至則盈還則淤故於修此三者為難然賦之逋也能勤勾較乎均緩急乎則易矣訟之繁也能絶請託乎懲貪狡乎則易矣甚哉水之為利害也嘉定之水不數疏則灌溉無所引疏之則瘠土疲民懼不勝役焉計塘浦之在四境其大者猶以百數每歲自孟冬即役境內之民奔走數十里外裹餱糧冒犯霜雪常至春暮乃得罷督作治者更緣為奸利役不均或更加抶以罰作苦之今年而東明年而西以次及於四境不數年而東又告淤矣歲所興役民間之費幾於常賦外畝增十二而衆不至怨且怒者以為猶愈於淤而無可耕以瀕於死也此其視旁郡邑何如哉長吏雖賢重憫斯民而勢終不得已則務講求方略身行視慰勞之不輕以屬丞簿苟如是即民亦歌呼趨事務為中程罔敢怠先是境西偏多納湖水東貫治城迤北入海故有練祁之名自松江中掣於新洋夏駕今之東西流皆潮汐也積數十年來海水之入采淘港者西北至月浦又西至馬路塘日再停淤才通一線耳居人至無以溉田以故其收常不給於賦今南康吳侯涖政之五月歲豐人和田收既畢當有畚鍤之役侯既相度兼以咨諏慨然歎曰邑所仰松江也而非邑宰之所及也凡江水之所從入吾將多鑿故道而迎之未遑也吳淞戎鎮為防海重地督撫大臣及臺使者歲一至焉而舟楫不通庸非吏責乎於是戒期鳩工測量深濶督旌怠勤方略既具鞭箠不煩幸值冬旱無坐靡廩食之費無蹴氷躡雪之勞役凡閲月而成向之平陸疏為洪流農人相賀泄潦沃枯戎卒之來揚帆飛槳侯又憫其功之勤而虞其湮之易也將築為壩以圖於永逺然而溝塍久涸人喜驟盈侯曰樂成之民慮不及逺且吾興役於積湮之後故用民力過多後有繼者數年一濬第求母減於濶其深必殺之則力省而功倍矣遂止不復壩焉於是所城之軍若民快所未覩美侯之勤施相率來請紀厥成功以告於後來豫哀嘉定之民獨歲不免於畚鍤故具言濬渠之便利俾知勸而忘其勞焉若侯之所以施於政者其賦斂之平獄訟之簡侯既易其所難矣而況於易易者乎兹固不得而詳也侯名某江西之星子人萬厯辛丑進士修復真際菴記自竺乾之法東至支那其徒之能紹隆者譯梵為華疏隱為明所在為大衆宣說勝妙往往致天雨花石㸃頭良由戒墉慧户善本夙植非偶然矣逮菩提達摩擺落聖諦解粘釋縛直傳心印而禪學驟盛以今觀楞伽四卷性相瞭然固吻合二宗也其後禪之訾講則曰枝蔓講之詆禪則曰荒唐蓋末流自分源豈有二哉有三際師性通者自蜀宕渠來遊瞽也而善說經其渟而蓄之如水在潭注而不溢其吐而出之如瓶㵼水酌而不窮七歲喪父八歲喪明十一出家明年禮峨嵋雞足南登衡嶽凡歷十年所北至五臺留京師又數年反而渡江訪牛頭祖堂之遺東浮海禮補陀落迦而還遂止吳中往來嘉定太倉間時年未三十也善信翕然歸依願聞圓覺楞嚴法華師隨其根器而為之說或詳或略咸令心開豫嘗贈詩云近遇西來盲講師世間文字未曽知瀾翻千偈縱橫說愧殺窗前弄筆兒昨歲又暗誦不可思議解脫法門通其大指將復就善知識而研究焉其精勤不懈如此先是元泰定中僧良玉者創真際菴以聚其徒在州治之南面城臨隍圮久矣居人以佛地莫敢為室廬鞠為草萊咸謂師之來其當復乎度其地廣輪可五畝故李參議之子願捨以為施衆曰夫檀那不専於一人也與吾儕共之其可乎相與率錢九千酬其直於是凡屋之材無脛而自至凡屋之工不募而自集而菴以成焉師嘗乞故王文肅公題堂額仍其舊名又屬豫書懸之門且請為之記師之言曰吾非不知吾身之幻而斯菴者又直幻之寄也顧昔人創之已廢而人莫之居也吾自東川適來因善信之緣而修復焉他日吾雖去此其必復為緇流之所棲乎書以告為吾徒者昔何由創今何由復以幻軀寄而以真際名何居則知四大幻也軒楹牆壁幻也即之則究無一真離之則真亦不立有實相焉以去來今為境塵塵密移而莫窮其際以空假中為觀法法俱捨而默契其真昔之逍遙雲水耶今之託宿蘧廬耶何者為際何者為真拓而廣之吾不為德撤而毁之吾不為怨顧合衆人之力歷三年之勤以與吾之徒寄於此也唯其為佛地焉而莫與之爭故也後之人能無忘真際則菴其永存乎豫乃記之曰菴之經始以歲己酉而地之闢也以明年其屋於前後者各五間有崇庳無廣狹而左右翼又各三間佛菩薩之像設僧之寮齊之厨亦略具焉菴前隙地其徒以誦持之暇鋤而灌之亦可以不匱於蔬豫以謂百年之廢一朝復之於吾邑佛事之盛衰亦當使後有考焉壽榮堂記歲丁未春婁子遊杭之西湖又至徑山皆從學佛者信宿歸而名其堂若菴曰壽榮曰歇客有過而問焉子之所謂歇者雖余能言之矣子自少壯至於今漸衰服仁義以飭其躬敦詩書以修其文汛而涉於小道以自適其意可謂已勤矣今將反之於無思無為尚不欲揭仁義以行而奚謭謭焉以藝文為顧子既已遺形忘生淡然無所慕於世而猶若有羡於壽且榮者何歟婁子笑而應之曰若殆知人壽而未知天壽知勢榮而未知義榮也夫吾生有涯而性無盡復其性者列仙不足為其壽矣吾身可賤而道甚尊樂其道者三公不足為其榮矣吾雖與世異趨直寄而名焉奚不可哉雖然吾之所以名吾堂者蓋可得而詳也昔者先大父始卜居於此及壽八十㑹朝廷以元子生覃恩海內獲膺冠服之榮有司以是旌焉所不忍沒也又所居在市南負庚而面申每至於夏朝之旭滿吾堂焉夕之陽滿吾牆焉不勝熇也乃於中庭及旁舍之東西檐外種桐數株不二三年交柯布葉無風自涼及冬而葉脫林立又不礙吾暴焉夫桐榮木也或曰其植根淺而幹中空易為風所摧多不克於壽今吾家闤闠之中垣屋四周吾自下而望其顛如出於井中況又鎮之以巨石不虞摧也庶幾其壽乎堂以是二者名焉雖性與道非吾指也矧於若之言云爾哉於是客亦囅然笑曰非其意子之淺也不獻吾疑則子之名斯堂者不著因次第其語以為之記慈月菴記釋氏之書言觀世音以慈悲願力安樂衆生自無量劫前已證如來果復於今賢劫現大士身佐能仁闡化安忍而補陀落迦莊嚴道場則無礙大悲心所由演說也況又補處安養故長行密咒見於梵策多矣而七俱胝佛母心大準提陀羅尼獨以密圓與大悲埒皆未來世薄福衆生之所依怙也自非業重障深即未能悟萬法一心其孰無意於誦持乎若夫閨房季女所見不越於户外所圖僅狃於目前氣非稟乎剛强巧未極於機變少能以柔和銷其隂忮未嘗不悔多生之迷悶而庶幾一日之解脫也故其志能不渝而其勤能無倦以豫所聞潘母施孺人其庶乎吾吳之産而吳興潘大夫之簉也子振為諸生有名以書來稱其母之賢而痛其不及於下壽也且曰吾母之妊振也供養觀世音甚䖍比生而白衣重胞其徵也又嘗捐資造準提金像送資福院供焉而晨夕持陀羅尼靡有間其深信如此今不幸殁矣將捨其簪珥之遺創慈月菴而具像設其中蓋吾母之手澤存焉庶可以寄吾之思慕也願為我記之豫以為親之鬻子自孩提稍長而成人凡所得致於其子無弗用也而子幸無恙又幸無過能自立以為親慰可必乎哉子之事親自用力用勞而養志凡所得致於其親無弗用也而親之所遭與其所享安常處順以永其天年可必乎哉然則孰為可必者不曰惠迪吉從逆凶惟影響乎而時有不盡然於是又分别言之曰天定人定云爾獨佛氏以為其必然而無爽者多生相報之業屢遷而常定者歷劫不昧之心頗為妙圓而拘拘焉者且詆其謬悠也彼蓋曰凡愚皆動乎其情情有染而墮於因因所以為果之招聖哲唯循乎其性性不動而妙於常常所以為果之淨信斯言也夫焉有常而不可必者乎所謂常者何也殁者存者淨信之心是己母以是為慈焉子以是為孝焉慈非有為慈吾為人親則知有慈愛而已是即法王之愍念也孝非有為孝吾為人子則知有孝誠而已是即衆生之悲仰也雖以觀世音之十力四無畏三十二應大準提之吐黑變白根器芽生即顯即密一諦一圓豈有加於此心哉試以論於孺人母子可信一念而通三世焉夫安知今之母非昔之報而後之子不還受今之報耶彼其言升忉利天為母說法而豈誣也哉若孺人之淑慎且慈雖殁而生天其可也如有誚我學孔氏而言謬悠者儻亦可無辨乎曹氏北郭園居記太倉治城之北去郭六里而遙有宅一區巋然村落中水縈之若帶曰杜氏之故園而曹養吾先生之所更葺也入門為廣除堂髙而深左右庖具列折而東則一樓踞焉傍植玉蘭大各幾數圍其枝皆出於檐花時照耀樓中目為之眩樓之東藂桂參差又雜蒔百卉為屏春暮過之其香殆百合也徑轉得赤欄橋跨池上再折而入雙梧交䕃一亭子最宜於暑晝不見日夜不受露獨涼風飂飂自踈枝中來耳橋左出迤邐而北行藥欄中數十步忽復得一亭亭之基纍石為坻在水中央以一木低水而度又其北甃石引流客至以濫觴别有亭北面酒䦨得少憩焉躡磴而下乍見修竹離立如人循而右漸益深密中為楹三間常以三伏時與公之孫申錫課文其中清虛隂森爽氣徹人肌骨蓋園之東觀於是焉窮矣公既以養痾謝事數來居於此又愛其孫俊才欲亟觀其文以娛老則又别營其西偏隙地凡為樓為檻為軒者又相望而出軒背三老樹面列湖石為小山水檻僻在西南幽敻如别境樓四面阻水僅闢左扉為橋以通出入橋之中復為茒亭觴咏奕博咸宜每一登樓臨牖豁然野色無所不受公來必與客俱圍碁既罷間一吹管度曲聲出水間恍在山谷而申錫復與其徒伊吾隔林窗間夜分時一燈青熒書聲來入公耳髙枕聽之此樂不復與人共也公既殁且葬而申錫復來讀書念其祖之平生繪為圖而以記見屬且曰申錫年已壯矣庶幾蚤夜兢兢以無忘先大父所以訓敇之意今且與天下之士獻其義於主司見似目瞿則恃有斯圖之在吾笥也子其為我識之豫之識公也晚顧幸得遊其三世甚習蓋公時年已踰七十又素善病里中人莫得睹其面而公之子進士君思所以娛公者數置酒召公所厚善二三丈人與談笑終日公或坐或卧欣然忘疲而豫以通家子數得侍見其形羸神王而議論必依於孝悌謙厚非苟然者嗚呼今之世幾不復有斯人矣幾不復聞斯言矣故豫為記其園而不覺夫涕之潸然也萬厯甲午仲秋婁某記傳七首先友朱清甫先生傳昔我先君以溫文篤行稱於其鄉多隱君子之交故豫自垂髫已獲侍老成人及稍長辱以小友接之距今蓋四紀餘其人皆已凋謝先君之殁亦垂二十年而向之髮鬖鬖侍側者不覺已頭童矣追數先友若王丈叔楚唐丈道述宣丈仲濟丘丈子成張丈茂仁洎清甫丈此數公者或頎然嚴重或坦然恬夷中或退然而勇於為義言或呐呐然而叩之不窮行修而識明論議皆依於忠厚而確然有所不可奪非世俗之君子也幸猶及識其人聞其所以論身世之故竊嘗識之每歎世道交喪日趨浮薄正猶狂瀾橫流而前哲之遺範遂同潦水之歸壑幾無復存者蓋不勝今昔之感焉朱先生之子若孫既屬書志銘又列其遺事請别為之傳以垂示於後人豫以謂先生窮而畸於世與俗為無町畦雖子孫豈能悉數其生平獨其不可得而招不可得而懾以藝事之精絶而强半入於酒家有欲名先生者第當以此想見其風采譬如傳神乃在頰上三毛不然而徒拘拘焉求肖於豐羸黔晳其神弗存也憶豫少時尚未能盡知先生而獨喜從之遊每往扣門必坐語移日周覽一室之內牆壁窗牖皆古人樂性之言及再往則又别書易之凡與遊者真若挹清泠以沃焦腑數稱薄糜不繼襦不暖謳吟猶似鐘球鳴以自況焉嘗聞之張茂仁丈一日於衆中飲坐客紛呶私有詆訾獨執手附耳曰吾第與君飲此何足汙吾耳耶蓋爪入於掌幾至傷焉先生之天性耿介絶無阿比意可概見矣閒居遇可喜可愕輒寓之於酒曰一與之同其適一與之分其塗以是樂之終身不厭也當其久病且亟豫往問焉呼入坐卧榻傍因問病中亦復飲乎微哂而應曰固知今為所困但與之昵久如形影然終不能絶也時亦濡脣焉以待盡而已昔蘇長公稱陶靖節出妙語於屬纊之餘若斯言近之矣以嬉笑謔浪而處死生之際此為何如人哉先生少而多能博涉有餘力而世或重其雕鏤幾欲一切抹殺則過矣其書工小篆及行草畫尤長於氣韻長卷小幅各有異趣不多為詩而間一書其中所欲言悠然之味常在言外庶幾香山擊壤之遺音焉良由胸懷灑脫有所自得於貧賤故絶不同於俗耳先生名纓清甫其字家世本新安自宋建炎徙於華亭又六世而東徙故遂為蘇之嘉定人贊曰邑於吳為海鄉僅婁縣東偏一隅然以風氣願朴故多賢士大夫若先君之貧交其人尚多有足稱以豫所稱諸君子者其尤也今朴且漸散非復曩時豫為朱先生傳因并列之皆賢而不試者俾後猶有考焉其人率永年王最先逝秩宗徐公志之又志唐及朱而三顧豫少且賤亦銘丘宣兩翁兹又為先生别傳夫人固不待文而傳乃文實因其人而足重豫生也晚少而得侍先生殁且三十年而猥承論次之役一何幸歟緱山子傳緱山子者王太史辰玉之别號也君天資警敏又少而勤學甫習經義即已趨髙朗駿發度越尋常矣未幾試於有司三冠其儔而意乃夷然凡所目擊耳聞莫不歎羡以為逺器娶於嘉定金氏文肅公鄉薦之同年友也婦兄兆登字子魚自是數求友於邑始與張君定安同硯席仲慧其字也又因張而交唐時升字叔達及豫婁堅子柔既而讀書支硎山房則與華亭陳仲醇俱皆其弱齡也君於受經之暇出入內閣見其女兄獨居小樓修默存之道往往羣仙宵降天樂空來甘露飄灑蓋屢覩光景而不覺心動焉久之道成請於父母同往徐氏墓田以白晝化去逺近來觀耆年宿德咸共咨嗟瞻仰若君之目覩而神往積以歲月又何如也第方誦法周孔醰思經史未遑耳君之别自為號聊以志也當是時文肅公琅邪弇州公相與歎日月之如流而貴盛難久居也遂築觀於城西南中堂以供龕東西二個各處一焉而署之曰恬淡殆欲躡揚許之蹤窺性命之奧而未幾文肅公迫於內召弇州亦起贊留樞雖裴衰蕭逺之運命已企羡淵明之歸來矣居久之為歲戊子君之秋試程文極為主司所賞擢為第一衆皆歎服顧以文肅公之在事也清介已絶人而剛方又忤俗如君之才敏文贍猶未免於覆試逮乎忌才者無瑕可蹈傍觀者公論益彰然君且因是更淡於世味矣遂留侍公朝夕圖史之暇偕其友策蹇入山每慨焉興歎思浮游塵埃之外蟬蛻汙濁之中而未能也既而奉侍吳太夫人東還自後文肅公嘗一乞假歸省才半歲連三使召還遂陟首揆是時也人皆稱公以清峻絶干謁為忠而君以恭謹防隙瑕為孝云比歲甲午公纍疏懇乞謝事歸侍母夫人昕夕得覩其壽終焉自公宅憂君內奉二親外應賓客暇而修其文章如是者又數年而中禮部試洎對大廷皆第二人臚傳之日天顏有喜顧謂侍臣曰王先生有子一時爭傳之以為榮乃君猶不能無憾者母夫人之前逝也未幾以升儲大典奉詔馳諭東南四郡而還比歸覲文肅公喜而迎慰之第對曰兒今日以後有長依膝前而已遂乞終養云自公家居䝉恩特敕行人存問俄又召還者皆至再逺近皆所欣慕而君獨竊歎曰此殆吾父子畢命之期乎已而君病病以鬱且瘁遂不復能起嗚呼君於學問文章自少及强不怠益勤經史而外泛覽於諸子百家殆無隙晷且丹鉛其傍以識焉誠欲有所用之非徒以炫博而已顧自早歲知名迄乎登第精力方强曾未及施用而身已疲於過客矣豈不可惜哉初豫過州城讀書琅邪蘺薋園密邇君第每一過從往往淹留及於文字之飲以為樂其後又久縻賁園相去差逺不暇數相求而異時把酒論文之樂時復如昨君每文成輒以相示間有求全即時改定蓋其虛而能受又若此猶記嘗一日雨中三過則皆自城南客舟還也冏伯留之少淹再辭不暇及三乃留明燈相對當杯而歎涉世之糾紛豈若閒居之清暇低回者久之君於讀書綴文必以古人為師然不屑屑求肖於形模而務以豁其胸懷往往造於自得凡其寄情翰墨者蘄乎獨創而極之於宏肆偉麗然後已雖人皆知其長才而或未悉其沈思獨所與同筆硯者能名言之耳以君之才之志使得究其所學踵在昔之儀刑為流俗之砥礪豈可量哉而年甫及衰用未少展譬猶花榮而未茹其實淵深而尚屯其膏豈獨執友之歎道窮實亦通國之傷埋玉者也豫蓋嘗敘次其遺文而猶未悉其雅尚故於尚寶之請傷其進未及於施用退不獲於遂初輒别為之傳以俟後之能知君者焉贊曰君之內行淳備人多能言之若其與人交又靡偷也困思振之殆欲為之遒也有長必暴之不啻躬之售也聞有疾藥雖珍必捐曰吾不施焉用勼也與人異同好相與往復既而灑然有諍而無侜也吾亦何以名之蓋曰古之君子而今也殆鮮其儔乎新安江德宣傳豫嘗論新安在山谷間其人重遲而尚氣故其才且賢者往往能自力於進取次亦能貶衣節食以致厚資急病讓夷以然諾為名髙而不然者即逐利若騖嗇內而張外義不捐一毫而睚眥之怨至不顧頂踵蓋多有之以豫所聞若江君德宣者殆可謂允蹈其美而務逺於疵纍者乎君名應選其先太末人也宋紹聖間有汝剛者為徽州倅樂其風土因留家焉凡十五傳至君曽大父麻城令漢大父紫陽令敦相繼以詩書之業顯父禹㑹娶於羅有男六人而君其叔子也少嘗授經有逺志坐外家纍破耗其資見父母愀然以生計為憂則請於父曰兒學為士固未必效也且圖大者不速成即不怠以奮亦當數歲需也不若去而為賈視時所急而趨焉朝吾耕而夕以斂雖良農弗如於是南浮甌閩東北走齊魯之郊以逐什一之息視其資少贏矣則又曰向吾需之急第求可以必不求為饒也求為饒則莫若三吳可以安坐而多獲焉遂定遷邑之南翔里其轉販之跡逺至薊門遼左第持籌計算出入而已君雖起於貿易意度豁如尤好行其德族姻之以假貸告者無不應也嘗拯人於厄人或終負之絶口不責其報焉所積槖金曽一中盜既又燬於火而處之恬然曰吾向嘗困乏本無是金也今雖失是豈有異疇曩之乏乎且吾積金將以遺所不知何人耶故居常每稱損智益過二言以為子孫戒君貌莊而色和是非之諍不形於口短長之見不藏於心嘗曰以吾容人視吾為人容孰愈乎性尤好書所至必以數卷自隨晚歲彌喜儒生所以資遣其子為師友之費不少吝焉凡生十男子數撫而歎曰吾後世其有以儒顯者乎是穮是蓘必有豐年今君之年六十有四矣語其叔子之瀚凡吾生平汝其以告文而不靡者一述其概必使吾讀之而無愧庶足慰乎豫於是嘉其志而為之傳焉贊曰以豫觀士之務為名者未有不沒沒於利也彼直以名為餌烏睹所謂士哉夫商逐末工執藝事人咸輕之其中有士焉係乎其志行也世衰道微吾見士而賈矣安在賈不為士乎業之分途何足論人哉何足論人哉徐復貞别傳豫每讀史見其人有自負幹略倔强不苟同於俗者輒慨然慕之非獨豫然也數舉以告人亦皆咨嗟企羡問其姓名有不獲生同其時之歎顧或有一人焉負其氣不肯儕於俗則又羣起譁之是不近人情好為名而不務出乎實者也夫聞人稱之而喜及親見其人則反疑且駭焉豈古之道其不可行於今耶抑今之人實與古異趣宜陽浮慕之而終不可與並立於世耶豫遊太倉嘗識徐君復貞閒與仲子文任游頗聞其剛直自喜而未之悉也比殁且葬錢太史受之志而銘之豫讀其詞慨然太息以為非世俗之君子而文任復請為論次辭不獲也君諱可久字復貞其先吳長洲人自國初東徙崑山者十世祖福孫也自後世居茜涇里𢎞治中割其地建州於是又隸太倉父整老於諸生有仲曰侍御公敦侍御之子三人其嫡長曰可賢娶於太原王氏無子仲弟可達之子思任嗣焉以母氏之偏憐其女也資漸耗可賢既殁嗣子幾無以為生至訟之於官君挺身為左右之人皆曰母家貴盛雖其父兄賢者將無憂及身乎君曰彼吾中表不余毒也人各自為門戶計耳語有之畏首畏尾身其餘幾且他日何以見吾父吾叔於地下嗟乎若君者豈非量彼與此真能自奮於義者乎君少為諸生已而去遊太學晚乃需次京師數接時貴人意頗輕之歎曰吾豈能以資郎俯首事此輩乎竟以例授光祿寺署丞罷還其喜為義益甚務急人之病州人蓋多能言之者昔者孔子稱不得中行必與狂狷夫進取也而目之曰狂有不為也而目之曰狷蓋亦取節焉而已此皆果於自信不顧世俗之訾議其於中道不跳而越焉即有類株守焉而孔子顧獨思之為其不外飾焉故也自儒者說經誤以為思其人將以傳吾道故孔孟之指迄於不明然則今之世有若君之勇往不懾不亦可謂之進取歟視夫依阿淟涊不復知有亷恥曽未得比鄉願而詭自託於中行者何如哉故豫為之傳特論其大節以破世俗之論姑勿言中行而且辨其人之真僞庶幾膏肓之沈痼其有瘳乎贊曰豫聞之州人歲戊子州嘗大饑君為粥以食城中餓者度隙地三所視道里逺近與之期聚散先後衆以不譁其後二十年再試之野君曰維水所滙於衆之趨赴便又與期而集之往者益便第謹伺乾沒而已蓋終一歲乃致其事而竣距今又十年所吳中米價騰涌長吏以上束手無所措使復有如君者條上方略必能使米不壅糴不貴民豈至若是困哉朱節婦傳朱節婦浙江鄞縣人姓桑氏嫁為同縣朱某妻某遊象山以暴疾殁喪還節婦慟哭不欲生少蘇泣且言曰舅姑老矣男長者才總角次猶乳下兒且方娠幸而復生男所以慰吾夫地下在二老人及稚子耳不可以徒死無寧茹荼以養字其幼以需其成立而終身布衣疏食以寄吾哀乎蓋又三月而遺腹子生男也數年之後少者漸壯然以生計窘艱苦萬狀各授之職弗克竟其學意未嘗不在第三男也稍長即遣從里中師受書夜歸與共一燈織且課之讀憫其勤即好言慰勉之小怠或垂涕撻之及為諸生見所與遊皆才俊每為之喜輒至泣下凡三試而名未成家貧游學逺方資脯修以為養意嘗不自得數貽書戒之曰吾不以兒去吾側為憂而以獲交海內之士為樂也吾不以兒未遇為戚戚而以吾母子獲有今日為幸也吾雖婦人猶知男子桑弧蓬矢以射四方不意爾之若是淺也嗚呼可謂賢而有識也已節婦奉其舅逾七旬而終孝養如一日事姑張及費前後皆能當其意朂三子各以其力有所就先世遺廬偶不戒於火困彌甚然未幾能葺而完之寡居三十餘年其事老者生養死葬不以菲廢禮其撫少者有子及孫不以慈廢嚴向微母賢不能復振朱氏雖生人之所謂不幸而名永無窮意者天道之福禍或多與人情不相合而適以相成也耶贊曰節婦之少子啓仕以文學知名前年來授經友人家始與相識嘗為豫言母氏悽然自傷其不遇貧無以為養也豫以為若夫人所遭以視慷慨死節難易何如也彼能是亦何羡世俗之祿養哉豫於戒子書尤三復而悲之賢於世之士人逺矣非獨少而教之書蓋其天性貞順明達固然也王節婦傳王節婦者姓陸氏崑山人也而嫁為嘉定王夢鸞婦其父巖少嘗受經以故里中及鄰境多延為童子師數往來嘉定識夢鸞知其未有子也因以女歸之嫁三年許生一男未及期而寡幾欲以身殉既而抱嬰兒哭告翁媼新婦命薄誠無以生為顧吾夫之所以瞑目地下而二老人之可幸不斬其嗣者獨有此兒也吾何敢死吾何敢死且仰事俯育相與拮据不猶足賴乎居久之而島夷流劫圍城人不自保以一窮嫠扶老攜幼以謀其生寧有冀乎比寇退而翁媪旋相繼病殁窘益甚晝織夜績殆於不支頗仰遺秉滯穗以給饘粥亦足悲矣而子玉自幼及壯强亦能痛念母慈黽勉有無閭巷咸目為孝子當歲戊子旱魃為虐儋石之儲緡錢三千節婦悴且殆矣玉夜禱於神刲股作羹以進一啜少蘇遂以復起嗟乎母以慈育子以孝報人道信邇矣即天道亦何嘗逺哉論曰豫昔嘗書封節婦金氏傳後自嘉靖初至萬厯之季年其從容就義而得旌者宣氏孫氏及金而三耳今王節婦家世微也而又良死其辛苦終始大義視感憤一朝者不更難乎昨歲豫友張君之嫠亦以奏上奉俞旨表閭今已年踰六十猶安享其子之養居常以明智剛決見稱於舅姑蓋家本舊族其兼有節孝固宜若王節婦特出於天性而所遭尤為不幸詩不云乎誰謂荼苦其甘如薺斯節婦之謂矣王常宗先生小傳王彝字常宗其先蜀人元末父孝恭先生為崑山縣學訓導因東下留家焉髙皇帝混一區宇徵海內文學之士纂修元史先生與髙太史啓凡數輩同應召史成當得官翰林以疾乞歸洪武五年魏太守觀初行鄉飲酒禮請先生為碑文其後卒以觀得罪與髙同被誅方先生之得請而歸也自號媯蜼子以見志媯陳姓也先生本陳氏之裔欲復姓而未果蜼於物卬鼻長尾雨則挂於木以尾窒鼻革命之初天下習於惰窳髙皇帝方以猛糾之士大夫重足屏息以營職業不則佯狂自放庶幾於無咎焉如先生者亦可以免矣而卒譴死豈非命歟同時楊維楨以文詞名東南先生謂其文非雅作文妖一篇以詆斥之其辭云云蓋嘉定僻在海濱其俗敦朴近厚雖嗜古勤學之士不後於旁郡邑而其人率不騖於名故世鮮有知者然學有本原或熟於典章或深於盛衰得失之故往往不同於剽剝之學乃其以文顯於國初者先生一人而已豫既求得先生之集挍而藏之欲得墓志行狀以考其生平而問之故老莫有及見者豈世逺而莫之傳耶抑當時法嚴莫敢為之辭者耶姑識其大凡以貽後之人使嚮學之士猶知有先生而已學古緒言卷四
