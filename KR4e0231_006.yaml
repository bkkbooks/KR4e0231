body:
  text: 學古緒言巻六明婁堅撰夀序十二首姻家陸翁夀序姻家陸翁以是歲周六甲仲冬十一日其初度之辰也君之嫡孫委禽弱息宜修頌禱之詞以侑一觴意欲有所效未可以驟表弟王伯深其子壻也數語及之余以謂君之宜頌者有三生長市㕓衣食於貿遷而樸茂欵誠躬長者之行一也教其子元之學為儒受餼於黌舍所與交皆人士之良方將振其家聲二也君年視予僅三歲以長而子巳壯强孫男女若而人皆蘭敷玉潤三也余雖慚能言稱賀不當後他人猶且遲之何歟誠以古之君子所欲自致於親葢能養次之㫖甘之奉以接親知笑言之歡苟竭其誠足矣而吾呉之俗日趨為靡會客則爭致貴勢以為榮張筵則務窮水陸以為腆倡優在前賓主終日揖讓以為禮固非衰老之所堪也夫古之人嘗以每食四簋追往悼今若五鼎則大夫之享矣而近世民間讌會或多至百味葢人子之不誠於獻夀為日久矣視孔氏無違之訓何如哉奉其親以分之所不得勞其親以體之所不堪未有若今日之無當者也君之二子將行古之道乎則必為世俗所姍笑始且以為必如是而安及衆譁之則亦有不安焉將亦為世俗之侈乎其親有不樂焉吾意守禮樂道之士其必不苟然矣且吾聞之驟富貴不祥夫非謂其所享有異於尋常也哉今至以吾親之年而酒食之豐必求多於分外則無乃未處於富貴而顧奉之以致不祥之具歟元之兄弟如不惑於流俗數召親戚故人與君共四簋之奉君必樂而安之夫樂康者所以為夀而屑越者所以為不祥也吾故不欲侈而張之而徐進其説以前之三言為頌而以後之云為禱不可乎陳翁七十夀序是歲七月十二日為少泉陳翁七十生辰凡與翁父子及孫三世之交咸有獻夀之辭其婚家徐爾常徵文於予且曰必手書之先是莫春之初予嘗為文夀宗伯夫人寫屏風數疊以獻葢陳之請也今者爾常又欲假手焉雖駑且衰固不獲辭矣夫其承前之緒以素封聞於里閭衍後之慶以學殖訓於孫曽目不識催租之吏足不涉對簿之庭有堂之爽以招凉風有室之靚以延冬日親朋時至笑言足以罄宿昔之懷酒肴常具酣適足以寄花月之興自少至老常以歡顔笑口樂其天年豈可多得哉或者曰此殆天歟譬之卉木雨露均也或茂以繁或悴而槁解之者曰爾何知天道栽培灌溉之或愆而以求同於雨露乎或又聞而笑之曰硜硜乎斯言也似之而非也至顔跖而窮矣人之生世其賢愚通塞之不相值常若枘方鑿圓雖有辨智莫窮其情惟天與人適相符乃可得而言耳吾嘗聞翁之為人矣伯兄疾且病為謁醫嘗藥如子侍父及撫其嫠孤加䖍以勤與同居三十年終如一日家有僦庫以屬㛐之兄累折閲至不訾置不問也外舅姑老而困子在襁袵賙其存歿且終其子之身凡此皆世俗之所難能而翁若以為固然無足多者其他為人緩急雖半席片言已諾無不踐也後多負之者而翁第曰可奈何久而遂若忘之今世稱篤於其親好行其德必曰此士行也孰知夫凡翁之所優類儒生之所媿乎固宜優游耄耋之年而安享子孫之養豈可謂偶然也哉庶幾乎天與人適相符矣翁之子若孫皆方以文學有名要為翁盛德之報亦不誣也自伯子獲解南京兆踰一紀矣比聞益自晦匿被服居處無改曩時非親且故欲一與之接而不可得其中泊然常有以自足者語有之榮辱立然後覩所病貨財聚然後覩所争今翁進不知有子之榮退不私其貨之藏烏乎病且争其有聞於衛生之經歟將來之歲月以無羨無營坐而閲之腰足忘而屨帶適夀未有涯也視夫謭謭焉以尊生為者何如哉以是為翁夀其謂予為知言否也守齋金翁八十夀序自昔言養生者每稱少思寡欲可以養夀命之原而尤謂思慮之賊人殆甚於欲夫惟學道觀妙之君子其神守内完故能漸屏二者而渾忘於無其次則貌樸而中夷不修邊幅不設機關幾無所用其心焉若此人者其於嗜欲必淺能因血氣之盛衰而為之節故往往得全其天年以至於夀考亦其理有固然也若夫役私智以争尋常其神日勞其欲無厭而欲以圖於久長豈可得哉予友金伯醇之尊人曰守齋翁今年八十矣而形神不衰如六十許人夏四月四日翁生之辰也凡所與伯醇善者相率登堂上夀而屬予為之序翁之先聚族於邑之羅溪世為農家自其從子伯謙先生洎從孫子魚父子相繼薦於鄉而伯醇又以諸生廩於學宫於是金氏之俊少多修詩書之業為人所稱然而皆逡逡退讓無鮮衣駿馬之好雖其僮奴亦化之伯醇嘗言僮某惰遣還田間其不能衣襏襫把鋤犁而耐勞苦者終不足侍吾於硯席間也葢翁之教於家類如此翁少而明農其言農事娓娓可聽然無他腸遇事無可否必罄其底裏亦不逆人之詐之也又不好為容見其子之友或盛衣冠而往則趨而匿屏間竊聽所言其不夸以誕也即私以為喜若翁不幾於少思者歟顧竊疑翁素壯健内有廩廥之贏而外無門户之累終歲優游或不能自割於嗜欲且生人之大欲無過於飲食男女而伯醇又極孝養㫖甘柔滑必具夫滋味雖以養胃然譬之益火以膏火之炎也相於欲或壅之則成疾焉不虞其壅而亦不至於炎吾意翁必能知之是以若此夀也抑伯醇旁通醫方所以娯侍其親者或别有術焉可以扶衰而延年歟自今以往翁之閲世滋久其中懷泊然思慮益省當不異學道觀妙之君子非止愿樸夷易而已也獨羨其年加長而貌加豐欲從問所以保嗇者何如又自省壯盛時嘗有志當世不幸為思慮之所賊今衰矣庶幾竊翁之緒餘以息黥補劓焉且幸無敗於糾紛以從翁於几杖之間亦吾黨之所同志也朱濟之兄六十夀序友人朱君濟之以今年秋七月廿四日為六十生辰君之交道廣自其父行至子壻所與遊處見即歡然忘年忘形終日飲酒談笑無倦容於是嚴翁樂山偕其酒社之友凡若干人過予屬為文贈之夫以予之衰嬾廢學而長年者顧欲得一言以夀君謂能悉其平生也且意君優游詩酒亦欲得潦倒疎狂之言以為樂耳君少嘗有志於當世見世無知者遂厭薄不屑中年以後一意以醉吟為娯客至即留與飲不問中厨之有無也肴蔬間設相與終日對奕剝啄之聲不絶於手謿謔之言不絶於口已而呼盧浮白君既自喜能飲酒而客亦好與之較酒酣輒奮髯抵掌多所譏評與之善者輒正言止之君亦笑以為愛我無忤也或以謾辭欺君君還以語客有笑其妄者終不言出自某某也其涉獵强記有過人之資毎於酒間稱述稗官小史往復曲折如目所覩客為解頤焉閒居好為五七言近體詩嘗一賦郊居多至百篇每嘆邑在海濱無湖山之觀吾中有不適焉往往即所想像而賦之詞或夸大而近誣世當有知我於言外者耳葢予所得君於三十年間者如此予於君顧獨自有感也君之先公以布衣之俠享有良田廣宅之奉以遺於君其識賢士大夫於未遇時能使其人終身不忘抑亦可謂傑然者矣而幾不免其身君杜門髙詠彌縫之以酒絶不問家人生産雖時以口舌觸迕聞者亦終能寛之不為隙也以較於先公所享不已豐且安乎嘗試與君追數省事以來耳目所覩記中間盛衰之變所不必言若其頹然自放不為繩墨所束者有幾獨坐而吟羣居而醉來不迎去不送如是以終其年者有幾厚於施人而不責其報豐於待客而不留其贏如是者有幾亦可以樂而忘其老矣君每歲至仲夏即散髪不出户客至以袒躶接之至秋中乃復衣冠今正其科頭箕踞時也予將艤小舟袒而就君與竟日飲酒賦詩因書此以進於君不知視世俗之頌禱何如也張元長六十夀序夫士汲汲於當世負其有可以自見也其不幸終不為人所知未有不憤然嫉俗與世濶疎也當其少而受經終日矻矻學為文章以干時及已老不遇非獨厭所常習儷偶之文雖聖人之遺經亦遂棄置不以闗於心者多矣若此人者其鄙淺固不足道然亦何至反沾沾焉自喜其一藝為哉嘗怪友人張元長少而博渉於書無所不窺宜其於世俗有不合矣顧雖見擯於有司而更為少年所推重色未嘗愠文乃益竒夫今之時文率三年而一變其始不必果有合也而驟掩前人之規其後不必果有戾也而已來後生之誚矧吾元長盲於目則簡䇿都捐順於耳則行年俱化此屢變者何由肖其步趨而闇與之合何用悉其才力而數與之競哉且人之有喙獨不可以清言雅謔極羣居之樂乎而我實苦心獨不可以黙存觀妙怡燕處之神乎若曰此少而習之誠不忍棄焉則古人之言語與日月長新不已賢於爝火之一燿乎如君胷次宜薄詞賦不為顧難割於童穉之小技乎予乃為解之此殆元長之所挾以傲世而不忘一警憒憒者歟君葢曰向吾欲有自見也有司者之程度未能詭而與之相遇也今吾直以為寄也少年人之矜尚猶能變而與之相逐也世有達觀者或因是以得予曰斯文也老而不衰能者無難知者良不易而耳食者或轉以是詬予曰夫夫也其何能合旣以自誤將復誤人為夫此兩言者吾皆笑而頷之此吾所以為窮居之適也信心而索之衝口而吐之其聞於人泠泠然未必不如絲竹之和鳴也有會於心欣欣焉未必不如屨帶之兩適也夫世俗之患在以人為重輕人不知而愠苟知之而汰已甚矣不勝憤焉而甘與世相違亦不勝肆焉而輕以人適我矣誠知夫鄙淺者之足嗤則夫沾沾自喜者以為果有樂乎此可也而曷足怪乎予與元長齊年而後兩月生君之生日以夏六月邑之與君善者屬為之辭以夀焉予方辭諸君之頌禱未暇以為不知夫沈李浮𤓰之會親知滿前所以佐君之歡笑亦有以予言進者乎予兩人皆不遇以老故吾之言云爾若其相與於無相與相為於無相為者要自有莫逆於心而非文辭之所悉也唐實甫六十夀序嘉靖中邑之賢而有文名聞四方者唐道䖍先生其尤也然卒困諸生晚而得郡文學以歿先生之撫其弟葢父師兼之旣而隠於醫嗣其世業者道述先生也文學公與先大父同時為沈氏姑姪壻先君之少也以姊故往從公受經與道述丈相厚善實甫道述之𦙍子也又學於先君余故得暱焉道述先生風度凝逺望而知為有道者每出為人治療歸即登樓檢方書究極所疑暇則誦古詩文攬觀法書名畫以自娯樓之西堂之東卉木斐然舍後竹深水凉夏月數與知交數公避暑其中門無雜賓若年少而獲與接者予與亡友張君仲慧而已實甫再以文試有司不售先生卽令棄去仍學為醫且授之家秉未幾君果以察脈處方積歲入之贏别買地葬其親有二弟一醫且耕一耕且讀皆去之郊外以城居諉之兄君即又兩慰其意人以是稱君之才且服先生之前識也向令君終為儒儒生不得第十九而餒耳其克有是乎君之子孟博既補諸生有子甫成人今又繼之適屇君六十生辰於是親朋之賀且祝者雜遝其門予雖衰劣自有識以來幾五十年獲交其四代固不可無一言也竊嘗以君自方少而受書如獵與漁惜此居諸勤苦三餘徒費耘鋤不成菑畬此相似一矣終焉逋客當世無責匪狐奚白匪彪奚嚇雖慚巨擘無靦尺宅此相似二矣君早自弛吾猶濡軌雜蘅與芷夫何愠喜求粟得秕能無瘢疻此不逮一矣有鶱而鵷豈牧而豚有圃而樊豈市而門子日笑言我舌欲捫此不逮二矣夫此兩相似者失之於前吾與君之所不及悔也持之於後吾與君之所得保也至於兩不能逮天之厚君吾不子妒天之困余子不我嗤春花之朝秋月之夕君灌園能為我擷蔬吾近市能為君烹魚若夫泉甘茶白追桑苧而友玉川尤可數數也請自今為期勿以貧且憂而辭勿以衰且慵而免暇即相過語不及俗子言子之蒔花種樹予話予之觀幻悟空退而教誨其子若孫使各有業焉以自立無羡乎今時之浮榮無忘乎先世之遺範庻幾乎馬少游之意以樂其天年不亦可乎勅封翰林院編修温君曁孺人沈氏六十夀序代士之砥行立名澹然自足者其身之不試則必有為之拓其緒焉士之蜚聲騰實曄然有聞者其名之驟起則必有為之發其祥焉干霄之木不生於培塿千年之脂必種為琥珀理固有然矣呉興山水之奥區也融結旁礴發為人文隠淪材傑之彦自古多有以今所聞有隠君子曰封編修温君者人貌而天殆古温伯雪子之儔與年纔六十而其子太史長卿升玉堂之署較天祿之儲且十年於兹矣維歲冬首屇初度之令辰樂齊年之嘉耦而長卿甫先已乞假蹔還里門温樹無言數馬以䇿族姻稱其孝慈鄉閭羨其福履煌煌乎善頌善禱固已爛縑緗而盈巻軸矣長卿昔在南宫所薦士若而人謂余子某謬先簸揚介而徵言為稱觴侑予聞之君本逢掖古道自將讀書談道不専章句旣而考槃薖軸便懷終焉之志以及子壯登朝榮膺綸綍而處之恬然布衣徒歩無改素風至於急病讓夷先人後已少以自矜迨晚加勵不於其身於其後人君之謂矣長卿在貴不驕髙才能讓趾前之美擅時之譽求忠於孝為世偉人君之貽矣在詩有之威儀孔時君子有孝子孝子不匱永錫爾類雖有善頌何以加兹酌以大斗以祈黄耉黄耉台背以引以翼夀考維祺以介景福雖有善禱何以加兹予又何言哉顧予老矣竊有衰世之感欲一效之夫金閨之籍世號清華肩鉅任重豈伊異人振而矜之器小忌盈政以賄成棟折將壓膠不適時雉膏不食予忝聞政毎用惴惴私門之内喜不勝懼如君之意將無同乎則又歌烝民之詩以進焉既明且哲以保其身夙夜匪懈以事一人君與孺人其善自保嗇復十餘年觀長卿以不吐不茹不侮不畏為王國楨為徳門慶其喜樂永日又何如也是為序宣翁偕老夀序凡夀而為之辭葢言得於天者之厚而美君子之福履為不偶然也又祝其勿替引之享有期頤而使閭巷之人爭傳道之以為美談也夫然則一人之夀天下之人之夀也雖其親暱焉用文之一言之祝百齡之夀之祝也率十年而更端不已贅乎夫情之戚疏若莛與楹不有文也夫安知戚之不同於疏耶且人之生世雖數年之間而愉怫之遞更猶寒暑之狎至者盖多有之矣若其纘前之緒貽後之謀已為劵而責之天如夏之必燠而冬之必凉此亦生人之希覯已苟親與昵即侈而張之可焉是嵗仲冬届慕川先生七十初度之辰而其配徐孺人適與齊年所與元甫厚善者屬予為祝詞余家於宣氏再世姻連女弟為先生再從子婦今其嫡孫又委禽弱息焉既慶先生之夀考而又將以致吾之情雖言之不文不可以已也猶憶往時諸長者為酒會數過飲余家時先生年未六十嘗在末座不意忽已至七十之年而予亦荏冉衰矣比見先生年加長而貌加腴意竊怪之一日從容問所飲噉朝不過白粥二盂不必其蔬也飯或佐以少肉不必其醬也嘗稱味之養人以平和耳過爾甘肥必有所偏語不云乎厚味實腊毒吾薄口腹所以安腸胃也予以是知先生之於嗜慾淺矣嗜慾淺則所求於世者輕輕故易足易足故無營其神完而氣平可以却疾可以延年殆有道者與又嘗見語云毎笑兒姪輩譙訶穉子繩以幼儀夫士大夫師事孔子誦其遺言而發為文章以用於世矣已而旋背棄之曽不若是童子之猶知嚴其師也則若之何葢先生之感慨深矣而責於人甚薄雖其誨子姪猶然庶幾乎恬與智交養者宜其道貌之加腴也雖然先生與孺人之所享不可謂非天民之厚幸也假令有子而不若元甫才雖欲貶衣節食以優㳺於田野俯仰寛然堂構無圮以安享百年之樂豈可得哉計自今以往予為先生孺人夀當不止此姑言今日之偕老而傳者已矣誥封夫人徐太母金氏夀序故大宗伯徐公以嘉靖二十九年庚戍起家進士為禮部屬十年守官不阿出補郡荆州而夫人始來歸嗣執筐篚逮公歿之十又七年歲復為庚戌夫人春秋七十髙矣於是境内外之徵文詞道盛美者後先登堂因冢孫爾常奉觴上夀而姻家陳國紀方就試春官其子開美為素屏謁予求叙而書之竊自惟獲交且三世平生辱公知最深視夫人猶母也雖不文固願為執筆焉始公之成進士也夫人甫十齡耳然先是已從其父鴻臚公居京師望見皇居之壯麗而習聞名公卿命婦朝賀之儀閨門之内數相與歎羨以為榮豈意三十餘年間蒙國厚恩而身受二品之封號乎方景王以愛子就藩公為州人力爭沙市至於下獄其後放還夫人乗肩輿自廨宇出州之婦女百千為羣争以肩臂受輿環擁不得前此其為榮又豈止封號而已哉自公歿至今人謂夫人於存歿盛衰之感當有不釋然於中者予獨以為不然夫夏之日冬之夜此有所贏彼有所乏無足怪者喜春暘之煕和而惡冬雪之凛烈是烏知天道哉人生夀命長者多至百年試以四時平分之有不及於夏者矣况秋冬乎若夫已榮矣勢不能無顇已而顇者復榮豈非剝後之復而一人之身之所希遘歟今者夫人當旣老之年視聽無改神爽肅然爾常以孝謹娯侍恂恂之譽著於里閭夫天道六十年而甲子一周傳所謂公侯之後必復其始者行將在爾常矣夫人顧而樂之喜可知也昨歲之秋夫人已抱曽孫今聞又占夢焉關雎窈窕鳲鳩平均世所謂吉祥善事者宜駢集以奉膝下之歡喜又可知也然則夫人於今日固去雪霜而就青陽之候也歲時燕喜御冠帔而撫曽孫追叙少壯之榮盛歎已往之不可留而慶將來之未有艾也不自今始乎爾常雖少孤觀其所與遊必求勝已知夫人之教以下人也績學綴文不廢昕夕知夫人之教以無怠也歲中朋酒之會必潔以共知夫人之教以慎微也夫人之勤施於徐氏者如是長食其報也宜矣詩不云乎詒厥孫謀以燕翼子以引以翼夀考維祺以介景福請以是頌且禱其可乎勅封太孺人淄川韓母七十夀序上之四十年仲春淄川韓侍御奉命巡按江西過家省覲葢封公之春秋七十髙矣而某也嘗從士大夫之後屬樸訥之詞以侑一觴而頌萬夀焉後二歲甲寅侍御使還道經呉門邑之旅謁而餞送者踵相接也其明年孟陬又屇太孺人七十生辰於是前之往賀者將復繼之而屬為之序竊以謂君子之孝於其親與世俗人異俗之所謂孝小者娯其晨昏時其寒燠雖其大者亦不過邀朝廷之寵錫為閭巷之榮觀如是而已其親而賢者也或猶有不樂焉頃者獲接侍御燕閒之談其論賢不肖之品若别白黑也若薫蕕之不可同器也其論出處之大節寧剛而折也必不肯媕阿冐昧一日而偷自完於列也其論任天下之重且難雖絲之棼不難理也雖驅車於阪操舟於湍悍而不虞覆却也如是以為父母光寵葢義榮非勢榮也養志非養口體也其親之樂之豈猶然世俗之所艷羡哉或曰淑婉之資非所論於慷慨朝廷之義非所論於閨房子是之論其或未然歟應之曰子未聞太孺人之居常乎其相夫子也順而能安其撫侍御兄弟也慈而能均其睦於韓之宗也降而能施家之裕矣而用不為侈子之貴矣而色不為驕口不甘於滋味葵藿而已身不安於綺紈繒布而已此士大夫之所難而太孺人顧易之矣夫人之仰於物者輕則物之為吾累者鮮累鮮則形安物輕則慮澹安故莫能攖其寧備物奉之而若無有也澹故莫能汨其清五欲染之而終無滓也譬之注水焉所以受之者深斯不溢矣譬之為室焉所以基之者固斯不傾矣萬福攸同不亦宜乎古之得道真人所稱外身身存後身身先不可易也天下多脂韋之丈夫而曰必無恬俞之女士非吾言之過而疑吾言者之淺也然則太孺人其亦猶有望於侍御乎葢聞之君親等耳故孝者所以事君而忠者亦所以順父母也今海内乂安而朝廷之上漸似有黨人之形黨必起於爭争必各恃其援其究至於邪正兩傷而世道受其敝是故君子與其争而勝莫若處之以無争無黨而俟其自伸非無爭也無其心也非無朋也無其迹與名也夫然故其勢不至於過激而其變不至於禍天下某少而受易請以易推之復之初剥之碩果也有休復之下仁焉不與之戾也進而臨君子之朋可以無不利矣又進而大壯則壯趾者與羸角者不必貞而吉矣故聖人有憂焉今者朝廷之進退士大夫自以其意為勝負而中㫖反似出於不得不從者雖侍御之所以處此固非書生之所測知而或者虞其臨而且壯也此宜亦太孺人之所慮矣魯敬姜之深識逺慮儻可得而聞乎將天下實受其福而樂只君子福履成之又非止今日之所享而已敬書之以頌而禱焉不知亦有當乎否也西安方母鄭氏八十夀序友人信安方孟旋以丙辰春登進士乞歸省其母夫人鄭氏吾謂孟旋其不徒以祿養為榮而尤喜母氏之夀康優游暮年未有涯也吾又以知太夫人不徒以子之一第為樂而尤喜其素所自許不同流俗行可以有補於時也比三年授南京兵部職方司主事將之官而是歲七月某日為太夫人八十生辰閨門之上夀賓筵之獻酬須禮成然後行斯時也凡浙東西能言之士及海内之知君者必且盛為之詞而孟旋乃有意於予之一言予將何辭以頌且禱乎竊以為人子之孝其親雖極於無涯而必𠂻於内自盡朝晡之疏食冬夏之裘葛此用力與勞之所及也苟能使其親安焉則可謂之養志矣豈不亦士人之孝乎若夫冠帔以為華鼎食以為養已榮矣然而職業之不修聞譽之不章此夫不肖人之所狃也其親而賢者能安之乎奉之彌隆辱之彌甚耳今試以是二者號於國中非貪冐無恥之尤必前之是而後之非也然試令羣國之人士而處於此其為不肖人者不少矣豈非孟子所謂失其本心者乎惜也身旣貴矣可以立身揚名孝於吾親矣而考其生平或下同於閭巷小夫雖少知自好者宜所不屑顧沒沒焉若此何歟若吾孟旋者學為經師行為人師實大而聲宏其已久矣今且服官守而漸進用其風度則羔羊之委蛇也其寵光則蓼蕭之譽處也以是而娯其親夫然後冠帔足以為榮而榮不必其冠帔也鼎食足以為養而養不必其鼎食也夫人顧而樂之必曰向吾聞是子也與其徒言必依於忠孝今吾幸得見之不虚矣豈不亦人子之大願哉予始識孟旋於石頭僧舍一見語合相與論蘇長公藥誦葢欣然會心焉今海内承平日久以國家磐石之安乃隠隠有惰窳之憂當由士大夫意不在公而内營其私耳故予為獻夀之辭特以樂有賢子頌焉誠孟旋所以見屬之意亦欲使天下之愛其親者奉其冠帔鼎食而進焉皆慨然有意乎孟旋之為人也傳稱孝者所以事君豈不信哉豈不信哉貞節姚母文氏六十夀序萬厯四十三年秋呉郡有得俞㫖以貞節之門旌者鄉貢士姚希孟之母文氏故國子生諱汝轍之妻也又三年冬闔郡士大夫綴文賦詩往為之夀者夫人六十之生辰也葢距洪武七年歲甲寅詔旌其門而蘇太史伯衡為之頌者七世祖榮三之妻黄氏也至於今二百四十又二年矣一門之内婦節母慈後先相望雖家世以名德稱者或不逮焉夫士少能勤學長能勵行或有功名於時雖官至京朝三品其得諡者鮮矣若夫節婦之旌葢人臣以身殉義而得諡者之比也以閭巷窮嫠辛勤顦顇以老而一旦䝉朝廷之寵賁豈不尤難哉於是吾邑之辱交於孟長者將撰詞以為夀而以齒見屬乃孟長亦有意於予之一言不知其衰鈍鄙朴言之而不文也夫人之為婦僅八年年二十有二而孀居上奉二姑下撫十月孤兒中外百罹備嘗艱辛卒朂之至於成立早以文藝知名方壯而舉於鄉即未進用亦足慰矣今者孟長將偕其舅氏文起又試於南宫竒文異藻豈復憂不合哉予以謂其入而盡孝者即所以為世用也其出而盡忠者即所以為母報也若徒曰章服以為榮鼎食以為養而已意者母夫人其必無樂乎此矣國家承平既久喜起不聞上不信其下而并廢威福之用下數嘗其上而漸開私黨之門吏治日黷民生日瘁而有奸莫察有竇相通容容焉務為苟安而已以其身為大盜積而以天下事為羣兒戲長此安窮欲求長治豈可得哉比者疥癬噆膚誠無足患而倉卒無備逺近懷疑非事勢實然而其人之莫可以恃也假令孟長一旦在事果有必然之畫乎即不當其任或問焉亦有以告乎將黙然而已乎即言之能無異同乎即衆咸是之能果試用乎則雖以孟長之志之才誠未可自必也豈果無足患哉予衰且迂於時務無所通曉然竊嘗觀於古今之變頗懷孟氏生心害政之憂則今日之文章是也鉤棘以為新誕妄以為髙塗飾以為贍問之歐蘇曽王不知也則進而問之韓栁又進而問之賈董孟荀皆不知也而曰吾有以勝於人而取於人足矣而主司者亦遂目為異也而亟收之以斯言也而發於政事其害可勝道哉予昔嘗為書以告當事者而漫不訾省遂匿不敢出示一人兹聊復為孟長言其概士苟志乎古必不誤而入於今苟志於忠孝必不誤而沒沒於富貴庶幾不為黨人之蔽固乎孟長試奉一觴進母夫人而以予言質之然乎否耶不知夫仁人孝子之大慰其親者當何如也學古緒言巻六
