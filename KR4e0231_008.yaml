body:
  text: 學古緒言卷八明婁堅撰夀序十四首夀胡侯尊甫教庵先生詩序􅺫春東至吳二千里而近而嘉定僻在吳東偏又百四十里而遙胡侯來為邑之二年以歲癸丑八月移長洲去瀕海而之大都才歷三時耳而長洲之人之頌之如吾下邑也侯始東下蓋奉其二親以來逮今年春暮侯當以考績蒙恩而太公夫人亦皆康強難老尤可喜也於是邑之以獻夀行者不以筐篚而文詞是徵濟濟蹌蹌亦不下於長洲之盛也諸生曹訥以少雋受知乃於邑之人士為侯所加禮而延譽者合其詩若干首屬豫序焉夫君子之愛其人必本於父母頌其德必及於祚胤固詩人之指也吾聞太公少為儒嘗有意當世之用不幸淪落以老而樂有賢子以詩書之業潤飾吏治太公之志之所求行將盡見之行事矣夫吳財賦之區亦俊乂之藪也賦重則不無積逋士多則不無負俗長洲之賦不知視嘉定何如要之為邑者率十五而催科而以其間聽無情之詞况又加以過客之求稱日不暇給豈若東土之政尚得専力於其所急哉而侯以數月之間從容治辦聞譽益章語有之前事之不忘後事之師也吾意退食燕間太公必熟計兩邑之異同而折衷之固非儒生之所及知矣竊嘗論君子之異於流俗者厚自待而望於人者輕不求同而取於人者博骯髒者不憂其難合而軟媚者不患其易投此子産所為不毁鄉校而子賤之驅車於陽鱎者也夫然士雖有負俗之纍吾有以待之矣庸何傷故曰鄉曲之情非所論於涖官愛憎之常非所論於取士二三子之賦詩也雖有祝詞豈能加於南山之夀松柏之茂哉則請言其所以致此者詩不云乎民之質矣日用飲食羣黎百姓遍為爾德夫上能以德化其民下能以飲食宴樂安其生而歸德於上此世俗以為迂而君子之恆汲汲皇皇不忍忘夫斯民者也詩又有之詒厥孫謀以燕翼子斯以知孫不謀不足詒子不翼亦不能燕也以是頌太公夫人之所以教不可乎孝子不匱永錫爾類豈弟君子民之父母斯以知孝子之行施於人無窮而干祿豈弟則民皆有父之尊有母之親以是頌侯之所以孝不可乎若曰命服之榮而已蓋士大夫之遭時獲寵者為不少矣溪山堂夀詩序士大夫間居無營每思自放於登臨以為樂顧邑四境無湖山之觀往往浮舟郭外隨栁隂竹風而止焉相與陟數仭之丘極目百里而遙以發舒其意然終不得近在跬步接之几席之間獨城南潮汐微緩波澄不流藻荇如畫居人髙竹連舍於園圃特宜舟行南可五里折而東里許望之四山圍合有堂翼然則石巖方伯之溪山堂也因友人别墅而改為之東偏為宅一區入門水東西流繞出舍後春時繁桃夾岸漾為錦漪公諸子讀書其中焉而兹堂别峙水西豁達夏涼公始伐竹穿徑以為山鑿南之池加廣且深復引而右北合於左流以益山之髙東山曲折如列屏障而西南之山淡淡焉若晴雲浮空趾入藂篁深不可極堂臨渺瀰梅林拱之得月而幽得雪而竒距堂之北數十步渚蓮隄栁濯濯焉冉冉焉相映發以增其勝公每與客圍棊飲酒於堂中見夕陽在嶺必登眺舒嘯焉而月白即泛舟於是焉向之不可得者一旦憑几席而接之矣公未壯出仕及艾歸田楚粵之交嶺南北之山川當極天下之竒觀矣而歸復寄情於一丘一壑夫山水之好人情所同也然惟仁智者得之性中而遊於物外故孔子稱焉吾意公之名斯堂也將必有樂乎此矣或謂士之岩居川觀自得其志而終其天年者蓋不得已而逃焉若施用於時則其端凝不動山也虛明不滓水也又何暇於外物為哉解之曰窮通時也不榮通不醜窮性也故投間置散棄斯人而逸其身非君子所安也然或厭寂寞以為稿則不愈乘權藉勢瘁其躬以利天下非君子所恤也然或挾圭組以為榮則不恬非恬非愈性乃離矣豈復知有山水哉若夫仁者智者彼視其身猶寄也而山水直寄所寄也或出或處與天下同其愈悴而於吾性初無加損故其樂全而其夀命可長此豈非公之所以志與開歲二日為公六十初度二三子謀繪堂為圖又賡再歌以獻夀焉豫雖不文輒繹孔子樂夀之指以冠於篇首太僕申公六十夀詩序傳稱六十曰耆亦曰老之將至云爾蓋自既艾之後君子之為世大用其尤在斯時矣今吾元渚先生當其未衰嘗乞身於朝歸侍二親皆以中夀仙去比服除而春秋甫六十叔達為文夀之期以心腹干城之業不亦宜乎古之人蓋有以耋耄為時所倚重者非其勳名早著素見信於人主亦何由眷注不衰而聲施至今也哉蓋士當平世雖負經世幹略或未試用即用矣或未究其才有能深知之者鮮矣吾安知先生不遂無意於今日乎私念吾三人者之獲交殆三十年於兹矣輒復相與賦詩道鄉曲敘疇昔以致其相慕愛之情而豫竊重有感也當上之初年委政輔臣呼吸通於宫府而血􅎃流於寰宇姦宄自消邊鄙不聳雖微傷峻急而吏治蒸蒸有中興之象焉其後劑之以寬和乃漸入於隤廢至於今而有黷且汰無綱與紀如是而曰理安譬之負痾雖膚革充盈而常若有眩瞀痿蹶之憂庸醫拱手坐縻廩餼或且攘臂其間妄投湯藥益以困悴縱有盧扁若非望而驚走必且譙訶及之矣竊以為仲尼道大終於莫容用行舍藏獨許顔氏而子淵卒未嘗仕也其餘小用即小行蓋有舍之而不能藏者矣方今循循者既弗克勝其任而譸張為幻之徒又且以膏而沃火即有知先生而薦起之能盡用其籌䇿乎能旋試而速效乎叔達蓋惜夫有可用之才而世未有能知者故相為憤惋而言之耳未暇論於今日之事勢與夫當事之難也昔者夫子嘗曰智者動而樂仁者靜而夀始豫未得其解也其後觀於昔賢之論以謂道一仁而巳智者知求至焉故動而時與之合有合焉則宜其樂矣仁者不待求焉故靜而常無所為無為焉則宜其夀矣於是恍然悟曰此殆安仁利仁之義疏乎今先生所求於壯盛之年孚於家邦之人者亦既動而得樂矣盍姑靜焉無為則俞俞憂患不能處而年夀長矣他日苟有用我執此以往雖動未嘗不靜也其為樂且夀豈有涯哉將進而與昔之耄耋者比肩請以是為先生祝張氏家慶詩後序昔者讀書至洪範信以謂好德錫福若影響然其後觀於古今之變喟然歎曰凡箕子所陳皆王政也王者有作則夫好德而備福者皆其所錫也君子曰福吾不能必也吾知勉於德而巳於是焉或剛克或柔克劑而歸之於平康正直蓋所謂攸好德者如此中世士大夫進而騖於名位若不及焉退而騖於豪侈若不及焉至其脂韋俯仰以取容湛溺盈溢而不悟有能自克者鮮矣以豫觀伯常先生甫壯而出仕踰艾而乞身所至不為赫赫之名而君子莫不髙其守小人莫不頌其仁一旦以母老請終養田間當事者欲挽留之而不得也豫以是知雖三公之貴有不足易其一日之養矣顧非其母之賢能無眷眷於子之榮進哉於是人子雖欲自罄膝下之歡而裴徊顧望進退之間果能自遂焉若此哉吾聞太淑人既貴且老猶躬自績紡有魯敬薑之風門內化之皆習於儉勤然則伯常之得行其意繄太淑人之成之也有園在宅後先生日往獨居其中挾一奚自隨而巳春秋佳日時奉版輿以逰母子蒼顔白髮相對如童兒時歡也此豈可望於世俗人也哉人徒知先生逡巡退讓宜為福之所集而不知其中有介然不肯苟同者其接於人也以柔克而律於巳也以剛克是故宦達可以後人而寧拙毋巧奉養常不如人而寧儉毋奢以是娛侍其親非所謂好德而備福者歟豫既嘉其母子之間能自相成且窺見其閨門燕喜相與幸夫安享今日之福者其必不忘所自錫也於是敬繹洪範之指而序其後潛山先生沈君六十夀詩序潛山先生者友人沈君用卿方為其邑諸生師因而稱之也君今年六十矣其生之辰以中秋後五日於是忘形之交徐允懷唐時升婁堅金兆登相與賦詩因君之胤寄以為夀咸謂堅也頗好字畫屬以筆札輒復敘而進之憶豫童時識君比冠遂獲磨礲於文章鎔冶於德義嘗同栖石湖之治平僧舍裛晨露之清華醉夕陽之遐景濯以澄波皓月而焦腑俱涼醒以逺鐘羣唄而素心雙領時相與慨然有當世之志顧君璞未剖豫行屢蹶坐銷壯齒為可歎也昔歲丙申共遊合肥航丹陽之晴湖則月露湛於漣漪犯天門之駭浪則霜風號於澎湃陂陀羸馬逺懷洗耳之賢漾渺危檣近數興王之佐每託詩篇備存感慨巳而青眼難逢素絲多愴君既貢於澤宫豫乃逃於梵策彼二三子亦復阻燕臺而長悲駿骨望海若而自分枯鱗皆太平之不遇人也君中歲抱疴經年閉户獨有吾儕時聆謦咳然而杯酒之歡久隔過從之迹徒勤自再駕鄒魯之郊而腠理漸還其舊及一官吳楚之徼而苜蓿且安於貧夫灊皖伯之國也而漢武之祀為南嶽者有天柱山焉北矚廬子異時割據之所爭也西望齊安昔賢放逐之所栖也而志公錫泉燦師窣堵皆在境內近憑籃筍逺棹輕舠不過一舍之程時豁百年之興亦足樂也心安斯百骸俱適體適斯宿恙全袪固其宜矣秋風漸涼夀觴斯舉吾四人者徐長君三歲唐與齊年金視豫豫視君猶君之於徐也追思弱齡有如昨日良夀命之足娛寧遲暮之為歎雖千里阻修而寸心來往室逺人邇斯之謂歟豫嘗嘐嘐妄意古人可跂而君獨踽踽實薄今人不為或入狷而巳優或去狂而猶逺言易行難豫慚君友今之賦詩各寫平生貴在稱情永以為好彼有同賞出而視之或屬和焉張太母顧氏七十夀詩序春秋時列國之君及卿大夫歲時相會同聘問未嘗不賦詩以見志而當時有識者往往以一言逆定其禍福殆無一􅐩者然未嘗自為之詞也要皆出於太史所陳以觀民風者而巳至於閨房之內迹尤易湮若劉向所敘列女殆多不能詳而亦必稱詩以著其褒貶後之君子考驗行事而裴徊吟諷以想像數百年之遺恍若親見之也東漢以後文日以靡蓋皆有餘於詞而典則不能逮矣至唐宋作者始力追大雅雖其詞或難或易其指或顯或微要之非深造其域不能識其所以振起衰敝之意也若夫閭巷之小夫老婦非真有卓然可稱不經見於詞人之筆而近世多苟殉所好雖亦華然鏗然按之實枵然也蓋吾吳獻夀之文其尤矣間有好古之士自編其文特置頌禱於卷末若曰此古人之所無有也聊以應俗而巳以故其文獨爾雅可誦苟不能然寧為詩其勿為文此豫向之所持論也太倉曹亢宗過余而言曰當歲甲申時夏之先人與外舅張弱冠同為諸生始相識而先生亦以是歲廩於學宫自後遂為纍世通家今外舅早歿而顧太夫人夀七十尚康強無恙將往祝焉敢請賦詩以侑觴且為之引以見吾儕之好古而不同於俗蓋如此也因憶豫方壯辱昭服先生邀同硯席遂獲交其三世又及見亢宗少能誦長能為文詞今三世之交皆巳為陳迹亢宗年且壯而豫蓋頽然以老矣然不可得而辭也職方殷開美丈七十夀序代職方殷公既還里第日與其徒飲酒賦詩以為樂每遇境與意會未嘗不相求也花時扁舟出郭近則竟日逺則連日夜供具無倦容文酒之會不以涼燠辭雖過夜分非坐客莫能留終不先言别去也歸後八年為歲庚子而公夀七十孟陬二日其生辰也邑大夫士之相慕愛者謀為公夀而以序見屬豫謂士生於時非早露鋩穎即自致於公卿則沈鬱未有聞而一旦驟以科名震耀於時俗然而魁偉卓越之士中所自負幾不可一世而卒以廢棄為太平之不遇人者蓋不少矣獨公未弱冠而知名顧久困諸生踰強而薦於鄉又十年而後成進士出為方州牧巳擢官京朝佐大司馬圖畫所以鎮撫逺彛使咸知懾於赫濯而又差次天下桀驁拳勇之士人各服其心雖旋遭讒謗末究其材用以歸而其志亦可謂少酬矣當公之未遇也人咸為公有遲暮之歎而其氣未嘗少衰於時尚未有子又若不以嗣續為念今之歸也且以暇日指授長子以藝文之事而忘其疲也至親朋過從則擁稚子於膝屬對如流以為歡蓋公嘗官要地矣而甔石之儲屢空雖貧如素士而四方之以旨酒肴簌餉者又常足以待賓客夫其稟也厚故其發之遲其得之也艱故其優遊於暮年也不富而樂不以老而衰舉世人之所羡為福澤者無一不有而獨其神王氣盛猶如少壯此蓋山林寂寞之士所挾以傲貴富之人者而公獨得兼之然則繼自今以往公之益自得於詩酒以享有百年之樂正如既老出仕倦而後歸而從容以教子為樂持劵而責於天其亦必不􅐩矣是可以侑萬年之觴否乎諸大夫士相謂曰然遂請手書而進之公夫諸君子之齒亞於公而又少相習莫如錢德化仲與既同歌鹿鳴又同登第者則時侍御汝健自宜有所述以揚厥盛美然皆以豫言似有當於頌禱故輒撰次其語以為公夀序徐二丈涵齋先生七十夀序士之能世其家者不必圭組以為榮視所以為業而巳士之能尊其生者不必導引以為夀視所以為適而巳嘗數稱斯言以質於人而或未之信也曰世所以貴士以士能為可用耳圭組蓋所以旌也士誠束髮受書而終老無所用於世非獨世俗所姍笑雖厥祖父之望於子若孫者豈若是焉巳哉至於夀夭天或司之然而沖虛淡泊抑亦學道觀妙者之所亟也而獨區區於意之所適不乃以有身為大患歟豫以謂世之嵬瑣齷齪幸而遭時者殆不少矣又安知名聲不彰爵祿不及者果無當於用哉夫既承圭組之遺修詩書之業而見擯無所知名鮮不戚戚以自傷彼不能知將又笑以為不自量也吾故曰觀其所自為適而巳豈與夫追逐嗜好汨汨每若不及者同乎哉邑之故家其最著曰徐氏自中丞少參二公父子繼起為時名臣逮今百數十年之間子姓之業詩書而能文章者多有然而未有復為時用如曩時二公之盛者也少參之曽孫曰涵齋先生雖老於諸生無圭組以為榮而先生弗戚也曰吾知嗣吾先世之業而巳既而厭薄棄去則日與里中故人為酒會以娛晚歲會之日博奕諧笑終日無倦先生獨以齒牙脫疏不多啖肉而頗能食酒然不肯竟飲飲亦不肯竟醉每與客縱橫決賭至夜闌不勝杯酌猶若不忍别去蓋其不以困窮挫折而能自適其意以無伐其天和者如此既夀且康不亦宜乎是歲莫春二日為先生七十生辰諸嘗與為酒會者將往稱觴而屬以一言為侑豫故稱其不圭組而榮不導引而夀者以頌且禱焉蓋曰士遇合不可期要必有無忝於前之人者若乃桑榆之年不早自適而猶汲汲乎以外物為榮悴是則先生之所嗤也既以告於諸公因次其語以為夀序封小莊翁七十夀序有田一㕓勤力其中俯仰皆賴以給子若孫能世守之而無替其業此足以老矣而世俗不善是也髙者誦詩書號為儒以競於時幸而得則身榮家肥為世聞人其次服賈以居積致素封終不為農以自勞苦然而貴盛之極衰亦隨之末富以嗇或漸而靡貧可俟也夫農霑體塗足暑雨劬勞而莫必有秋然幸而不為里胥所困猶得長子孫飽粗糲以卒歲焉惟其黠而用事於官者更為侵削以自潤曽未幾時而不保其室廬矣乃有悉閭閻之微隱究因革之便宜進不逢有司之怒退不失小民之心身家俱泰無忝於前之人無憂於身之後非才且賢者弗能也若吾小莊封君其近之矣世為城南農家軒冕之榮什一之利非其好也力耕以謀生而間則漁獵前史用益廣其識焉其行方於孝友尤隆也其進止雍容可觀言邑之故事孰異同於今與政之得失民之利病歷歷可聽也君今年夀七十矣猶子某吾甥也以翁九日生辰告而請豫為頌禱之辭始君之尊人栁莊翁與先大父交好兩家之嫡長遂通婚姻豫曽賦詩為翁七十夀時與君皆未及強也倏忽不意便為六十外人而君且及其父之年矣豫本農也雖學為儒走薄宦於風塵意不樂而歸歸復為農以老以是知君之生平有無羡於貴盛者矣况於末富哉顧非君之才將見困於追呼期會何暇為田畝之樂而君又不以其能故更求豐饒守先人之廬使子孫永為庇焉時和年豐公無逋賦私足自給蓋君不獨以才也賢逺於人矣此其能優遊以老者歟重陽令節景物髙潔黃花滿籬白酒初熟親朋在坐更勸迭酬自今以往且歲歲就君而醉焉以自放於桑榆蓋老農之樂吾兩人獨能知之信未有以易也酒酣將别於是歌以言之城之南垂栁毿毿土廣平兮宜稼水灣環兮揉藍誰氏之世業兮給石與甔秫以釀兮飽且酣南莊之栁其人世多夀綬若若兮金拄斗不如樂此田畝吏不叩門兮盜不伏莽呼我鄰兮聊與之飲酒吳母翟孺人九十夀序生人之欲將必待物而足乎物固有不可必者矣有待故不能無求不可必故患在求多樂莫大於知足而巳世之王公大人其求得欲遂豈不百倍於恆人哉而汲汲每若有不足之患若夫田野之窶夫所望不過於朝夕所圖不過於尋常幸而無飢寒之憂則快然以自樂由此而觀有餘不足者不生於外物而生於所求之廣狹也雖然人之有求固也而獨閨門之內則幾於無求何者其所職者酒漿其所勤者績紡凡户外之事舉不能以自必故也顧其狃於貴富者亦未嘗無侈心焉惟夫處所不能自必無貴富之足狃亦無貧賤之為纍而寬然以終老此必有常見其有餘者矣以豫所睹若吳母翟孺人者其所享不巳多乎然非獨其子若孫常抱不足之憾於其親也雖閭巷之人亦然曰是耋且耄者以望於綸綍之榮鼎烹之養不相去逺哉嗟夫彼固未足以知此也吾意孺人其必能知之矣孺人有四子皆同生其伯仲力於農而叔季皆筆耕為養雖未有一遇然皆足以娛侍其親一樂也諸孫滿前耕而穫獵而饗後將必昌二樂也自年四十即持長齋既享清淨之福而又植人天之果三樂也夫如是雖綸綍鼎養殆不復為榮而尚何不足於中哉此非孺人其孰能知之始豫弱冠即與其叔季交好以行與文相劘切叔獨行君子也屏居郊外以讀書灌園為樂舍傍有老桂二株老梅數十株花時每一過之愛其有蕭然自得之色季獨侍其母居城中奉儉勤之訓能更飭其故居而教其子又巳能讀父書尤孺人所為顧之而喜者也是歲癸卯孺人夀九十髙矣屇設帨之辰豫之友某某謀所以為頌禱之詞而以見屬豫猶記少時數過外舅家嘗一拜孺人於中堂蓋外姑之姑也長於姪七齡而今尚康強無恙方豫獲交其子齒髮皆壯鋭然有四方之志而今亦荏苒衰矣既不勝今昔之感而益以知孺人之所享惟其無過求於物所以常見其有餘而形神俱泰以漸登於耄耋耳傳有之不貪為寶斯言也可以治生可以永年豫於孺人徵之矣遂請書之以為夀王母黃孺人八十洎長君六十夀序洪範言五福攸好德居一焉之一也所以為五也彼四者懸于天而一者存乎人修其人以致乎天有不可必焉而合焉者其常也或者以謂王公大人其福澤其行事有特異於尋常者故修違之應若景響至於田野之間閨門之內安其願朴之分而無敢求多於造物其人亦不少矣則夫天人之際宜亦謬悠而不可致詰矣以豫所聞若王母黃太孺人之夀考康寧也長君之兄弟子孫以農起家積資至富而漸能肆力於詩書以潤飾其先業也斯於福可謂巳備矣夫豈無德而致然哉太孺人之為婦為母不可得而詳聞少而相其夫子則以勤晚而訓敕其子婦與其僮奴必躬率之以儉曰家幸饒不可以溢吾分也長君以醇謹退讓稱不能如其仲積纎成巨然吾聞王氏之産雖日加拓頗錯置於四郊至所居洋涇之傍與其老鄰人共之不求兼而有也殆所謂攸好德者歟如是而富夀康寧宜矣今歲太孺人齒登於耋其生之辰在夏而長君亦以某月某日為甲子一周其從子伯雲甫謁豫而言曰吾伯母與吾兄之夀竊思乞言以侑一觴顧不能必其核也不核雖張而大之不足以為榮也子好古文不於其辭而於作者之旨敢以請豫既不獲辭則為序其家世福澤而本之以攸好德夫太孺人二十而生子子且夀矣尚康強無恙福可知也長君年六十而奉其夀母子孫滿前菲不廢禮費不及奢福又可知也惟勤惟儉以力作而謹守之睦於族黨以及於鄰之人不忮不逼歲時之問遺往來與里中父老長若平生歡也蓋一者修而四者響臻五福備矣豈得謂天人之際果不可知也哉且吾又聞長君之元孫勤學殖以自廣而不屑於膏粱紈綺之習伯雲試以豫言質之其亦為然乎否也顧母周太宜人七十夀序昔周盛時海內寧謐百昌遂長其民安於上之德澤以仰事俯育而人有遺秉滯穗之利其士大夫進而宣力奉職退而羞其食飲以養其父母以為樂於閨門雍雍愈愈莫如成康之世蓋自文王之受祉新命其修身刑家內有關睢之后妃而下亦有鵲巢夫人能循法度以相其夫子故若此盛也及乎季世而公父文伯之母猶諄諄以勞逸為訓所從來逺矣我國家承平既久當正德末年識者方虞其惰窳而肅皇帝嗣興聿新大命天下又翕然一變至於今適三世則成康盛際也士生其間乘時自奮邀朝廷之龍光以為親榮而又無賢勞之感豈非幸之尤者歟歲十一月吳江顧大夫道行先生與弟太學君道明以太宜人夀七十率子姓祝無疆焉而十有三日實維設帨之辰於是邑之姻黨咸焜耀其祝詞以稱道盛美而余不佞適讀書里中遊先生父子間甚習有授之簡者不敢以不文辭竊惟太宜人少而寡居含辛茹苦教其子使克遂有聞於世今子孫滿前蘭茁其芽拂髦總角而朝者相踵也此人之為太宜人慶者也長公既仕於朝嘗乞為南曹郎以奉太宜人朝夕巳而北走齊魯南入閩粵逺在數千里外雖有弟侍養以娛其親然念太宜人之恩勤不欲以祿養故久去膝下年未艾而亟自免以歸此尤太宜人之所顧而樂者也然豫獨自有感焉太宜人之生為肅皇帝之二年其後恭肅公服在大僚佐天子進賢絀不肖以振起一時之治以故四十餘年之間吏治蒸蒸民生樂業雖亦有疥癬之疾發於四肢而天下安於覆盂先帝繼之內順外威熙恬至今蓋太宜人之少而婉娩長而拮據逮老而優遊冠帔以安享太平之福者其猶鵲巢夫人之遺也歟昔吾觀於小雅自六月以下以宣王中興而祈父之詩不免致憾於有母尸饔者何哉蓋當是時南征北伐氣象赫然而天下之不安其生巳可見於言外矣何必北山陟屺而蓼莪瓶罄哉然後知成康之世之極盛而文王之德之逺也則夫太宜人之承藉世澤自少至老雖中遭荼毒而獲以垂白之年御板輿於湖山林麓之間問桑麻蔭榆栁含飴弄孫以為歲晚之娛者雖敬薑之食報宜然與其子之賢克自樹以慰其母之心然豈非遭際之幸而適當國家之盛時哉敬書之以侑萬年之觴陶母許太孺人八十夀序豫逰太倉友人曹周翰為我言陶君名逸則有志行妙能為辭章已得其文讀之又數與之接知周翰之言也信然吾觀逸則負氣慷慨似不汲汲於世俗之富貴者顧至於得失之際似亦不能釋然於懷意頗疑之蓋豫猶未悉逸則弱冠而失怙恃十年來煢煢與其祖母許太孺人相依為命今逸則之齒逾壯矣學巳成矣而不獲徼尺寸以為太孺人榮宜其以是戚戚也余既窮於世二親之年皆望七顧以駑緩自廢而猥言淡泊中心忸焉古人有言約其身而儉其親不可以語孝審如是則昔之簞瓢陋巷甕牖繩樞之士幾不得為人子矣嗟乎啜菽飲水盡其歡此孔氏之家法也彼其人皆得聖人而為之師其所自立有不同於尋常者雖其親亦樂而安焉其不汲汲於富貴無惑也今世之士自束髮即志於功名或不自力而廢即自力矣又不幸不得遂其志此其視聖賢人何如也而忍以自解乎然而孔子之徒自顔淵而外希有不仕者率常為小官非必皆喜於自效或亦以貧不能養故也如逸則盛年能不懈於學問以究其志則其有聞於時不逺矣以太孺人之茹荼拮據以育以教而使逸則克嗣其先業天之使食其報也亦不逺矣吾又聞太孺人自其未筓時巳能窺佛法大義常夢觀世音大士提耳示之既歸淮里先生方辛苦治生幾廢尋繹年三十而善病旁及於悟真參同即性即命了無障礙今年八十矣而形神不減少壯人若太孺人者殆所謂宿植德本者歟雖逸則之不以貴富養吾知其必恬然安之也然太孺人之訓課其子若孫極恩勤矣不於其子必於其孫吾又知逸則之志之必當酬也是歲夏四月三日為太孺人生辰凡所與逸則善若周翰輩視太孺人為太母行者將舉萬年之觴而屬豫為之辭因歎士窮於時雖其天性之愛容有不得而展者常感念二親能安豫菽水之奉故樂道太孺人之懿美以慰逸則焉逸則之貧至筆耕為養而能奉太孺人遍禮名剎以慰其皈依佛氏之心則豫又愧之矣夀朱濟之兄六十二詩引朱濟之兄長余九年甲辰之歲六甲一周矣憶自弱冠從君逰逮今三十年每一相過君未嘗不留豫深坐醉之以酒棋局詩卷間出以為娛往往至宵分乃别君饒酒德豫飲不過一二升而顧與之同嗜君有圃池數畝去其家不百步而近花竹斐亹尤多植巖桂花時或風雨亦必往逰焉顧豫雖嗜酒而不喜列坐終宴見肴蔬盛設則歡適之味為之漸減以故獨喜過君君既率意而留豫必快意而返坐起無常列酒茗隨所須自許得酒之意者無過余而能適余之意者無過君蓋麋鹿之性然也追數自少壯至今各衰且老矣中間所以為樂亦微與世俗異况自今以往蒼顔華髮相對蕭然生人之欲漸寡勞生之事漸稀相與遺形養性以終其百年則吾與君遊處之樂殆未可量也頃嘗為文以夀君而又賦二詩寫豫之懷故復敘之云爾學古緒言卷八
