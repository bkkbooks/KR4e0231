body:
  text: 學古緒言卷十二明婁堅撰墓表一首奉訓大夫淮王左長史何公墓表嗚呼天下固未嘗無材也而常患於擯不得用即用矣而人未必知之深也又患不獲盡其才若其志節不立媕阿苟且以自失其身且重負天下者即有材何為以豫所聞若常熟何大夫其才其志節皆宜為世大用而卒困於資格以老豈非當事者之責而士君子所深為之惜者與公諱某字子宣父曰湖廣布政使司都事贈文林郎浙江平陽縣知縣諱墨生公兄弟五人嫡長曰鉦其母王也再娶周連舉四子而公為長次曰礦曰錞曰鉉平陽之父輝大父采曽大父海海之季弟世學為士譜藏其家而燬焉故自海而上距宋靖康南遷凡數傳皆不得而詳也獨宗人之老猶能言裔出東海自别於廬江而巳公兄弟皆少而力學意在當世不專於浮華甫壯貢於鄉顧久困禮部平生自負其才謂功名可立致即終不遇寧跧伏田里豈能碌碌隨流俗人汨沒耶及弟礦登進士第慨然歎曰吾今而後殆亦可小試乎遂謁選為令溫州之平陽其地東瀕海於溫之屬最僻逺而瘠其民多去之永嘉瑞安佃而耕比公為之三年流離漸復二邑之民更視為樂土如異日平陽之人也及公既去後之為永嘉者歸以告其里之人如此蓋公自踰冠讀書任陽田舍拾兄所棄汙萊而墾之其穫滿車則仍以歸兄而更受其瘠瘠又復穰故其為巖邑而治辦能若此平陽之輸或逺在鄰境及他衛所涉江即沈艘踰嶺即摧輈公乃議折而益之羡彼利其贏此享其逸人咸便之金鄉衛者介甌閩之交去邑南幾二百里湯信國公所設以備倭也久而備弛戍卒病於㬥露猝有警無足恃於是條便宜築二石堡屹然為一重鎮使後之為邑者率能繕完則猶信國之逺慮乎其他魚鹽關市之征廢則修之或不足於額則轉移補之有勸之鑿空以佐縣官者謝弗為也而贖之鍰稅之羡悉以供解省府費未嘗私以自潤焉蓋公既明而熟於計事至孰利孰害靡不究極於毫釐而又本之以廉法出之以練達幹之以精勤以故規畫一定若操劵而收責役興而費易支功成而民不勞能使旋至而立有效每若此及朝京師以課最蒙白金之錫當得美官而當事者終不能盡其用僅遷南京錦衣衛經歷以閒散縻之公至樂其江山之勝意泊如也巳又遷淮王左長史遂乞致仕歸而以圖史自娛數與親故共為酣暢而巳尤好為弟若子揚扢古今以寄其感慨如是者又二十餘年以歿豫生也晚恨不獲從公遊聽其議論以開發其中之所窺老而無所用於世幸為太平之不遇人而撫時感事常思得當世之偉人以身任天下之重舉動光明卓犖剗去世俗之媕阿一切出於奉公守法而又有如何公者若而人以為之佐其於久安長治庶有賴乎獨惜夫有材矣能不失其身矣既試之而效而卒不使極其才之所至然則必媕阿苟且與俗同其波流者而顧與之共功也豈不可惜也哉豫既獲論次其概竊以謂公之為平陽獨凰浦之役最大而碑記頗能詳之輒采而參之於表其略曰平陽之南有江橫亘江之南又多大溪南北相貫穿則亦名曰東江西江凡溪水之來滙者三十六源溉田可四十萬畞獨患閩之山犬牙錯潮出其間若與之鬬鬬即濤愈壯而溪水尚不能敵湧而壞民田者鹵也在宋端拱始築埭三峯嘉定中又移築凰浦民賴其利元末兵起埭廢本朝自永樂迄嘉靖里父老凡四叩閽卒未果復當歲丁丑公以白備兵使者龔公遂與定築埭之議經營凡八閲月而工畢是役也公謂用土不如石恃隄不如橽止埭下流不如并埭上流完皆與衆異議夫籠土石而投之石固易止而立也橽者下石而上土水之來者阻石而留石以為之閾也水之去者汨土而利土以為之户也并備上流則無虞於蟻穴蓋既成而後人知其完焉計用工三萬有竒用金四千兩有奇而取之四十萬畞者不過稅民畞四釐而已公之子三人伯世滋撫其弟錞之子也已而舉仲子允澄叔子允泓其能備述公之稱於鄉閭見於政事而謁豫請表其墓者允泓也行狀三首鄉貢進士曹君行狀君姓曹氏諱繩武字昭服其先河南人自宋南渡移家常熟之福山元末以避兵又徙沙溪里分東西二族以居逮國朝𢎞治中建太倉州割其地𨽻焉因蓫為州人君裔出於東纍傳積困於貧弱君之大父雲南按察使司副使公諱某始起家嘉靖己丑進士得贈其父諱某為太常博士未幾以御史糾汪尚書鋐杖於廷謫為隨州判官稍遷至憲副有名世宗朝生子幾人而公之考諱某某為嫡長弱冠舉於鄉距憲副之登第才九年耳後又六年而生君君垂壯以國子生中南京兆秋試其明年憲副公病亟日夜望君北還比至屬以諸稚叔乃卒君少而孝友當憲副時大母顧恭人樂居溪上而父又善病晨昏之奉不能數數往來君每攜婦王往侍其側恭人甚安之前母顧孺人早歿未葬夜為盜所發君聞馳往撫其尸哭之慟手為易衣衾不以屬侍婢也歲癸酉計偕中途忽心動即戒傔從南還已而母唐孺人訃至驚仆於地起哭而馳馬蹶傷右肱創甚不為止及歸居喪毁瘁然每見太公淚交於睫而已太公早衰羸閒居多伏枕又苦不成寐君常在左右視食飲惟謹時共談言以適其意太公雖心樂之數顧而言吾以疾故不能卒所業念汝服勤孝之末也養志孝之大也吾將暫去汝買山以居逺不過一日程音問數相通如在吾目前耳汝其朂之毋以吾故廢學君是以得遍交知名之士修其文章然甘鮮之餽不絶於途花朝月夕數艤舟追隨湖山間以慈孝稱於人人云初憲副公注意睦族謂范文正公義田士大夫家有田十頃便皆得為而世顧希有惜吾力之未逮也屬君父子籍其族屬之貧者歲時廩給之當是時西族蓋有比部公某於憲副為從子年已垂暮矣顧族之人有違言往往東訴於君君既為之調停乃使還受成於比部族人以是咸歸心焉平生於師友誼最篤少受經王先生某生為買田以贍之歿為之殮比葬也上自其父母下逮於子凡三世焉友人周某者夫婦相繼歿先後為歸骨於土憫其子撫之尤有恩伯子之師周君某少與君同硯席以故延之家孰病瘵久殆不能起君流涕撫之曰即有不諱老親弱子後死者之責也不待君言歿後所以賑恤其家而朂其遺孤讀父之書如一日也比試於有司舍伯子而力為推挽常先於伯子曰吾兒少非所急也丙戌冬北上顧君成忠遘癘困卧寓舍相去十里而遙君每晨必挾醫往診之既而疾有加遂留共相守歿為具棺衾以殯幾罄其槖裝而遍訃於同鄉及其同榜之厚善者積所賻封識之歸以遺其父元朴先生辭不受則請為卜兆且曰傷哉貧也吾父吾母尚久㬥露今與兒而三矣即又為營三穴而仍納其金先生歎曰君行古人之事我何敢固辭願更留之他日以畀吾孫克紹蓋君所心許以女妻之者也遂偕其一姊來相依以居後四年擇壻嫁之裝奩甚具蓋君之好行其德樂之不倦類如此矣君性剛不能容人之過然初未嘗求多於人或負之亦不與較也至其成人之美急人之厄解人之紛誣而為白之鬱而為伸之苟力所及能不為流俗顧慮而終不自為功以市恩開釁也鄰邑之政將欲甘心於大姓以君通家年少語次及之君言耳目所及猶恐未真况曖昧乎令驚謝此長者之言遂寢不發里人每於春秋二試具舟及馬兼程報捷以邀厚糈或有往而不返其徒疑殺之者某也訟之官且誣服矣州守偶過君頗自矜擲發從容對曰正欲白其寃顧不敢耳此鄰家子僝甚非能殺人者且不與某同出奈何以不同入坐乎其人竟以得釋崑山之賢令聶侯以亷能著稱深知君特敬禮之有某豪者妻妒以治綿鐡梗椎孕妾腦而殺之夫懼計誣其讐而厚賄鄰里為之證聶密以問君君先已盡得其實即為白之人無知者獨曽以語伯子慨然歎治獄之難也蓋嘗題壁云人有欲則無剛吾以不貪為寶躬自厚則逺怨吾其强恕而行即此可以想見君之為人矣居常好讀書嘗手自抄寫至盈篋笥又頗喜法書及三代彛鼎鞸琫環玦之屬時出而玩之以為燕居之娛然人有舟車重載而遊士大夫間者亦不數與之接也太公既以抱痾斷往還君又性簡亢不能與世俯仰杜門端居父子若自為師友所與游處最習者曰潘省菴先生某以直諒見重豫雖晚與之接太公及君一見喜其坦易而許為入室之賓一日延潘及豫入其書室笑語從容出所愛花瓷觴焉酒數行手滌而貯之匣因為豫言昔嘗於酒次有所玩弄此翁意不懌抵之地而毁焉吾色不為動知其欲以此諷也復笑而語潘今日知不復然矣潘亦笑應曰前事吾幾欲忘之若兩君子者而豈流俗人之交也哉顧慚何人亦辱奬以三益今老矣執筆而序次其概所愧言之不文耳君娶於琅邪王氏溫州推官諱一誠之女而魏恭簡公之外孫也於司馬司寇二公為再從姪孫幼時嘗受詩及孔孟之書於恭簡夫人婉嬺淑慎稱其家兒伯子之言曰吾父吾母真能以德相成矣孰有子事父母婦事舅姑兩無間然者乎吾父之嗃也婦女之得至中堂獨有歲時饋奠及歸寧耳居常聞有羣而山游及禱於佛老之宫而尼姏巫媪之狎至者未嘗不極口唾罵也母笑而言自分吾家必無此事何用預他人事為若孺人者古所稱清心玉映蓋庶幾焉男子子五人申錫孺人之出也肇錫之母王居厚之母郭思恭之母章而最少訥亦郭出女子子三人長嫁張際陽者孺人出次嫁顧公紹陸日升者俱章出君生於嘉靖癸卯卒於萬厯丁酉孺人先一年壬寅生亦先一年丙申卒享年皆五十有五其葬也以泰昌庚申冬十一月某日墓在鄧尉山臨深區某字墟將葬君之諸子洎嫡孫謂君與豫善知之實深故因伯子先所叙次來請為行狀將藉手以乞銘焉禮部儀制清吏司署郎中事主事張君行略君諱某字伯隅世為蘇州嘉定人以譜亡不能詳所始或曰宋之南遷自關中徙吳洞庭又自洞庭來徙蓋郿伯之後云通議大夫都察院右副都御史贈兵部左侍郎諱某者君之考也杭州錢唐主簿封嚴州府知府贈山西布政使司左布政使諱某者大父也以孫貴得贈官如其子諱某者曽大父也妣楊氏按察使楊公諱某之孫女再封安人恭人贈夫人凡三世皆受二品誥邑里榮之君少勤學能文詞未冠補諸生踰壯舉於鄉未幾成進士歷官武學教授國子監助教兵部車駕司主事嘗受命為湖廣考官還晉禮部儀制司署郎中事而不幸以夭君之再試南宫也今庶子馮公為分考官擢冠其經釋褐當選為州乞假南還豫間語君曰士仕於時惟盡力州縣可以驟行其志使利澤及於斯人顧君癯甚如簿書鞅掌何君歎曰吾豈敢苟冒其責而負官負民耶亦請就閒散耳始為武學進諸生朂以韜鈐之學且曰鮮衣怒馬所以快意適自輕也苞苴竿牘所以媚人實侮之也皆宜恥不為已遷國子士以文求益者一經㸃定無不意滿去間語之曰人以資郎待若若必怒且慙曽不知浮薄文士之不足效也則謂之何再遷尚書曹在駕部時一意搜訪幹略奇士以佐主者又為規條減省歲所例供絶不以脂膏自潤胥史奸弊無所容然皆服君之介無後言其在儀曹會楚藩有告王非真先王子事曖昧且王立已三十年不容輕發而左侍郎郭公楚人也少年時微有所聞於里巷驟信受之欲以身任其事君力爭不可其後郭公竟坐免歸蘇州守以考試失士心士羣譟隨之執政聞而怒將引繩批根盡得其主名而置之法君從容言誠法當如是但恐坐者既多即無辜濫及當亦不少意遂稍解而郭侍郎驟得太守所自列諸生名尤恚甚屬君具以上聞君窺侍郎意堅未可遽奪乃趣吏亟具牘而抱牘白言奏已前具倉卒不可增今首從皆已服辜苟罪而疑不若盡縱弛之以彰朝廷待士之寬郭亦頷之獄得無濫君為人溫文清謹中雖兢兢自克初不為崖異以謸人人望之皆以為退然者然遇事有可否必力持之不肯為苟同與人交常依於厚人有以緩急告苟力所及未嘗不為之盡也其還自楚闈也自言於考文章極詳且慎不敢忘為舉子時比歿而京朝同官稱其守官每若此雖不獲詳亦可少見其概矣君譽聞孚於上下而一旦移疾乞改南當事者擬以吏部郎處之方待命寓舍以閒草故人何侍御行狀至夜分乃寢將曙呼治書小史索飲語漸不可了未幾瞑矣君之疾得之火焚其和當未遇時見君於衆中嘗有不自得之色意其急欲有所表見故然耳及既登用有自京師來者言君近狀常若有不釋然豈性固然歟不然平生故人强半不遇以老尚能日尋笑言之歡如君者豈有不足哉且君於進退恬然又方叙遷知君非熱中無疑也君生長貴介然性謙讓其言呐呐然如不出口常折節下人始為童子侍郎公欲教之儉則授以掾史筆故牘紙使書其背為藁草習字畫比長凡所讀子史百氏之書皆撮其要手書之積成袠其不擇紙筆乃愈於寒士與之遊者皆稱其敏而能勤富而能約每嗟嘆以為難君眉目娟秀體孱然羸也然意所獨往不副其所期不止侍郎公卒官西粵君以省覲往而不及於含斂哀毁匍匐幾不能生既免喪益刻苦自奮多招延友生與共硯席矻矻不少休一日謂豫與君年踰壯盛而名未成又皆顧影孑然此兩者孰急豫笑應曰古來賢士多寂寞而眼前販夫傭豎其不幸以無子終者殆十不一二也吾意欲先其多者而君獨曰吾儕何辜乃虞斬其祀乎不早努力即年不待人此吾憂也相與往復久之低回以别乃君竟以三四年間連取科第以去而年亦且强矣於是又皇皇焉以𦙍嗣為憂而無幾何又果得男子以慰其意方謂君自兹以往惟優游以須其子之成立耳而乃以未衰之年棄三歲孤童以死豈君之始願則然哉君平日於嗜好泊然或時牢騷不平即逃之酒人以自遣故終其身閨房無婉孌之昵邸舍惟僮僕相親易簀之夕孤燈熒然圖史在列豫是以傷君之意而為之愴焉以悲也君既歿前所拔君於禮闈者馮公洎君之友數人議留其子而獨以喪歸念修塗暑濕非嬰兒所堪也而後一歲所子又夭折豈所謂天者固不可以人事知耶如君謙恭靜默人未有忤者而獨忤於天耶豈君之自詭必得者固造物之所甚忌耶當侍郎公在山東臬時楊夫人與女四人皆燔死而君獨賴乳媪得排牆以出意天將以是留其祚耶而乃止於其躬耶君之配封安人徐氏為大宗伯公女嘗一舉子不育今惟一女嫁太倉州諸生曹居厚其母蓋徐安人之媵也為之後者從兄之仲子襲隆奉母安人命來請叙君行事之大略俟葬有期而告於當代之名公以賁君於永久襲隆已有子夫非君之孫也歟哉而安人亦嘗抱從孫景明自乳褓至今十餘年撫而教之恩有加焉即前往迎君之喪從兄其羽之第二孫也君生於嘉靖某年某月某日卒於萬厯某年某月某日得年僅四十有一其葬在城南沙浦原為侍郎公洎夫人某氏賜葬之塋而祔君於其左歲己酉三月友人婁某述隱君子沈公路行狀吳郡之東南瀕海而邑者曰嘉定邑之東南渡江聚族以居者曰清浦而居人又謂之江東多故家著姓若沈氏其尤也自孝廟初迄於今其兄弟族子先後登朝者皆有聲當時而門內之懿行又多以節孝旌於朝其垂裕於後之人久矣若豫所及交而悉其平生能以好古篤學無隕家聲者則公路其人也而不幸年僅始衰羸疾困之又不克成子姓以歿此尤昔人之每致憾於天道者也君諱𢎞正公路其字遡其先世之可考者曰宋揚州守都逺公君之十二世祖也始東遷為吳郡人家於郡之烏鵲橋已又徙嘉定之清浦七傳而思善公以好為德聞於朝廷得詔以旌義表閭生二子其仲曰輔與婦瞿以篤孝聞於朝廷得詔表其閭曰雙孝子四人季曰修職郎槩生子燆有丈夫子二仲諱應元是生君之考太學君諱昌德字叔懷少丁家難攻苦勤學既讀且耕以起其家以娛其親比哭母陸孺人念翁未衰而鰥居曰夜臥誰為搔背癢者以閒請為置簉翁喜而諾娶於潘舉小弱弟昌國蓋少後君而生也稍長叔與從子同學歡如兄弟相朂如友朋今之經紀其喪撫孤若嫠調族姻而貽之安凡所以慰君於九亰者目可瞑矣君少而穎異讀書過目不忘華亭唐太史父之中表也一見器之撫而歎曰是可踵豫武也年十六補諸生即以該博自期尤喜聚書經義之隙次第翻閲必竟其編然後更端遞及焉踰冠之年以文戰少不利鬱鬱成疾然日夕一編手不停披父叔慰令少弛則對曰無憂也兒非此將何以療吾疾乎既而遭喪內外釁起君曰吾將以三自反當之夷然不與較而學亦不為少輟垂壯遭母朱孺人喪方侍湯藥時形疲於醫禱神悴於憂思幾與母俱殆比歿而哭之衰藥與粥麋間漸以得蘇時方卜居海上聞有惎而欲甘心者則又歎曰盍還吾桑梓乎既畢窀穸遂渡黃浦來邑城卜築於東偏數與其賢者接風物之佳花朝月夕肴酒與茗甌並陳笑言與歌曲間發性不食酒而好客甚往往至於夜分君平生於交道尤善也雖所甚䁥必以莊中有可否直吐之否則默然終不為浮游也客聞其博雅多自逺方來未嘗以疾辭從容晤言或至浹旬終無倦色每歎同心之言其臭如蘭彼不能知徒謂君此好為名耳豈不相去逺哉君既自負其才以為幸得售可以少見於世故始而用之該博比抱痾則以暇寄之於林麓一亭之搆一池之鑿榭而花者樓而眺者淵渟而以濯以舟者不惜罄其儲以快意中之豁然視夫持籌而會計孳孳然以務益其帑者不霄壤乎哉或有誚君一何不顧其後君直等之於焦鷯鶠鼠而已豫嘗觀君之藏書矣自經史百家而下至於稗官野史之編板而傳者筆而祕者有不見不聞耳苟力所及何異渴饑若夫象犀珠玉之珍雖亦篋藏以為玩此寄也非其好也間嘗以語我自踰强望衰以來所未忘情者獨書耳吾撫姊之子名之曰榖似始生而鞠育焉少長而訓課焉亦已為諸生矣可以讀此矣吾日望之有同祖弟𢎞執𢎞雅焉如以世嫡生子即吾子也日可俟焉能讀即讀之不能讀則謹藏之以俟其勿令散逸焉此吾志也非數世之交而孰與言之豫聞斯言為之酸楚三歎君既抱沈痾無復當世之志讀書之暇頗多著述若蟲天志小字録枕中草諸編已行於世久矣别有救荒書兔罝野談印録續枕中草篋藏以俟後人惜也君之敏而好學而甫壯即困於病不獲竟其學又未嘗少見之行事而遽以羸瘵促其天年此豫所為抆淚而叙次之以乞銘於當代之名公者也初沈之先自郡城東遷瀕海以居其家於北者有給事公照御史公灼先後起家進士仕於𢎞治正德兩朝從兄弟也而君其裔孫家於南者為族子廣信守公諱陽以嘉靖庚戌進士宰邑治辦有聲擢侍御史升朝矣而隆慶初僅終於郡守先君之師而某也甫丱即獲侍焉有從子紹僖於君為叔父薦於鄉仕於朝官至兵部郎先君數月卒君之少也父黨咸謂蘭茁其芽苕發可期而一疾纒綿年止及衰嗚呼天乎何厚其稟而嗇其施乎君之自鄰境還而定遷也先後來為邑者皆以疾困不能旅謁然莫不慕其賢與通書問且揭德振華以表閭焉當是時大臣有疏薦巖穴之材者如茅斯拔而君獨恬然髙尚不為起也人尤以是稱之比葬而君之從父昌國嗣子榖似叙次其世系行實屬為撰次以乞銘其墓君之歿以天啓丁卯九月晦距其生萬厯戊寅八月十二日享年五十其配李鄉貢涵全君之女也先君一年卒别自有狀榖似娶於顧生男駿發駿惠駿聲女一人卜以是歲冬十二月吉日合祔於江灣新阡去考妣之昭若干步而通家婁堅為之狀以乞銘其墓學古緒言卷十二
