body:
  text: 學古緒言卷十三明婁堅撰祭文十三首祭徐大宗伯文年月日門下通家子婁某沈某謹以炙雞絮酒敬祭于故資政大夫禮部尚書太子少保徐公之靈嗚呼單閼之歲公壽七旬距其懸車八閲冬春於時獻頌自遠來臻焜耀厥詞紛紛綸綸凡公勛名巨細畢陳今之哭公略而不論感公深眷憤彼衆狺存殁之懷能不少伸當罷觀察健翮中鎩賁于丘園振宣文物稚愚而頑一見心折悉索穢蕪喜為擲觖身退名高俄復脂轄聖神嗣興起公藩臬十餘年間晉司㗋舌抗疏乞身不受汙衊逮歸里門遂斷請謁為方外遊黃冠白髮月明之宵花發之朝或乘籃輿或棹輕舠顧謂童子促具酒肴偕我同人于焉逍遙二三俊少每每見招侑以清歌有顔若苕酒既深只醉客羣囂公或愀然叙說勤勞曰此畏途以笑為刀痛定思痛漆乃賊膠貴不如賤此理甚昭既脫於絓弛我冠帶人為不怡中實大快將知耄及豈不夙戒恆舞酣歌猶賢噤齘公之逹生數聞斯話何圖梓桑盛兹蜂蠆衰羸及之有加無瘥蚩蚩之氓公又奚怪始邑之愈困於征輸自改為折瘁者復蘇荒草野田遍為黍稌瑣尾流離乃聚室廬起之膏肓報曾弗圖疥癬之疾銜為剝膚孰導狂瀾莫可支吾憸人之幸士類之吁豈公一身翻覆榮枮堅也疏狂學為詩章有唱俾和動盈縑緗湖山之麓古寺禪房經論之暇風雨聯牀察其愚欵謂無他腸可保終始實唯子良言猶在耳如何可忘儼之呰窳有意進取辱公甄收言庇其宇借我齒牙與我規矩藏焉修焉公子我侣扶搖九萬數嘗見許兩家衰翁少而習公眷念在昔忘其顯融自公歸田杖屨相從時於酒閒慰其畸窮幸各健飯孰否孰通音聲琅然曠若發蒙公今奄忽有識其恫矧於受賜他人莫同天不可問曷喻我衷豈厭混濁避其嚚訟騎箕上升帝庭寶宫俯視下土蠅蚋薨薨我陳斯詞酹以一巵寧為公哀聊叙我私匪私於公世道之悲報德以怨豺狼狐狸俟彼天定後當可知嗚呼哀哉尚饗又嗚呼人亦有言蓋棺論定何獨於公疑謗未靖嗟世之人喜儇而輕或矯為狂風節自命畫餅噉饑弓蛇宿病舍彼昭昭唯冥是偵載鬼負塗聞者易聽考公生平靡不足證十年曹郎守官則徑不撓於權一麾旋迸孱焉眇躬以捍百姓黜歸田間厥聲益敻至今南荆甘棠蔽映豈伊梓桑而不知敬固宜同升勛名日競莫知公賢覆謂公佞柄臣既傾目公捷徑寃哉斯言睅目羣瞪嗚呼哀哉當公在朝不問家秉僮之蚩蚩或竊為橫遂閧於鄉一呼百應有喟而言公施實盛若罔聞知彌訐彌絙海壖瘠磽慳於物性稻則匪宜而稅是併號呼籲天永賴寬政孰為之先維公錫慶嗚呼哀哉公壯自期庶幾汲鄭晚亦自咍視日趙孟不圖吠聲遽掩其行令子繼徂白日再暝受重者孫煢煢伶俜季子兩甥實同枝牚嗚呼哀哉公神在天俯視瞢瞢譬猶蚊虻未堪梟獍菀既當枯垢亦同淨吳山之西峯巒綿亘賜域芊芊土膏泉瑩維暮之春卜吉而塴考妣則違子婦相並嗚呼哀哉吾儕侍公學焉就正八珍一臠偶沾殘賸公顧解頥留連觴詠曰古文詞燦然緯經唐宋諸賢六經胎孕今之詞人妄生譏評斥遠姬姜昵近婢媵訛種相承口舌難勝猶望後生無售昏鏡旁及老莊是詮是訂尤切憲章綜述列聖其言日新有告必罄飫所未聞沃醉俾醒嗚呼已矣復誰韶令祖道一觴陳詞而醟髣佛見公几筵來憑嗚呼哀哉尚饗又代嗚呼天之生才實俾輔世既啓元良爰錫之配國之登賢實由詢事既積勛庸爰晉之位自古以然道喪乃戾履方則危競於軟媚於惟明靈獨能不愧未壯登朝簪筆入侍帝重絲綸命掌其制繄國大典曰戎與祀由司馬曹為郎祠祭稽古禮文大祝無祕肅穆壽宮天子䖍毖厥詞煌煌以薦圭幣時長春官風稜獨厲謂公曰能屬之代對將請于朝酬其勞勩公不詭隨權奸內忌出守于荆快其睚眥政平民和不煩而治江漢之間號稱茂異帝子于藩爭民所利少給市租大忤其意閹人構患逮公囚繫萬衆塞塗追挽其䩛叔子去思至今墮淚既歸忘出世不忍棄有詔起家遭讒復躓論定乃升回翔楚地節鎮未幾刑官入二超遷秩宗章服三賜始明于刑棐彛率乂既曰降典寅清是寄禮刑一物唯公克遂及耆而歸脫身冕黻先朝所垂二氏所記有造必窮有餘必識蓋公於學特為精詣故所居官有遌無避當其屹然獨持大義如遼庶人為汰匪悖主父在齊懷刃欲剚公之抗辭不撓者氣壽陵既卜奸或濳伺潝潝訿訿衆咸愕眙公折其萌以紓國計雖履虎尾了不為惴凡所執持多如此類不同流俗脂韋矜智迄終天年必行其志列上太常將錫公諡公未嘗亡譬猶委蛻我之識公實從初試慕公牧楚願學為吏公亦不鄙待以國器今之仗節遄聞公逝俯仰今昔能不酸鼻公真大臣後來孰嗣我懷明靈緘詞以酹嗚呼哀哉尚饗又代維萬厯年月日宗伯宮保徐公以疾卒先是邑之黠而嚚者惎公僮客羣而囂焉不思公之嘗有大德於斯人也其東偏瀕海而居者某某懷憤悶不平之日久矣於公殁後明年月日祭以特牲請於能言為文而告公之靈曰嗚呼公之為德於鄉兮紛其賴以全活也彼狂奔而羣吠兮何若斯之乖剌也豈寃抑之莫伸兮將貪夫之好為訐也咸攘袂而大詬兮吾不堪此蠆與蠍也謂左右其實訌兮隔九閽而不得逹也呶呶者何可盡信兮竊恐夫當路之不察也公之再起凡十年兮由牧伯而朝列也兩公子其實從兮無他子弟使毖㓤也操奇贏以牟利兮固無厭者之沒沒也豈强貸而倍收兮亦維時政之騷屑也嗟瘠土之寡入兮恬不慮夫澤竭也夫孰以告司農兮俾得改而折也維田賦之三等兮固則壤於前哲也彼惰窳之積蠧兮乃猾胥之窟穴也曰均下賦於上中兮吏亦偷以補其拙也懵莫之省憂兮踵行此弊轍也公手為草以代訴兮監司聞而蹙額也遂欣欣以漸蘇兮庶不浚夫膏血也苟良心之不泯兮如飽饑而止渴也曾不若畏壘之尸祝兮忍乃為此桀黠也吾儕輟耕以太息兮中一鬱其若結也疾黨人之滅公兮身處卑而不能關說也公有大賜於吾土兮竊不忍其抹摋也維海壖之斥鹵兮凡鹺課其千鋝也既灝溔而不可漉兮猶責洪波以飛雪也兹大海之吐吞兮亦恃人之回斡也彼稅盈以償詘兮實咨公而施設也吾既獨私此惠兮不覺夫哭公而嗚咽也人情誠不可以一概兮胡衆口之反為齧也公固施而不責報兮吾哀夫俗之薄以劣也喟陳辭而奠酒兮髣佛乎公之來啜也尚饗合祭王大司寇文嗚呼公之文章行於天下擬漢及秦鼓吹騷雅四部煌煌世多習者公之出處凡幾回翔亦既初服不辭繡裳為介為通孰知公常公之偉度如海則涵公之勤施如雨則甘不以文掩十猶二三始興以來奕葉相望蘭茁其芽誕必遒上凡民有知靡不瞻仰公今仙遊其又奚憾將厭世氛還于恬淡綿竹之期於兹當驗某等辱在門墻或故或新不鄙而棄於誼則均武之先子昔同馳驅暨乎弱息以吹以噓不幸短命彌惜其殂晚更知我潦倒粗踈今世實鮮宜謂為迂時升孤孑嗜古而拙公謂莫知子羽我刷從我秣陵我文子閲含咀英華匪日伊月堅也拜公在弱而蒙逮試京兆言憫其窮于館于穀他山為攻自公豫告靡日不從醉以朗月煦以和風臨别之音提耳則空燧誦公文于冠之年蚤失所恃有痛莫宣庶幾一言賁之九泉不謂獲請數奉周旋承公之訃飲泣漣漣公來自天為世造福命之不延寧為公哭哲人云亡百身奚贖言叙其私以薦一巵倣佛見公笑而釂之尚饗又嗚呼公之返真歲閲五期久殯未祖以需日時生為正卿殁得賜葬維是恤典有畀無讓公昔遺言從先大夫戒其嗣人我違汝辜子乃上疏具陳哀誠隱君之賜義不敢承天子曰嘻國有故常汝其勿辭往治爾喪爰用復土賜域之左於是焉藏魂魄以妥方公壯歲有意馳驅既遭家難十年茹荼先皇之初沉寃昭雪恩重身輕言脂其牽晚稱遺民賁于丘園再蒙恩澤復就籠樊未幾乞歸此身吾有夜壑舟遷柳忽生肘唯是窀穸公志則存庶幾地下永奉晨昏考公生平凡再疆起義兼尊親臣臣子子吾儕後生咸以文行遊公之門叨陪觴詠往者哭公人寫其哀許與之分於今永懷何以祖行炙雞絮酒陳詞侑之公乎知否嗚呼尚饗祭董大宗伯文代王嗚呼維昔江漢篤生元良既膺寶厯有弛必張公對大廷廣川頡頏含腴採華厥詞煌煌典司綸綍在帝之旁晚躋春卿寅清是將勛名既著俄卷而藏用啓後人奮翼翺翔匪榮其私酬國未央凡兹盛美史乘則詳我所感戢情結於腸自昔稚齒學為文章氣盛才拙莫知披猖先子之故側聞大方棄瑕録瑜目以圭璋齒牙餘論許紹青箱黽勉十年始舉於鄉再獻再刖乃忝周行時公元孫聞譽日彰指心相期不同尋常纍受國恩朂哉勿忘猶憶少時辱公稱揚知己之感於是焉償何圖大故匍匐奔喪疾疢繼之窳不可强公今已矣我實倀倀客歲之冬公以一航翩然東下止我中堂鶴髮朱顔其容蹌蹌終日匡坐閒舉一觴每至夜分吐論洋洋謂當百年彌壽而康胡忽厭世白雲徜徉公雖早退其施不長為國薪槱實棟實梁唯是樗櫟於用無當疇劚而削能不倣徨元孫之歸身晦道昌今之繼起彪炳詞場或出或處咸為國光公收其全殁有餘慶我之哭公默而自傷拜瞻遺像衮衣繡裳尚如平生音徽孔明陳詞寫衷薦此椒漿嗚呼尚饗祭潘司空文代嗚呼大臣殉國匪才之難袖手在傍噂㳫來千爭獻所疑蝟磔矢攢慨然任之力排衆歡浩生說趙實為心寒國是以定民獲少安豈伊識明有慮必殫河流湯湯久湮禹迹自北迆南蕩漾莫測避之而遷荒哉賈䇿回河北流徒費工役其在於今勢尤異昔自引而漕兼賴其力合淮以輸歲虞激射巋然園陵憂在肘腋天子曰嘻疇稱厥職有言公能俾往底績公來行視講求實詳增卑倍薄允賴隄防不忤以蹙少殺其狂彌束彌遠水性之常下流既滌孰壅為殃驟詘復信奏功明堂民免為魚室廬相望一時之利璽書煌煌公今云殁淮壖不忘嗚呼哀哉昔我先子嘗參名藩公以臺臣歸賁丘園許與之分夙聞話言暨歲壬午鎩羽獲鶱簸揚而前公胤吾昆始識公顏飄髯如㦸目以通方朂以學殖曰今之人誰不外飾子之易夷前修所亟爰命女孫許字弱息終始之誼維是姻戚自余在疚逮今數年中遭舛互有痛莫宣區區之懷日省豫愆猶望後來無忝於先稚愚失學快意所便况慙義方䑛犢多牽我是愧公每用憂懸長君宦遊厄於豪右公論在人使出稍售何圖倉皇還哭公柩嗚呼哀哉老成既謝時事亦更病淮而號泗上之氓謂當改圖役豈易興易變則通毋毁公成令公而存别有支牚寧固而愎毋躁而輕維公諸子家學是承公則已矣尚有典刑嗚呼尚饗祭王奉常文嗚呼公之學問淵源文章煒曄驂哲昆而齊騁譬蘭苕之集翠猶汲古以修綆蓋遠擷六代之菁華而近以濟南為庖郢公之敏於治辦長於師帥紹前烈而彌永譬鏌邪之發硎猶張弓而先㯳蓋終焉八閩之模範而始定魏國之家秉凡公生平在二三椽筆固己勒堅珉垂汗簡而琅琅炳炳寧獨海內所共瞻仰將傳信於後世而莫不想見其山之高行之景維堅與表稚愚無知不獲侍公於生前聽其議論之踔厲覩其丰儀之峻整而奉以為師猶幸與公之諸子遊處而庶幾於私淑者五六年於兹公居家庭內和而外莊凡所以訓敕其子必依於醇謹鍳於盛衰斤斤乎刻鶩畫虎之喻而告以門地之不足恃者其言尤諄復而可思此雖長公之叙述亹亹或有未悉而洵美象賢時為吾黨而闡繹緒言輒抆涕而歔欷嗚呼哀哉公位不滿其才年不滿其德固將貽厥後人以未艾之福乃四子競爽又弱二焉伯兮叔兮皆以恭敬溫文欲並轡於康莊而遽脫其輹獨仲也苕發穎豎方有聲場屋而季亦逡逡退讓抱未雕之璞一塤一箎猶足備九奏於咸英以和嗚國家之盛而無負於式穀若公之明悟既能了無罣礙於去來而何戀乎浮生如轉轂矧其卓然不可磨滅者又已灼灼在人耳目乎丹旐翩而靈輀既駕生芻一束其人如玉奠酒漿以陳詞徒悵恨於百身之莫贖嗚呼哀哉尚饗祭欈李馮封公文代嗚呼世稱人子所為親榮曰高其門有進於此匪直榮觀令德之溫乃厥考心所用自慰亦在後昆圭璋特達爰有名位出為世珍疇菀其條疇導其流水木本源維子之為實父之貽以克有聞吁嗟我公含和養醇賁於丘園賈既弗售是啓賢嗣甚秀而文擢第禮闈褎然舉首矯矯高鶱公顧樂之吾幸有子可遠世紛巖觀川遊佐以觴詠聊樂我員疾革之言我老牖下清時逸民孰屈而信孰殁而存唯吾子賢某少習公與之遊處真若飲醇兩附令子科第之末以自濯薰唯余家嚴視公兄弟情好素敦謂當百年皓然兩翁鶴氅綸巾胡忽厭世棄其親朋曾不少延我別而來拜公堂上維暮之春逮承公訃自秋涉冬彌曠九旬乃克緘辭以抒悰愫薦江之芹我實愧公公能鑒余簿領為煩嗚呼尚饗祭欈李朱太公文嗚呼楩楠豫章其高千尺其大數十圍而任為棟梁則必不生於尋丈之蹊而步仞之岡其於人也亦然非甚盛德則孰為厚其積而開厥後之人繩繩乎德彌劭而名彌昌於唯我公含真葆素蹈義履仁凡所施之閭里而被之膠庠即未展其生平而在卑能施在約能裕蔚然盛德之光公有象賢世其家學蚤播聲華晚就閒散其所抑而未試試而不苟一稟承乎公之義方爰啓孫枝蘭茁其芽並擅國香而仲遂以明經起家始出宰乎南漳仍移牧于此邦為氷蘖為鸞凰固己名被八閩而譽冠三吳豈非公之所厚積不售於躬而盡以貽諸後人使紹述而闡揚也哉某以沉淪廢棄樗散瓠落之才辱公哲孫時與從容於議論文章蓋未嘗不述公之所以訓敕之者庶幾乎陳大丘荀令君之不亡且言公年已八十餘而神明不衰如少壯人一旦遺形委蛻而遊於無何有之鄉公又何憾於人世所為公悼者仁君之勳業向鞅掌於簿書而季孟之學殖未獲騁於康莊要於克自樹立以酬公之所未償則譬猶深山大澤之産干霄拂雲靡不飽雨露而厭風霜異日者之為棟為梁也審矣明靈有知其尚欣然而來舉余之觴也耶祭矦大參父子文嗚呼昔歲作噩公以踰耋之年示疾而辭世回顧諸子環列孫曾岐嶷夷然於啓手足之際人皆謂之仙遊諸福亦云咸備於時長君雖未忘於揚名撫賢嗣而自慰痛定之餘以稔聞青烏家言行將求乎福地歷數年而得之阻日時之未利年六甲而甫周抱沉疴而遽逝後又五年而子也登朝奉䇿書而三使陟衡嶽之嵳峩觀嶺海之噦噫歸而煌煌乎綸綍之來賁已乃擢官給諫言歸覲省奉觴於王母及母氏之前蓋一耋而一老既壽且康猶如甫衰之歲於是諏日庀工將以日躔星紀之次啓公與長君之殯歸於𤣥堂以永安於百千祀邑之白衣冠而送者將踵接於城闉非悴且老也且牽舟而前相率拜於墓道之隧某等咸辱交於數世託里閭之末契輒以生芻絮酒往酹而告以祖道之祭蓋江自西來泖自南下渺瀰而來滙以奠逝者之魄以宜爾子孫於世世若公父子之稱於鄉之人與永有貽於來裔有銘有碣非可罄於造次之陳饋嗚呼尚饗祭曹養吾先生文戊子之歲始獲升堂以通家子拜公於床形臞神王骨聳顔蒼心與貌古靜默而方晚實聞道寡營孰戕公始望七杜門滅迹軒車來過輒辭以疾唯平生親笑言促膝何圖新知亦許入室觴詠餘閒圍棊彌日性不食酒僅能濡口座客滿前分曹列偶子承其顔滑以瀡滫山肴溪蔌辛酸畢取叶一飲一石匪升與斗公笑而云有子無負川遊巖觀吾意所安於焉卜築永以盤桓言采於麓言釣於干春花秋月歲暮雪寒短歌長謡興至必殫生人多欲紛紜馳逐獨以素羸早脫桎梏少舉於鄉公車奏牘三獻莫知遽懷其璞乃託計然用展心曲既積高資好施奚黷賢嗣繼之有聲場屋屢上春官珠掩魚目公憫其勤慰諭諄復子之榮親豈必章服維爾好修繄我多福況於後來森其蘭玉逹哉斯言老氏止足如公之賢弗試而竣養痾林樊以樂天年是當百歲胡不少延實夢斯覺周也蘧然自弱而耄一彈指間以神為馬駕而上仙遊彼帝庭俯視八埏某託末契見其四世公子吾兄公我父事我朝我夕我館我餼不以沉淪遂見鄙棄今兹南逰公訃忽至臨觴澘然起而攬涕典刑是傷匪私其意時日之良期月而藏跽而陳辭薦以酒漿髣佛見公來舉我觴尚饗學古緒言卷十三
