body:
  text: 學古緒言巻十四明婁堅撰祭文十四首祭朱通政文聞訃嗚呼守道通方實難其全孰有備美體方用圓感恩知己各繫其逢孰是契合情深道隆於維明靈宅夷蹈峻清而能容廣而能慎其取於人寧鈍無銛其責於人以鉅掩纖嗚呼豈無清節於物多傷亷也勿劌其道大光豈無厚施或私其恩形骸之内古道斯敦邑之凋敝如人病羸公曰食之藥石何為賦從其緩令蠲其煩如氷之潔如春之温禮厥耆碩㧞厥俊髦不罰而治化餮與饕去後之思至今如新庶幾節鎮復來拊循日月以須未慰饑渴一朝奪之天乎降割嗚呼哀哉公始挍士㧞我衆中以言信行日就磨礱猶憶行春仙舟共載德音泠泠是培是漑公旣佪翔予日偃蹇書疏每勤朂以歳晚昔公北上期會吳門促膝笑談自晨及昏信宿而别賦詩言懷務道之合匪俗之乖洎乎再起兹秋為期時暑方虐後到而疑旣謁門庭旋枉軒車公來惠招辭謝以書請俟畢試飫聞髙論以酒彌縫解其勞困老親傳言促以遄歸公方病脾臨發依依留書閽人具告之故曾未經旬俄而承訃嗚呼哀哉公之屢擢每官於南我至都下謁見者三白門橋東石頭城外數聆話言繼以歎嘅何圖斯遊僅一覿靣痛結於腸有淚如霰嗚呼哀哉公之名德鬰為世望賢者所歸雖愚無謗才用未展命不其延所不可問瞢瞢者天旣畀之厚胡奪之速匪天不仁抑民無禄將世之汙卒以莫伸寧喪國寳毋混於珉自古潔清幾人富壽彼鄙而頑福澤多有曾是力田欲勝逢年以德為劵豈曰誠賢養之不終有伯與季志之不酬象賢維嗣我哀斯人為公大慟國撓棟梁士失麟鳯嗚呼哀哉不訾之恩匪利與名在奬其進以古為程相知之深匪才與藝在信其𠂻雖窮不墜恩不能報知不能酬我則内慙公不我尤立不易方用不違時古道邈矣能不悲思嗚呼哀哉尚饗又代王人之相知貴相知心或異圓方而同酌斟匪迹之諧其中則忱維公清峻垢氛莫侵挺然特立如松出林潦倒維予與俗浮沉有喙三尺自比於瘖中間相去寧尺與尋泉流高山何有蹄涔鳳輝五采何有翠禽云胡契合證古信今公念我甚我媿公深自今已矣此意誰諶嗚呼哀哉清而能容是謂道大嗟彼鄙夫譬猶牙儈偷肥幾何身名俱敗其或好修又不勝隘唯名之尸唯物之蠆公嚴自律待人不然仕非為貧吾義毋諐柰何衆人望以聖賢世儒齷齪行以名羶及試於用拘攣不前至於友朋意氣莫宣公雖逡逡遇事慨焉公赴留都道經於吳扁舟東下一過吾廬予時屏跡田閒掃除公以籃筍就我踟蹰促膝之談𠂻曲是輸既别而歎此真丈夫公方嚮用不棄慵踈曾是蓬藋足音來娛自今以徃孰慰窮途嗚呼哀哉公始為邑於閩之漳理成獲譴厥譽彌彰公來識靣鄰邑相望維吾先子謂公循良已擢儀曹改考功郎視學江右卿寺俄翔病免家居用韜其光以納言起將鎮一方而年止服政官止五品未展欲為賫志以殞士失依歸國䘮膚敏凡厥庶民罔不悲憤況於深交淚何可忍嗚呼哀哉我之哭公國士之知友道日䘮化為魅魑無與為質痛結肝脾擷蔬薦酒跽而陳詞髣髴見公如田間時至公操履洎其設施後有作者徵於口碑未敢以誄有涕漣洏嗚呼哀哉尚饗祭朱西宗文昔歳之冬郡邑朝正道出於吳舟車縱横我歎於座思通政公客曰傷哉善人之窮比聞公嗣復已短命疑信半之知其善病今果然矣天可問耶蕭艾敷榮蘭蹴其芽自公云殁凡再晤君食貧而瘁有慼無欣性又狷甚不取一介我為之顰如何可瘥火之鑠金醫窮莫救人之好修人胡不裕叶又嗚呼哀哉維君履方稟於儒行其中泊然又依禪定將蜕汙濁上生天歟抑再為人遂師浮屠我在門墻為世所擯守其顓愚匪俗之殉倐而衰白報德何時唯是骯髒無慙見知公昔之官實攜元孫我時方舟時接話言舞象之年頭角已露翹首天衢非久横騖彼蒼茫茫人定則勝如聲與響有召必應慰太夫人洎君之嫠日可俟矣其又奚悲所可痛者公廉不劌位不滿德中道傾逝意君接武又憊於貧俯仰不支妨其躬身將人所享不係其行或世之衰天亦醜正吾不敢信徵於來兹眉睫之近何足致疑生芻絮酒酹而寫哀靈如鍳予髣髴其來嗚呼哀哉尚饗祭沈中丞太素文嗚呼顯晦之分以俗觀之其途天壤唯有道者處顯而恭在晦而廣公之辱交棄彼脂韋憐我骯髒昔在水部歸於其鄉東下海隅邑有茂宰臭味實同語次及余出其試巻宵歎於座晨禮其廬伯氏之嫡屬以石攻與共三餘每一晤言何以當公有迂且踈匪朝伊夕有倡必和俄奉簡書自省而臬督學關中别我西征我笑而言今之在事有權無衡君以衡徃復恐才難或不中程還書詫我彼有傑然鷄羣之鶴匪鑑則明士固易知玉也犖犖予旣屢蹶以此媿公書問不數猶蒙記憶碑本是貽慰其寂寞先君之葬公移齊藩書來賻俱我不敢承感其誠念賦贈干旟入當獨坐出即摠戎爰贊中樞已果授鉞作鎮大梁旗纛徐徐未幾移疾累疏得代歸臥東山我欲扁舟布袍徃覿信宿而還何圖訃聞驚愕問故有涕潸潸楞伽之麓湖水所滙形勢囘環徃營壽藏陸遊平莽水宿澄灣神遊其間一去不返邈不再攀嗚呼哀哉人之知公早以文戰名動帝京晚而登用將由内臺陟為孤卿所莫能知氣剛局方屹然不傾有度有識有惠有威為時重輕未究於用未躋於壽騎箕而升嗚呼哀哉公昔方壯求友山澤而得顧翁昨歳乞身聞而私喜儻可比蹤而今已矣平生之好於是焉窮靈輀旣駕丹旐翩翩徃即爾宫我有生芻以侑哀誄一寫予𠂻嗚呼尚饗祭王稽勲冏伯文嗚呼昨歳仲冬書來招余曰病漸深肉去存膚日噉幾何枵腹如壺及今相見有懷欲輸仲醇南來余自東徂同日而晤言笑晏如為信宿留與同朝晡臨分悵然兾春而蘇庶幾勿藥息慮自扶已得還報筆墨糢糊有増無損勢難枝梧母氏未葬痛不及圖外憂門戸内憐妻孥以此瞑目其將能乎感念百端攢刺病軀疾高下治求腴得枯倉皇再來卒以號呼嗚呼哀哉予始識君歳為丙子相與周旋後又一紀君之將翔省覲留邸余時鎩翮放于山水迨官雎鳩歸以哀毁方慙攻玉毎為倒屣燕閒所聞洞見底裏扁舟石湖欲以兄事余謂不然向嘗竊鄙所貴友朋豈減昆弟苟為斯名倫止四矣君益慨然曰子吾砥乃延授經北山有梓模範謂何實懷斯恥余衰杜門君出旋弭時一過從迹遠心邇頃歳金閶夜燈同艤君見吾儕其色有喜宵分之譚佐以甘㫖君談甚豪或臧或否旣别咨嗟誰歟可擬氣雄神王必多受祉而官止五品年僅踰耆耳於戲哀哉如君伉爽迹於疏脱及乎精詳靡有轇轕或疑其深城府過設有信其𠂻肝膽俱裂鬰勃者氣而文特夷豁堅凝者志而用殊活潑早擅科名晚見抺摋常思得當為世肅括奮不顧身要與俗别汶汶以完寧察察以缺所為痛者賫志而殁嗚呼哀哉君之令子亟思表見改絃更張衆以規瑱君謂丈夫何塗不衒父子之間當有獨見世猶忌之莫借以便嶷嶷諸孫行看豹變其嫡而長王母所眷君别其名以著繾綣孝慈之風施及來彦爰兆復始譬猶集霰旣以慰君且勸為善日余哭君即以此唁君其聆之歆此薄薦嗚呼尚饗祭博士何原錫文嗚呼昨歳春暮君過吾廬痛念先公曾不少須語我暗投邂逅其徒要以西邁自潞歸蒲所不能從東望菰蘆庶幾青衫還為親娛旣而謁選得官新都歳晏來歸氷雪長途馬鞍之陽引領歸帑何圖入門涕涙霑裾今徒骨立神已先徂執手慰君滅性可乎劬勞之報盍葬而虞君旣别去予踵歩趨輕舟俄發悵望踟躇欣聞令子苕發瓊敷凡百俊髦莫或枝梧慨我遲暮方此將雛春雨之淫逮於夏初且曠疏問況乃舟車令弟訃來驚起嗟吁繼以泣下兀然䘮吾嗚呼哀哉予始暱君於彼南徐行則接袂榜也同艫高秋凉風欲忘客居後在曁陽又數相於君攜愛子日勤菑畬笑言之歡不棄散樗别來耿耿每懷濶疎自君之北予歸糞除追念舊好今也則無嗚呼哀哉君之行誼稱於里閭君之詞學遠為範模百未一展賫志黃壚天不可問尤在賢愚彼侗而騃終老膏腴此賢而瘁不及霜顱俟其旣定夫豈終誣維塤與篪將起詩書我陳哀㱔託好生芻髣髴見君翛然清臞嗚呼哀哉尚饗祭張儀部無隅文昔歳戊子就試金陵遊處之暱毎同寢興予適病瘧欲歸未能君頗矜奮喜於得朋迨乎鎩羽意憤不勝顧我恬然悔且自憎予曰有命非人所覬君今踰壯我又加四況各終鮮又艱𦙍嗣試觀生人萬不一貴顧影而單百纔一二姑置所難而思其易子曰不然天匪瞢瞢苟無大戾寧剪吾宗唯是遇合如㠶待風無風而前艣楫之功其後三歳君舉于鄉再試南宮天路翺翔未幾銜命祗役大邦楚之多材考厥文章還而見語所獲過當今之憂念乃在蒸嘗予笑而應毋勞遑遑子恃艣楫颿則高張天道可信必有餘慶我迂且頑世宜共棄至今單孑天若同忌子之熱中當無不遂别又四年君旣抱子書來欣然易憂以喜造物於君亦云厚矣改官而南蓋計所便有未釋然卒難自遣一心為盾百憂為箭如蝟之攢而不克見為膏幾何緼火實多首尾惴惴以焚其和嗚呼哀哉旅櫬南歸穉子獨留羣公之慮風土不侔欲令成長歸解母憂母泣而望霣涕難收人或謂母有美誰侜室遐心邇何虞阻修時其餽問通其綢繆唯力之視匪人之尤孤嫠相倚如水石投年似為異終焉見休以此慰君含笑泉壤我辱君知憐其骯髒宇下之庇譬景罔兩哭陳斯詞追叙疇曩奠藻與蘋庻其來享嗚呼哀哉又昔承君訃驚顧相悼澘焉涕零洎乎喪還拊棺長號痛不勝情所用為慰唯是孺子可望長成何辜於天本旣槁矣復折其萌其悼君者曰旣踵武再振家聲厚畀之才顧奪其年天胡可慿晚錫之嗣殁斬其祚抑又瞢瞢或解之曰世道缺陷鮮受其贏如君世胄能以文起不保一嬰予角去齒從古以然有平有傾仁必壽乎且有後乎兼享令名宇宙大矣古今邈矣萬不一并天人之際譬有物焉欲知重輕徃來取𠂻人者權也天司其衡有進於此曰是宿業如景隨形唯聞道者解㢰釋粘俱忘愛憎過眼空花何貴何賤孰殤孰彭如飲而醉沃以清泠旣醒無酲吉日辰良言歸窀穸適歳新正唯予二人夙昔之好情均弟兄悲極而思曾此幻化而足牽縈嗟君生存憂瘁半之以畢一生殁而復然魂魄私恨永結幽㝠敬陳薄奠縱言大通以祖其行靈乎聽只形閉九原神遊八紘嗚呼哀哉尚饗祭宣適吾先生文嗚呼憶始髫齓已識公顏偉然長身屹立如山及稍有知得公之心如淵斯渟衆所酌斟就之而温樂易君子飲人以和莫測涯涘至激於義譬渴與饑仁者之勇凜不可移公富詞學儕輩推讓屢獻而刖有舟無榜行道為惻公乃恬然曰世我棄吾駕可旋偕我同人賁於丘園且留其餘遺子若孫公饒酒德飲可數斗晚以病止幾不入口凡所自割大率類此所以皭然不汙泥滓居常語我更事以來政俗之變頺波莫囘闕文借馬酌泉鞭蒲誰復嗣者覆謂我迂予其識之長此安極每語移時相對太息公旣厭世世益好夸欲聞斯言尚可得耶昔我先子臭味實同歳赤奮若先公而終我有女弟歸公叔子翁媪共憐二十年矣爰有二甥漸露頭角何以慰公朂使勤學嗚呼人之老成鄉之典刑一朝奪之能不涕零清酒一壺徃告予䖍髣髴見公來凭几筵嗚呼尚饗合祭殷軄方無美文嗚呼維昔識公皆以穉齒先人之交逮于頑鄙未有聞知公顧之喜此汗血駒一日千里雖則内慙矜奮伊始於時公名在遠猶邇明月暗投按劔相眎乃會其徒我鍔爾砥爰及後生令奏其技曰予厚集汝試摩壘再皷而麾蹲甲注矢何以佐之有酒孔㫖公每為文或臥或起口吐厥詞然後伸紙誦之琅琅聽之靡靡蹙而為瀾爛而為綺亦旣老成雜以譎詭何有愚蒙乃為倒屣知公用心始駕如是車在馬前斯之謂矣公雖食貧而性豪侈好為酒會必豐以美謔浪歌呼歸於有斐自公未出洎遭萋斐三十年間如一日耳咸謂康彊尚多受祉臥痾浹旬遽捐牀笫嗚呼哀哉堅老逢衣曾不媿耻恃公之知或不在此兆登潦倒困於鞭弭黄金臺邊壯心欲死公於吳英口授經史凡在師門受恩無比自以少壯佩服知己推挽後先增釋譽毁今其漸衰未獲出否以是媿公有淚如泚嗚呼哀哉公才過人自謂跅弛大德之閑不踰咫尺官至大夫家猶寒士口多微辭或疑為詆善善之長十倍所訾恥為鄉愿同於惡紫至其坦懷洞見底裏亦曰虚中錄及欵啓有急而告孱弱同倚有耄而賢貧病加禮人之云亡孰蹈斯軌鄉邦之嗟其何能已如或吹毛索公疻痏我不敢知後有君子奠而告哀匪以為誄嗚呼哀哉尚饗告張二丈文維歳戊申冬十二月張二丈茂仁先生殁期年矣先是通家子某等於訃之夕徃哭焉葬之日徃視竁焉及清明又展禮其墓而獨未克為文以告之猶憶先生閒居每得吾輩詩輙粘壁間坐臥諷之其後相見聞先生之論莫不快然意滿蓋先生之於文終身好之老而不倦如此方其未病也聞予作壽榮堂記一日晨來叩門索觀讀竟三歎以為翛然得古作者之意已呼孟陽來共談笑竟日乃别不意其遽病以殁也雖先生平日之所以告語者不止於文字今墓有宿草矣安可無一言以冩予哀乎其詞曰嗚呼我少未冠獲交令子側聞話言誨以讀史歷代之編如貨在市以待求者紛綸錯庤通鑑紀年本於左氏如絲在機事經人緯縱横貫穿究厥終始謂可用世世莫能以帥臣悍驕從古以然宋懲五季徐收其權逮至于今罔阻戈鋋謂秦毒痡有剏而傳匪郡匪縣孰使安全蘭陵大儒曰法後王知時逹變不主故常近代儒者畵餅為粻不顧饑死好為荒唐先生之論期於實效豈若拘拘方枘圓鑿至其談經實探窔奥孔孟昭然胡不自劭而以虚恢妄相為驁日月中天何有螢爝所謂文章以道為程古之作者才與識并西漢典重其音鏗鍧在唐維韓源本六經柳克嫓之如月長庚廬陵嗚宋實開大聲爰有眉山傑然高牚王旣峻潔曾亦渟泓其所自得各極晶瑩彼不能知以時代評自宋之南庸淺儇輕漸矯為豪匪雅而傖以剽為博以蔓為菁吁可怪也實盲後生誰歟好古允有師承今其徃矣孰告孰聆予賤且衰有志未能舉世嗜痂如何可勝先生之壯好言老𣆀摧剛為柔寧鈍毋銛晚悟空寂復歸瞿曇南能之宗庶其可叅已而見語尼父吾師靡所不有佛老何為論語一書童而習之豈唯莫由且莫能窺淡而不厭老之希夷克己而仁佛之毘尼吁嗟先生允蹈斯言每當噂􅊱杳然黙存有臧無否吾道自尊及乎諤諤不移衆讙貌之芼芼若混渭涇所莫能眩其識之明中之兢兢若重愛憎所不可奪其執之恒學志其大文抉其精而知之深者獨二三友朋予之告哀實悼老成後有命世斯言其徵嗚呼哀哉祭沈見吾先生文嗚呼先人之執存者數公自少迨老唯公實同二年以長前殁七年判隔幾何行復周旋我念疇昔兼悼老成匍匐徃臨有涕沾纓昔我先君師事廣信獲交仲季有譽無恡旣困章逢幸各有子復令頡頏朂以經史公子競爽豈如我頑或騁或蹶猥同伏跧諸孫駪駪其氣如虹曾是璞玉而以石攻昔之侍公我髪垂肩翰墨餘暇每厠賔筵今之侍公我髪其華杖几從容相顧興嗟昨歳長至屏居一室時勤書䟽訊公微疾聞其減差眠食如常謂當百齡永享安康公孫生男於兹仲春走賀充閭迎笑諄諄何圖奄忽厭世仙遊訃聞鄰邑徬徨客舟四十餘年記猶昨日風俗之隤漸漓其質唯公子孫允蹈孝友尚有典刑以詔于後賁公泉壤可劵來兹哀我父友酹而陳詞平生之分非言可殫庶其來聆鑒予辛酸嗚呼尚饗祭徐攝山先生文嗚呼公少以詞學有名諸生中之無競色又奚矜人皆稱之喜愠不形晚升於學終困一經選為縣令廉惠著稱資格為拘去之蠻荆滯淹頗久歸耦其朋性非食酒不厭深更晝需肉味佐飯則恒餻餅及糜宵坐焉慿伎筵絲竹有召必譍暑雨之晨花月之舲翁為祭酒笑而不觥夜不扶杖黯然一燈行泥淖中丁丁屐聲彼有蹣跚羨翁體輕翁曰否否吾藥為餳自壯至老餌术與苓緬懷攝山藥草藂生欲徃求焉齒長未能别未旬日有言吾兄脾氣不宣頗倦將迎徃問而信土不勝形容則瘁矣言清且明竟以溘然奪我範型嗚呼哀哉我嗟世道撲散淳􅞏其騖於機平地嶣嶤其矜於餙售跖以堯或有詆之彌迹於恌以臆為權以舌為刀有靣而詬或背而呶此又叵測匪吾黨交翁今仙去遊於泬寥下視塵俗蝶胥螗蜩雖昔所安亦同氷銷維鳳維梟維蘭維蒿自視等耳其分則遥古云論定終焉不淆我懷其人望風長號倬彼嵬𤨏詎曰堂坳翁去何之聆此大招嗚呼哀哉祭龔方伯汝脩文嗚呼公之臥痾距其巻懷垂二十年時方踰强形神俱王早賦歸田性喜賔客分曹博奕飲以觥舩少長咸集醉而歌呼迭奏管絃或時閒居巻秩紛披手不停編始乎孔氏泛覧百家亦𤣥亦禪去之田野於彼城南為山聯綿水樹周遭輕舟容與山堂翼然豈唯夏秋追凉而已雪淨花妍四時遊觀於邑為最至則忘旋晚病風痺不良於行籃轝仚仚自頃痰壅脾氣不宣有坐無眠屢徃問訊形憊神閒了無戚顔未幾承訃感念疇昔攬涕漣漣嗚呼哀哉昔我先子獲交虞部若兄弟焉變起倉卒有友數人不媿重泉公視猶父先子之殁三哭几筵當其生存彼此過從執禮甚䖍予少五齡童而肩隨今亦華顛彼速其成稍知佔畢自以無前目擊隤風其業詩書其人市㕓後此一紀當復如何將遂天淵如公㓜孤能蚤自奮無墜其先此衆所悉吾於懷舊獨窺公賢其所脱畧小小自弛蓋氣之偏獻歳二日賦詩為壽公老而傳維此一觴易祝以奠嗚呼蒼天哀哉尚饗學古緒言巻十四
