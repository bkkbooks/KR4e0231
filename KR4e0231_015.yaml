body:
  text: 學古緒言巻十五明婁堅撰祭文十五首合祭李叅議茂實文嗚呼自昔悲憤究論天人莫如柳子雖激而真禍福賢愚分塗以出其適相符十不得一是信然矣古今豈殊執表論影非迂即誣如君之賢而以客死所得於天年又止此䟦渉之辛簿書之勤自夏及秋勞形與神人或謂君過於峻潔直木甘井先伐而竭為此言者殆於吹毛彼不能知何損秋毫吾儕知君不勝䀌傷未免以臆責報茫茫死生大矣胡見之小㝠心以觀孰壽孰天嗚呼哀哉君之讜言著於諫垣積與時迕旋出叅藩令君而壽竟所施設誰與等倫為世魁傑君之令聞浹於鄉閭瘠土窮民爰頼以蘇九里之潤已各滿望逆計後來其又奚量而天奪之速志業未就徒令有識痛心疾首嗚呼哀哉君實善交能愛而親各隨其分侃侃誾誾色温以恭與物多可涇渭之明實輕嵬𤨏識明以敏視人無前貶損之意每下仁賢如吾六人始以文狎莫逆者心情好日洽昔歳丁亥為會而盟期共切磋不苟為名藝文之暇酒酣氣振薄雲干霄靡有緇磷君騁驥足高歩康莊數年以來或顯或藏自君使還休於里第握手之歡疇昔無異猶憶江干流連飲餞别君一年而以哭奠嗚呼哀哉君之嗣子孝友天植一歩一趨先民遺則自承凶問久絶水漿迨乎啜粥猶屏桂薑篤行若斯克昌君後吾儕念君欲竭鄙陋行方智圎則幾乎全九原可作必謂曰然少者六齡眉目娟好哲兄是依成立可保天之報施所不敢論君雖蚤世不没者存蘋藻之薦以洩其哀臨觴一慟肝腸為摧嗚呼哀哉尚饗祭王伯栩文嗚呼君之文章勁悍峭㧞魁然劃然見者驚怛胡以囘翔健翮屢鎩匪衒於辭而矜于法君之幹局不激不阿敏以應猝静以鎮譌匣藏鏌邪剸割如何晚就冷官日月耗磨君于交接飲人以醇其中之夷而色之温孰久而疎孰遽而親宜福之遐僅踰五旬天可問邪人可慿耶恢奇見擯嵬𤨏乃升驥服鹽車駑馬是乗栽不必培覆何必傾嗚呼哀哉始君謁選人為憫焉未第而試俗所棄捐吾儕聞之獨謂不然雖未獲展猶執陶甄唯斆學半老更精研况彼谿山可眺可沿維歳之春蕙蘭斯馨層岡複嶺吐花㝠㝠彼茁者荼紫茸熒熒何以瀹之山泉泠泠庶幾見分植我户庭瀉我瓢勺我醉旋醒而今已矣腸㫁涕零嗚呼哀哉每憶過君枯棊在枰香幽酒冽竹暗花明雜以嘯詠肝膽俱傾至則如歸歡極平生如何兹來哭對銘旌嗚呼哀哉君之連蹇生人之瘁於君何有修短不貳目之未瞑我知其意母氏在殯不克襄事疇歸其䘮從母于墳維太保公洎編修君終焉孤寡尚頼殷勤慰君九原代感以欣我陳斯詞以侑藻芹髣髴見君凭几而聞嗚呼尚饗祭徐孺旭文嗚呼君生之辰歳在癸丑先公宦達旣三年後自童及强咿唔窗牖筆札丹青兼出人右長身傀俄性頗食酒時陳珍羞求此良友歌呼獻嘲咸謂甚口凡四十年福履則厚僮客之豪爰召羣詬彼氓蚩蚩狡獪來誘一呼而囂千百其耦射影吠聲夫何不有君於斯時不震不忸出遌其鋒囚服泥首入承公懽共厥瀡滫旋遭大故茹哀蒙垢衆方豺狼已為禾畆或益之距恣所踐蹂自春徂秋對簿糺糺哀與憤并有閽難叩心焉鬱結孰刺孰灸厥眚伊何門則亡牡鬼瞰其室主人出走病不踰日柩聲有呴煢然遺孤與季相守晝哭逮夜傷哉老母謂天嗇之丗年所受亦既優游疇為之佑謂天俾豐乃奪其壽晚遘閔凶曾是焉取造物杳冥奚慿而剖君雖有文今將覆瓿貴介遇君君瞑目否海壖瘠鹵巨室難久松栢之生不於部婁理或然耶君則何負凡我締交亦孔之舊忽焉承訃失足與手勢極而反後當復茂或漑而培矢以無苟有酒盈樽佐以餌糗髣髴來歆酌此大斗嗚呼哀哉尚饗祭王亭伯二兄文嗚呼昔歳戊子擔笈仁里子來惠顧託好伊始時奉常公抱痾牀笫晨昏之奉與仲臥起外應賔朋公聞色喜迨於大故瘁不勝毁予賈不售都門留宿冬孟來旋緇塵滿䄂匪人我嗤亦自知陋子獨見憐書來幣侑期以明春切磋相究不謂頑鄙乃同味臭旣獲周旋弟晜後先自春徂秋咿唔牕間舐筆伸紙競吐其妍當其會心或丹或鉛佐之酒肴實㫖且鮮我醉歌呼顧子塊然謂我嗜古發其藏弆商敦周彛鐏罍􅀢鬴晉唐以來圖書之譜心開目明得所未睹子遊金閶邀與徜徉我止於栖子臥其傍歡然笑語此樂難量何圖未幾二豎膏肓我始怪子善病少康暑月露坐揮汗如漿獨屏於廡燈下相望素秋方肅會客中堂子席當戸闔扉以藏子之文弱難恃醫藥猶憶病時驚其瘦削惙惙謂予兄毋見謔豈不自珎疾不可却自子訃聞心焉如焚芳蘭旣摧其芽復芬子之遺腹今已締婚後十餘年績學綴文大業之遂以慰子魂子今永歸先司馬原靈如有知聽我斯言朋友之誼誓以永敦嗚呼哀哉尚饗祭侯官陳封公文嗚呼公昔至吳觀俗海濱其氓搰搰其士逡逡誰歟涖之漸變囂嚚公有令子實牧斯人公來之年吳人病潦九雨一晴彌望浩浩湖水西溢禾也為藻海波逆湧飄忽若掃壟畆不分塍則有表民之籲哀攜㓜扶老或言厥壤邑多岡阜薄少可收尚給升斗公白上官為民疾首高田無濡歳不宿糗當其襄陵歩仞何有一視之仁繄我父母歡聲載塗黄童白叟公聞色喜可幸無負以此養志豈伊􅔱滫旣而遄歸慨然三歎吾雖不售當得閒散苜蓿堆盤亦足衎衎及矦課最擢為御史公笑拂衣吾可已矣彈劾之聲播於人耳方按江右飛語驟起姻連之故指為瘡痏既歸里門侍奉多祉昨歳初夏公病扶几琅琅德音脱屣塵滓嗚呼哀哉某老書生以拙見憐先慈之䘮枉奠几筵感深欲報有愚而專某也齗齗每荷諮詢眉壽之祝賁及於親禮重鄉飲首延為賔相與惜公綆長短汲其唯既醉五福鱗襲何圖承訃當歳甫集逮兹永夏緘詞南檝白雲英英山幽水清風馬雲車翺翔蓬瀛下視紛呶譬羶與腥公其唾之來舉一觥嗚呼尚饗祭王使君達宇先生文維公淹雅之度包蒙鄙而能容凝定之𠂻當造次而不擾其所施於從政之大者遠莫能詳而小試於育才之日者久而彌著驟而接其色詞如坐春風如飲醇醪不覺夫體融而心醉徐而窺其蘊藉如中流楫如隤岸防秪見其氣定而神閒凡皆吾黨之得於親承所不能僂指數而可以一二見其槩者也當公之未去下邑也會多士之郡試或召侮而衆囂此於法為犯上曰某某其煽摇謂曖昧之難明告當事以宻調與其濫而枉誣無寧幸而獲徼向微仁人之一言豈無誤詿於科條及公之登第春官也有錢虜之通神嘗誣殺以中士獄久淹而未決曾莫分於臧否值督學之來涖濳賄屬乎胥史坐縁事以逓降復數年而得理儻師帥其如公何䑕輩得而為市夫此二者前有恃則幸無濫後失庇則旋見傷兩生盖得於傍觀嘗私論其所以而今日之所為痛悼於哲人也自公入官爽鳩出守閩粤中間雖書問濶踈然而賢嗣之裒然於京兆元孫之斐然於黌校皆竊以驗積善之多慶宜福未有艾也何圖一疾而解官渉期而承訃用未盡其才德未食其報豈天人之際容未盡符而修短之數或果前定耶所媿壤地相隔僅百里而遥而匍匐徃救顧獨後於知交生芻告誠俄已迫於窀穸蓋兩生之困頓衰遲實抱大慙於中而庶幾㝠漠之我鍳者恃有平日之知也猶記癸卯之冬合餞之夜公醉傀俄不辭杯斚欲别誠難酒盡須貰猶昨日耳忽此徂謝陳詞侑觴有淚如瀉嗚呼哀哉祭王編修辰玉文嗚呼士騖於華靡有根荄剪刻繒綵綴之枯稭我思古人求友於今洵美君子實慰我心含咀仁義周孔為師根之沃矣播厥芳蕤其遇之晚柅於多口疑者漸信璞玉斯剖其登於朝有文恢奇不踁而走罔敢瑕疵其歸就養穆焉孝誠將老其才以為國楨其疾之痼而卒以夭天可問耶行道有摽君之無年民之無祿何予之豐而奪之速父哭愛子子失慈父抑又何言私門之盬仲尼大聖不諧其伉非我所為其又奚愴孟軻之賢臧氏興讒彼噂􅊱者豈足為嫌又其甚者爭名若儈射影吹毛詫棘為檜世道交䘮末流日壯孰恥不為欲以身鄣嗚呼自予獲交於今丗年惟是朴直君則我憐千里之思促膝之談旬月之别信宿之淹相見而笑臨分而懊中間興懷筆豈能道予窮於世實駑且慵君欲振之若于其躬每辭京尹輒為慨然惜也斯人逢掖華顛況艱子嗣及衰猶獨盍廣其途屢勤書牘予謝不可君譙且疑已聞生男喜而色飛嗚呼朋友道䘮貎而不𠂻獨君於我戚欣與同君之抱痾有加無瘳凡我家人咸為之憂日夕以兾如秋旱苖數日闕問顧我忉忉訃至之夕我泗汍瀾攬涕還坐相對辛酸雖吾痛君婦女莫知道義之戚豈忘吾私臨殁之音似託以子有如不盡生者媿死徃奠一觴侑惟蔬果詞以告哀庶其來妥嗚呼哀哉尚饗又嗚呼君之雄文博學蒐六藝而總百家始冠秋賦於京兆或混玉石而羣譁洎乎韋相告老元成起家擢南宮而脱穎對大廷以揚葩於是向之懷疑久乃帖服化猜忌而為咨嗟君之篤行坦中友一鄉而論千古不知者以為矯矯華胄矜才諝而峻城府知之者以為温温恭人劑柔剛而泯茹吐若其居常心口相勞嘿然深念趯然圖報一則曰父母老矣門地之高其何可恃蓋兢兢乎爰始於客位之醮再則曰恩寵極矣如天之施其何可忘蓋勉勉焉自朂以移忠之孝此雖朝夕伊邇莫能識夫中之所存而庶幾於莫逆者於君之亡每不勝夫國寳之悼然則世之惜君徒以才與時迕名由晚成年弗克永道未獲亨與哲人之不試而同慨而孰知深𠂻之怦怦即號為能知之者視夫羣猜聚訕之徒要未足為徑庭也某等始終之誼秖以文行相關周旋術藝之藪高論皇王以還有骯髒而契合孰脂韋以躋攀君旣捐我各已衰顔淚未乾於宿草魄未奠於西山青烏之書誕謾而不可信君未即葬懼夫言之或中而以瞢瞢者貽後之患然乎否耶松檜蒼蒼流水灣灣其必從先公先夫人以徜徉於其間耶跽陳詞而薦酒神髣髴兮左右嗚呼尚饗又嗚呼自君之殁於今十有八年矣而骨肉始歸於土非緩也當文肅公遷殯而西凡知君者咸謂孝思之依依何異生存之處華屋如必别為之兆域非所以慰之於㝠㝠也因遂從公之柩而西於焉聆山寺之曉鐘覺塵寰之宵夢或從公而生天或踵前之芳躅儻可臆決於㝠㝠乎而青烏之書不無異同則遲廻而未果固人子之至情耳曁乎嵗月屢經疑懷漸豁蓋嘗始基於西山之崇峻已復穆卜於東渚之渟泓纍纍焉依先世之故域鬱鬱乎啓今日之新阡庶孝誠之積䖍禱而有符即明靈之託蛻骨而永安者矣予與君投分實深有懷欲吐昔嘗濡翰託之陳饋文蓋四言韻逾五十亦既慿悽惻之音寫痛悼之懷矣别又賦五言律十首慨世道之交䘮寄懷思於無窮焉迨乎遷座而西邁復有輓歌以導行凡七言二韻十首則皆導之以逍遥而極之於無生即欲别為之詞其亦何加於此頃辱賢嗣請為君傳文不求工意在徵實與於執紼亦復何言猶憶辛丑北歸枉奠先子喜予得雄盍出以視撫而見語當有難弟未幾而殤始悟君指比舉復聞君疾憑几聞之欣然此乃賢嗣豈有術耶不爽如是予今送君歸安窀穸輙吐所知以詶夙昔君家尚寳朗朗英特孫以出之有容無窄使於四方所至前席曰是寧馨足徵世澤里閭稱之無間疏戚前史之躭既披且繹門内雍雍庭前翼翼孫枝蘭玉伸其佔畢以是慰君匪聞而覿如君超超已通仙籍凡予所陳爰告無斁嗚呼尚饗祭叅政張公文嗚呼人或謂公吐濁吸清形羸神王胡不百齡公嘗語我順受其正較短與長乃俗之情予昔善病頗學養生既而大寤孰為殤彭所貴聞道空無所縈心之已了又安問形相視而笑如日銷冰今之哭公有叩莫譍嗚呼哀哉士窮而老絶意榮名時復感慨水火妄争豈少庸駑為國股肱如公清真不至公卿始為州牧迨叅藩屏歷試中外慎獄與刑所見於世藹乎仁聲不激不隨以亷自程人飲其和莫識觚稜意所鄙薄狗苟蠅營不露色辭黙焉内懲萬石之慎三閭之醒永以詒糓施及孫曾尤敦儉素代綺以繒食不兼味矧於珎烹自乞終養恃母猶嬰後園之遊親從以餳蓋踰一紀爰啓先塋頃方禫除欣接友朋讌樂以酒屢及深更獨居高樓遊目郊坰布衣徒歩或攜野僧彼不能識問此孰傖俄而鼓盆悲不自勝火炎痰壅失其所馮曾未兩月溘然相仍死生旦暮非公所驚將從羽流翺翔玉京抑生人天歸依佛乘公既厭世詎有不能雲𨫼翠軿恍其將迎公乎歸來一釂予觥嗚呼尚饗祭張烈愍文嗚呼昨歳凶問至吳吾黨相顧驚愕愴悼相與痛其所遭而壯其守死以謂斯人之端静愿恪宜可圖於遠大而乃死於盗耶豈天遠不可問而人事每紛出於適然都不足慿而弔耶嘗試以季脩之才之行而論其平生所遭天固厚之矣其又孰為之撓耶君少工文辭為儕輩所推讓迨踰壯而僅獲升於學徒見賞於國子先生而曾不得比於遭時之俊造况乃履方蹈軌穆乎其度肅乎其容有為之推莫為之娟而僅以牧凋瘁於遐方又束於選人之常調涖官三年其民戴之為慈父其士奉之為人師而同官皆稱為不矜不伐之君子又嘗兼領鄰邑所至皆頌其惠慈比死官而相率肖像祀之於廟若斯人者其文其行其吏治亦既為當世所稱矣始而屢躓於棘闈猶曰未遇其人也及乎受官於荒裔猶曰被拘於格也至為上官所知將移治大縣使展其用而廣其施以為寵為光而驟殁於戎𤏡之羣剽豈所謂天道無親常與善人者非耶抑生之不辰或别有命焉者將天亦弗之撡而人固莫能拗耶不然無乃用之未盡其才需之莫遘其會非殺身成仁之是蹈終無以昭激烈而警憒眊耶今者羣公疏請主上憫惜贈官錫諡名滿中朝而遠播戎徼雖生前之掩抑而無窮之炳耀何如也視夫享榮名於朝著身未殁而貽羣誚者何如哉曾得與相較焉不也某以世講辱交君每東候仲父或來外家旨酒清言每共歡笑尤以同困諸生數譚藝文繼之感慨實相期於久要當君之西賦詩贈行君還書覼縷示我峨眉遊記屬為叙之緘報未幾而君以殉節殁矣慙吾生之無狀徒優游以及耄悲君之遭重君之操何異芝蘭見鋤而蕭艾是膏耶及靈輀之東還奠一觴以抒懷髣髴乎明靈之來釂嗚呼哀哉祭侯給諌文嗚呼天之生才以嗣其先而昌其後譬之農劭是穮是蓘廼宣廼畆如君苕穎㸃筆成文氣陵儕耦陽羡之遊髮纔覆額已薄株守旋廩學宮再試京兆其璞斯剖當大叅公脱於縶維頗娛詩酒通家年少獲與賔筵以升侑斗每蒙顧君捧觴而前醉以玉友自公仙去君試南宫屢困未偶晚得一第使於四方風塵疾首梯山航海頻年道塗蓋亦云久已擢諫垣感遇攄忠九閽是叩竟以罷歸遽嬰沉痼纔得下壽慈母在堂養不克終豈勝遺疚嗚呼哀哉邑之在吳瀕海而東頗為才藪始宋嘉定逮乎今日賢逹多有季廸常宗鳴於興朝詞人之右𢎞正以來風氣彌開不踁而走君三鳳雛亦旣和鳴仲不終喁伯登南宫受官而旋獲侍􅔱滫叔之詞源厚積而流昆侖之泑以是慰君殁而不亡其又何負予好為詞未獲受砭第堪覆瓿晚而得雄以童受知僅吹劒首羨君蘭蓀又茁其芽洵也積厚予媿非莊今之哭惠坎其擊缶嗚呼尚饗合祭須贈公文嗚呼俗騖於利争炫其儇未厭溪壑禍不踵旋或厚為藏擬儉以慳施不及親為盗積焉孰如公恬見利不前退亦無恐飽食安眠孰如公仁能殖能捐于以行德令聞昭宣爰啓後人麗藻翩翩積思藝文學日貫穿公殁未幾文戰登先再進再㨗摩壘高搴乃言於朝卜塟是䖍凡受公施請為墓田既得吉卜衆口歡然祝其子孫福澤綿延崇酒於觴實其豆籩以奠以祖匍匐華顛距公之殁今已十年人情如此實維公賢公之懿美礱石以鑴鬱鬱葱葱歸安新阡其後之昌福善者天吾儕視公年或垂肩或友公子同操槧鉛自頃承役各有所專傷時偷薄為公涕漣陳詞酹酒告于几筵嗚呼公乎庶幾得全尚饗祭沈廷和員外文嗚呼萬厯之季嵗在作噩予哭伯兄迄今廿年君官郎署受命于廷昨嵗云暮陳饋見呼晤言深更厭厭之飲耐酒如昨有釂無停春暮為期歸自浙西偕我友朋彼此過從歡然道故爰濯塵纓何圖南還困於風露至妨將迎謂當勿藥醫師束手遂不能興嗚呼哀哉君素珎攝室無内嬖以矍鑠稱甫艾服官由文學遷誨國子生聞譽之著擢𨽻冢宰亷辨有聲遂陟武庫旋歌皇華傳車是乗諭浙東西念此夙夜遽還郊坰抵家而病乍聞延醫謂當旋平再徃訊焉驟而增劇大命以傾嗚呼哀哉予昔垂髫甫學弄筆未受排擏時廣信公傳車轔轔還自朝正撫予而喜顧語先子氣朗神清吾之二穉一長一少與同受經迄今追思每慙淪落中心怦怦曁乎金玉硯席之好迭唱與賡皆託以子玉也石攻藍乎出青君之南還季留北雍有文雲蒸諸孫濟濟已露頭角佔畢囊螢直需時耳千里足下行且計程如君康彊尚堪煩劇宜觀厥成厚與之福而嗇其年天固難慿抑亦分定與角去齒造物忌盈嗚呼哀哉予之隤廢志不帥氣慵與拙并晚而生男課之藝文黽勉筆耕督學之試幸而甄收得試留京蔬䔩之奠與于執爵世講之情嗚呼哀哉尚饗祭瞿翁文嗚呼憶甫成人從我先君讀書沈氏維廣信公以疾免歸迄於不起俗薄而嚚羣聚狺狺族姻坐累翁沈外家鄉人重之莫之敢指寧唯莫指片言一出衆口同是予雖穉愚見其屹然私心為喜時翁正强其逮於今忽又三紀習俗之壞縱有老成亦靡足恃蓋俯仰間日􅞏日漓孰知底止翁今厭世翺翔寥廓脱去塵滓子孫滿前撫曾及𤣥復何憾只自我不見踰一年所室遠心邇公昔入城曾未席暖即來娓娓謂我父祖再世長厚君又趾美云何戹窮況復單孑吾猶及竢予謝不敏實忝前人天道邈矣每一相對凄然而别予顙為泚雖老而强食噉兼人百齡可擬不圖兹秋脾受肝刑驟减甘㫖人或負翁意不能平欲出其否曾是蚩蚩而能使悛病或由此頃聞屬纊神識恬然談笑生死殆聞道歟豈今之人能渉涯涘翁起孤童里有長年曰避此子是當素封以好行德稱於邑里斯言果酬富壽且康高有福祉跡其為人質直以方不為骳骫我獻其誠爾破其械以是没齒昔長邑賦數役於官前後見禮每條便宜詳厥可否以芘桑梓天之報翁在翁後人其無窳啙予有女甥歸於曾孫夙夜滫􅔱亦既抱子慰之目前庶幾葛藟四世之交衰年之感寄此哀誄嗚呼尚饗學古緒言卷十五
