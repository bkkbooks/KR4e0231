body:
  text: 學古緒言卷十六明婁堅撰祭文十六首祭瞿翁父子文丁未十一月甲寅瞿翁心疇洎黃孺人歸於窀穸其子幼真祔焉通家某不獲與於執紼先數日為文而告之侑以瓣香束帛以祖其行詞曰嗚呼躋耋而壽踰壯而夭雖年之懸同歸宅兆子姓滿前有曾有𤣥父母之福子亦與焉儒者每言維福與禍視人否臧其應無左理則然矣事或多愆當適相遭化媸成妍達人齊之等於一吷合不為欣乖不為觖如翁父子所遭異矣論其生平寧有窳啙我聞內典同分别業同則相於别則異涉乍似河漢久乃夢覺響固從聲景亦可貌人之生世各隨其緣所以一門自為天淵爰陳斯辭以逹幽冥殁而有知庶其我聆言念女甥追惟舊好窆不臨穴心焉若搗所以恝然曰自陽復屏居內觀方禁豫足翁媪之藏史氏則銘幼真不泯豫言其徵吉日辰良往奠爾魄庇爾後人其永無極嗚呼尚饗祭繆翁文嗚呼世之隱德多以晦湮其克有聞在後之人子之用譽榮顯非真以文以行自其賤貧如翁之賢不列儒紳少受家秉代其二昆曰親是娛厥甘乃辛兄以筆耕我服衆勤性尤靜默酒不濡脣靣目清冷人望而踆既用本富親以樂欣里閭之猾其口實嚚搆其家釁公庭齗齗翁辭雖直為親者顰竟以末疾積十五春裹足一室不知城闉瀹茗設醴洽其族姻叙說平生道故與新逮乎易簀德與年臻於乎世道交喪散朴漓淳如翁好修能不沉淪實由令子績學播芬騏驥未騁桃李何言後進是推先逹是援贄幣之來日盈其門人曰是翁有子長君不以祿養而以道尊視彼夸毗昭然屈伸我之愚鹵跧伏海濵嚮往之誠負笈扣閽昔聞從父數稱其文既從受經亟挹雅馴會其茹荼未獲傾囷時日之良翁歸穸窀祖筵之設曰藻與蘋侑以蕪辭髣佛蒿焄嗚呼哀哉尚饗祭曹昭服文嗚呼朋友道喪貌而不心猶幸古道及見於今我從君遊未能一紀十年之長事以兄禮我之鈍頑屢陟而蹪憫其不遭且朂且慰曰子親老貧無以養號慵以恬胡忍自放每聞斯言靣熱發赤抑首槧鉛庶幾學殖世方好竽我瑟是工以方內圓宜途之窮有知我者借以齒牙令彼不知録瑜棄瑕君聞而喜繼以太息容華未衰無恥塗澤首夏揚舲遊彼舊都書疏之勤無間修途謂我數摧宜舒其氣鳳凰臺隅佳麗之地飲酒賦詩以狎彼姝神融纍釋文孰子如我之還札有愧其意我雖競時時或我棄既試而還急省吾親舟過城下以書自陳已聞病疽其勢頗劇醫藥是求未能對客我遲其行彼斥而恧須疾之平就展心曲令子書來報我彌留倉皇而往哭君牀頭嗚呼哀哉自我于役君過吾廬問餽之厚爰及妻孥仍念遊子窘于資斧實知子貧有贐無拒爾如奮飛於彼天衢雖老執殳為子前驅續又得書有寵而夭婉孌其雛且以娛老居常謂豫平生所嗜三代以來圖書彛器祕不示人慮或豫奪唯子能知當為子設飲以㫖酒有肴有蔌出其觥罍錯磁與玉嗜古而癖終庋不宣有俟其隙幾喪獲全嗚呼哀哉人琴俱亡何嗟及矣誰為吾質啜其泣矣人或謂君迹同夸毗我知君心寧激莫隨倏成古今幾乎腸絶眷言諸孤鶺鴒念切嗚呼哀哉尚饗再祭昭服文嗚呼兄之㫖酒飲我嘉肴饋我叙說生平而留連光景者歲中不知凡幾而今已矣念所嗜之如昨而音容邈若山河魂怔怔其何理吾邑之産土實多宜歲聿云暮可以薦巵黃雞啄黍歷冬而肥既割未燖白鹽塗之是宿三日堅凝其脂其味孔嘉接壤所希亦有市肆刳剔豚蹄漉潘以柔宿火以胹糅骨與䈥食則用醯草實之屬有芋而香其又一種花落乃生夜寒天清浹旬屢霜厥實始甘乃剝乃嘗膚唯玉雪比於稻梁每一餉兄四物是將兄乃召客陳厥脯漿或蓏或肴厠於大房客既醉飽兄以樂康猶憶語豫新居既成歲晏來過别館是寧信宿之樂豈減弟兄日月幾何遽隔幽明兄殁杪秋逮兹陽生時物既具愴焉傷情已不獲對嚼於一室又不忍哭奠於兩楹是用緘詞寫愫與物俱往託僮客以告誠且以視君之稚子囑子之保母使謹視其食飲以慰兄於冥冥嗚呼哀哉尚饗祭何嵢吾先生文嗚呼唯翁鉛槧之業夙擅於一鄉模範之譽遠聞於四境日月其逝悼壯齒之不恆蚤夜以思謁良工而求擏玉韞櫝而莫沽驥伏櫪兮焉騁豈枘與鑿之卒齟齬歟胡人與天之不合并也驟而接之頎然其貌莊者頓令人意斂而自肅徐而聽之悠然其味長者濳使人神怡而自領學雖紹乎程朱悟欲幾於庖郢何圖衰晚獲奉周旋數共笑言靡不雋永既别而歸往弔且省雖眠食之暫乖俄襟裾之復整自後間隔縱瞻對其日踈時一過從挹音容於食頃及夫定遷城西坐揖煙景或寄懷於篇章或晤言於甌茗謂當百齡相期一艇悵長君既垂翅於遠游而元孫亦斷汲於修綆翁遽上仙棄我而瞑當窮冬而訃聞喟慿心而悽哽嗟洪鐘之絶撞又焉用此寸莛唯在亡之同歸徒西望而延頸瀝一觴而告君亦何異於五鼎茫茫者之不可知兮孰酪酊兮孰醒嗚呼哀哉尚饗祭楊伯蘅文嗚呼昨歲冬暮緘書往訊還言病狀羸困日進言念二雛年甫齠齓君疾以痰庶猶再閏顧余衰慵未遑數問客有來東悼其短命驚問何時三旬在殯豫豈恝然平生之分唯是頺齡出不踰境自冬涉春殆於一瞚幽明驟乖有淚旋抆嗚呼哀哉豫之獲交蓋已逾强逮今草年世味都忘君病半之數過相羊始以目眚視不能詳既而若眩其神倣徨豈謂豫衰蓬鬢飄霜君猶鬒髮乃臨其喪嗚呼百年同盡孰短孰長孰榮孰瘁孰晦孰明叶芒君之從父人稱長者有季溫溫可謂端雅是皆可慿撫孤恤寡須其成立慰君地下當君生存或言多藏洎乎蓋棺若已經掠叶亮是不可知亦不足仰君嘗謂我言輒有當酹而以告其可無愴嗚呼尚饗祭曹周翰文嗚呼歲行在子君試京兆再接再厲抽思若攪二豎侵之咄嗟懷寶文入於闈傳觀異藻惜乎中輟衆所同懊歸而屏居謝其舊好歌呼叫號與疾俱老奄然而蛻殆猶振槁嗚呼哀哉君少有文大父驕憐負其才氣自以無前人或側目曾不為悛意有獨愜肝膽畢宣豫嘗謂君貌匪俗妍然且並騖求多於天犯此二患胡以童顛君笑而答病不易痊快心而促拂意而延較量所得容詎相懸豈能恬俞栖遲永年卒以戃恍與世長捐於乎哀哉雖豫斯言未為知子百齡俄頃其猶寄耳短何必非長何必是譬之病狂笑啼孰使欣或攢眉戚有見齒以道觀俗亦猶此矣凡俗所趨於道多呰呻吟以生含笑而死逆旅之悲得歸為喜於乎哀哉我初識君年已踰壯從先公遊俾和而倡三世之交容或佚宕才拙氣孱有挫靡愴吾道自窮吾懷自曠君不鄙遺數問無恙蓋已世年念此悢悢一慟之悲如何可忘君之二孝鵬翼方張胡不少需遽此淪喪君所知者門內克讓發為文詞蹈乎哲匠若其逡巡審於周防不吐不茹治亂以相在遠稔聞慰豫無量前之悵焉於是焉償嗚呼哀哉尚饗合祭王逸季文嗚呼子之警敏踔厲宜紹其家業而遽沉菀以逝耶子之魁偉端重宜優游永年而顧以短折貽母兄之痛耶子之緘書走幣幾傾東南之彥方將肅括砥礪以克有聞而徒令承訃之日涕淫淫之若霰耶嗚呼哀哉玉蘭堂前曾敷搖雪首夏清陰廣除延月曲房藏春塵筵互綴湘簾霏微桃笙對設閒以瓊瑰圖書羅列賔朋之來談言如屑九華鐙明羞珍啜冽觥籌蝟飛酒深耳熱醉即頺然微酣激烈當今身名不隨俱滅爰有從遊清才稚齒近集里閭遠致百里抗顔為師授以經史每課其文然膏繼晷涉筆㸃定或臧或否務追陰絶寧與時詭哳吻裂鼻每稱柳子藝文餘暇侑以芳㫖蛾眉曼睩雜薌澤只聞於吳中一時之美何圖年未壯而齒髮早衰疾已病而魂招不來昔之綱軒危砌翳蠨蛸而封緑苔耳目玩好以授兄之子而鐍不忍開嗚呼修短貴賤自古而莫知其然何獨於子而悽愴纒綿所可惜者厚之畀而奪之年其矻矻於丹鉛者特干祿之蹄荃凡所自負百不一展而并無撰述之可傳蓋方志於功名而未暇於立言所以吾黨之知之者不覺其涕漣而不能使不知者知也是子之所飲恨於重泉撫几筵而一慟髣佛乎音容之在前嗚呼哀哉尚饗祭宣丈丈維靈神清氣夷貌溫行潔起於孤童克自振拔二兄翼之有擏有抴學成未售其志彌決朝斯夕斯匪饑伊渴卒困諸生抱璞以兀曰幸有子可嗣吾業脫屣去之又孰豫閼春朝之花秋夕之月所與倣佯三數黃髮層氷非寒恃裘與褐出則負暄歸或見跋赫曦非炎不袒而葛晨露未晞夕日半沒醉不及酡飽不由餮笑言當歌杖屨為艓是宜百齡何有耄耋孺人齊年先翁云殁翁後月餘一何倉猝嘗曰孺人未强先苶今此羸然如酒吾蘖吾於養生殆得其訣古稱難老言豈虛設翁所知人夭乎未逹有不可知定於荒忽釋氏曰緣乃窮始末顔樂如何匪餒而札跖厭人肝匪殺而活比聞翁亡頗覩鬼物素行則那豈亦有罰識神去來見空則徹空非墮無如湯沃雪凡豫所陳不以情怛靈乎聽之何生何滅嗚呼尚饗祭程翁文新安程翁蘭石既殁之八年其子先歸營竁兆明年歲甲午月丁丑日庚申率其弟啓翁之殯而還葬焉子之所善友人忘年而交者丘某張某相與如兄弟者唐某婁某奠以酒肴為文而告之曰唯程之先厥望安定廣平江東世為著姓既遷篁墩後先輝映堂構墳塋稍湮復晟支分𣲖衍所在而競其最後遷長翰始祖自晉以來代四十五後又六傳為君之父君少而孤煢煢髫齓靡瞻靡依或撫或擯既長而東依於其姑沉毅以敏殫慮厥圖晚而漸饒遍報有德雖則無恩懿親是恤君勤一生克紹其世垂範後昆詳傳與志吾儕重君知之特深聞諸其子識君用心不謂古人獲見於今茂陵之季有貴而文創為宗譜網羅舊聞計族而給鏤板遽焚無俾他族假託棼棼祖父所貽迄今如新手自綴葺嗣世之珍别有札記忠壯公墳木號龍角前志則云或冒族姓妄有指陳君從父老聽其剖分時未有知不出一言後始攬諳燦然具存感泣而書傳子若孫自以客遊不獲載主琢木如重爰識數語言簡意長備極酸楚故山之植長松百尺或施斧斤曾莫之惜將出私錢丐之勿析竟不能奪每用心惻君疾既病言及歸骨唯祖之依所不可必蓋君之心永懷故土匪土則懷恐墜令緒君有賢嗣謹識不忘寧殯以待不速其藏既買墓田有鄰倡狂訟而獲伸復來具裝奉君之柩道出於杭間或登陸車船具良必誠必信無敢怠遑新阡相望負山邐迤鬱何纍纍高曾祖妣於是焉埋可無憾矣酹以告之靈乎至喜尚饗祭沈叔良文嗚呼去年之冬數與君晤攜其二子方舟西泝虎丘林麓風高日暮同遊其間裴徊相顧君疲不前慿檻而踞我逐少年東西橫騖還憩舟中挑燈道故君曰病脾積久而痼飲不及酣噉不及飫其何以支侵尋為懼已留崑山氷雪寒沍相去二里南東其寓令子實來曰遲豫步往即與談俄又别去自後濶踈有懷莫吐曾未期月而以哭赴嗚呼哀哉豫始舞象就君家孰先君為師實課誦讀君少一年翩翩相逐兄弟塤篪視我猶柷中年淪落俱脫其輹我逰四方君田是服間一過從我慚君顣倏焉以衰君病我獨方謂頺齡舊歡可續而君已矣百身奚贖嗚呼哀哉君之悍强十倍尋常尤饒酒德一飲百觴晚生六男分出姬姜女又加二螽斯未央何圖一朝環哭帷堂君之自叙其言孔臧雖有好友誰復能詳令子未冠已遊膠庠所念諸稚早違義方婚姻之好能撫而匡庶幾不墜以永其慶豫慵且鈍於世無當苟可以效其何敢忘痛結於腸淚盈於眶酹而以告髣佛在傍嗚呼哀哉尚饗祭徐孺穀文吁嗟孺穀君之俊爽敏給宜有聞於當世而竟困厄以夭耶君之坦易謙降宜終享於晚嵗而乃令垂白老親淚為枯而心若搗煢煢稚子未知舉家之驚號而孩笑於襁褓嗚呼哀哉不知者謂君才地既高意復邁往而克自力於文藻掉臂詩酒之場高視埃壒之表遡已往之歲月計所得之非少其知者以為少遭閔凶中年多故父殁兄繼當邑犬之羣吠傷眇躬之難保及夫衆囂已定物論漸平追思先秩宗之造福桑梓雖蚩蚩無知若或為之家至而戶曉君方將與從子爾常尋緒業於縹囊騁逸足於長道而年甫及强髮白過半蓋貌若腴而中已槁昔在庚子秋賦玉幾剖而足仍刖頗不勝其嗟卑而歎老去歲傷伯姊之嫠居念遺孤之在遠悽然歎曰吾猶有望其在兹秋實思杜門畢力探討而今已矣遂慷慨束裝扶護儀部君旅櫬觸冒暑濕歸已潦倒復乃力疾南征迄於失意悄悄自秋徂冬形瘦削而日䵩神惚恍而有掉何圖上元燈火猶邀歡於杯斚曾未涉旬而遽已匍匐寢門咸失聲於丹旐所幸二雛母慈足恃爾常之賢門戶有寄雖薄俗其何可知意無復昔時之狂狡君其瞑目否耶儻可信之於蒼昊臨棺一慟陳詞寫哀靈乎有知其來釂豫之清醥嗚呼哀哉尚饗祭馬伯清文嗚呼人之相知十九貴同不同而合蓋信其𠂻余以濶疏落落無成衆所姍笑獨謂寡營君慎且勤曾無暇日又孰知之庶幾無逸往歲之春來哭先人寫哀於文備極酸辛逮乎秋中君病幾殆見託以子幸朂無怠大兒邁往未知所裁不早挫折慮與俗乖少者始誦實稚且驕所憂母兄有愛無勞既而漸差親朋相謂病根未除宜厚自愛君雖頷之意終不回積瘁成癯忽焉以摧嗚呼哀哉君病在肝脾氣莫勝加以腎消水不上升嘗語吾徒難圖久長日月其除亦思樂康舍後隙地行闢為軒數集我友相與話言已乃鳩工爰築爰削壘石穿池一時並作形神俱疲積不能支小至之日手書見貽告我不樂猶明且清僅再踰夕大命以傾豫為謁醫醫言脉絶流涕視之遂不能訣嗚呼哀哉如豫衰晚志業日頺不復勵鈍寧望將來中所自矢向受君託藥石之言敢忘如昨嗚呼哀哉桂蘭芬芬誰歟共嗅水石粼粼誰歟共漱往奠一巵君其來歆幽明雖隔不隔者心嗚呼尚饗祭唐叔美文嗚呼子之先公隱於方技行潔貌莊遠利若膩與先人交終始不二先人溫溫篤於慈惠有求莫違要歸於義或峻或廣實兩無愧子少警敏來遊於門十年以長視我如晜是咨是詢匪朝伊昏游居之樂世講彌敦弱冠而孤貧不自給乃耕於野左鋤右笈有憐其困相濡以濕賴其詬吹卒以有立世故靡常盛者忽衰昔之赫曦變為流澌子實憫焉庶其報之一飯不忘自古若斯力有弗愛何避於嫌雪吾不寒暑吾不炎雖莫能助吾意則懕以是知子薄俗可砭俗之日偷乘人於危因以為利寧傍笑嗤孰有如子疇昔之思惟余衰慵誰數過從旬日不見足音其跫疏食菜羮不辭我饔每撫稚子喜見於容今兹孟秋我疾在髀唯藥之珍以佐其匕維蔬之甘以充其簋洎乎良已握手相慰憐我少羸不足於味笑謂養心何憂於胃未幾君病得之飽餐豫往語之胃寬即安可勿藥也且遠杯盤少焉思食曰脾之蘇從其所嗜必勿拘拘一飯魚羮漸增以殂豈子定命乃由於兹惜之悼之理莫可推則有是疑曷既其悲子有羣從以相二兄日月之良歸骨先塋子之嫠孤相依以生凡此素交應不忍忘所未可必各有肺腸維子之誼誰獨無良豫貧且老豈能自保昔欲有效尚纒懷抱顧子知我或非草草唯是一觴與淚俱傾髣佛見子愴焉以聆吾詞有盡吾恨難平嗚呼尚饗祭鄭間孟文嗚呼維嵗之初豫往叩門君聞曵履貌悴色溫君病水涸不勝火焚告以靜息百慮逡巡先屏宿好遂謝所親塊然獨居以寧其神君雖首肯曰我未能歸依釋氏庶幾我振為寫大乘灑塵沃根疾高下治徒此顰呻奄然病革遂脫垢氛嗚呼哀哉君匪食貧而拙治生麴藥之好醉可無醒每攜愛弟如篪與塤當其意適顛倒主賔清言為侑譬猶八珍性既嗜古尤矜時文已擯於俗自比芳蓀彼幸而售要為液樠前後作者豈其遽泯豫笑而言此道如羵妄謂羊耳芻狗之倫又如啽囈寤豈云云終不我信為之益勤以俟子雲知其所存不多為詩文贍以溫其於哀誄娓娓千言而今已矣賫恨典墳平生友愛撫弟有恩何圖嫡長殁無負薪顧謂稚子以嗣而昆朝夕大父則猶元孫嗚呼哀哉嗟豫衰老困於暑煩踰月而平硯枯穎髠逮兹冬首潤回焦脣乃克伸紙寫此悲辛一告几筵霣涕霑巾嗚呼哀哉祭秦翁魯齊文嗚呼君之未疾來叩豫門揖之入座從容話言顧問粘壁是何遺文告以釋氏志公其人嘗拈偈語警發沉昏歌十二時往復諄諄誦畢而歎覺路可臻乞我一紙比於陶甄既諷且思庶窺其藩幸得闖入豁然逢原自後别去曾未再旬聞其臥痾往問所嬰非有痛苦幸不顰呻謂當勿藥漸起䞭䞭何圖承訃愾我酸辛君素簡靜不逐世氛加以晚歲釋典是親當遂解縳徜徉無垠豫所悼者俗罕其倫擇地而蹈稱情而云中所不可呐呐逡逡人之好我若飲以醇或見所畏却步逡巡機事機心君實恧焉如此人者而不久存嗟嗟百齡譬於朝暾有不亡者修短曷論嗚呼哀哉我有稚子極荷殷勤朝書夕詩朂以有聞逮兹成童援筆繽紛君愛其蕚未及於蕡率之饋奠愴矣蒿焄嗚呼尚饗學古緒言卷十六
