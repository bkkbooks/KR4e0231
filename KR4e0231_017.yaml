body:
  text: 學古緒言卷十七明婁堅撰祭文十六首祭徐汝廉文嗚呼汝廉君之自負不羈與同時之咨嗟歎羡者而止於斯耶當其年甫成童一出就試與儕輩相角逐於詞場即為考文章者所知自後與郡諸生羣試又輒凌厲出其上而稱最於一時顧小騁而大蹶者何居自屢挫於京兆而前日之羣譽强半轉而為羣疑縱有為之推挽未免長歎而深惟蓋二十餘年閒境外之相從受業者先後脫羈紲而長嘶而君且撼頓不前顧影自傷其栖遲已足令交遊惘惘況於卒然而永别豈不悲哉或謂君少喜沉飲比其衰也已漸不似異時之過當今者一飯而臥臥而痰氣上壅忽忽若罔聞知以迄於不可療治非酒之流生禍而誰歟是殆徒為追悼而未之深思者君母老子少自頃失意久不覩其沉飲或者傷吾道窮中有不自釋然遂不覺其神守之離耶一旦駭其驟折而曰飲酒之積疲得無厚誣而未之能窺耶是用陳詞酹酒以寫吾黨之悲以釋不知者之瑕疵髣佛君之愾焉寤歎而一釂陳饋之巵也嗚呼哀哉祭沈廷望文嗚呼憶甫成人與君周旋藝文之場君少豫三歲兩家尊人尚抑首硯席兾少收於桑榆之末光老驥悲嗚不忘千里兒駒齧蹶驟風自喜及君仲季皆以稚齒一當伯樂目為騄耳豫服鹽車君困鞭箠及幾立年後先以起豹隱深霧雖漸成於文章鮒號涸轍徒求活於升斗敝帚自珍荆璞未剖而侵尋以俱衰惜所遭之不偶嘗延豫家孰遣其子姪北靣受經歲維乙巳令迫季冬君拏輕舟先過鹿城豫思自弛强而後行既抵寓舍頗困將迎日入醉酒擁被瞢騰寤而問君一燈熒熒口誦手披宵分未停雖默自愧意耽沈冥豫悟世諦之皆空睎禪宗以自滌君謂此生之不虛鼓將竭而彌激却後二年同遊僧寺忽喟然以歎意有未忘何能相從於枮寂於時達者張翁言人世糾紛豈足把玩未若以清暇自娛庶幾乎衰晚之適豫亦從傍贊歎為得而君愀然艴然不覺靣熱而發赤何圖去春君方就試親病遄歸奄至不諱愧恨哀號傷其宿贅噴血數升肌肉糜潰逮乎首秋余哭慈母聞數月間墳超若塿長至往省搴帷疾首音聲琅然尚幸無咎時我兩家僶俯襄事月日之吉卜告無二嗟豫煢煢殊不勝瘁夜夢有言君殆難支其去葬日旬五日期他年之藏子作銘詩歲暮相見髣佛如斯果以志託豫愕且悲今兹仲春君以朔卒距喪之行才及半月豫匍匐於東倉歸聞訃而悽咽豈神者之先告若相就而訣别曾以君之才優氣鋭乃豈如豫之懶廢而卒困不售賫志以殁意天實為之無所容其人力嗚呼豫之知君賢於他人遇事警敏曾不逡巡過而知悔尤難其倫頃聞易簀遺令諄諄雖情所鍾易憐為瞋豈愎而頑能涉其津束生芻以往奠陳交情之終始儻逝者之來聆謂斯言其知己嗚呼哀哉祭沈翁守愚文嗚呼世道交喪日以呰窳朝也而市士也而賈射利抵巇為鼠為虎謂儇實才唯拙是侮夫孰有名不聞於公卿跡不出乎環堵取少而不求其贏食貧而不憂其窶滿於人耳者多長者之稱而朂其後人者蹈儒生之矩如翁生平蓋自託於黃公紀叟殆不知有圭組而矧於區區之財賄乎吾二人者庶幾因翁之子幸一覩其眉宇豈意翁雖種德而曾未獲於升斗子方養志而遽茹荼以泣雨吾儕懿德之好尚阻於摳衣能不為之低回而酸楚然而春秋望耋多歷年所子孫滿前將高門戶翁之寬鄙敦薄中所自許者或有能撰次其概使人知閭巷布衣猶有恥同流俗而可與尚論於古爰陳斯言以薦清醑蓋感深於貴富之不足叨而未若賤貧之為愈嗚呼尚饗祭浦雲從表弟文嗚呼昨歲長夏我攜稚兒就試鄰邑久淹末期適君來訪慰我渴饑寓舍之隔自東徂西我未及往君又遄歸悵惘實深阻於赫曦當其晤語頗為君疑聞曾渡海出入渺瀰危檣巨浪不廢酒巵君素豪健何遽清羸為别已久重聽幾時君曰久如甚矣吾衰一别半歲莫往莫來我納子婦君抱孫嬉慰懷等耳吾悴不支客來自州相謂曰噫城南有喪殆子所私再問而信有淚交頥君精方脉寧失調治修短命耳詎人所為憶君壯盛自負不羈文不吾售奮於戎麾射既命中䇿又恢奇遂冠其儔咸謂為宜或有謂君文弱如斯坐籌可耳騎射何為君聞翻然曰吾業醫而以武進無乃乖違輒又棄去自娛以詩游於酒人感慨淋漓有子工文儕輩所推方將慰君遽迫崦嵫嗚呼哀哉君之先世當憲宗時有隱君子博涉工詞長吏亟稱和靖吾師嘉靖初年助教繼之仕雖不逹鴻羽為儀邑之有乘先後實資維豫大母洎君先慈姑姪之親兩姓塤篪跡遠心邇跂豫懷思云胡一疾遂以長辭豫自春首疽發於髀徐需其潰而不謁醫逮今踰月乃臨繐帷山河邈若泣涕漣而何以慰君君有佳兒嗚呼哀哉祭唐君朗文嗚呼子於閨門孝友克修子於閭里醇謹無偷少而為學覃思力搜每一屬文腎腸畢鎪其所悟解摽指於眸卒以善病志弗克酬草年家督靡瘁不勼父老而逸弟弱而庥職思其故維子之由自春徂夏病臥若郵婦子乍起躬乎鬱攸曾未及旬去昭即幽嗚呼哀哉子之尊人於昨麥秋偕其所善再為北逰一歲為期必不久留吾生江南朔易非憂宜高與凉蒸濕為仇三子送之泊於吳州二三老友亦其夷猶謂君喜睡蝶夢悠悠桃笙夏爽氊毳冬裯豈獨無恙宿疾應瘳書來相慰行覔南舟春夏之間還車再遒已出都門七旬阻修朝夕以須神鬼是謀繇之不臧心煩語嚘子之無祿命也何尤所未瞑者父母白頭遺以二稚如泥中鰌所不能堪兼痛與愁聞之釋氏妄業分投子受其毒闔門康休以是為侑兕觥其觩嗚呼尚饗祭張植之文嗚呼嗟人生之在世譬草木之衰榮或霜露兮來瘁乍茂盛而遽零或歲寒兮後凋曾不改於青青豈造物乎不均乃一栽而一傾彼百卉其何知同感召于有情蓋所受之分定孰有定而能更蘭固不可以為蕭兮豈朝菌而可以為冥靈吁嗟植之生而秀穎如光風之泛蘭英然而沉痾驟纒中道以夭如疾風之掃枯莖徒使垂白老人哭其死而撫其嬰天其可問耶夫孰為之致詰於冥冥雖然子之俯仰哲昆是慿子之志業寧馨是承柳生肘兮委蛻而遊其何足介介於死生吾黨託里閭之未契嗟已久阻於合并當悼念之方新旋祖道而奠楹痛斯人而斯疾雖聖賢猶委之於命又孰悍而能與之爭嗚呼子其聞斯言也耶將含笑而舉豫之觥尚饗祭陸翁文嗚呼昔歲庚戌翁方下壽豫為祝詞往侑朋酒頗言頺俗恣腹與口笑談之歡僅需升斗肴蔌無多匪乏􅔱滫通人所嗟生生之厚飣餖相誇為日已久里閭之觀於實何有知翁父子或不豫咎翁素壯强未覺其衰矧又坦懷不藏瑕疵伯仲之年奚翅過之何圖一疾驟傷於脾匕筯漸違積以枯羸豫頃往問客邪可治退而私喜得汗當夷曾未再晨溘焉長辭嗚呼哀哉將無形充而神實槁抑亦外愈而中或慓亦有牢騷戚戚以老終窶且貧而獲壽考如翁所享已不為少殁而有知游於物表豫窮於世行方才拙每以朴忠供彼讒舌知者之憐憎者之糵豕塗鬼車恥於自列頑雲瘴霧終焉冰雪所傷弱息未拜王舅何圖倉皇罹此僝僽況我隤齡浸以眩瞀老馬為駒不顧其後日月幾何人唯求舊念翁元孫學當日就毋令優游鞶帨之繡維瓊維璧視好與肉為蕕為薰慎味與臭以此慰翁允也堂構釃酒於壺瀹蔬於豆酹而告焉庶其不謬嗚呼哀哉尚饗祭孫賔甫文嗚呼人之稟受或得其醇視表知裏洞然天真及試以事氣或不振若其警敏邁乎等倫自許無前曾不逡巡鋭極而纎匪德之鄰誰其兼之才與質副坦乎其夷綽乎其裕有如斯人洵美無度宜命之長而享之飫胡以不辰罹此乖互嗚呼哀哉子之嚴君宦遊汝陰往侍朝夕以慰其心有事帝京於河之潯亡其維楫脫乎淋滲一病幾殆久乃治任還見其父困於衆嚚有黷我憎雖枉莫伸嗿彼耽耽嗾此狺狺赤日流漿以走埃塵心焉若焚積以苦辛奄捐旅舍遂掩荒墳嗚呼子之安和如日斯春子之諧合如樂就均况復堂堂偉貌長身其形與神皆不當夭而二親在堂恨深烏鳥孤嫠相傍集於荼蓼天道茫茫豈復可曉吾儕獲交或壯或衰情好之敦三世於兹乍驚遠訃若夢而疑仲叔之還愴焉傷悲逮今歲晏始奠一巵魂而有知其無不之髣佛見君聽此哀詞嗚呼尚饗祭沈公路文嗚呼宇宙之大古今之變極乎無涯泯乎莫可端倪自生民以來無智與愚莫能必者其分莫能窮者其數夫孰相忘於耦奇若其談笑於死生之旦暮泯去來輕得喪不以纍乎靈臺而直與之為逶迤是謂生人之大寤而逹者蓋或庶幾於乎此豫所以悼公路之不永而歎其中之豁然以夷㫺者君嘗停居於鄰邑矣已而思邑之俗朴以願也還卜築于城東偏意頗安之客至與從容笑語亦數及於商𣙜古今以為樂往往遂及於杯匜其暇也啓緘發書矻矻於百家之編而手不停披偶一㬥下失血已甚而疾作頗難調治然清言與泛覽不為少減日以羸瘠而迄於不能支顧其談笑於死生之際猶故也未幾遂委頓長逝若蟬蛻然曾不眩瞀於去來之岐君於未殁前數日筆授嗣子遺命處分諦當以情分而遞及允矣咸宜乃猶為不相悉者所娚吾知君之翺翔寥廓視猶蠛蠓之過耳而何足為嗟咨君遺命踰四旬又九而窆既卜吉將乞銘以賁幽宫而以行狀見屬所愧豫之不嫺於詞靈輀將駕寄悲悼於一觴有涕淚之漣洏嗚呼哀哉鄉賢祠祭歸司冦文嗚呼古之所稱祀於鄉者特鄉之人追思其檢身接物有名聲於當時而可以垂訓於後來則祀之非必聞之朝廷秩祀於學宮者重且遠也故當事者輒任之不過曰殁而可祭於社云耳以嘉定僻在海隅而今者一時之並祀前有大宗伯徐公後有少司寇歸公豈徒以名位之崇重為鄉閭之所羣赴哉蓋德在於人之心前而倡之其勢難其澤厚後又得人焉而維之俾勿壞若慈父之護其赤子且使傍郡邑皆信以為然而莫或忌且撓之而朝廷之遠之重以為是固然也如徒曰司寇公之潔亷恭慎為鄉閭所重而已則當今聖明在御政教聿新改革之際不有若二公者長在帝左右將安賴哉此尤一時崇祀之深𠂻也嗚呼尚饗祭王太夫人文嗚呼在昔有言國命勝人壽命勝祿於太夫人天實命之膺是多福人之生世榮不均悴寒必踰燠此既難論差數之懸不皆戬穀閨門愈愈俯仰無虞何如育鞠厥後之昌以德為光何如跧伏自少而衰耄耋是躋何如短促朝廷清明海內蒸蒸何如蠡瘯維此數端命懸於天家以為祝得一猶幸況於彼蒼全畀所欲於太夫人考其始終復何不足尤於晚年一出一歸為天所篤歲在單閼逐子東回臥不安褥有詔纍起久虛首揆以待來復懇辭再三使車旁午言脂其轂黃髮皤皤曰母之將而力是戮宣國威靈旋定根本功垂帛竹乃乞病身奉母而還急流有洑歸未寧只朝野鰓鰓兒脫於腹公則有母赤子何依翹首瞻矚公既報國母則反真上升仙籙訃聞於朝皇華三賁天寵加渥凡丗年餘祿養為榮不顰以顣綸綍煌煌被於難老繄母所獨匪天私人國則有命寄在鈞軸一時之功百年之遭天意攸屬某等樗櫟散材匪桃與李門墻之辱或以衰拙或以稚愚皆蒙齒録壽母之故及其梓桑尤深佩服維月之陽日時之良窀穸既卜乃助執紼乃陳祖筵酹而以告曰太夫人百福來臻實命之淑嗚呼尚饗又代嗚呼梱內之懿多閟莫宣爰論族姓德門慶延水則含珠亦以媚川自非聖善疇啓大賢福履綏之宜享其全既貴既壽佑之者天凡世所述莫能舍旃我頌壽母功冒率土保衡之出簡在當寧盍母是將而來相豫濯濯皇靈靡有不撫蠢兹島夷乃敢或侮是用出師以遏徂莒彼懼來歸毋黷豫武道旁紛紛孰任可許暨乎師旋人安其宇外既寧只時事孰巨唯是啓賢未離保姆帝眷維莘猶兾再乳有戅而直每逢其怒誰回主心翻然無阻濟濟講筵凝承弼輔既覲天日言歸其室母聞加餐以是報國公曰無涯將殫吾力目眚纒綿竟以移疾乃御而還帝用憫恤都門衆囂去不可尼祝母萬年行當再入逮還梓桑老稚填溢板輿綵衣里閭動色匪母康寧公不成行維公回斡彰天子明岐嶷青宫入出內廷雖則鯨鯢鰭鬛不驚繄母之壽以迄有成歸未幾時奄與世辭帝聞咨嗟三使追隨匪以為榮用報厥施某也奉使便道還憩拜瞻几筵公號毁悴卜日之良重泉永閉執紼有期匍匐往祭我昔陳詞門墻餘芘今之祖行更告而酹嗟太夫人功在一世孰使壽康時乃天意嗚呼尚饗祭王母魏淑人文嗚呼昔恭簡公被仁服義世號儒宗著名卿寺於時琅邪父顯子繼門地之崇姻好是締於唯淑人及笄而字曰公從孫夙稱婉嫕長公雄才少而踔厲蚤歌鹿鳴才冠出仕閨門肅雍煌煌冠帔上順尊章庀其家事患難是同辛苦攸萃明珠去懷小星垂惠爰求窈窕實勞寤寐蘭玉森然鬱為國器鳲鳩恩均有喜無忮先皇之初隆恩下賁司寇奉常分鑣並駛末疾纒綿遂分牀笫封號頻加藥物為餌孰侍公行實生伯季孰無母憐彌勤省視當公云亡伯已擢第斐然之文競快人意頃年紛披誤同兒戲不謂風聞乃挂吏議外內洶洶莫知所自不怖不疑撫其兄弟唯淑人賢以克免戾丈夫實難矧於中饋謂當久延觀厥昌熾衰與疾并倏焉厭世啓手足時與平日異肌肉更生神識無滯是曰考終其又奚喟嗚呼哀哉某也愚蒙拜公蚤歲晚交賢嗣共傾肝肺洎乎冢孫攻玉謬寄訃聞走唁執手苫塊子之哀號幾絶於地雖則孝誠匪慈曷致酹酒陳詞髣佛來蒞嗚呼哀哉尚饗祭王夫人文維聖立極聿宣內職好逑是克亦有元臣佐其經綸令德作嬪於太原公能孝能忠一代所宗夫人配之處高用卑福履永綏幼而夙惠德兼其藝逮老弗替族黨熙熙僮客䕫䕫內外具宜公寬以栗有相於室所其無逸始為宫僚翟茀以朝雖貴曷驕公忤於權謝事歸田亦無瞢焉維舅維姑奉其朝脯以劬為娛洎乎大拜親耄而憊其尤匪懈公之一出宇內寧謐終焉愛日公之既還版輿東山樂每在顔孰分其勞孰遂其高夫人則劭方將逸老舒厥懷抱以莫懆懆為歡幾何疢疾是罹若車下坡夫人之生女而國楨以就公名夫人之逝留其和劑以視後裔仕而顯融閫內是同秪繫其逢孰如夫人其德甚真不愧絲綸某通家稚齒近託仁里夙聞懿美長君高朗不遺鹵莽唯道之廣我之大母祝夫人壽不啻出口於訃之聞攬涕而云殆去為神夫人之德與其福澤固天所嗇既收其全還歸於天名以永傳人孰不死死可瞑矣聽此哀誄嗚呼尚饗祭徐太母金夫人文嗚呼維暮之春雜還稱觴壽母有懌冠帔煌煌頌禱之詞爛乎篇章豫時在疚阻于登堂顧慙穢蕪亦㸃縑緗已聞眠食少乖其常屢進屢退兾還康彊何圖二豎遂跧膏肓逮兹初旬婺掩其芒嗚呼哀哉豫昔未冠獲侍宗伯亟賞其文許以􅀈翮簋飱其饛已煩梱閾洎公歸田數參末席風花之朝雪月之夕有倡俾和無歡不極酒肴㫖豐時親釜鬲公嘗私語稱其明識張夫人苖儻可匹敵公既仙逰長君繼夭撫兹元孫譬猶集蓼次君承顔又奪之早襁褓二孤蘭摧蓮槁二女之歸門地峥嶸或殱其良子姓不成成子姓矣則霣其生夫人之夀徐宗實寧若其中心每懷怦怦所自慰者含飴弄曾元孫既壯日有令名事賢友仁嗣厥家聲從公地下目其可瞑嗚呼哀哉豫駑且怠實負公知骯髒之性亦匪諧時猶幸不遇長與世遺如其遇合豈能餟醨公嘗謂我人多靣欺始終可保非子而誰實謹識之矢以無違我哭夫人能不涕洟憶曾起居䦱門與言始陳世誼次及家門視我猶子吾兒猶孫令人感歎維德之溫音聲琅琅猶在耳根而今已矣母儀則存嗚呼哀哉稔聞居常䖍奉釋尊今之遺令饌以桑門况我戒殺敢用雞豚薦其清酤侑唯芳蓀有抱愚欵沒存永敦嗚呼尚饗合祭王太常夫人文嗚呼壽母於兹年躋大耋萬壽之觴未及于闑維仲北還暗投明月方俟歲寒前帨之設爰飾厥詞比於一吷何圖仙遊遽辭塵紲嗚呼哀哉家世貴盛由侍御始其後益昌孫猶趾美儲祥德門篤生芳芷洎乎于歸作配杞梓一門之中輝映朱紫白日晝昏禍不移晷豈意閨房能靜而理未幾叩閽盡滌疻痏奉常甫衰一病不起其後三年又哭伯氏悲哉煢嫠撫厥諸子玉樹倏摧痛心竭髓二十年間叔姪齊軌既歌鹿鳴猶未執雉母雖喪明而色常喜視則矒然心可無纍謂當百齡永享多祉微痾纒綿以沒其齒嗚呼哀哉當其盛年有愈有悲慶兮弔伏以慎為夷迄歲之晏榮悴間之榮也能懼悴也能支此其大者婦順母儀至於細行亦靡有虧一飲一食必躬必咨幼事歸化潔其樽匜以燕嘉賔不知為疲既相夫子母兄具宜惟孝惟恭不問其私晚以寡母督課佳兒我膾我炮汝友汝師今其稚孫髮才覆眉早以文筆見稱於時可以瞑矣其又奚咨闔門痛悼恩斯勤斯嗚呼哀哉某等或因投分託於攻玉永夏涼風窮冬膏燭沃以露芽醉以芳醁談藝之暇飫聞肅穆或忝世講以子弟畜獲接雛鵷實慙野鶩少壯之交俄已衰秃緬懷昔遊近若昏旭今兹承訃有涕濡服釃酒盈巵侑以蔬蔌跽而陳詞寫我哀曲嗚呼尚饗學古緒言卷十七
