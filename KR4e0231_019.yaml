body:
  text: 學古緒言巻十九明婁堅撰祭文十一首祭龔母徐孺人文惟靈婉嫕之資順聽自將簉也而賢佐厥筥筐夫子干藩去國而航南踰嶺嶠殿彼海邦誰歟侍之有美季姜逮乎解組曰歸呉昌有鶵二鵷洎兄翺翔室喪其嫡陪祀于祊亦旣弄孫挾册方洋夫子之疾臥起一廂飲噉猶昨步屣微妨晝娯墳籍夜飫壺觴所不落莫孺人在傍樂此燕譽年甫異粻短檠共燼不逮晨光嗚呼哀哉匍匐往唁知其素彊女之及筓為具齎裝宿昔所峙僅留空囊屢恚而歎二豎膏肓痛不可忍猝以披猖嗚呼哀哉人之生世如何可量雖有修短不繫否臧少侍君子宦於其鄉子又生孫世業青箱赫赫髙門潭潭中唐兼珍而食刺繡為裳所享多矣豈必夀康其未能瞑夫子皇皇然自乖分移居東堂惟酒與棊忘日之長魂兮有知其勿永傷世講之誼薦其苾芳奠而以告庶其來饗嗚呼哀哉祭宣配丘孺人文嗚呼閨門之譽婉嫕夙稱生自望族歸於蜚英嗣執筐篚以奉嘗蒸言媚堂上有如嬌嬰翁也而慈無譙訶聲媪之嚴兮謂順而聽子未有男進以琇瑩十年之内舉三寧馨撫之如一罔不受擏伯也齒胄是為吾甥亦旣抱子頭角崢嶸日侍大母啜所調羮可幸成長以慰頹齡何圖一疾童穉涕零嗚呼哀哉予之老誖三世將迎有女而孱未辨執罌王姑憐之有誨必聆無非無儀實愈才能母亦謂然不誚不勝而今已矣有淚霑膺城之西南墓出於汀水勢環繞樹色靖㝠將告夫子以古之經必母久淹青燈長熒薄陳果蔬以侑醁􅌬彷彿來歆靈車翠屏嗚呼哀哉尚饗祭徐配呉孺人文嗚呼孺人之歸嗣執筐篚逮事王姑曲承音㫖顧而樂之婉娩可喜稱其家兒夙知大體夫人晚年女之伊邇餽問之勤如同卧起旣夀而終銜哀備禮窀穸有待愴焉塵几雖撫二女長甫及筓嘗舉一男送以悲啼久病而瘵醫何能為相為歎息肝實傷脾血枯中消殆不可支經旬絶粒抆淚長辭嗚呼哀哉内則孔閑夫子亟稱逮下之恩中外同聲閨房穆如迭進小星爰有驥子舞勺含英如金在鎔如弓受擏母之臥痾躬禱必誠歿而有知庶幾目瞑嗚呼哀哉孺人之家貴極簪纓三世而上實秉國成有孝有德嗣起崢嶸洎乎世父亦邦之楨先公數竒僅升於黌其文與行允也令名嗚呼哀哉古稱士女必本家世生於貴門歸也服媚雖奪之男無忝錫類命之不長有報其瘁所不能忘惟此兩穉有父之慈豈無快壻風馬雲軿去此疣贅聊陳一觴以告而酹嗚呼哀哉尚饗祭時母馬孺人文嗚呼閨房之内嬿婉之私其幸不幸銖兩毫釐生而分定邈其逺而微或耦貴得侍房帷如江之氾濺沫流澌借以風雨滙為沼池鬱彼嘉木下茁新荑始華韡韡旣實離離吁嗟孺人生實似之少侍光祿潔其盤匜恭慎且惠朝夕允宜是生鵷鶵幼不好嬉稍長積學漸騁厥詞方圖養志以慰母慈云何一疾遽不能支醫藥罔效痛結肝脾光祿之殯卜葬未期偕其元配後先繐帷從之地下如平生時嗚呼哀哉吾儕之交再世追隨年多已老次亦踰耆若其少者姻婭差池爰薦簋飱以侑一巵髣髴雲車來聽陳辭嗚呼哀哉祭宣氏妹文嗚呼予之同生兄姊早殤兩弟不育三妹相將憶我甫齓長者扶牀仲後一甲歲臨子方季同予寅丙火其煌各歸舊族獨有文章先君疾革管妹驟亡秘不敢洩忍淚盈眶仲僅踰衰貧病交戕幼子侍側我躬其喪今又哭季痛何可當妹生二子章逢蹡蹡足慰目前而命不長豈其顇耶貧則何妨我父逾老母更夀康妹未及耆一病莫禳如予潦倒能不摧傷豈彼瞀昬舉止倀倀人之所鄙而天謂良耶豈其淑慎蚤暮皇皇人之所喜而天實靡常耶抑或脩短稟受異量而瘠未必尫沃未必穰耶嗚呼葢蹔聚者形骸斯欣蹙分於在亡不昧者神明故賢達㝠於短長夫安知存者之不為有限而逝者之不為無疆耶夫安知衆所羨者之無幾何而獨契者之未渠央耶苟長逝者而聞吾斯言悟其本光則風馬雲車翺翔乎寥廓而税駕於無何有之鄉也必矣嗚呼尚饗祭執丈傅先生文嗚呼憶甫穉愚以通家子出拜於坐公揖之起退問先君頎然者誰曰士凱兄伯父事之博學多聞此世偉人聆其謦欬庶幾斯文已漸知學識張二丈叩其淵源與同鄉往張嘗語我昔與士凱同在師門各厚自待維歸先生精於文律抉微棄陳闖入其室獨吾士凱不專於詞意在經世才傑為師我時豁然若撤其覆若發之蹤而示之獸自後公來信宿予舍每至宵深豪飲悲咤戲謂先人且可還臥留爾阿戎我唱俾和俯仰幾何倏忽卅年今其已矣有淚澘然於乎哀哉先生於學善論前史擺脱拘攣視猶稊稗不學無術乃俗之陋以是涖官不賈奚售謂事之幾繫於忽微有黠而合或戇以違匪識之長孰知其趣世有斯人胡令不遇嗚呼哀哉公之感憤每思一試自負其才而不得志嘗論䝉莊以悁為達謂與世忘一何乖刺音辣公之元孫頗世其學或時訶之汝非卓犖榮名可淡進取難忘胡今之人有弛無張我聞斯言殊為心惻世終莫知況乃日昃公以濶迂廢其先貲晚歲食貧中益自悲然而聰明不減於舊飲噉兼人庶幾上夀顧其體肥氣不能充行立久妨以歿元躬嗚呼哀哉雖然子且下夀而哭其父有曽有𤣥身為髙祖世所未聞公獨享有雖人之窮天則何負所可悲者才出於人學邃於古憂不於貧而官止師儒不登朝廷不司民社老於窮經世之膚學剽竊無根膴仕厚祿以髙其門人以相方為公興嗟何石之瑜而玉之瑕彼不知也曷足怪焉凡世所收譌種相傳譬如蘭艾臭味迥殊艾之盈腰蘭固宜鋤百圍之木不任棟樑千金之璧不琢珪璋此世之羞公乎奚憾我陳斯詞申於明闇嗚呼尚饗祭殷職方公文代公方舞象㸃筆成文長者試之占對紛紜其後三年補弟子員督學馮公目以絶羣實兄事予情好兩敦於時宿儒有唐有殷洎潘先生篤行多聞引為小友擢英播芬數擯有司氣為益振逮歌鹿鳴九抵白門南宫之役三詘始信乃􅑴大江牧彼州人乃佐戎樞論厥武臣請託旣絶謗議實繁蒼蠅㸃璧千古同寃歸而槖空如諸生貧老又加二以歿元身公旣晚達又被毁言始不及旭後不逮曛何才之髙而命之屯顧所自樹已足不冺況留其餘以庇後人我所悼者欲吐復吞貴不忘賤此道久湮公正發憤亦已沈淪誰於貧交白頭彌親誰復侃直分别蕕薰於乎已矣能不悲辛嗟我望九亦旣眊惽五十餘年時事日新公又前逝將孰與論吾儕老矣朂吾子孫與公之子尚其還淳老淚欲枯奠此一尊存歿之感寸心若焚嗚呼尚饗祭瞿幼真文子之端靜而敏宜克有就以聞於世而竟中道以殞耶子之提鉛握槧避喧就閒蚤夜孜孜以求合於有司之程凖而其討論墳典每掇拾今人之棄餘以剖擊俗學之駁踳葢細極於蟲魚草木而博通於㸃畫偏旁庶幾泛覽而密稹吾觀其氣和色温若醉人以醇醪而不少露夫畦畛然而其志甚厲其神甚緊苟可以極才力之所至又若秋天之鷹隼顧能勤一生於脩塗而不能脱鹽車之韅紖豈其決性命以饕貴富而未免為達者之所哂葢以立身揚名乃孝之大雖亦知自全於恬俞而中有所獨愍彼不知者謂子欲朱丹其轂以為親榮而更使垂白老人哭愛子之夭折而痛結於腸腎曽不聞學殖人也脩短命也假令子棄人世之榮名學方外之導引未必能囘已定之命縱復優游以終老而志業未遂名聲不彰亦何取於夀考而泯泯耶吾三人或忘年與交或少而相習或締交伊始而皆自謂能知子之心能悉子之隠今之哭子葢不能忘情於三號而實知夫火傳之無盡然則子之再來人間以究竟其所欲為也允矣敬陳辭而奠觴淚汍瀾其不能忍嗚呼尚饗祭沈祖均文嗚呼去歲之冬就試於郡君臥寓舍屢走問訊起而對餐言語諄諄曰疾所由得之鬱忿木旺火燔肺受其病予實憂疑且告之慎君雖傫然意猶矜奮談及藝文抉摘瑕釁予笑而言此何足論死生大矣菀枯一瞬愛其皮毛腎腸為殉子必不然盍以靜鎮首肯予言是有定分吾力與爭彼不吾近其若之何狂走以僨於時詞場爭礪鋒刃慨焉曰歸寧匵之韞幸而得痊吾學益進不幸病廢吾子是訓後身身存斯言可信旣别而歸窮冬伏枕遣問増損口授以應子書不來憂心日甚陽羡之遊予懷懜懜詢君親朋彌亂方寸有加無瘳漸妨食飲還過於崑驚聞在殯中腸若抽有淚如迸君而蚤夭信矣其命性剛而明才敏而儶一言之過其更無吝一得之長亦取自潤比來精勤旣溢愈濬吁嗟已矣能不悲慗君之羣從握瑜懷瑾爰及從遊咸受韅靷還以所聞授君之𦙍君所未酬後當克振吾衰而迂有皤其鬢同心幾何俗之所擯與君久要庶不緇磷匍匐哭君拊心慿櫬嗚呼哀哉祭呉起龍文嗚呼予昔垂髫謁外舅徐侍坐中堂時方聚徒授經其中少長紛如君之昆季濟濟曳裾入叙姊弟則予外姑自是識面數共籧篨已結為社同獵與漁情分日深君尤勤渠洎遊膠庠得陪步趨予縻鄰境歸卽相於笑言之接棊酒之娯逮乎歲晚有暱無疏予别諸生倦於脩塗君起家貲贍於菑畬隙晷之暇彼此相呼我姻君鄰三人與俱棊之虐矣酒亦酣且俄别三日方擬相拏鄰之訃來君去斯須嗚呼哀哉君已三子或勤以劬或憺以愉少亦馴謹無敢昬逾以侍寡母慰君黄壚嗚呼尚饗祭呉氏姑三娘文於乎維昔歲首先人見背㷀㷀靡依痛沈五内姑之哭兄幾同兒輩已拭淚痕慰我苫塊逮踰百日形亦癯悴念厥老姑僶勉還憩秋暑向闌來看吾妺信宿即别强要不遂期以杪秋重來相對何圖一疾纒綿増憊病得之肝而傷於胃我就問時勸以無懟姑亦頷之非不自愛吾疾已深寧當復瘥而母而妻吾向所賴今當長辭能不介介及乎彌留終以不憒嗚呼哀哉父之同生兄伯女弟伯旣早夭白首惟二姑少吾父實惟一紀春萎冬謝乃同兹歲於乎哀哉姑不知書而性明慧每與之言輒了大義問我往來死生之際為言幻緣悉如目翳或寃或親或喜或恚揑目所成何足挂礙姑曰實然我所歎喟自始來歸舅已前逝辛勤事姑衣食每匱未衰而寡鞠此諸稚三男兩女各已婚配長孫成人且見孫壻吾勤一生無慙呉氏奈此老姑翻令掩淚此如可忍含笑入地有家而貧乃命之值將逸而殞其又誰觖嗚呼哀哉姑念兄嫂歲必再至其留旬月拮据不廢予時勸姑宜少自恣晏起早眠胡復勞勩姑曰吾來食飲爾饋幸有餘閒肯怠吾事吾之家居吾炊吾洎吾日不給而暇於寐今其已矣徒霣涕泗諸子哀哀能不百倍於乎哀哉又念衰姪未有頴嗣曰父八旬終不求忮兄亦踰耄敦行不貳寧有單傳而斬其裔爾之居喪慎勿過毁言猶在耳每為心悸憶姑臨終屠宰為戒市脯擷蔬以薦而酹靈其我歆知必不昧於乎哀哉尚饗哀辭四首友人徐孟祥哀詞有引予友徐孟祥别三日而或以訃至余愕且疑亟往問所知遇其僕於塗問之信葢歿之時前食頃猶為其子説書課家僮有所葺理俄入内而凭欄咯咯似呼痛者再舁至牀而絶痛哉孟祥之父母老矣以彼其才氣不早奮於時以為親榮當必晚達無疑也而竟以夭死尚可知耶雖年之不永與志之不獲展平日與孟祥言頗似聞道者顧安能無戀戀於其親耶然而孟祥之長子已踰冠成立足以娯侍大父母不異孟祥生時後二三年績學綴文以畢其父之志而為二老人慰者知必不逺矣故予為之辭如韓之哀歐陽生者以解其父母之哀悲且以慰孟祥於地下云秉諒直兮氣方剛忳壹鬱兮年踰强脱鹽車兮馳康莊逝將駕兮蹶且僵豈良樂兮終莫當使騏驥兮隕路傍策駑駘兮追翺翔委銜勒兮私自傷善之慶兮惡之殃吾欲問兮天茫茫彼菀枯兮與彭殤譬遵途兮各有方或脂牽兮登羊腸犯陽侯兮戒舟航塗所出兮難周防枻莫施兮僨其廂賤且夭兮命之常魂魄依兮父母傍目可瞑兮後則良代子養兮夀者康刷羽翮兮修文章所未展兮於焉償昔與子兮泝大江予嘯歌兮子傍皇曰臨深兮永以懲叶曽倏忽兮臨其喪子事親兮能勿戕孰短命兮可使長窮泉閉兮隔幽明知莫逆兮如平生方孟成婦張氏哀辭方孟成甫踰冠將娶於張張之大父别駕公一日與予語及之以生嘗從遊知之必深也予因為言孟成外温内朗學日益而功加勤公聞而色喜張吾鄰也通家往來昵甚先是予妻見吾數稱孟成輒曰鄰家有女殊秀慧盍為聨二姓之好乎予雖頷之而未暇及其後竟成婚姻焉孟成以其弟故困於雀䑕至無以為家來依婦翁翁媪皆愛其為人然為諸生十年不獲一試京兆徒以獄訟縻之也去歲辛亥别其婦讀書虎丘山中及冬而還試復不利開歲即又别去夏秋以為期未幾婦病間一歸視卽復惘惘出門孟成所買新居去予舍傍纔數十步未定遷而以盛夏走句曲顧雖數謁醫藥終不效則數謂父母其以兒遷乎移居之後意乃恬然而孟成不勝内顧復觸暑蹔歸留十日而行已畢京兆三試會督學戒諸生母得遽歸旣而疾馳四日以昏夜宿關外明晨遂不及於訣僅得視含歛而已嗚呼痛哉孟成嘗為予言婦之疾得之火鬱而上炎予曰豈為未成子姓乎曰不然以𢎞文之蹇耳窺其意儻幸而有一日之遇何必身自舉子哉其始疾作有妖夢焉問之不肯言孟成亦曰泣而為瓊瑰盈其懷吾懼夫不幸而踐也亦置不復問其後凡所以告孟成者皆㣲引其端或傍及於他人迨殁而後知其皆訣也殁之前一日泣而戒其穉女曰善事若父而已至其言嘗為羮以療孟成疾尤酸楚可念旣沒而孟成之諸弟無不稱其孝睦可謂賢也已予故為哀辭以慰之於地下且以解孟成之悲思沈痾中人兮醫難為良湯藥少閒兮左右去傍指其臂痕兮問此何創宜不能知兮今告子詳昔子之癘兮食絶於吭實迫且悲兮黙焉以禳刲臂為羮兮試與子嘗幸而下咽兮繼粥與漿出肉於瀋兮納腊於囊終不以告兮後莫我明叶芒發篋覩此兮覆謂不臧嗚呼倉皇迫切兮為此固當匿跡杜口兮意尤難量孰有女婦兮丈夫深藏天奪婉嫕兮如何可忘嗟人之生兮福禍茫茫夭也而淑兮夀也而狂有惡其生兮有悼其亡豈以臧否兮而分彭殤其間相反兮乃足相方昔之剜臂兮今為斷腸不聞鼓盆兮古有蒙莊彼豈寡恩兮誠悟其常苟為若淑兮促乃為長如其嚚凶兮夀彌不祥亮逝者之無憾兮奈何乎哭死而過傷王尚寳元配李安人哀辭太原王遜之娶於崑山李氏今中丞公之女孫而太史君之女也嘗從官京師然未受封而稱曰安人者從尚寳為京朝六品而稱之也來歸八年屢遘閔凶連舉三男子今年夏還哭子而顇醫藥未效旣又免身彌不能支迨其疾而病也嘉定之通家某某數誶其進退以為憂喜間二三日則往問遜之李氏姊及聞生男喜且慰曰可無虞矣孰意其増劇以至斯耶悲夫安人之始為婦年及筓耳進止有常度不妄言笑家人無不宜之居王舅之喪戚而無違禮明年文肅公薨山崩梁壞而遜之不震不撓聞譽日起顧其内事久茀不治旣而外内肅然人皆曰安人實賢且能以佐之也或以語太史君則謝曰孺子何足以當之吾為父知其於婉娩聽從或庶幾焉比歿遜之書來辭極酸楚至云身賴以康家賴以庀聲不出於梱而臧獲各循其職疾已瀕於殆而話言咸中其窽神識恬然無戀與怖有類聞道者而竟夭其年造物㝠茫其又何可知耶歿未幾而仲子痘愈尚寳當以使事之江右吾儕相謂弔與賀不可兼再踰月而始克往奠為之辭以哀之且以解遜之之悲詞曰稟清淑兮閑姆訓外則温兮中彌濬生華胄兮歸髙門惟夙慧兮逺驕吝逮事舅兮驟見背茹辛酸兮佐厥𦙍矧泰山其復隤兮傍之人兮為彼震嗟梱内兮糾紛試亂絲於芒刃旣大事之克襄葢盈耳兮休聞雖夫子之競爽兮賴夫人兮坐鎮樂欣欣兮所知彼蠢蠢兮奚釁泣呱呱兮蜯珍秋之中兮再孕望國門而北􅑴兮尚纍纍之符信已使車其南還兮飭藩封之虞殯攫明珠兮掌中等朝華於彼蕣淚涔涔其盈眶兮魂怔怔而欲殉又一舉而得雄兮謂可療乎疾疢竟形神兮兩憊埋塵土兮玉潤淼西江兮旅次攪繐帷於方寸靈之歸兮安養陟蓮臺兮崇峻神逍遥兮無方睇金容而不瞚何脩短兮足云去塵勞之若焮留結想於人間乃宿緣之定分誠靈心兮永湛已相忘於喜愠無噭噭而怛化兮斯達人之委順王伯深配陸氏哀辭表弟王伯深之妻陸氏年十六來歸歸十有八年以歲癸丑四月病歿予往唁焉姑哭之慟以予所聞平日之孝於其姑也信自伯深之弟及婦皆痛不自勝葢其和柔惠淑為㛐而㛐為姒而姒宜於家之人也又信始歸之歲姑嘗命出見予色温而貌莊舉止合度意其為福德人也已而漸聞其賢久之伯深不以予之衰鈍數相過從容問所以勤學之道於是聞其賢益熟嘗生男不育意惘惘不自得顧連舉女性又篤於慈愛推乾就濕體日益顇歲中臥痾者常十三伯深憂焉予慰之曰此無夭法也婦德如是體貌又如是而乃虞短折耶比者每見伯深必曰吾婦殆不能起以為憂數遣問訊云少間矣當疾有加幾絶粒漸喜日啜粥三四盂矣一旦忽以訃至吾妻女皆錯愕失聲雖予亦自怪向之所謂福德人者而驟至於是然則人之資性容止其皆不足信乎可痛也巳乃叙其疇昔所聞而為之辭以哀之詞曰士貧而娶兮賴其儉勤所以為養兮瘁骨與筋其不能然兮奈此食貧或給於養兮每患齗齗盛飾而居兮曠於晨昏夫子之過兮閭里日聞吁嗟淑媛兮匪驁而仁父母憐之兮室無間言歸不逮舅兮恪共明禋滫􅔱之滑兮靡閒夕昕旣以奉母兮燕及嘉賓母之戒齋兮閒停壺飱莫奉母歡兮有獻於緡弱而善病兮不耐苦辛敏於女紅兮手不去紉猶以儉補兮無侈衣巾譙訶不聞兮其怒以顰姑為一言兮改顔為温葢孝誠之天植兮豈勉强而由人凡今日之深痛兮固在昔而已云嗟予言之不中兮殆禍福之不可以理論惟孤女之􅑱􅑱兮恃大母之加恩不數年而及筓兮庶以慰眷眷之幽魂學古緒言巻十九
