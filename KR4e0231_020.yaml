body:
  text: 學古緒言巻二十明婁堅撰呈八首修復南水關呈詞呈為懇恩酌採羣言修復水闗以禆學政事竊惟人文闗乎風土氣運係于作興照得南城水門舊在黌舍己向因衆稱巽水之秀改闢迤東而迎然於卦氣有符實則巒頭未合雖其説各有所主若至是則必無非大抵濱海之鄉凡潮汐吐吞總謂之去故其流注之勢必江湖滙合斯謂之來試就治城論其地脈則必以東北為去西南為來明矣舊闗直受之於南何必為巽新門縱據得其吉却轉而東譬近舍稻梁之養逺求珍異以適口求而不得餒且相隨况巳在巽西氣本相接辰居巽右禍亦須防雖隂陽最為渺茫非耳目昭然較著顧當其改圖於始亦謬謂張網可幸得魚及其覺悟於終豈容以懲噎而遂廢食不及今明臺之兼聽將終虞已事之難更此諸生之所蚤暮以講求飢渇以延企者也又去歲秋試之先曾具呈言新鑿西水達於練祁者若橋梁為礙舟楫不通將坐視清流漸成填淤已奉處分未獲訖工并乞查會前呈一時並舉實為便益須至呈者乞祀朱熊王三公於名宦呈詞呈為遺愛在人宜隆秩祀以著不忘以垂有永事竊念吏治必稱循良親民莫如州縣况東南繫財賦所出於催科兼撫字尤難幸遇其人能無追思於沒世雖紀其績未若崇祀於將來照得前知嘉定縣事歴官南京禮部吏部郎江西按察司提學僉事南京大理寺丞通政司參議嘉興朱公諱廷益其自閩移呉之日當政猛民殘之餘吏以急斂干和民以屢侵多疫公仁且潔又簡而寛絶不自潤以脂膏惟有人沐以滲漉邑之歲困漕糧以土瘠不宜稻也則為請於主者仍得改輸以銀邑之額設官布以賦緩可紓民也則為言於監司因得漸弛其課至於徵斂有法則創為板册連票雖愚民不至於倍輸又慮風俗漸奢則倡以節食貶衣雖富室亦遵於雅化與韋布通賓主之禮際而人知老老賢賢與章逢申名教之防閑而士用逡逡凛凜總之以逺賂而瘠已以瘠已而肥民萬姓頌之同一辭三年紀之如一日也繼其後者廣安熊公諱密擢官户部郎早卒承寛仁之緒撫甦息之民以為政似不難以見德實非易初至不求殊異無取名要譽之為稍久孚以悃誠有淪肌浹髓之惠所以人蒙其賜尤在天戹其逢在任久歴七年連歲曾無一稔方流離之乍復咸寄命於緩征乃殿最之攸闗似考成於通賦公恤民之瘼惟己之辜雖奪其俸者屢加然不為動者自若旣申折漕之請特嚴投櫃之防務令納者絶無絲毫加増而收者不至萬一賠償又以惡草不除則嘉禾不殖始剪打降之兇横繼絶訪行之中傷大約虚懷待人時或寄之以耳目然實心求可人亦效之以肺肝亷不為名寛不廢猛人士頌其質行黎庶戴其深仁顧惟二公或已陟為卿貳或久遷為省郎未究厥施遽促其筭獨此荒瘠最被恩施昔賢有云後世子孫思我不如桐鄉之人思我緬思二公在官之年所以為一方之謀者不異父祖之計安子孫以故二公沒齒之後所以繫一方之思者亦猶子孫之追念父祖考之祀典允矣具宜惜其後人未聞趾美接壤西呉而近者僅嫡孫名繫於膠庠曠隔東川而遙者斷遺孤音問於修阻若不及今而申請或恐稍久而莫詳顧欲由下以遞申或恐文移之寢閣豈如自上而批發不虞胥吏之稽留又故本學教諭累遷國子監助教博士監丞南京户部員外郎致仕婺源王公諱廷舉端方其行篤實其𠂻謂行本而文華當分急緩若華繁而本撥倍切甄陶貧乏者數賑其寒飢僝弱者尤力為擁䕶因良牧之加禮燕閒輒有獻規毎輿論之密伸緘秘何曽出口再當偕計而北上直云衰拙而南還世人之邊幅不修賢者之坦懷彌著以故改官胄監祭酒亟稱其賢已而進秩户曹同官咸重其守至於移病懇求致仕葢由考滿不能治裝行李蕭然遺貲窘極實乃昔賢之清操豈止叔世之人師參二令而齊名信一時之絶盛况葢棺久已論定而闔邑靡不心儀盍使此邦士人寄懷思於俎豆後來賢達興慨慕於宫牆有此連名具呈伏乞准勘申詳並祀名宦須至呈者覆勘回呈云云竊思官守至重也材品固以時升降而其論必先於儒生鄉校至公也評議亦以時重輕而其究必定於輿論照得前知嘉定縣事朱熊二公及掌教諭事王公先後僅十年之内望重皆一時之尤有身處於脂膏而冰檗不移其操有食貧於苜蓿而苞苴無動其心朱以寛簡著稱嘗微行村落之間野人初不知為長吏也而熊自逺方後來規隨咸戴其寧壹熊以悃愊終譽尤特嚴錙銖之禁私家幾不知有官耗也而王與同時相善獻替每畢其見聞士民追思今昔如一或曰此三公皆宜大用而竟以不永其年世之喪道歟民之無祿歟不然而何天奪之遽又曰此三公皆宜有後而未聞能世其業天不可問歟善不必福歟不然而何後嗣之衰夫詩詠民不能忘君子之有斐兹其人矣傳稱沒而可祭神明之及交以教德也今上自大夫下逮士庶無不皆稱其賢則及春而祠至秋而嘗允宜並祀於學近歲儒生之論間有涉於阿私以故師帥之尊或多夷於寢閣前所瀆聽頗及其子姓之殄瘁可以無疑於過譽而今所覆詳尤恐夫歲月之曠隔不能無憂於廢禮人如此其表表也而不獲祀將來復誰可當言如此其諄諄也而不足行自後復誰可信伏乞俯垂照察亟賜申詳通學諸生上撫按保留胡明府公呈呈為疲民羸瘵懇留亷能有司以終惠愛事竊惟旌别者上之大柄所以察吏而振起惰窳之風怙恃者下之至情所以籲天而願借慈仁之牧本縣東瀕大海西咽澄江沙瘠故不宜禾未免仰鄰封而足食木綿尤不耐雨偶一經霪潦而就荒加以俗媮而訟日譎紛紛求勝於譸張况復區分而賦日逋往往交通為蟊螣向因松江壅為平陸故每歲之河工譬猶通咽開膈近以官布入於考成則昔賢之闓澤轉為擢髓抽筋以物力土産而論於全呉之邑則嘉定為最僻最敝以調停設處而責於宦呉之人則嘉定為最劇最煩胡知縣自三十九年二月到任迄今二年先除豪悍不逞之羣兇繼懲刁黠無情之宿蠧值歲收之屢儉撫字多方處賦額之加徵催科不擾勵操則四知是畏中懷獨潔之氷心訊獄則兩造無寃庭有久虚之肺石十萬家倚為慈母六百里欽若神君驟聞調繁不勝却顧在長吏則絶其有緒之成勞如絲方繅而斷繭在小民則奪其調饑之待哺如炊欲熟而絶薪雖地方重臣意在磨礪不暇顧於一隅而梓桑私計念切祈哀能無迫於上訴亦知己奉俞㫖誠難自異於盾矛猶望更煩部咨未必遽乖於竽瑟矧在長洲以𤓰期得代繼組者自當别有循良而在嘉定以棠䕃方隆怙恩者詎忍失其覆芘若長洲以得賢為幸則嘉定以失怙為悲幸屬帡幪誼鈞憫惻且下邑頃年之故事有調繁瀕發而復留如祁門唐知縣改調嘉定往迓舟車旣宿留於彼土莅官月日且刻期於此邦而竟憫攀轅再馳奏剡是知一時囘天之力全在台臺而三年河潤之施更自今日有此激切連名具呈乞改正𣲖剩呈詞呈為懇恩分豁額徵名色以釐積誤以釋羣疑事竊照邑賦之得請永折也實由地磽苦旱乏米而每虞缺兌故也歲輸之獨多𣲖剩也又因已減復徵所餘以抵充别項故也自巡撫周文襄公創立平米加耗每石編銀五錢以蘇東南之重困至萬厯初下邑猶困於兌軍累題折兌幸得永折奉㫖蠲免輕賫蓆木板過江修河等銀每石約計減編四分據徑賦册凡係奉文蠲除無得仍五錢計筭向已頒行遵守止因廿三年院題闔郡全荒部覆槩徵折銀本縣遂亦一例混編五錢賦冊所云府胥之㒺上則曰片段易於徵解縣胥之誑人則曰髙下全在府胥可謂昭如日星矣而迄今未蒙仍前改正故𣲖剩視鄰境積久相懸雖用抵練兵均徭里甲等項原非擅増然何必獨浮嬴餘之數使閲册者駭其過多又且曲為抵充之名使輸銀者疑若可緩况此一方病糴之衆雖幸免兌軍其如萬姓糴價之髙已不翅數倍所蒙不費之大惠未紓終歲之私憂萬一事有朦朧中飽者易售其詐儻或時當倉猝在事者莫展其籌將曰均五錢也何彼皆少賸此特多餘均一剩也何此獨踰千且至及萬雖有喙三尺列狀百通亦無由得白矣其在今日合無遵照經賦册開奉㫖蠲免輕齎蓆木板銀仍不𣲖徵而應徵練兵均徭里甲仍照原編驗𣲖不名抵補則羣疑頓釋而税額允釐矣至於修河過江二項亦為漕艘而設旣俞永折自當並蠲而猶然編𣲖不常亦於經賦未合乞照三十六年事例并賜查豁尤為諦當有此連名具呈公舉節孝張母王氏呈詞呈為公舉節孝懇恩勘詳以章婦順以光旌典以勵壼範事本學増廣生員張婁孫有母王氏守節四十齡行年六十歲家本世祿歸於宦門其夫生員某其舅隱君子某而福建按察使司副使某之孫婦也夫因力學成羸强以無男再娶每客遊於鄰境逮疾甚而家居僅閲歲除俄遽身歿婦之撫其先後兩女飲泣而血繼之奉其内外二親食貧而身瘁矣旣凜乎嚴氷蘖之操又允矣持門户之才黽勉有無共襄事於城南新壟辛勤朝夕終就養於燬後敝廬舅好讀史書每以古人自許及共商家事數稱新婦甚優婁孫以伯兄次男來為之嗣而母以孀妻訓子早見其成女各有歸孫亦漸長雖目前似足慰意而身外未獲榮名昔歲甲申有賢父母檇李朱公其人擊節亟稱其美謂夫有文且賢而妻自矢立節以賢節齊名為奬勵葢閭里相傳為美談迄今歲月已深允於褒揚為當矧江南四郡久闕驄馬之巡行而下邑衡門竚望龍章之來賁伏乞照例發勘轉詳具題寵光幸及於生前風勵奚止於境内有此云云請入殷方齋先生鄉賢呈詞呈為崇祀鄉賢以勵風教事竊照本縣已故淮安府學訓導殷公諱子義天資醇篤行誼端方其學無所不窺而特先其大於人無所不誨而躬率以嚴折衷朱陸之異同直探孔孟之窔􅀢平生尤篤於孝友逮老不私於貨財曲承後母之歡顔盡讓穉弟以遺産自少卽能戒色絶無孌童季女之私終身未嘗失言惟以質疑解惑為樂一經大冶多為名世之人老作廣文徒抱專門之學睠此下邑篤生醇儒惟有崇祀於宫牆庶幾增輝於俎豆自萬厯八年十二年再經通學具呈蒙督學批勘而子孫儒素旣無貴盛之攀援人士咨嗟長慮輝光之泯沒近者明臺纂修邑志已於人物志中撰次小傳伏乞粘連申詳有此連名具呈卞先生助喪呈詞中懷樂易素行清醇雅志功名曽不登於下第晚官閒散竟莫展於歿身自來此邦樂育多士入其陶鑄將無躍冶之金受其磨礱即是暉山之玉不脩俗儒之邊幅自標良士之丰儀對函丈於席閒均霑時雨庇廣輪於宇下如坐春風方幸奉以周旋何圖嬰兹沈痼到官未及周歲卧病乃積數旬有加無瘳積治不效彌留之際欲斂未能一官獨冷於廣文十口僅餬於微祿旣老成之凋謝兼孤寡之伶俜衆所䀌傷相為霣涕盤併空於苜蓿櫬難返於梓桑痛此附身尚倉皇而稱貸況乎復土將暴露以何期獨有相率而籲哀庶幾驟聞而垂憫施恩乍寒之骨一慰長往之魂儻䝉破格之隆施乃是及門之厚望有此連名具呈雜著四首荅問性一首予旣倡為之説曰告子之言生之謂性孟子葢未嘗置辨也特謂生不同則性亦不同非若白同而均謂之白耳物生有心動而必之乎欲人生有心動而必止乎理此人物之性之辨也人之未純乎理者有以蔽之非其初也故曰性善也或曰子言則旣辨矣孔子之言性相近也其謂之何予乃復以告子之説應焉夫饑而求食寒而求衣性也人固有食必列鼎者矣乃或以一簞告飽人固有衣必重裘者矣乃或以挾纊為温不無小殊故言相近或曰然則烏在性之善乎曰夫物類攫拏而食牝牡之合每不知有父子矣人然乎哉人之入於禽獸者世多有之然不足以累性也此非予私言也雖孟子固以耳目口鼻之欲歸之性矣以命自制則入自賢門不知命而浸淫焉以牿其性則入自禽門宋儒之宗孟子好為深眇之談而未究其實徒令孟子自相矛盾耳予故合而論之使性善與相近之説畧無異同彼以食色為非性者無論未足屈告子也獨不思反與孟子戾乎譬猶葉公之好龍其於論性舛矣尊經閣夜話述明府齊安胡公以今仲春政事之暇來過黌舍與邑文學三先生同登尊經閣謂堅雖濶迂頗好藝文而宣君嘉士通曉世務皆可與言從容使畢其愚至漏盡二鼓公旣豈弟飲人以和兩生亦不自疎外寧言不中倫不敢負公之下問也與之言文則謹對曰六經而下百家之文意非全粹詞多造微孟之醇荀楊之大醇小疵聖人之徒歟西漢渾雄樸茂東京漸靡而弱六朝之排偶唐初猶存韓乃力振栁與並駈長慶以降其細已甚宋㳂末流歐始反正王曽維佐三蘇並擅長公其尤南渡迄今未見其比勝國推虞昭代稱宋皆號博綜尤謹程度惜理學礙之於超乗未能也後有作者自謂逺紹然多採華忘實求新得陳外若恢奇中乏雋永向之典刑不無異軌即有識真狃於時代矯以爾雅力不能囘矣肅皇之季頗標同異和者旣非其儕苟希奬借排者或非其敵秪益揶揄其或識髙才健衆非獨是雖快爽絶倫而率易為異加以好譚名理誤落臼窠瑜不匿瑕亦其宜也若夫允蹈成規務逺俗尚得意象表標㫖目前語全鑄今法乃自古則吾呉歸氏視唐宋皇甫張秦其不多讓矣與言詩騷則又對曰騷人之致風雅之遺也彼旣自極瑰異今乃妄訾合離漁父卜居云何作俑詩三百篇稱四始於前漢十九首擅五言於後㫖趣自符音調自别然則李杜何必非漢梅歐豈盡非唐同源異𣲖自古已然異曲同工於今豈病哉且今之外合中離譬已陳之芻狗昔之音移調改乃嗣響之宫商遺文具在精鑒何疑與之言字畫則又對曰此小技耳然而不精研則心與法不相入何由通微不積習則手與心不相應何由造妙師法須髙骨力須重已識其源雖師心而暗合强摹其迹縱肖貌而實乖王會稽善學篆籕者也顔平原善學羲獻者也晉帖傳者要為不可思議唐帖有贋有臨其真者固難髣髴也宋元名蹟幸獲覩真蘇則沈著之中乃見妍姿米則逸宕之外自覺淹通蔡整而媚人巧已極黄秀而勁自得為多呉興小楷深穏多姿行草自是入能氣韻不無近俗然後之繼作未見其倫目以邁宋相也舉肥矣語未畢而公為解頤撫掌引滿連釂若吹竹彈絲以為侑也已又詢及時事見其逡巡俾勿辭讓嗟乎桑梓之邦實同欣戚父母孔邇孰不瞻依顧良窳習也緩急勢也凡為下邑有二難焉民貧故逋賦此催科之難也俗偷故多訟此聽斷之難也二者請以醫喻訟之多客邪之有餘也攻之為差易賦之逋元氣之不足也補之為尤難雖然差易矣慮或為之媒焉絶其媒則客邪無從入雖勿攻可也旣難矣慮更為之蠧焉去其蠧則真氣不重傷雖勿補可也今者案牘無壅請託不行聽其講解則弱猶可支懲其㒺誣則奸不得肆媒已絶矣邪且散矣信乎有餘之症療之無難矣獨此不足者匪由凶荒而患為蠧者不勝奸敝譬之負戴見其能勝忍更加重乎良民之日顇可憫也譬之飲食見其可欲寧知饜足乎頑民之日饕可恨也况於中飽之徒利在行賄自非束濕之政勢必受賕不忍於猾胥之數輩而忍於人為刀已為肉之小民非情矣不忍於宿逋之數區而忍於不累官與不病國之良民非計矣即使壤地不無肥瘠徵收合有急緩斗則之輕重不已分乎復熟之抵補今安歸乎且彼之積欠者不皆區内之圩田豈無本上田也而收入下區者乎又民之僥倖者不必曩日之敝民豈無本上區也而效尤下户者乎若論賦額合冬與春夏秋而畫一徵之自是其分此則勢必難齊即欲權宜先冬之孟仲季而一切急之徐酌其餘豈容力有不及况田之肥瘠所在而殊無下區之名者豈皆上田歟歲之收穫接壤而異無下區之逋者豈皆倍入歟試觀邇年會計之差未有不費營求而得其費彌益足知其所入必不貲其利彌増足知其為弊必更甚此為取諸常税之外乎抑即取諸常税之内乎舞文而得賂者十三行賄而得緩者十七此十分之緩旣入於奸則十分之急必屬於良矣有愛民之實心圖平政之實效者忍不去此蠧乎去蠧如何未役之毋使以求得也旣役之無使以佞售也所慮狡猾之徒每集黨以羣訴則易為所動胥吏之口必巧發而多端則易為所欺往年刋行經賦一册若能先究根源次尋脈絡修復清由之廢杜絶呈報之訛雖有神奸亦當照膽此非明公而孰望乎公於是憮然歎息洞然照知欲採芻蕘見之行事兩生亦相顧私語始談藝文終於政術正猶曲終奏雅神融意暢區區説耳誠不足為比矣臨分授簡令識其詳雖次第一時之言或少文率爾之陋要歸於暴公之虚受贊公之亷平而已歲在壬子述辨米畫曹周翰出示大父公所藏米巻予雖不知畫觀其雲山烟樹走筆而成縈紆蓊鬱之致超然脱去蹊徑知為真蹟無疑也展巻至後題輒語周翰此元暉筆耳曽之一䟦葢題元章他畫好事者裝池時誤綴其後匏庵先生未暇深考因定以為元章予旣憑筆蹟臆斷其非又按元章本傳終於徽宗朝其年僅四十有九而此題距紹興乙夘葢三十年矣又他本供御為元暉所鑒定者皆在紹興中其夀至八十餘與所云老境者適相合夫筆墨之辨世已不能知獨恃歲月可據而乃失之於匏翁題識可弗慎歟又考蔡肇所撰元暉墓銘卒之歲為崇寧則其必非父蹟又不待辨而瞭然矣論筆二則聞鄰境有好事者極喜佳筆毫必紫鋒必長直必每一酬白金三四錢少亦一二錢友人或過而譽其好事即捐二三為贈筆工之與相習者嘗攜過予而求試即以為贈予辭不受而聊一試焉笑語之曰用此筆材分而為四豈不趂手且耐久哉則對曰卽果佳渠不屑用亦不肯多蓄矣葢人之輕財而重筆有如此亦大逺於情矣自後予偶屬他工用紫毫製一筆大如棗核長可一寸五分小即蠅頭細字大即方四五寸旣極隨手又久而不乏可喜也然俗工例不肯用紫毫作心往往白裏紫衫外紫則悦目中白即省料故耳又非獨此也趂手而耐久於用筆者有兩便而求售者或一妨書此以發一笑製筆之妙在使人作字時手忘其筆而已宋時筆工稱宣城諸葛然蘇黄之論似微不同東坡於諸葛之外頗稱程奕及呉説父子且謂散卓筆非諸葛不能製自餘筆鋒譬如著鹽曲蟮作字有觔無骨而山谷極稱呉無至無心散卓且云試使人提筆去紙數寸欲左右皆能如意則諸葛敗矣似又以懸腕枕几而分非筆之通論也今之筆師如王道彰茅瑞彰先後擅名於時王已歿矣有子能繼之其一茅壻也予欲以蘇黄所論詰之輒試其筆為作懸腕書茅之子曰道生亦知名説二首沈彦深字説從予遊者沈生宏祖來請更其字且曰幸有以誨而朂焉予因字以彦深而告之曰子知所以為深者乎山深而虎豹變淵深而蛟龍蟠玉剖而珍珠絙而升德産精微而光華絢爛物固有之若夫刑仁講讓綱舉目張澤被羣生而威振殊俗此則朝廷之深仁厚德也不有海内之彦士而孰與共其功顧士何以能自效於世若此哉其器誠深以閎也不深不足以為宏矣易曰唯深也故能通天下之志夫士穆乎其容坦乎其度天下沐其施如和風甘雨仰其德如景星慶雲豈若僉壬小夫為機變設城府而深阻不可測乎哉彼其學則聚之深問則辨之深寛居而仁行資深而逢源爵祿不入其心而功名不出於意若唐虞之羣后德讓寧可以淺近窺耶自三代以降世莫不有忠貞之臣旣厥心慎厥事其視險膚殆若仇讐此其人皆可謂深識逺慮者矣若乃抵巇鬬捷陽施隂設雖亦能偽定一時而終無以大慰天下此則奸雄之譎詭曽足比於聖賢之淵深乎今吾子妙齡勤學深造以道在子勉之而已性之所近能矯之使勿偏乎習之所染能絶之使勿涉乎見謂是也而能求其不可母膏以沃薪乎見謂非也而能求其可毋洗以索瘢乎同乎巳者能勿暱乎異乎巳者能勿訾乎羣而欲得也獨能求之於其所不取羣而欲趨也獨能求之於其所不由德之能勿見其為德之形逺之能勿開其驟逺之釁苟力此數者斯於深也幾乎將見山暉川媚以應雲龍風虎之會他日所自效於世必非淺尠也已朱季方字説易之六十四卦其初八物而已八者其初兩畫而已震之初則猶乾也純之斯為乾五變而一不變復也其悔之變而巽則為益焉巽之初則猶坤也純之斯為坤五變而一不變姤也其悔之變而震則為恒焉益之與恒聖人嘗為之辭曰遷善改過而立不易方矣此何取於雷風哉夫天地之化雷動風散雨潤日晅各専其功焉然而日也雨也其用以形形故時有所偏油然沛然則朝暉匿影杲杲出日則霢霂謝潤獨雷與風也不然雷擊而風勢益張風行而雷聲益逺不相悖而相與為助夫非以神用故耶葢吾觀聖人之憂旣濟與所以圖未濟者而後知益恒之用大矣善而遷焉過而改焉如是而立焉其何易方之有要所以取諸震巽者不震則不能以動不巽則不能以入舍是而求可久之道庸有益乎昔夫子稱南人之言曰人而無恒不可以作巫醫然則世之志於求益者不恒其德道無由矣聖人猶恐夫恒之者之誤也而曰利貞曰不易方於乎盡之矣聖人化於恒者也賢人君子守之者也中人則望而趨焉其反是者所謂愚不肖而羞之招也長洲朱君以其名某來求字予旣字之曰季方而申告之以恒君之姿温慎以敏非逸於方者也勿易之而已求所以勿易者必伏而思曰無或溺而不振歟無或剽而不留歟如是焉而益𢎞矣今世之小夫市人皆有别號以謬為尊吾又願君之勿循其俗也又别為之字曰益之可也疏三首資善禪寺改建山門并葢一堂二廡募緣疏葢聞六度以檀施為首衆生以福田為因但捐積累之贏即破慳貪之障治城東南有資善禪寺者僧道林之所修復也覓遺趾於汙萊邈矣異時之締構易嘉名於棟宇翛然今日之熏修然而像設雖嚴中唐尚虧於瓴甋軒楹粗具四周未備於垣墉凡屨杖之來過咸咨嗟而興歎頃者石巖方伯因疾減瘥每共徘徊謂當告於淨信庻多植於勝因手札一行施金伊始予忝支許之分爰疏給孤之緣在昔釋尊乞食曽訶羅漢心不均平逮兹末法有緣凡施比丘等無差别若論多生果報募有為募施有為施俱依八識田中究歸三輪體空與本無與受亦無受同超十方界外或曰均福田也所願憐貧賑匱修道補橋何必莊嚴佛土不知均檀施也縱復片瓦一椽束薪斗粟即為趨向佛乗在未信者以為此愚夫愚婦之所眩也昭昭而背之㝠㝠而徼之難以冀矣其知之者以為此善人信人之所依也愛而能割之求而能應之不亦美乎勿輕一念之隨喜可醒歴刦之愚癡勤幻生而多聚幻財溺幻貨而規貽幻裔何苦以身為牛馬直須彈指悟空華由有為而入無為惟此第一方便因始覺而還本覺遂窮無量法門東林圓照寺募緣疏邑之東十有八里有東林圓照寺焉剏自宋紹定三年庚寅其請於朝得賜額者僧有謙也元季燬於兵燹僧時習偕其徒思修結茅以居募於檀那稍稍修復而以舊額請洪武元年戊申也距其始建葢百四十年矣思修之徒又數傳而如權者卒其業然後殿閣像設及禪誦之廬咸以一新迄今百餘年來未有能繼日就頺圮有盲道人金士成奉母菴居䖍修淨土而禪僧明本來共昕夕相與發心重建二殿前供四天王像後供觀世音菩薩像獨虚其中緩而有待比工畢而道人旋化去明本自矢必新正殿以報佛恩將復從善信募焉有為貽書見屬盍為之疏以助勝緣其可乎予惟天下承平日久江南呰窳波流物力耗於輕浮嚚訟争於桀黠即有禁止猶然怙終惟有廻向佛乗庻幾掃除宿垢夫布袍豈如文繡被體還同疏食定讓甘肥充腸何異莫若移為喜捨之用正堪結此清浄之緣乃至怨毒相仍猶然積聚無厭子孫之福分定身家之需幾何已苦沒齒勞心況供傍人笑口胷中機總為矛㦸眼底事盡是鍼砭普勸捐貲一為拈偈見聞易解逺近争趨佛説人生總宿緣乞兒争得富兒憐苦遭氷雪俄晴暖已忘披蓑忍凍眠日日傭奴昔昔君可能宵旦正平分浮生信得還同夢富貴青天一抹雲老人垂白戀殘年一種兒孫幾種憐及到臨分齊放却從他鏹藏落誰邊饑寒也解多生業富厚都忘此去緣今日大慈香火院幾人先注破慳錢東林教寺觀音殿募緣疏代竊惟性無生滅資六度以出迷塗法有廢興報四恩而新梵刹是以寳光同放灌國土於微塵宗教流通演法音於浄域業無勝而不積緣有導而彌昇者矣東林教寺者國初僧時習之所建也楊涇縈紆而出其東練祁渺瀰而亘其北去治城一十八里遡創始二百餘年正殿嵬峩則能仁迦陁之相好斯嚴阿閣邐迤則大悲薩埵之手眼具備毘尼開士固宿昔振其犍椎慧業文人多棲遲挂其巾屨焉歲月迭遷榱桷崩壞住山為之惻愴飛錫過而咨嗟於是寺僧某等悼像法之陵夷謁檀那而廣募風幡夭矯覩表而生捨施之心法皷鏗訇聞聲而破慳貪之障猶以工非易庀將經始於一隅庶令緒以漸尋用告成於七衆謂觀世音菩薩西方補處東土導師悲仰下同於衆生慈力上同於諸佛自在成就現為種種之身無畏圓通普徧聞聞之德昔文殊揀選方便特摽妙解於耳根示末刦求捨塵勞必獲想澄於覺海團財何愛佛乗同歸但悟三空便超五濁某蚤緣科第曽奮跡於宰官晚憩林樊已息緣為居士緇衣作伴頻繙貝葉之文紺宇棲𤣥恍覩曇華之瑞欣逢盛事共託勝因鹿苑雞林等是調根之會竹園金地増脩正信之緣苟在家而出家誰與火宅由財施而法施兹為漸門謹疏學古緒言巻二十
