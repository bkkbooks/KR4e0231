body:
  text: 學古緒言巻二十二明婁堅撰書牘十二首寄申美中司理自昨嵗旌斾南征此中米價湧貴民間嗷嗷洶洶㡬有嘯聚之虞幸及秋轉販者舳艫相接既而嵗登非獨頼以全活而已國家三大喪相繼中外憂惶有同杞人俄而旋定無疆厯服此足徴矣但恐臺省之間囂陵詬誶習以成風而州縣之政積偷成窳監司而上彈劾㡬何未足深懲有識者咸以民窮為憂緬想江右民風吏治為南方第一而門下學紹青箱節比素絲官為郡僚責専審克實門下闗通之脈也始於一郡播於四方為徳甚逺視彼優游省署而感時撫事或未免仰屋竊嘆者何如也友人周君以服除補官貴屬掌教南安不過旬月俸便可得遷所望借之羽翰俾得優敘其為感激豈有涯哉此君文筆敏給器度坦夷年甫及艾用無不宜少與從容便見底裏故敢一為先容耳伏想徳星所臨數及鄰境此地蘇文忠少甞遊焉晩而南遷北歸復再經過南安有學記刻石䖍州有贈士人孫志舉詩及題鬱孤臺等篇過吉州有清都臺三大字又甞寫海外天慶觀乳泉賦過廬陵為曽安止作秋馬歌刻石聞其石今尚留曽氏處此數種似皆可榻得以語所在縣令必能致之他日東還可當百朋之錫也此中寒雨自季冬十八日至今屢雪入蠟且三白矣聞周將治行率爾緘上記室不宣寄姚孟長太史僕於世味久已泊然而每聞故知之捷非獨色喜且為之躍然慨然豈誠以一日之榮進哉亦為其人有可自見於世與碌碌者不同且世亦必有賴焉耳若乃孟長之捷既可内慰慈顔行且世酬旌典矧名已早著年已及強過此則為蹉跎矣憶昨相過覽所貽書還為相識數稱之以為丈夫處世若畏首畏尾苟以自完猥云明哲保身者亦足羞矣已聞膺庶常之選則又喜曰斯人也他日當以經術經世務且以文章回雅道決不苟為諧俗而已久欲奉書一罄鄙懷未遑也竊以為兄之志於斯道亦已久矣猶恐向縻應舉未免博涉為優今拘館程仍以華膄相尚則力追前代之深醇一掃今人之儇薄不在此時乎第當出其緒餘以趨時適變而已僕童子時讀蘇長公上梅直講書未之識也及壯因歐公須讓此人之語始尋繹得之其後讀韓歐曽王之文一一窺其高處進而求之賈董鼂劉又知遣詞布格雖各隨其時而其為卓然偉然一也如毆少時步趨唐末五代今見於外集者何其麗以靡也既登第乃一意為古文詞而當時之文遂為一變本朝諸公其始為南宋理學所縛雖有博贍終不能高其俊厭理學者趨六朝頗工於詞喜恢竒者稱秦漢更流為詭吾呉之文王文恪陸貞山葢爾雅之宗也至歸太僕始棄時人之詭舛絶不以時代為高下謂唐宋高文不減西漢非真知古文者其持論必不能若是之邁俗也譬之相馬略其𤣥黄取其駿逸苟為不然誠未見其能古也此非吾孟長而誰望哉今在館中知未免為應俗文字俟三年之後力追大雅未晚耳語多未可以書悉他日南還省覲或可從容為半日談適須儀部家有北上人率爾附一緘意在傾倒不覺絮聒亮之亮之與黄貞甫學憲久不至西湖自仁丈蹔還里門便擬扁舟一叩宿留雲岫堂中眺湖山之明秀聆談言之斐亹淨洗菰蘆塵垢而因循未能果者非獨嬾性固然實由家無壯子弟頽齡穉齒依依不能為再旬别耳閒居每念天下泰寧物力全盛而島倭小蠢遂不勝其蹂躪譬如人生豢養太過小有疾疢便不能支又如舊族强盛來久一朝勢去漸以衰落此由養生適以戕生倚勢以兆失勢故也今日之事但上有體國之大臣不植黨不營私無以言翕訿而妨才俊無以賄賂而養豺狼國是定則黒白不相淆吏治清則民生不彫瘁顧論此必無爽而力此絶無望寧復有救乎是宜仁丈之脱屣而賦歸田也雖然有能深知而重任之豈可終以髙蹈為明哲哉昨歲東西創殘實可深慮幸而蕩平譬猶壯夫驟病非有藥物能療之恃元氣尚可支耳今尚可不一懲而易轍乎民心即天心也人怨即天怒也若背公營私者日偷以自肥不知身之當為魚肉而人且刀几我也念此實久一為仁丈悉之以當晤言巽甫去留已不辱命餘續布寄胡仁常明府溽暑得書俄復臘盡翹企之深與感佩之至真與日俱積雖已附一緘為報竊有欲効於左右而未暇悉也自昔仁人君子志存乎當世必不榮通醜窮審矣然則何以言得志不得志也葢在乎用之則天下蒙其利不用則斯人受其病云耳若一身之否泰何論焉亦曽有以齊安羇客為明公言之者乎雪堂居士其才其識其所論列與見之為郡者至今令人慨慕而當時人主又深知之一為異已者所嫉至於下獄流貶豈非人情所難堪乎然獨能夷然處之誠胷中度世與孔子所稱得之不以其道而不去者合也今明公之進用雖少淹乎將未幾而郎署内之卿寺外之藩臬郡牧其得吾志不逺矣所恨獨不得在言路發舒感憤為世鍼砭然今之朝士頗聞有植黨之嫌識時務者亦不願為此何者同則日甚一日異則必不相安於進退兩無當也不審髙明以為然乎否耶衰劣不勝䑛犢於舍後隙地構二丈許藏書之室未免稱貸而佐費兹幸歲豐然方碌碌償逋即欲賦詩奉寄亦未遑及至於札示一巻聞之沈生云曽囑友人製巻然迄今未見擲來俟其一到當於來歲清和圖之也李長蘅行呵凍附布區區并以為候嚴寒伏唯倍萬珍攝不宣荅方孟旋日承再枉雖從容話言未敢造次扳留亦知仁兄之不以我為簡也及長蘅來别與相知數人共集僧舍出示手書因言仁兄亦已長齋乃始大悔知之晚也夫以千里故人不為市脯沽酒猶可以不能酬酢自解乃至失不為具伊蒲之饌非仁兄其孰能寛之昨及一緘捧誦愧悚何已謂有試而譽則不肖已衰謂過情相借則又兄所不為或者愛而忘其醜乎不肖少為舉業所縻終於孤陋兩無所效幸而所父事兄事者二三君子於古人學問文章頗有承傳不似近代諸名公鹵莽幸亦竊聞其略而熱心一片喜為友朋言之轉相告語庶幾不墜長慮非徒無益而先違老氏睢睢盱盱之戒乃有謬見許可如仁兄者乎不敢當不敢當仁兄兹役上則玉堂次亦蘭省瞻對未期然僕以為士人有意當世惟長吏之澤最速最渥儻亦不以簿書為勞乎得在吾呉鄰郡或容幅巾野服握手葉舟而非所敢望也幸因仁兄獲以一言為屏岡翁夀限於格律語焉不詳顧其父子之行之文差可概見矣書生習氣語輙傷時贈别一章尤為胡亂凡兄所與必無荆棘或可令見然亦望慎之秘之有贈長蘅五言題扇他日一相見京邸即索觀之亦見不肖之待長蘅非淺鮮矣長蘅所付絹濶而少矮須囑裝潢工人綴黄絹於上下玉池内旣宜懸挂且於稱賀尤妥也使到後方取絹歸若非雨中具草未免使者空還今幸留一日以待晚船早食後即得應命未能巧遲何如拙速想見掀髯一笑耳荅呉興王君書僕鈍且衰已絶意當世之名兼酷信釋氏每恨知聞之晚漸益泊然乃䝉不鄙惠書鄭重且拜珠玉大貺若翹首雲霞而傾耳韶濩也慚感何已何已憶自少壯至今凡讀書為文皆不能與時俯仰以遂成其名雖小夫豎子之能捷得者猶媿不若況於名公才士之未必果合者乎顧竊有聞於宿學其言雖迕俗而頗與古人合聊一為陳之僕嘗舉東漢文勝六朝六朝勝唐人以問又問古文之法何以曰亡於韓唐人之詩何以曰無五言古語未卒而其人啞然笑曰子為疑我而問乎抑果有不釋然者乎此殆囈語耳試多取古人之文與近代文雜而讀之其若飲醇若食蜜者必古之卓然者也其若餔糟若嚼蠟者必古之靡靡者也不然則今也且非獨文也夫宋人以議論為詩誠不盡合於古至其髙者意趣超妙筆力雄秀要自迥絶未可輕議今乃欲以贋漢唐而訾真唐宋容足慿乎僕自聞此快論中頗了了然才旣不逮人又不蚤自力於學迄於無所成立比者百念灰冷不恨無成且願學之思亦都廢矣衰年遘閔病復乘之何心及此姑述所聞以為報耳苦雨十首田野樸拙之音聊用發笑而已至於字畫非曰能之但以嗜好旣久庶幾識真蘇長公論書寄子由五言殆盡其理此在髙明可以頓悟漸入也目眚不辦作小字又方伏枕聞有風便彊起口占想䝉垂亮荅張季脩書兄昔别去為萬里之行每一念及輙念唐宋以夷獠雜居之地困苦遷人賢者不幸時或遭之耳其於初試猶知憫惜尚不令逺去其鄉也而今者名為聽之掣籖已陋甚矣況實寄之胥史誰不知者雖公無取矧又蔑公及其遷轉一以資格為叙往往賢且能而見屈庸且濁而獲升葢明知之而不復顧者多矣聞兄在彼知而欲援者多有忤而欲擠者不無誠寡不勝衆顧好之者之氣力淺而怒之者之機械深亦那可以常理論總之自有命在兄雖在逺亦頗聞吾呉近歲吏治民俗乎猝有小警孰可仗者幸楚蜀來者或遥聞風采或已睹設施下邑新政庶幾惠人解而更張意在兹乎譬病暍之人沃以清冷又似痿痺已久蹶然忽起喜可知己兄所謂能不同憂者失在父兄不能訓子弟自有以取之豈意披裂至此彼悍然而圖報復者猶可知也狺然而爭骨者其謂之何乃外敵方囂而内釁復深撫而用之者旣昧於長算伺而乗之者又跡於大悖里閭傳為談笑親知莫能解紛惟有涕泣之道自西逺來詩之言䦧牆禦侮彼豈不聞顧出於骨肉至親倍足感動耳來札言彼中秫多而泉冽又以善釀之法試之而酒不能佳何歟豈麹有不宜乎不然則暄寒之地氣或相懸耳向嘗欲按東坡酒經雜麹與糵以粥為投一一按其法而試之儻可為發興乎又未知在彼所釀用麹用丸子若麹也則酵於何取此中賣酒家如祝如張問之酵皆茫然不能言也咸取給於釀手耳兄豈亦嘗識之乎向者朱提之句慮兄過於清苦或不便於同官詎意興文之相成如是若兄之攝鄰邑篆亦已聞之彼豈盡如興文耶美人蕉曾於呉江識之然非其花時也荔支蜀種或異閩讀蔡譜即閩亦􅗥懸計得書後兄已嘗甘久矣承惠蜀葛賢者之貽誠當服之無斁況逺地土物尤所足珍多謝多謝令子尚未及晤聞其留伴孟夙養痾俟愈與俱還真季脩兒也殘歲若不東下來春必西往見之若其資敏而筆超已窺見一斑日益又可知己孟陽尚留潞州友人官廨一緘乃郎已領訖俟有風便當寄示見及書叔達子魚汝亷各為道相念矣適作書連為客所娚多不相屬盡四紙至筆倦而止與王慶長自聞令子遊庠便宜遣賀并候聖善起居惟一僮差知書亦差解事不可去左右遂逡巡且俟謁廟後雖曽見全案又不識令子之名今乞并示其字小試為發軔之始於世家不足重朂之努力接武正在今日矣聖善撫孫如子屬望殊殷未即有以慰之雖得失早晚有數實恐平日工夫未即能精進又未知師範何人近來此道轉衰然嚴重之與寛縱如白黒迥懸想不至誤耳尤望叱名於聖善前委曲道及也新書細葛聊以申賀惟幸笑存聞已為司㓂公建祠不審擇吉何日奉安像設此誠輿人公舉一鄉盛事然鄙意終不喜過爾彫飾第如郡城范莊祠宇非獨易辦抑亦可久且所重本不在此不審與何人商量務出雅道勝人多多許也臨期當同二三友人瞻仰拜謁不宣與殷辟非書比有所聞於道路言足下所與狎者或非其人頗有燕僻廢學之憂叔達子魚輩欲同詣諍之庶幾翻然僕謂少年偶一失脚吾輩愛之旣深宜相為䕶其短密以一書規切如辟非聰明豈有不聽受者諸君便以見委將發而會聞卜吉行納徵禮當俟過此而後及之今則不容緩矣先公踰衰而舉長君踰下夀而舉足下每見其憐念之極自言老翁譽兒將來應不隤家聲恨不獲見其成立耳已聞其命名且遂為之字足下顧名思義儻有先見其倪而為之防者乎夫旣往何足咎丈夫貴自新耳吞刀刮腸飲灰洗胃是在今日矣若以習氣難除請獻對症一方不過痛念先公而已雖有緘砭何以加此僕嘗論人生少而寡過多得之稟受若過而能改彌難其人辟如本無酒德雖終身不濡唇有何足異如其居常五斗一石偶有過差便斷杯勺如此等人豈非豪傑人之稱之并其前日之瑕皆為瑜矣僕又嘗言習氣之病寧失於狂如好游狭邪是毋失於貪如注物決賭是夫此兩者豈有優劣顧病狂尚可療病貪不可治經見已多不容不具陳非謂開一端以成足下之過也今日所望正在無非無辟庶足慰先公於地下耳二扇寫納向曽以小楷題極精小扇今尚存否此先公命寫勿入他人之手囑囑密扎勸殷丈保嗇孟陽昨見過云丈丈垂聽鄙言便思斷慾保嗇安享晚年淡泊優閒之福今之丈人行年踰七十老而不衰如丈丈者有幾自非好古近道之君子亦烏能無所牽制挫有餘之形氣悟無為之閒適者哉然以茂仁仲與兩丈皆年未滿七而或已鰥居十年惟寄情篇籍或遂謝絶閫内止用米汁自娯此皆所與少同志長同學者也今遂與二老而三又同恬曠之味則丈丈之遂能決然吾逆知其必無難也某雖向衰少於丈丈尚二十四齡而鬚鬢半蒼早臥晏起兀然一室如苦行僧此真不能非直守禮實愛身也而非不欲也顧輒以此言進者無乃與性不能飲憎人銜杯者類歟竊嘗思之以為某未衰而衰之徵十見其七丈丈猶强而强之實亦減其一則耳之於聽少不逮前故也又竊以謂雖一不如前而不失為强此可以調攝復也葢五臟之虚實各有驗於形耳屬腎若丈丈者獨腎一藏微傷而餘四者固未嘗虧也何者以飲食起居無異平時故足徵耳非若他人衰老同時俱病而潰不可收者則又嘗私驗之矣比者丈丈自江隂還晤僅一月别耳而耳病似全已私謂仲與丈若自後復不逮今則致病了然已數日不晤而仲與丈見語君言殆不誣以數日之汰遂幾喪其一月之嗇可懼也以一月之嗇能使七十老人頓還其一藏之虧然則宜何如自愛耶又嘗謂丈丈之可以娯老者三喜讀書長於吟詠一也能飲醇賴以陶寫二也有二子皆慧可以授所業三也此三者可以奪彼一矣而又有一宜過計家貧子少尚當以百年看其成立老氏有言慈固能勇若如此則閨房之内尚當有脱簪進規者況於學古近道與彼二老同其少壯而獨以旣老之年顧不能自割於愛我者之規乎誠不勝惓惓又慮面談不悉故敢復以書贊決貽邑學二師書昨承傳示邦君之命欲俾以藝文之事與昆季周旋此非獨不敢辭而已某於諸生中蒙眷待有加實倍倫等去冬先人病亟旣拜珍藥不幸大故又賻奠猥及葢於一體培植之中又竊抱知己之感長慮駑鈍終無以報更荷不遺仍有此命然竊有中所不自安者侍閒或值他友不獲面質輒以書問今科場文字與經術漸不相關某雖頗好古書而絶非時文當行舍竽挾瑟旣以自誤美芹獻曝或復誤人此所不安一也又方居憂苴絰菅􅂒公庭豈敢趨蹌儒冠逢掖私心實懷慚恧此所不安二也兼以容止朴野語言戇狂以侍君子或多愆尤又自省生平迂疎有愛有憎雖萬無召謗之事豈必無見疑之人此又所疑阻不安三也伏惟師長知我愛我求為具陳感激之私且斟酌疏數之間使上不負歸依至心下不為進退無據幸甚幸甚與唐四兄叔達書不肖自成童時聞之先大父言汝父少卽勤苦自力於學問師以不煩吾旣多長者之交家僮不足於役薪水之勞皆汝祖母親之而父憐其母往往分誦習之功助之汲每讀至夜分一燈熒熒母對之績相與勞苦或時至泣下其後學漸成以明經為學者師俯仰資焉又十餘年不肖漸壯而先君亦已衰矣大父又言而父之養我可謂已勤然而觀其意時有不足於中者冀有所得以為父母榮也此誠人子之心耳吾自分所享已過豐豈更有望哉所以為爾父惜者其平生志行宜有聞於時而名不出於鄉閭不能不為介介也及不肖屢進而見擯家君又數稱時命以慰之又見所與逰者或父行或其同儕非名公卿卽懷寶遁世之士皆服仁義而稱詩書若與時之人異者則又私以為喜或時愀然曰而能養我如我養而祖獨而未有子嗣續謂何且爾後衰欲如我今日豈可得哉不肖乃為解之曰大人勿憂此亦命也已而先君終不獲抱孫以歿歿三年圖改卜宅兆葬未有期而不肖舉一男於是祔葬之意乃決竊念先君於事父母盡其孝於事伯兄盡其恭於視其妹若姪盡其友愛無一椽數畞之承藉而辛勤至老以卒有宅一區有田百畝以詒不肖堅又啟之以詩書之業疾未病時友人之子若孫求贖其先所賣田數十畝慨然還之所得金盡以分娣姪及諸女可謂盡其慈因謂堅曰惟我為父兄可作如此處分知吾兒必與我意合也未幾而病以至於大故哀哉痛哉伏惟知先君之深能名先君之為人者莫如吾兄且居常數稱唐先生有子非兄銘之而誰也旣狀其大畧又具述先祖先父平日相與告語之意以見先君之的然不媿於古人者果不必其施於用也學古緒言巻二十二
