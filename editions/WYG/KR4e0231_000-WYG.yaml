body:
  text: 學古緒言别集類五明提要臣等謹案學古緒言二十五巻明婁堅撰堅字子柔長洲人隆萬間貢生早從歸有光游明史文苑傳附載有光傳中稱其與唐時升程嘉燧號練川三老又與時升嘉燧及李流芳號嘉定四先生然嘉燧以依附錢謙益得名本非端士核其所作與三人如蒹葭倚玉未可同稱至三人之中時升流芳雖均得有光之傳而能融㑹師說以成一家言者又當以堅為冠盖明之末造太倉歴下餘焰猶張公安竟陵新聲屢變文章衰敝莫甚斯時堅以鄉曲儒生獨能支拄頺瀾延古文之一派其文沿溯八家而不勦襲其面貌和平安雅能以真樸勝人亦可謂永嘉之末得聞正始之音矣王士禎居易錄嘗稱其長慶集序以為真古文今觀是集大抵具有古法不但是篇士禎特偶舉其一也乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:63dfd46d4ed7c8bd46d3cf54206108dd4087bc66eb7a98e8c9efb72dea774584
