body:
  text: 學古緒言巻五明婁堅撰夀序十三首少師申公八十夀序傳稱盛王之治所尚不同而未有遺年者故以天子之尊袒割牲而躬饋酳其崇重如此今不可得見矣獨於大臣之年人主必遣使存問以示不忘而民間之禮往往盛筐篚侈文辭以頌且祝焉亦庶幾養老之遺乎至古之所謂憲老乞言者遂邈焉無聞而又無好古之士追尋其意以求髣髴於萬一為可慨也今年仲秋上以少師申公夀八十寵賚優渥閭里榮之夫公德全福備天人合符臻兹休美蔑以加矣竊不自量欲獻其所疑而乞一言以發其覆雖世俗以為迂或亦大君子之所深許也維我肅皇御宇不次之擢不測之威幾狎至焉然豈無以一言登用始終眷注歿而不忘者乎及上之初年付託得人權不旁落綱紀畢張然而始賴其力卒不能棄其瑕焉夫事或衆人見其似一人見其真人主斷而行之而勢之所偏重葢有終不能盡其議者矣豈非將順易而匡救難歟人主幼冲大臣在事權太重迹太専成王猶疑周公况其為汰者乎雖然汰可罪也功亦不可沒也此非若議禮之難也而至今莫為一言者自公之歸二十餘年矣今操柄實在上也而若其委之宫府非能一也而若或合之諍論各不相下也而若中立以持之舉天下惟名之趨而不務出於功實無乃懲前之任之者而究且至於不可為歟某愚且賤曰彼不與吾事可也竊謂公雖優游林泉然大臣之義必嘗深思極慮計所以亟反之使乾不亢而蠱可亨以圖於長久者可得畧聞其概乎抑此升降之大機有不容輕以告語者乎昔者衛武公年踰九十猶作抑之詩以獻規我公豈獨無意歟上以報天子之寵命下以慰海内之稱道盛美者而比於懿戒且為一發醯雞之覆可不可也勅封廣西道監察御史淄川韓太公七十夀序淄川封侍御韓太公以今歲壬子春秋七十髙矣其生之辰四月二十有二日也於是呉嘉定人士相與先期致頌禱之辭祝公無疆以見數千里外慕愛之情如長公侍御未去下邑時也某之駑鈍辱國士知最深且久思所以侑燕喜之觴雖言之不文固不可以已竊嘗謂享生人之備福者躬生人之厚德者也顧修違福禍之途宜出於恒而間出於有幸不幸葢君子之不幸而不克備於福者為不少矣然則其躬德厚享福履若操劵而責之天者人之尤艷羡而樂道之固其宜也太公嘗一至呉矣覽觀山川宜亦樂之居無幾何飭駕北還衆以為怪不知公之來所以觀為政於兹土也知其理平人和肅而不擾敏而能勤斯可以歸矣懷鄉閭之土風接親朋之言笑雖鼎食之奉誠不以易此也聞公家居未晨而興就田舍課耕桑日中而少休率以為常其暇也則以象戲壺觴彌縫之又多購異方儲良藥修合以施病者如其治生樂之不倦夫習於勞如户之樞也託於戲如弓之弛也勤於施如衢之尊也體用是康神用是恬德用是廣矣晚而偕其夫人皈依佛乗屏除腥羶以清浄為樂處貴盛而奉養不加豐當衰晚而神守不少懈俗之所羨有而若無衆之所騖去而若凂德積厥躬厚矣逺矣夫如是雖百齡不足為其夀也而某也將奚以祝為昔侍御之為邑也垂六年所旣去而民之思之至今若加新合一邑之欲獻夀者而以祝於公何如也去不數年而持使節來視鹺蠧剔利興商與民並賴合全浙三呉南至歙西至信之欲獻夀者而以祝於公何如也夫詞専而不咸咸難罄専易知也何者衆多之心一人之心是已某以布衣諸生庇於宇下上之不能以浮華麗藻顯名當世次之不能以賣聲市文誇炫流俗徒以朴直自守為侍御所知久困矣猶望其一日之遇焉已而刳形去皮益以自放而眷念不少衰使節之臨禮遇異常書疏之枉慰藉彌篤聞其生男也漸長成也則喜見於色聞其學禪也能淡漠也則信以為然以侍御之所以見待某之為太公祝者可知矣以某之所以為祝由一邑而推之凡江以南受侍御之賜者又可知矣葢不過一言而已曰攸好德之謂也如是而富夀而康寧皆公自有豈待他人之祝哉所為頌而禱者德厚存乎人者也福履懸乎天者也天與人適相遭而出於恒賢於君子之不幸而不克備於福者多矣自今以往固未艾也而能勿言乎若夫韡韡其華森森其玉家世之顯赫閨門之雍肅人多能言之而非謭薄之所暇悉也南譙費克庵先生八十夀序萬厯庚戌春友人馬巽甫讀書杭之西湖上與滁之來遊者費君敦甫一見契合久之因游於滁拜克菴先生於堂上遂留共研席比歲暮歸生之言曰始吾讀醉翁亭記愛其文詞每思一至其地覽觀山川之深秀與夫朝暮晦明之變而未之暇也今幸得遊焉乃知斯文無一字虚設讀古人之文葢未易也竊意歐陽公以氣剛行方不安於朝廷來守是州幸歲物之豐登頌太平之涵煦豈誠有樂於一醉哉中必有不釋然者矣甚矣夫直已守官之難也若克庵先生踰冠舉於鄉及强選為令建昌之政一不得志於鄰郡守棄去如敝屣當路者欲挽留之不得也假令先生得志於時遇所欲為肯以媕阿喪其所守哉即此可以比於古人之風節矣自歸田三十餘年先生之欲有見於世者旣終老不得試少而好青烏家言則覃精竭思務盡通其説乃已其所自得常能使不知者知或時陪杖屨於溪山輙指示某處可藏也嘗試求穴之所在即人人可以意揣得之至其所不言竟莫能知也雖一家之小道不足以盡先生要其所造必精詣亦可槩見矣將先生之骯髒而不獲試其才耶抑時人之鹵莽而莫知賴其用耶今先生年躋大耋有子五人以娯侍昕夕而敦甫以其文第五去學為武皆有志於當世子其為我一言以獻夀可乎予應之曰凡生所言皆足以見先生之大矣即欲侈而張之其何以加此獨慨夫歐陽公之賢旣遇合矣而不幸遭讒被謗以自適其意於一亭之間如克庵先生韞其才負其志不肯少自貶則徒以耗其精於方技而天亦錫之難老以彰好德之報然則昔之詆訾歐陽而今之媕阿取容以苟求利達者由君子觀之將孰置取舍於其間哉敬書而進之為一觴侑鄒愚谷先生七十夀序愚谷鄒先生未壯登朝未幾歸隠築室於惠山之麓而名之曰愚公谷歲中數移家屏跡其中足以忘世而自樂也閒居以文章自娯其辭出入古今崢嶸璀璨務極偉麗之觀而止以故名聞當世士大夫行過其邑者無近逺皆思一從之遊客至留連見其穆然之度似簡而實恭外若矜莊而中實􅆥易固已心醉而泉石之清冷歌舞之妙麗又若佐公以為客歡是宜其至即忘反已去而不忘數數也兹歲戊午公年七十以老矣而飄鬚未改雙頰猶童望之如神仙中人也或謂如公異稟使得為世大用其所展錯必㢠異流俗而惜乎世之莫容也乃令早自放於山水雖公之達中得無有不樂乎予解之曰夫君子志於當世急生人也其用之而效雖百里之政有足慰焉其不效則三公之崇媿彌甚耳先生旣與世濶疎其視得吾志與不得吾志等耳而豈以身世為介介哉且古之君子葢有以大臣重望而憂讒畏譏嘗懼以身為禍府者幸而脱於憂患之途若白公之分司歐陽公之思潁至今誦其詩文真若息䕃而弛擔也此豈獨達人之髙致其於進退之際見之審矣豈猶夫營營者之終老而不悟歟自予得接公以來嘗竊觀其對客私語所知孰有終席危坐每至夜分巵酒臠肉曽不入口而了無倦容此豈無得而然哉夫重乎内必輕乎外即謂公於言語之工宫室之美而聲色之奉直取以寄焉與世俗為無町畦可耳豈其中之所自以為樂者哉又嘗聞之於公家世素封及既貴顧有减無増每歲計其所入而出自公家之租經費之耗以及懿親舊好之餽遺有餘則盡以葺園廬供施捨終不留一錢近世士大夫貴即務肥其家徒為子孫計耳若夫公之處此殆有二疏之風焉其於身世之浮榮又可知矣自今而後吾意公且虚其心於無有而與造物者游雖綺語結習尚將解免況其他乎則夫人間之夀葢有不足為公祝者矣所媿不􅈺於詞第書其平日之所聞而進之侍御時君六十夀序時侍御乾所方按部於晉中會上怒言事諸臣不能將順非訕即欺欲引繩批根一切抹摋乃坐巡視西城時失察贜賄與其曹數人同日免官而非其罪歸後屇歲戊申而年且六十矣于時龔方伯石巖張大叅明初出而與敭歴中外歸而與優游藪澤既昵甚兼有姻連屇其生日相將登堂奉觴而辱以為夀之詞見屬予雖不敏竊嘗於君之出處有感也夫昔人之論以謂臺諫之得行其志幾與宰相等顧君以能容盡下之忠臣以能言匡主之過兩者實相成而常患於不相遇何也大抵寛仁之主能容矣其臣或玩而流為市名為行詐感激之士能言矣其君或厭而加之誚讓或黜免葢自古已然也自頃朝廷之上章奏紛紜以致令主上薄其言亦薄其罰且以為雖臺諫員闕亦可勿補若其人舉無足仗者然且用一人焉而輒使兼數人之職豈以為才固堪之乎直姑為是名而已寧獨用人者之過哉事勢之相激使然無足怪者當君在臺中時疏數上所言皆天下大計不務為婞直名言甚諄切而上亦弗為忤也假令前後之言者皆若此何至令明主盡疑其臣哉顧朝廷之所薄在彼而一旦以詿誤使夫不屑為彼者亦無以盡其用玉石不分為可惜耳且夫士之求用於時葢絫百人而幸有一售也其幸而獲售而試之果可以用者葢又百人而不過二三也自壯而老三四十年之間效用之早暮又不可期也即早遇合矣其克至於耉老或十纔得一焉今也黜之不以其罪一黜而遂至不復振以老其人既不可多得得人焉而又不使盡其用國家之用人可若是焉否也君既壯出仕中間再以艱歸前後為邑者凡四任而以課最旋擢為天子耳目之臣所居官亷而不劌嚴而不殘强執而不膠以君之為令知其所論薦與所劾免其人之賢不肖如黒白較然也自君歸田以來數年間時事日非長吏幾不知有小民而惟知上官之喜怒上官見其人輭媚即以為可喜或鷙悍則又曰是可畏人噤不敢出一言也嗟乎君之舉錯雖不克盡行於全晉視世之君子何如哉予既惜君之坐廢又竊以為即不見黜必不樂為骫骳視早自弛於田間何如哉雖然君今始下夀耳鬒髪朱顔尚如未衰之年假令主上一旦悔前之誤嘉與士大夫更始追用老成以為世坊表君且與時俯仰乎哉抑終不可一世乎哉願二公於醼酣之際聊試以予言質之當必有不激不隨足以風勵當世而終不為習俗之所移者此亦迂儒之所欲亟聞也少司㓂歸公七十夀序予友少司㓂春陽歸公以亷辨敬慎稱於朝廷溫醇退讓孚於鄉黨不蘄名髙而聞譽自逺不為崖異而人皆歎羡以為不可及雖色溫貌恭然中有確然皭然者未嘗諧俗而世猶能容之歴官中書舍人工科給事中尚寳司太僕太常寺卿已擢為南京通政司使今之歸也又寵之刑部侍郎以賁其行夫以讒邪之言爚亂衆聽人主而欲絶之出納之司葢綦重焉以故明目達聰之世宅揆惠疇而終以龍之納言誠以為非是則天下大計或有壅蔽而不通者矣而不知者且謂㗋舌之司漫無可否狃於所見聞而不原其所從始因是而輙輕之不亦謬乎夫給事中侍御史之重亦若是焉已矣知彈劾之為重而不知納言之職之尤重君以納言歸而姑借六卿之銜名以為榮觀若曰姑以是重大臣之去焉耳嗟乎古之帝王所為憂勤於上而寄之乎臣鄰者其亦可以深長思矣士方其未得志也若曰吾得一命而自效焉亦可以少補於時有聞於後果爾則誠可謂之不曠瘝不素餐者也究且百不得二三焉不皆其人之負也有尼之使不得展者矣然則何論其為納言乎封駮乎寵之以銜名曽不課之於進賢退不肖而徒使儃僈以歸足為賢者慰乎不也若曰老而佚之里閭榮之是朝廷之所以寵眷舊臣使得優游於桑梓則可耳公以春首還里門未幾而屇七十初度之辰於是邑之老而獲久要者壯强而在弟子之行者非其姻聨即所厚善之世講也謂予稔知公宜為之詞以侑獻夀之觴公少食貧幾不給於誦讀然以敏而好學一試冠其儔遂有名於黌舍未幾薦於鄉又十年而成進士惟不習吏事以為歉然歴官皆清曹階至三品而未嘗積日疲於句簡亦未嘗一念動於脂膏居官則家於俸入居鄉則以貸且質佐其不給里閭之聞譽日騰而錙銖之耗費每缺非獨知交所悉而已而公泊如也晏如也節食貶衣杜門却掃每手一編為歡竟日間有交讁之經耳終無竊嘆之愠容即今髙卧林樊將無每懷魏闕彼達人之髙致豈大臣之深衷自今以後但以誦詩讀書望之垂髫總角對盈樽之酒或浩浩而歌澄止水之懷長欣欣而喜唱予和汝雖慚達者之數子此往彼來總是平生之故人兹樂也顔氏之子之簞瓢也豈不賢逺於人哉敬書之以為獻夀序夀丹陽劉心乾先生七十夀序予昔少壯數偕友人襆被囊書航湖陟巘憩虎邱之竒石潄石湖之澄波披帷而烟雲滿席㸃筆即魚鳥闗情或間與俱還亦仍留相對惟有歲時之覲省乃獲模範之追隨以故雖遇人師多違肅括惟新安王先生金陵姚先生數承披豁每慰棲遲王以狷介方嚴姚以淹通髙朗而中皆泊如咸許莫逆焉最後倦遊得侍劉先生幸縶維之俄脱欣杖屨之數陪何拘禮數都忘形骸暇即跬步相過談必移時相對及遷楚黄不忘呉苑頗深山川在望登眺緣慳之嘆予解之曰蘇公杖履遺跡齊安士子能言縱使臨皋雪堂鞠為野田荒草而其升髙望逺獨立放懷目無一世之雄者誠足為百代所仰也及夫西遊旣倦東望慨然辱以葦航來過蓬户篝燈話舊把酒興懷慨焉於歲月之不居而情好之如昨也凡在投分争欲攀留何圖夜談倏已晨發葢緣予方為兒納婦而先生意在山巔水涯知不能從故去之速耳維歲之首屇其生辰先生葢老而傳矣及門可無頌而禱乎偕我好友亦其通家念大父之遊潤州猶先生之來下邑也甫弱而獲聆謦欬及强而彌荷吹嘘請與同往稱觴託於祝詞以頌云耳夫風日之佳笑談之樂蒼顔白髪既可相求忘形與年孰非吾侣藜杖堪攜緩步濁醪聊借微酣有賞會之清言無醼集之靡費行吟多陶謝之幽深醉歌即李杜之豪宕山椒水澳竹淨花明興發而尋興盡而返若乃春莫而日方永似於圍棊最宜秋深而漏漸長正可燒燈為樂門前剝啄來談笑之老翁窻下伊吾憐誦讀之穉齒口不談中朝之黜降耳不聞長吏之追呼豈止一日可當一旬行且漸老復得漸耄室逺心邇想慕固已勤矣一觴獻夀趨陪不亦樂乎嚴樂山先生八十夀序壬寅歲二月二十日為嚴二丈八十生辰龔方伯汝修以虞部公之執也屇期登堂獻夀而屬為之序予方在疚辭未暇為於時先君之友尚有適吾宣翁及先生二人者存焉其後每相見必曰吾衰且憊矣子可無為我一言乎旣諾而逡巡不果葢又三年始克為之則宣翁亦已厭世獨先生存而已始虞部公年少氣鋭嘗於里第之旁曰四門小學者聚其徒數人與讀書其中皆自負以為功名可立取公旣不幸早萎而數君子者亦荏苒以老無一人獲酬其志猶幸以長年見方伯君聨取科第累官至方面大臣及罷歸尚以故人子來見退讓不敢當賓主之禮葢先生與先君子未嘗不接之而喜既别去而慨然以歎息也先生老而食貧遣其壯子孫力耕田間而獨居城中每以其身分婢僕之勞然常蕭然有自得之色歲時親朋社會必為祭酒飲僅濡脣而食噉不減於壯盛時尤與先君子暱甚先君之抱疾以歲丁酉自是屨不出户外而故人來者必扶杖迎之與終日圍棊不厭至於先生非風雨為阻殆無一日不相過也予每侍側聽其相與議論不為髙竒刻核之言而皆如布帛菽粟之切於用私以為自今以往將無復有斯人者矣雖斯言也尚可得而屢聞乎先生生於嘉靖癸未當肅皇帝勵精之始公卿大臣謇謇諤諤其出處進退去今未百年一何其遼絶也至於民間之習俗富者靡靡日競於奢桀黠者齗齗胥騖於鬬諍幾不知有貴賤等威矣而世之君子方且務揚其波若以為是固然者長此將安窮耶葢予之所獲聞於先生者如此自先君與宣翁相繼歿老成益凋謝獨先生為碩果至今神恬氣和歩履如常其為百歲人無疑也比邑之東偏有百歲薛翁彼田野畊農未嘗役其心於當世於世俗一切可喜可愕之感亦不以關其思慮則夀固宜也若先生豈非所謂天錫難老者乎且吾聞薛翁自食飲而外即晝日亦多卧如是者累年矣葢又無先生讌遊博奕之歡焉由今而逆計其期頤之年所得不更多乎顧未知又十年而後其於世道盛衰之感當復何如也君錫徐兄七十夀序予嘗於閒居追數少時之交不過數人存耳而君錫兄齒最長葢先余六年以生是歲季夏值其七十生辰將奉一觴為夀不可無辭以先之君昔與吾儕結為文社意亦欲有所表見於世而或以早夭或終老無所遇以世俗觀之皆士之樸􅈪不得志者耳然其中所自得頗能不屑於榮通醜窮以彼貴富者之所營雖其人自視為意得或未必如吾黨之無負也以窮通推之則又信知彭殤可齊而較量於顔跖者之淺矣夫孔顔學者之師也觀孔子之所自言不過曰疏食飲水而樂在其中如是而已至其稱顔子亦曰人不堪其憂而回也不改其樂然則聖賢人之所以異於流俗葢可見矣自宋之儒者知尊聖人而未能知聖人之所自得求其所樂似神仙之不可庶幾其尊之愈至而去之愈逺矣夫所謂學為君子者不以其道得之而有不處焉不去焉舉凡流俗人之所重而吾能輕之夫然後可試之於用耳近世卿大夫笑狂狷之樸􅈪而舉歸於鄉原且以謂時有不得不然者曽不知狷之足尚而且為鄙夫之無所不至矣若吾君錫其處身也兢兢然而接物也恂恂然聞有不善他人以為是固然無足多怪而君已不覺義形於色獨愕􅇇不敢言耳豈非孔子之所謂狷者乎予自少識君五十年之交如一日也見君或不樂輒談笑解之退而黙自媿其不如以為君雖褊狹然貌如其心若吾輩或遇可畏人安知能決然不喪其所守乎然或謂君誠心質行無他腸固宜其夀則又兒童之見也市井小夫夀至八九十者世多有之夫所見僅眉睫之間而區區焉妄以論於天人之際多見其懵於道耳顧予又有感焉方君踰冠予甫成童所耳聞目見吾呉之俗視壯强時何如也自壯强至今又何如也則是年日益長而中日益不釋然也誠不若一切置之於無有夫賢不肖有當世之責者之憂也此何與我事而强取以為喜怒耶吾願自今以往與君心忘是非口忘臧否以共樂其天年豈不快哉視夫拘拘之較量不又逕庭乎哉請以是侑今日之樽酒君必欣然臨風共釂一笑而别君錫徐兄八十夀序昔者夫子之答問士葢以有恥不辱命為先而次及於孝弟若曰士莫先於守身然或無可用於世亦未得為完人也若夫人生之大本修之門内而可以達之天下者非考與弟乎彼其必信必果亦異乎儇浮懦怯者矣何至輕之若此則必之為害非小也而或昧昧焉乃謂濶畧之猶賢於恭謹斯溺其指矣予少而佻輕與其儕數為駁雜之戲及見吾君錫兄亦時遊戲其間輙笑曰此所謂謹厚者亦復為之乎然而君實不數數也自後漸壯與同硯席汨汨於應舉之文君既喜人見規亦每以補過望之於所厚善内敦其孝弟以刑於一家外修其潔亷以孚于一鄉人皆稱之為長者君之先世有若中丞㕘議二公父子相繼有勲名於時再世稱邑之巨公焉君少攻苦勤學晚以不售謝去老而為鄉祭酒人無賢不肖咸所歎羨以為不媿斯名斯禮者獨斯人而已而君顧恬然不屑也君既飲人以和然意所不可即時見於詞色表裏洞然雖其迕之者旋亦渙然以解自君移居東城相去殆三里許每一相思彼此過從必晤語移時乃别别即君與偕南予與偕東嘗至中道而返以為常或過友人飲先後至或少遲未嘗不訝而問故此豈復少年時之徵逐已哉然彼一時似興濃此一時似興澹濃所以為快意澹所以為寄情也予少於兄僅六年而君之二孫皆長於吾兒同為諸生且復追往日之好以馳於翰墨之場而兄嫂又以遐齡將觀厥成兩家後生其欲少慰於翁媪又當何如也雖然娯目前所以為慰冀日後無乃為癡吾姑與兄一笑而置之唐叔達兄以中表兄弟同執友硯席其文詳贍而出之以核其意諄懇而託之以諧想見稱觴之晨必有噴飯之樂予雖不􅈺於頌禱亦以少侑夫壺觴王慕芝先生七十夀序墅溝王氏之世嫡有仲曰慕芝先生故贈太子太保禮部尚書武英殿大學士王公之從弟也於文肅公為父行文肅公薨之九年當歲已未而年始七十六月二日其生之辰也於是君之令子將及未暑雨張筵會客娯君以笑言之樂謂余頗悉其家世來請為獻夀之文予昔未衰每歎人生百年汲汲曽未有暇夀命旣不可期而所享或豐或嗇又似有定命而非吾力所及其幸而獲享備福以及於耄耋者初亦不自覺而荏苒以老矣方其勤一生以貽於後不過曰堂而構菑而穫庶其克昌也乎而後之獲庇於前亦不過曰是父某之子大父某之孫逺祖某之裔而已計一州一邑之地四境之内某為數百年以來逺至十餘傳者有幾又族大而蕃者有幾其間幸而富夀康寧者又復有幾則宜乎若人之夀自其至親逮於姻友雖所與同里閈之人無不以為祝也祝之者如彼而若人之自喜以為幸者又可知也顧所與共娯目前不過孫曽而止其久而益逺則所不知何人耳然則君子之篤於其親苟吾族也豈以逺故遺哉遡其初固一人之身也吾以是知譜牒之於生人重矣而舉世多忽遺焉以至於無可考者何哉墅溝東瀕海故婁縣之東偏也自宋嘉定初割而建邑逮𢎞治中城東倉以防海又割而𨽻焉而王氏葢世雄其鄉可考於譜者今十餘傳矣江水東注而潮汐之吐吞天地鴻䝉沆茫之氣於是焉鍾而鉅公出焉固非偶然矣孰能譜其家世而使後之人永有考者非先生乎是舉也信不媿於前人而且以俟後之君子吾雖未獲一接先生而於是見其大焉或言先生幼起孤童弱能自立學儒之莊契佛之慈而負氣似俠慢世似達可謂能名其為人矣而未足為先生夀也彼直欲使所不知何人常念其始固一人之身也而豈尋常之人也哉予猶憶昔侍文肅公一日言聞之署州事者有訟吾族人某將下其辭一為處分吾第應之曰事所不可知其人則素長者而已窺公辭色似微不平編修君時已病困即曰事似宜悉其本末果誣也亟為白之誠如訟者言亦須為料理今日在事人見訴吾宗輙不疑其誣此不足怪也予歎以為然而公亦首肯葢公之厚於其族如此若辰玉數言允可謂審於接物矣當公父子時有言内無喜爭之宗人外無不戢之家衆其孰肯信者及夫榮盛稍謝炎凉俄變而公之同宗無不晏然信乎盛衰之際君子宜有以自持矣若先生誠尤其卓然者也今之夀筵自君之姻友而推之凡昔所厚善孰猶若平生歡乎孰為少替其初乎孰為去不復顧者乎先生儻能􅆥然接之不以一毫動其心此尤所以養夀命之源也雖古之得道而忘物者亦如是焉而已何上夀之不可幾乎徐攝山先生八十夀序攝山先生以天啟三年癸亥夀八十仲春二十六日其誕辰也吾黨之辱與厚善者圖所以侑夀觴而屬為之序予未弱冠即獲以通家兄弟從之遊君視予十年以長有聲諸生間久矣體羸而神王其為文詞汪洋自恣顧屢進屢蹶會詔下御史凡諸生之廩於學宫者皆得就試拔其尤是役也予亦往㕘焉而君竟得拔升為太學生儕輩相謂曰宜然終不售於京兆僅以貢謁選為縣令閩之永福君晚而自號曰攝山葢聞此山多藥草可採而養生所以志也其為令有古循吏風君旣不求名人亦莫為之地秩滿不得志當改官去之京師竟留友人許久之友病殁䕶其䘮還旣渡揚子遂溯江遊楚之南陲過洞庭浮沅湘蠻獠之與居然且為留誨其子使知有文字予嘗稱支道林之目澄公以季龍為海漚鳥君殆似之去數年二子念君不已仲往迎焉君於是歸復從平生故人遊然亦時時往來陽羡瀨水間流連嘉山水之區固為其門人留亦天性好遊不樂局蹐家居故也或曰君之欲採藥名山謂何而乃數數為客子遊乎又不知君何以自將老而不衰若此乎余應之曰夫數遊乃君之所以夀而康也而獨不聞户樞之不螙與且也其視都會之繁盛與蠻荆之荒邈等耳自昔學道之君子翛然而來翛然而往豈復有夷險淨穢之動其心哉惟心忘愉怫故其於土俗奉養無所不忘必曰如此而樂有不得焉則愴然以悲斯乃流俗人之戀戀耳彼所謂偷肥其體而顧近於死者也若夫先生殆可謂衣其裋褐有狐貉之温焉茹其藜藿有粱肉之美焉正惟其無不忘也而後可以養生可以長年彼不能知求贏而反以得虧求長而反以得促者何可勝數久矣先生之了然於此矣不求夀乃得夀豈與夫規規焉争得喪於尋常而中道夭閼者同乎哉君氣温而識明聞其居官幾於不罰永福之人戴之如慈母然嘗按作奸為豪衆所仄目者數輩悉置之法其人則又頌之曰信仁者之必有勇也特以苞苴竿牘之問不出於境終無赫赫名耳自君留楚予嘗邂逅閩人知其福州也因問亦知有永福令徐君者乎曰此吾鄰境也寧有不知又問為邑若何曰聞之父老二百年來第一亷善令也夫以鄰之氓猶知君而上官莫能知夫安用監司為嗟乎此時事之所以日可憂也昨歲劍南不戒至戕大臣西南苗彛輙窺戎索間嘗語及君策之曰若安民無足憂也彼擁厚貲而侈自奉必不動動即速其斃耳已而果然及春而鳥獸散西陲以寧君豈臆决而好為大言哉在南中久見之審矣葢其在事外猶若此以君之識之年可比於老成壯猷而顧使終身道路白首邱園僅有吾儕數陪杖屨而聆罄欬雖足自幸咸為慨然如予潦倒麤疎將從先生求所以鞭其後者庶幾乎息黥補劓而已瞿君八十夀序邑之西南受松江之水迤東而北入於海其故家著姓聚族而居若傅氏瞿氏黄氏皆其望也而沈為尤著起家登朝者先後多聞人而廣信太守公最後起予先君嘗師事焉其配恭人瞿也公之將赴江右邀先君與其伯子同硯席而瞿之族子亦渡江來從遊中表兄弟相得驩甚葢予方舞勺便已識面得稱通家兄弟者子受君也父曰心疇翁憐君使學為士已棄而歸農父子相繼遂以本富為一鄉所信服比沈氏困於衆嚚翁父子彌縫其闕諸囓沈者皆嚴重之無後言所為德於沈甚厚有弟幼真以諸生廩黌舍方有名而夭君痛其逝也思所以慰翁之心者課其子若孫先後補諸生而翁得優游以夀終鄉之人由是益嚴重瞿氏歲在甲子君夀躋八十矣屇季冬生日凡邑之懿親好友將往稱觴焉而屬為祝詞旣數世之交且元孫又予妺婿不可以老眊辭竊嘗謂人之生世各以其時為世重輕世治則興朝之士出而展其猷為上下賴之比其衰也即巖隠者常退而安輯其鄉閭顇者以蘇弱者以立豪奪武斷之徒靡敢以逞凡司牧者之求無曠於官也所為納約而要歸於當亦有賴焉君既閲世久更事多於人情物理之變遷輕重緩急之差數慮之而熟出之以恬故人之聽受若以石投水君之條陳若因風鼓籥上有裨於長吏下為德於小民葢賢士大夫之所不能逮也優游歲晚享遐齡而受多祉豈偶然哉以較之先公時人情彌變世態日紛所以調劑其間固非迂疎之所得而詳也人或謂君悉心勞形以圖一邑之利病而塞長吏之諮詢其利甚溥而把鋤犁者固多所未悉坐堂皇者或偶不訾省葢自壯强至今公私勞瘁常數倍他人而乃得夀康殆猶户樞之不蠧其􅒒然疲役乃其所以為夀者歟嗟夫修短之數豈不懸之於天惟夫不諉其天者於偶然而樂盡其人者為固然旣醉之備五福要歸於攸好德而已夫呼吸吐納而夀力田服穡而夀夀等耳非人主之勢能錫之而攸好德者之宜有此錫也區區以攝生言者陋矣學古緒言巻五
