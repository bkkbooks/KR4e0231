body:
  text: 學古緒言巻七明婁堅撰夀序十一首楊貞母顧氏九十夀序友人楊之屏汝戢自太倉過予請為文以夀其從叔祖母顧孺人先是歲丁酉予嘗賦詩為孺人八十夀今忽已復十年予拙且衰窮於世久矣其姓名既不足為交遊光寵而言語朴陋又無環瑋贍麗之詞可以稱道盛美者則辭不敢為而汝戢固以請且曰凡實之不足者必求侈於文於是言之者多諛辭而當之者有媿色若吾太孺人之為婦而貞為母而慈聞於朝廷之上而信於閭里之人已非一日矣固不必如世俗之侈而張之也子為頌禱之詞而已予既辭不獲竊以謂孺人之歸於楊也年僅二十有八而寡其長子以髫齔孤次猶未離乳哺而季方在姙也又數年而舅姑相繼亡葢為婦之日短而以母儀稱於楊之族姻者且五十餘年矣予未嘗識其伯仲而獲與季交見其逡逡退讓可因以知其二昆也見三子者之克自樹立不墜其先可以知孺人之撫而教之者不媿於丈夫也以煢煢一婦人茹荼集蓼以持門户而卒保其家以成就其子豈不誠賢已哉計孺人之辛勤憂念朝夕不遑寧處者累二十餘年而後得安其子之養其非尋常之所能堪何如也及三子旣受室自含飴弄孫之日至於今又三十年所以自慰其伶俜孤苦者何如也幸母子之相依瞻堂構之無圮追思往時之拮据以卒有今日如痛定思痛其愴焉以悲徬徨焉以不能釋然者又何如也雖然孺人之不幸以寡譬之卉木始華或風吹雪壓而不免於摧折者此卒然而不可知也乃孺人以壯盛之年矢志自將使死者復生而生者不愧孺人能自必之也若夫藐焉三孤得不夭殤以迄於成長長而其材皆足以自立娯侍孺人於膝下能必之乎當孺人之寡居年未三十也迨今六十年間既克成其子又獲以桑榆之景膺表宅之光寵躋耋耄而望期頤又可必之乎葢天之鍾祥於孺人已厚其稟矣而顧奪其所天雖若不可知而卒以賢明貞順食報於子孫以稱於里之人則夫天人之際亦若有黙定而可期者矣即以終歲百罹非人所堪視谷風之方舟泳游何如哉髠彼兩髦實維我儀之死矢靡他太孺人克之有馮有翼有孝有德以引以翼孺人之子若孫勉之俾爾昌而大俾爾耆而艾百有千歲眉夀靡有害孺人與其子若孫終享之以是為頌禱其可乎雖予言之不文不猶賢於侈而張之者乎是為序侯太母張氏曁母陳氏雙夀序代獻歲發春嘉定卓明府走書幣來里門請為侯給事太母張洎母氏陳兩夫人夀序葢姑已中夀而婦亦老矣其設帨之辰皆在去年冬會給事方諏日襄事故其上夀也緩卓君之言曰侯氏詩書之業自叅政公起家以來凡四世矣四方之鋪張其辭以侑夀觴者率稱其代有聞人後將益昌二母皆夀而康子孫滿前享有備福而已顧所以致此者豈獨夫子能及志未變而閑之亦曰其無攸遂者咸以順則助耳不然東呉之俗競以侈靡相髙有如婦子嘻嘻一失其節至於愛克厥威欲母慈而婦聽豈可得哉予聞而韙之是足為二母慶矣而奚以贅為則請言風氣之殊今昔之變以頌而禱焉庶幾卓君之意或亦給事之内致其孝誠而外效其謀猷者乎葢吾越之去呉也僅數日程而近而嘉定又最東下邑俗故樸厚其世家大族好以禮讓相先尤知敬重賢士雖吾越人往往去為經師久而益親比聞人言俗且漸入於浮薄固習尚稍移能無望在事者一注意風俗以為之倡乎始予得卓君於禮闈一見知其温文而警敏也比謁選得嘉定令以行予聞之喜曰彼俗之漸敝其有瘳乎抑又嘗聞之彼之賢士大夫頗能自好不沒沒以妨賢有司之政則又私以為卓君賀夫所謂今昔之風氣果孰為之哉譬之穿池淤之則潢汙不可以濯澄之則清泠雖以鑑可也譬如為墉其薄且疏也傾可俟已厚為之基而捄之度之築之削之雖數十年如昨日有如為邦者以此厚其下而在家者以此宜其人可以夀國可以寧親斯言也雖謂頌也而實規可焉雖謂規也而實禱可焉葢賢者之相與以有成如此今給事官省垣其所論列固吾君吾相所取𠂻也然而海内之人上自卿大夫下至布衣寒士咸得以評議隨其後則其所自效於時以為其親榮者必有以處此矣今天下承平日久中外恬然以苟安為事又或囂陵詬誶以求快其私而身名亦且隨之若此人者獨無父母之髙年多福以享其榮盛歟亦且皇皇焉懼一失足以貽其憂否耶吾固知給事賢者必不苟同於流俗而乃以此為兩夫人頌禱儻可謂愛其人則必稱其親之所望於子若孫者以進焉亦君子之用心也勅封太安人錢母顧氏七十夀序自予甫壯即知海虞有錢景行先生以績學工文辭著稱而未之識也荏苒向衰識受之於崑山客舍見其在衆中穆然端凝竊私與友人歎其賢一日邂逅先生旣前揖客有問其年則應曰吾與太倉王冏伯嘉定婁子柔皆同年生於是復相向而揖葢一覿面而知其伉直爽亮超然流俗之表惜乎遇之晚也比受之擢甲科官翰林先生年未六十也而遽不逮於祿養葢又一紀歲在癸亥而太安人受勅封年七十老矣於歲之春受之乞假歸省比秋八月舉一男太安人撫而樂之眠食有加其誕辰在冬十一月予友陸君孟鳧何君季穆過予而致同人之意猥以祝辭見屬予聞贈公幼孤母卞夫人撫之朂之迄於有聞而太安人始來為婦即能嚴事其姑且以儉勤相夫子及見受之學成而身享歲晚之榮是足為太安人夀乎否也葢在受之他日之效於本朝者矣士當世治即稱古昔修文章以潤太平致其君比於三代之隆上也其次則為國家補偏救弊植立其骨幹而振竦其精神使不至於惰偷亦足尚已若夫主少國疑士習骫骳人騖於利事乖其紀朋則淫德則比賞濫而罰廢邊鄙聳而將吏弛彼槁項黄馘終老山林者無論也幸而在事宜有以自樹而人趨人諾袖手旁觀已乎葢自道喪文敝士鮮知有通經學古者而争騖為虚恢僥倖一日之遇偭䂓矩而繡鞶帨其流彌甚莫或拯之以受之髙才雄文冠冕一時而名在石渠司存宫允進可以獻丹扆之箴退可以挽波流之靡當斯時也而能不激不隨一意以明道術端步趨為凖的非獨後生之前驅實亦良士之實用也經文緯武扶夏剪􅉓將不在兹乎不然雖位至三公慶延萬石有不足為太安人榮者矣予又竊有感焉士所為用於世者吾親之身也其長養成就嘉奬拔擢以榮其親者主上之賜也然則不竭忠雖欲榮親無由已不克孝雖欲立身揚名無由已彼其纍纍若若䝉厚寵而陟崇階秪足為世所詬詈於移孝為忠何有哉語有之一夫先登萬人屬目一人善射百夫決拾於今日三事大夫而求一先登善射闡繹聖賢人之緒即思行聖賢人之道者非受之而誰此則予所以為太安人祝者也侯母陳氏七十夀序余友侯君得一以行人三奉使其初南登衡岳最後踰嶺嶠觀於海而還人皆謂君此壯遊也而意獨惘惘於不遑將母嘗以秩滿請於朝得移贈先公為修職郎如其官而未及母氏也去年冬還朝會伯子以秋試冠其經遂攜以從自呉門徂北三千里而遥士大夫之遇於塗者問君父子知夫人之夀康孰不咨嗟歎羨以為賀也今年夏君方需次六省而孟秋八日為母夫人七十生辰於是邑之人士咸撰辭登堂因君介子而進獻夀之觴焉予惟侯氏家邑東南數千里外種德於農而發祥於士大叅公晚年登第由郎署改御史臺已而副臬叅藩皆鬱有名實修職君僅以貢升於禮部給事雖早能自奮然頗搰搰於一第能無悵然於修職之不及見乎今夫人且又見其孫矣積之厚發之遲澤彌深而名彌著豈不休哉雖然苟徒以是為祝詞不過流俗人之所艷羡未可謂知言之要也昔嘗竊聞之凡夫人之相其夫子孝養尊章念風雨之如晦而黽勉於有無者更僕不能詳也其大者門以内無違言門以外無失禮訓其後之人能以勞為愛其德方其識逺務急其情不靡靡於文圖其難不沒沒於易若此者求之賢士大夫亦希矣何意閨閣之中乃有非苟知之實允蹈之者哉夫以夫人之賢達如是而家之長幼卑尊莫不漸濡稟仰肅肅焉雍雍焉夫人之樂其子若孫而優游於多福何如也抑亦天之使夫人難老而益以錫侯氏之𦙍祚乎是可為頌乎否耶若夫給事之孝於其親者葢自今日始矣昔賢之論謂天下事惟宰相得行之諌官得言之而今者任事大臣反若仰鼻息於言路何也且其言而效則身名俱榮其不效不過一去以塞責而朝廷之威重將士之挫衂疆圉之戎索若於彼無與焉則又何歟自昔官稱守言稱責謂將有以責之也凡今天下所跂踵而望之旣得之則揚揚有矜色者亦嘗反而思其責乎夫子曰勿欺也而犯之夫欺而犯本實先撥矣然犯亦未易言也人主威福在御一震怒其臣希有不戰栗失措者竊以為欲觀事君之不欺又當於犯顔先之傳曰孝者所以事君也豈非謂不能孝其親者固萬無忠君之理乎吾又以為欲觀人子之孝其必有騐於忠君之節矣夫義之無所逃命之無可解等耳况乎君之於臣喜有賞怒有刑如是焉而不忠謂能孝於其親吾不信也請又以是為給事贈予與姻友龔行之皆獲交其四世猶憶踰冠即肩隨修職君同文社及見給事髪􅆴􅆴補諸生而大叅公之歸田也毎見必慰勞其困頓且望其猶有一日之遇葢眷眷也今給事方進用而吾兩人者皆不遇以老猥以齒長執筆而末復綢繆其語以見夫頌不忘規者葢深念疇昔之交宜不同於流俗如此也龔母朱氏七十夀序予自束髪所與交者始皆以才氣相慕愛至於彌久而益信必表裏洞然清明淳篤之君子也若其外峻整而中􅆥易知與不知皆稱為賢者莫如吾行之非獨予云爾凡獲與行之交者於予之言如出一口也行之之最稱於人者事其母朱太孺人備極色養而兄弟友愛無間言龔氏自邑未建時已從郡城東徙為黄姑灣里人而朱之先有貴為桂林宣撫使者嘗置墓田於邑東南頓悟寺之傍子孫至今能守之葢皆境内之望族也予幼即從振軒先生受書長於行之一歲數入拜太孺人於牀下今追思之如一日耳忽忽不自意遽為五十許人而太孺人安行之兄弟之養葢其嫠居亦已二十年矣閨門之内雍雍愉愉以享有康彊夀考之福豈易得哉或曰行之經明行修而名未離於膠序親未霑於禄養於其中必有闕焉以行之之闕如知太孺人之容有不樂也解之曰夫此乃世俗人之所以養耳假令文不如行之行不如行之乃能徼一日之倖以為親榮兹固流俗之所共艷慕也而有道之士必心疑而竊笑之微獨笑之且以為詬病焉然則行之雖未遇其中必有所自得矣筆耕亦足以為養而豈以是動心乎哉或又曰父母之望於子者亦欲使有聞於世而身享其榮耳雖行之能自信太孺人之未能釋然不可知也而行之能勿介介乎又解之曰有行之以為之子可以知太孺人矣雖䄈褐之温猶狐貉也雖菜菽之飽猶粱肉也而况於輕暖甘脆之奉之不乏乎哉然予竊以為如行之者使其早得志於時功名顯於當世利澤及於斯人其賢於世之苟富貴而私其身圖者若黒白分焉所以慰太孺人者又何如哉行之姑守其道不懈於其志以俟焉豈終窮者哉其遇於時不逺矣顧以予之衰廢少獲遊於先師之門長而幸不為行之所棄晚又申之以婚姻今兹太孺人七十生辰欲為之辭以頌且禱而懼吾言之不能文也友人沈廷望廷和皆嘗遣其子師事行之亦以夀序見屬因論行之家庭之樂可無藉於遇合而終有望於行之之遭以為太孺人開八袠之榮也是為序陳貞母呉氏六十夀序吾呉之俗自年六十以上率十年而一祝則必侈為文辭以侑萬年之觴雖閨門之内其賢素不著於外猶必序其家世想像其所以宜於家者以頌且禱焉而其辭多托於縉紳先生至或取辦於庸妄而受之者猶以為榮今吾姻家馬君伯清與其子元調巽甫圖所以夀貞母呉孺人而囑予為序予賤且貧其言語又不能工而不辭為之者以謂能得貞母之實不必於侈而張之假而托之而其榮名信於里之人者庶幾於頌禱之善也貞母年二十而歸於陳歸陳七年而不幸以寡撫其子而教之以醇謹稱於鄉里而家日以起葢又三十餘年閒則課其童僕必以身為師惟儉惟勤以無忘其初可謂賢也已昔者孔子刪詩風始二南實以閨門王化所自始惟昔先王之盛非獨人倫之教明於庠序而其婦人女子皆有傅姆之助至於周衰而魯敬姜九子母師之流其所以教於家者猶古女氏之遺也今世士大夫已不篤於學况其閨内乎貴富之家既不知有女工以日流於淫侈惟貧不能自贍者乃始力作以謀其生然如此人者率目不知書至於從一之義猶時有不媿於古而足以風勵於世以述於後者葢其天性然也若貞母之為婦為母何如哉且吾聞貞母薄膏粱紈綺之奉而自力於紡織意所以訓其子孫必有若幅畫均軸之喻者而特不可得聞耳如令少而知書又有傅姆者為之助豈必讓於古之人哉則雖生於貴盛之家可也今陳氏詩書之澤將日逺矣有貞母以為之内主庶幾乎仲尼所謂季氏之婦不淫矣自今而往年彌髙而德彌劭所以食其報於子孫以教於陳氏之女若婦者詎有涯哉予與貞母之子皆為馬氏婚家而巽甫又從予遊固予所謂能得其實者也然吾又聞貞母深信因果其事神甚䖍不識今之為貞母夀者其亦有以敬而能逺慈而不殺之言進者乎巽甫識之其以吾前所稱為貞母頌以後所稱為貞母禱可乎否也是為序李母徐氏七十夀序李伯子茂初與其叔長蘅皆翛然有夷曠之致又能發為泠然清逺之文而跧伏田里以詩書為􅎵􅔱操履為襟裾娯侍其母徐夫人於暮齒而夫人少知書晚復歸依佛氏儉素自將憐其子之不以菲廢禮也而安焉閨門之内孝慈友愛之風藹如也是歲暮春上已屇夫人七十生辰吾黨之獲交其子若孫者將往獻萬夀之觴而屬為之辭以侑予嘗竊嘆士人之所期誠大且逺矣顧其得吾志與不得吾志似不在我若古之人葢有以王事不遑將其父母者豈若後世之徒以是為親榮哉然而立身揚名人子以養志焉非貴盛之足榮而身名俱泰乃其所以養也故其得失之際盛衰之感亦恒情之所不能釋然者李氏當石桐先生時身見其伯兄父子相繼登朝榮盛矣其身之不遇名之不彰能無憾乎及夫仲子茂才以進士膺庶常之選非獨父母兄弟之樂之也塗之人莫不歎羡焉而又不幸以夭此在學道之君子猶能以天命自解耳其若閨房之愛母子之至痛何然吾聞夫人每於痛定之餘念先生已衰矣則以閒潔其尊罍簠簋以稱遂親知之過從者如昨也朂茂初兄弟之自力於學問以慰二親者猶惓惓也既而長蘅薦於鄉少慰矣再進再蹶嘗中塗得疾火上炎終夜不寐懼貽母氏憂亟返棹而夫人第曰兒幸無恙足慰我矣彼身外曷足戀戀乎夫能不以一朝之名而易其天性之樂雖士人多有媿之者矣比見長蘅體益强神益王意思豁然其所以慰母夫人者行可必也子有以養母之志而母亦樂其子之令聞豈猶夫流俗之光寵而已哉予又聞夫人之先公賢而有文其送女也授之書娓娓殆比於女誡而母族又琅邪王氏故雖少年時已能撫茂初茂才多有恩勤及受室皆崑山士族子凡以夫人之故耳今者伯子以六十之年率其兄弟子姪擎跽趨走於夀母之前備極膝下承顔之歡吾又以知李氏之世澤未有艾也即言之不文儻亦可以侑一觴乎若夫茂初兄弟所為以泠然之音寫翛然之致而登歌於夀筵者必有發乎情止乎禮義者矣竊願與有聞焉朱母鄒氏七十夀序朱君元伯以歲丙午舉於鄉纔踰冠耳既數上春官連不得志於有司荏苒遂逾一紀常與其弟欽仲慨然思一旦之遇以禄養其親而先公萬松君竟不能待也頃者方禫除適當母孺人七十生辰於是遊其父子間者長幼若而人將往獻萬夀之觴而屬予為之序憶予甫成人獲侍小松先生已能知其為賢者誦讀之暇輒往從之遊環堵之室竹樹在庭圖書在几顧予與言言皆𤣥逺當是時先生貧而嗜酒萬松徒以授經為養而先生常怡然有自得之色非孺人之孝且勤敏何以承迎其意哉予以是知孺人之能為婦也既而元伯兄弟稍長嚮學同時補諸生未幾元伯脱頴以去而欽仲益發憤足不出户外將有以慰其親日可俟已丙辰春元伯北歸孺人數攬涕而慰解之且曰汝父病未革時數言兒如是已能自立矣吾豈有過望哉顧吾鄉土瘠而俗汰其君子甘於豢而小人競於嚚吾所善某某兒師表也其諮而後行乎他無可暱就者兒今悼汝父第一一稟其遺訓則庶幾乎養志焉毋過自傷為也葢元伯嘗以是語予予又以知孺人之能為母也予窮於世先君之歿老而傳矣吾母又及於大耋不為不夀然自慙無以慰吾二親者非獨以貧不能養也正以駑不自力即為人所輕愚不適時即為俗所忌長以此貽羞於地下矣故於孺人母子獨有感焉葢親之念其子同而子之所以慰其親者有不能自必故也夫以元伯兄弟而為孺人子目前可以為娯而其後正未可量豈非夀母之所樂哉徐徐于于以享有百年生人之慶無以加於此矣雖然當小松先生時人之重輕先生乃其人自為重輕也於先生何與其在今日已有不同於昔者令元伯兄弟一旦得志於時或求多焉或求昵焉苟無以望其腹則不嗛無以覆其瑕則不終吾知孺人之必復有以詔也試以是質之而進一觴焉其可乎李貞母沈氏六十夀序予友李翰林茂才娶於崑山沈氏其先嘗三代連登進士第邑之望族也當茂才不幸而早夭孺人年未三十寡居茹荼上事翁媪下撫孤兒辛勤之日久矣又能朂其子勤學問工文章少以諸生有名凡與之遊處莫不稱其才敏接武而與日可俟也維歲仲春屇孺人六十生辰里中之懿親執友將捧觴為孺人夀謂予葢三世交而其年已老當不為靡詞庶可播於里閭也而以夀序見屬其何敢辭葢人有讀列女傳而獻疑者曰婦順即所以為母儀耳而奚以區别為予解之曰此各就所傳於古者而列之冀夫人之企羨者亦各就所遭而奉以為訓耳假令茂才得永年必以卿相顯名於時而孺人約束其閫内以佐之簡婢僕慎扃鑰人必當其用用必嚴其防當不啻如今日徒以勤苦為也方其為婦則修婦順及其為母則肅母儀貴盛與食貧等耳豈有加哉予嚮悉石桐先生善與人交負氣慷慨傾肝膽以相親潔􅎵􅔱以為樂陳鼎彜閲圖書繪畫以為翫以娯其暇日尤喜與同好者共之孺人偕其妯娌黽勉以奉其歡樂其天年豈有異茂才之貴盛而生存哉獨處勢有贍不贍耳吾固知孺人之孝養其獲報於子若孫可計日而俟矣嘗試與諸君子億之當茂才少時年甫十三呉興董宗伯聞其秀頴輒招致之日與諸名士同硯席已華有文名既而中第與庶常之選其逡逡退讓猶昨也而奪之年命也其垂裕後人而復以文章顯名當世詎不可必乎微獨孺人之食報而已將子子孫孫弗替引之以是為孺人夀可不可也竊又思之心以境為樂境以遇為緣何論得失固難期即戚欣亦有分必如此而樂樂在外物不如此而亦樂樂在内心若孺人之甘淡泊而歴辛勤吾儕既熟聞之又獲與其弟和甫交尤悉其少而婉娩迨長而不怠益勤夫女而淑婦而順加之以母而慈以德若此福履綏之詎有涯哉輒書之以授緇仲為夀觴侑陳母張氏夀序予友宣君季嘉為予言陳母張氏之賢請為七十夀序於設帨之辰頌而祝焉其稱曰陳葢邑之雙塘里人也母之來歸以冢婦相餘溪翁躬其勞既而與二介婦均其分父歿無子於貲産無所取悉歸之為後者及仲子當為叔父後知其舅意有屬卒成夫子之讓焉翁喜為豪毎勸之加慎朂三子使學為士皆見其成立葢為女為婦為母多有足述者予以為昔者聖王之化自身而刑家始於房闥而風行於海内非獨士大夫化之雖閭閻之女婦皆能以禮自防而勉其君子以正嫡庶之間至或勞而無怨過而知悔者無他則禮教先之也自其少時已教之婉娩聽從矣及乎為婦雖一貨一器一假一與靡有私焉以示義無専制况其大者乎嗟夫禮教之廢至今日而蕩然矣情欲汨之習俗縻之自得號為士人者然且以㨗得貴富為有才還顧亷恥為小節尚安論閭巷小夫又况於門内之女婦哉詩有之無非無儀惟酒食是議無父母詒罹而易之詞亦曰無攸遂在中饋女子惟無所遂也而後其父母得免於憂雖儀亦遂之為也而能勿憂乎此父母之心也惟恐其専而已若夫威儀棣棣不可選也柏舟以自多焉既沮我德賈用不售谷風以自傷焉仲氏任只其心塞淵終温且惠淑慎其身燕燕以送歸焉孰謂婦人女子而獨無儀也哉故若陳氏母者可謂女而士行矣以其子之孝又獲交季嘉諸君之賢而咸為之祝人之所願天必從之此好德而錫福之㫖也令妻夀母優游百齡而享有遐福夫非天被之祿也歟既以語季嘉退而書之以為序陳任齋先生夀詩序侯官陳侯再為令南越有聲及莅嘉定既期月而太公任齋先生始來侯曰親在逺吾食不甘味寢不安席然而不敢以亟也邑於呉土瘠民貧賦重訟繁未易以治向吾未知所以為斯邑者需之且習其俗而和其民而後及於就養比太公之來也適三呉淫雨踰五旬乃止又風自西南駕湖水東下海之潮汐迎與俱溢横所漂沒二麥無秋春種靡遺侯乃徧謁上官為民請命還發儲庤通市糴為賑饑弭盜之備蒿目疚心未有已也或謂侯且無以奉寧太公雖太公亦必有不樂焉於是諸生某聞而抗言曰是何意賢者之淺乎夫士自束髪治經經之言皆教人修其身以用於世故其為世用也施澤為榮屯膏為辱非獨賢令則然其親而賢也意豈異乎哉故孔子謂士窮於世則啜菽飲水盡其歡而亦足以為孝明乎在此而不在彼也如侯之賢實自太公發之其父子之間必不同於世之君子審矣且天災時有正賴賢人君子為民之庇耳比者嗸嗸數百萬齒伊誰之責哉吾意侯朝出而視事太公必屬之曰苟力可為爾務盡其心雖劬吾不爾恤也夕入而侍側太公必迎問曰苟事有疑吾且為若殫其慮雖老爾毋吾隠也爾之能勤民則吾食於此土而安焉他日以爾故受錫命於朝廷而榮焉計自今以往凡所以圖安斯人者譬父母之為子謀當愈於子之自為謀耳若夫積資叙遷流俗之所以榮其親也偷安歲月尋常之所以愛其子也而豈所論於賢者哉某於諸生中受知特深頗能言其父子之意故聞之者莫不以為知言昔晉袁甫以好學才辨知名然不願居臺閣職而請為劇縣自效葢君子之欲有所表見於世如此今嘉定之黠者逋賦嚚者健訟二者卒難得其要領而重之以年饑於以觀侯之政必此時矣某賤且魯竊嘗鄙陽鱎之迎餌乃侯不以為迂且簡顧加禮焉其將遂使敝邑為單父乎太公今年七十有二邑之喜其來而頌盛德祝萬夀者已焜煌巻軸矣而博士先生與賢大夫士復盛為歌詩以進焉猥屬以前之所論序之篇首學古緒言巻七
