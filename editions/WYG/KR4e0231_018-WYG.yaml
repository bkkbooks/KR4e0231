body:
  text: 學古緒言巻十八明婁堅撰祭文十七首祭張太淑人文嗚呼子之於親如影隨形所以養志立身揚名有如坎壈莫展平生顦瘁相依愴難為情資適逢世養以鼎烹岵屺緬懷或妨合并孰是宦達為親遺榮孰是夀康慰子寢興耋也未衰耆也如嬰五福云備百行彌烝剖甘而分列孫與曾以勞為訓旣明且清長君之仕亷敬有聲晉叅藩牧母留不行還以督漕過家奉寧臬使之擢旣下於廷再疏終養肝肺畢傾天髙聽卑有叩必譍帝若曰俞嘉爾孝誠爾後起家予憲其澄孝以事君舍此孰登殆又十年以珍從軿然後厭世若蛻而瞑某等獲以鄉曲飫聞德馨憶自壮歲迄今頺齡人言門内如弓受檠僮客無譁紈綺不矜有避奚攫有讓奚争室唯晝績鉶絶宵羮以此為訓繼繼承承夀母之施施於雲仍酹而以告髣髴來聆嗚呼尚饗祭殷宜人李氏文邑之達者久詘晚伸曰職方君君之好客以文醉酒自其食貧旣㫖且多無使罍恥實維宜人昔在陋巷下帷一室中堂延賓其又數楹榱桷接連梱内之垣客至為具咄嗟而辦聲不外聞花月晶熒風雨淒清飲必夜分粟儲於缾酒湛於罇佐以炙燔簪珥是脱井臼是操不顰以呻夫子之貴年已服政始霑朝恩夷陵政清助成其亷靡求家温職方要地外内斬然賄不及閽歸自京師庋置冠帔依然綦巾有女而夭窈窕之求用啓後昆食指稍增貧猶寒士不辭辛勤少而拮据逮老不渝貴賤曷論令妻夀母在昔何戚在今何欣北􅑴黄河南浮長江還老閨門逾六望七白頭偕老寵賁絲綸漆園鼓盆可無憾矣言返其真某等交於職方或後或先情好維均毎煩中饋謔浪歌呼幾歴冬春昔之童稚今皆壯强況於等倫宜人之歿感念昔遊愴焉傷魂職方道廣有容無拒論議日新吾儕頑鄙才不能逮秪以道親巨源之婦竊視墉穿復何所云今其已矣歿而有知一聆斯言祭王先生配某孺人文凡生人之福澤視所履而可考然或收名於人間或縱心於物表故雖食貧而不為癯無年而不為夭若夫閨門之良實惟窈窕人制義矣惟從一之足寳我無儀矣等厥聲於若鷕自非集多福以優游必且目彼蒼其幽眇嘅昔賢擬之於分途謂夫合焉者之固少惟其責報於目前如調饑之求飽所以一不合而紛呶是惡知夫天道盍徐俟於將來信昭昭其可保伊孺人之婉嫕始綦巾而衣縞紛拮据於育鞠譬辛苦於集蓼使夫子之畢力於斯文不以謀生而繚繞已令子之岐嶷露頭角於幼小勤枲麻於夜分聽誦習之了了倏明嫭之摧殘沈夜臺之無曉曠窀穸於久逺庶獲申夫烏鳥旣一命之自天痛呼天而有摽脱冠佩於南曹歸而視其宅兆得日時之具良適司至兮伯趙竭附棺之信誠曾莫解於臨穴之懆懆惟小子之辱在門牆邈師承之難紹懷梱内之士行怨所遭其顛倒乃今知榮瘁之何常貴㝠心於本標陳生芻於祖筵望飄飄之丹旐愧陳詞兮穢蕪不足以罄夫人之美好祭侯太夫人文天之生人其施各異赫然榮觀或不永世亦或長年貧病交累其間幾何數者畢遂於唯夫人母以子貴旣夀而康靡所不備匪天有私乃德之致維我孝宗德澤如春在漢為文在宋則仁民之庇賴歲將百旬夫人之生及兹昌辰柔德婉嫕嬪於德門篤生觀察慈訓實勤雖則晚達大播厥聲敭歴内外激濁揚清朱輪繡軛所至將迎昔歲叅藩封章是膺繼鎮荆襄歲月再更斑衣之樂象服之榮況復諸孫玉樹階庭吁嗟夫人目可瞑矣某也通家稚愚無似辱觀察公猶子之視葢念亡者以及其子某託末契亦不余鄙先君之喪緘辭以誄殆數百言言言雪涕維太夫人實大母行神明不衰眠食如壯有來自南忽傳彫喪疇生熙朝疇啟賢嗣疇萃百順疇壽期頤崇酒於觴侑之以詞靈兮歸來庶或聽之祭張淑人文吁嗟乎淑人之婉嫕佐學殖於鷄鳴垂三十而之官溯大江以揚舲厯湘郢之二州賁章服以瓊瑩庋巾箱而弗御仍布衣之釵荆已進秩於西曹欣為德兮祥刑信獄貸兮非寶樂夫子之明清由守郡而再遷屢濯乎彭蠡之孤撐瞻慈顔之在逺悵歲月之崢嶸遂乞身而娯侍慰戲綵於頹齡荷朝命之俯俞遲長憲於陳情奉晨昏兮歲晚更迭進兮珍烹從後園之板輿雙垂白兮却行又數年而違養乍􅎭除而驟零雖所享之非饒在物理兮已贏撫諸孫兮十餘人又芽茁乎寜馨亮歿存兮定命兹貞順之所慿去夫子而彳亍陟泬漻之珠庭倘焄蒿其猶接何遽隔乎幽暝蒸蕙肴兮奠桂酒魂髣髴其來聆嗚呼尚饗祭陳母文嗚呼子之榮親實惟祿養雖或素封一命為上矧於儒生孰甘自放藿食藜羮能不悽愴人之有子授以詩書謂當奮飛驟致亨衢赫然榮觀考翼攸圖曾是房闥視同土苴我友陳仲少而攻文含英茹華振厥芳芬將展健翮干霄薄雲夢適帝所神語諄諄爾求多福其洽隱淪覺而占之以白二親設貴而促孰與長貧兒之沒沒桂伐膏焚父曰俞哉盍行爾意母曰亟哉爾勿再計脱其逢衣衣彼芰製菽水之懽今十餘歲旣不求仕其學彌邃朋來自逺奔走書幣大公樂之入詫閫内母亦慨然謂賢冠帔撫子而言丘園爾賁我榮孔多所飽仁義使爾若苕朝榮夕悴豈如歲寒松柏凌厲維仲之賢母以不匱維母之慈仲獲自遂方圖百年若曾養志羸疾纒綿忽焉厭世嗚呼哀哉母始來歸嗣執巾罍夫子壯年再茁蘭芝少而病脾罕御肉糜不勝胃寒時釂一巵春首寒凝沴氣乗羸一卧累旬醫藥莫治六甲之周不及者期哀哀二子雞骨崩摧白髪衰翁飲泣齊眉嗚呼哀哉某等遊於令子或弟或兄臭味則同愧其才名聞母之疾心焉怦怦逮於承訃不覺沾纓匍匐陳詞薦以殽蒸所知母心能遺世榮靈乎聽之一舉我觥嗚呼哀哉尚饗祭宣母沈孺人文嗚呼不肖哭母旣􅎭且除訃來自東妺哭其姑先妣之耋有賀在閭自春及秋百日而徂孺人今夏享年與俱其後四月奄棄諸孤兩家奉母以夀為娯洎乎遘閔亦畧相如所不同者吾母未瘉眠食差安利於走趨孺人久病臥起須扶若不肖者獨身枝梧況艱於嗣晚乃抱鶵孺人之子凡四丈夫諸孫森然蘭茁瓊敷幸而夀康顧後多虞不幸沈痼形顇神愉彼此較量何能無殊至於宜家族姻咸孚為婦為母克有令譽女也士行殆儷其模吾衰且駑窀穸亟圖慰我考妣奠此幽墟寧有多賢匪亟而徐時日之良其不躊蹰迎告夫子後人所諏音苴凡此在殯各有寧居爰陳斯言以侑清酤菲不廢禮庶其鑒予尚饗祭何配凌孺人文惟靈毓慶德門作配儒者以授易名如中山觟備順與慈有莊無冶娯侍尊章茂膺純嘏姑婦白頭宵燈同灺行則珍從依依膝下歿踰祥矣悲猶昨也曽未及􅎭索焉以寡嗚呼哀哉人謂夫子淹雅通方懷瑾莫售有識所傷文子文孫麗藻煌煌譬猶能稼而穡未償日月以須未幾竟亡嗚呼養何必禄腥聞非薌榮不在勢惡稔為殃豈如逡逡閭里所臧燕及門内樂夀且康頃者西歸潮迅㠶張馳書得報乃以遭喪云見夫子喪冠縗裳嗚呼哀哉孺人之終無疾而逝旣靧旣櫛骨肉環侍合掌西方㝠若坐寐悲戀則㤀殆於脱屣吾儕之交辱知三世長公之廣令子之粹趾美惟孫其器犀利久已醉心匪伊交臂具聞音徽庶幾錫類旣為鴻妻其又奚喟崇酒於觴告而以酹髣髴雲軿從空來蔇嗚呼尚饗祭龔大母文於戲昔歲辛亥月宿於斗爰遣弱女為元孫婦言登其堂入而拜母温然色詞慰勞孔厚何圖昏姻維耦維舊側聆德音拱立以久還語室人宜康而夀女之歸寜夜侍座右太母之憐奚翅出口憶始垂髫獲在師門歲時問訊常值朝暾母起撫我捉衿與言愛子相攜視猶弟昆五十年來感愴歿存昔之苕華化為陳根吾顔日削有鬢若髠矧於身外又何足論世貴碔砆乃棄璵璠長君學殖篤於本源其訓後生以身為藩未遇知者栖遲林樊維菽與水盡歡晨昏何以佐之亦有炙燔子曰家貧養母則那母曰子才吾榮已多方期百年樂此天和漸見諸孫自奮觀摩吾甥英英文筆懸河髙桅大艑浪蹙盤渦母不能待倐隨逝波嗚呼哀哉豈無鼎食鼓鐘於前祿之豐矣等於聚羶豈無冠帔雜珮珠蠙躬之華矣每以心㾓縞衣疏食歸依金仙含笑往生彼有大年某辱門牆繼以姻連相知之深莫如我先維孝友慈一門備焉如是足矣莫問於天嗚呼尚饗祭宣大母文嗚呼生年之永幾於大耋詩稱難老相其良人齊德與齒尤世所少令子克家堂構聿新先宗是紹嶷嶷三孫俱露頭角將振其藻吁可瞑矣是為厭世遊於物表母始垂壯一病傷脾恃粥焉飽四十餘年有儉而勤無擗而摽豈非天乎夀考且寧長我乳抱惟予季妹為從子婦覩鬒及皓每聞誦言誰無室家希此翁媪潘楊之睦元孫委禽復託姻好今兹孟陬以弱息嬪羞厥栗棗方圖晨昬問燠與寒辨鱻與薧歡顔幾何顰呻繼之易綵以縞嗚呼哀哉女之穉愚内則未閑念此懆懆雞鳴交儆實勤話言比於荼蓼長恐隨俗浸潭華靡予豈能保禮始閨門謹於燕私弓擏箭矯苟不能然以妄為常水濡火燎母所睠懷吉凶由人辨之在蚤敬陳斯詞爰有藻蘋以侑清醥靈乎聽之庻其居歆響像瞟眇嗚呼尚饗祭歸太孺人文嗚呼人子所難祿逮其親幸而遭時違昏與晨陟屺之感甚於食貧去其里閈逺道侁侁母子眷戀能不含辛如太孺人三子逡逡長君登朝寵賁絲綸當其使還星軺在門母安其鄉子不能飱謂其友生我之駿奔庶幾獲請出擁朱輪母曰無然蒙國厚恩惟有補衮爾力是陳兄也養志弟服其勤夀母康彊不顰以呻維仲維季不减元昆就列幾何復使宗藩提抱呱呱裹以佩巾慈顔有喜撫此麒麟秩以名峻卿寺嶙峋子且下夀母踰八旬歡焉侍奉疢疾俄臻生榮其養疾視其袢天假之合以慰歿存是曰仙遊指窮於薪異彼沈綿壑舟永淪況聞清齋久斷腥葷行歸安養逺離垢氛旣備者福不昩者因嗚呼尚饗祭曹配王孺人文嗚呼維州著姓曹與王侔北自海虞西分古婁是通婚姻情好綢繆孺人之歸内則孔修事其尊嫜色愉以柔琴瑟初調如漆膠投旣長令子俯仰優游屏居一室爰謝紛糺嶷嶷稚孫露角與頭弱不好弄學為箕裘母所驕憐失顰與愁俄抱沈疴有加無瘳荏苒踰歲日月其遒比聞眠食尚可夷猶不謂涉旬遽至彌留嗚呼哀哉我始内交夫子是求遂接長君更唱迭酬自慙薄伎實與命仇同糅玉石槪不見收每為我言曷解母憂庶幾杜門極力㝠搜自母之疾醫藥是謀娯侍朝夕匪躬弗羞閒一對客神采烟浮遽遘閔凶籲天悠悠嗚呼哀哉承訃之日匍匐往救親朋在堂追憶舊遊彼相人者其言實讎數旣定矣孰益孰裒子孫滿前衰衣絰繆有孺子慕肝腸若抽我陳斯辭於彼繐幬以慰令子靈乎知否嗚呼尚饗又代惟我宗兄晚乃登第以亢吾宗吾纔一紀稚騃無知亦謂顯融靈其仲女年則倍予夙修婦功其歸於曹婉娩以聽允矣肅雍自後五年夫子獲解奏書南宫有兒嶷嶷出就外傅則為丸熊驥絆其足駒亦屢蹶嗟時未逢俯仰辛勤凡卅年餘卒以􅍵􅍵眩瞀乗之一命未沾望六以終嗚呼哀哉閨門之懿如裘斯襲美也實充在室而女旣歸而婦母道兼隆友愛之性篤於其兄振乏與窮庶幾士行誰歟述者有管曰􅊮於乎哀哉昔少司馬元昆後先起家於東大宗綿綿雖未九列每紹家風靈實自出有子有孫其後必崇比聞兩稚長方舞象豁然心胷旣誦五經左艶騷幽旁及史公少者十齡其所誦習必兄之從靈雖奄逝所遺於後玉樹丰茸況也夫子志在千里必試其庸長郎學成又三年殖文場之雄慰爾九泉可以歿矣天豈夢夢嗚呼哀哉尚饗祭唐嫂文昔伯和兄視我先君恩猶父子師弟之誼舅甥之親葢其名耳我始八齡入拜嫂氏迎饋我漿其貌温然其儀肅然匪傲而莊追數至今四十餘年我已衰白中間兩家靡所不同維休與戚㛐之臥痾於夏増加有孫受室喜為開顔眠食如常庶其迪吉維仲之冬伯子來告嫂病顛危我西過崑曽未信宿訃音倏隨嗚呼哀哉伯和剛方㛐以柔劑外内無郵至其為母愛而能勞子女無媮曾不偕老又未食報而奪之年天厚畀之又復嗇之孰知其然歿後一月日時具良成禮而袝我將為銘納之𤣥堂以永其譽維是平生中表之分倍於常情俯仰今昔􅋞淚陳詞以祖其行嗚呼哀哉祭凌孺人文嗚呼昔歲丁酉予時踰强老驥垂耳將辭服箱有謂楊君夫夫善藏盍與朝夕修其文章君乃延予館於山房如豹隠霧如笙含簧何以佐之維酒與漿誰其尸之有美孟姜王父司馬仗鉞南方宿衛之旅父冠其行允文允武世業是昌婉娩令儀言歸於楊琴瑟靜好娣也袂良熊夢未叶小星煌煌雙珠在掌炯然夜光撫而樂之實篤其慶夫子有眚其視茫茫賴此内助杜門相羊一病奪之灑淚承眶予頃艤舟於彼金閶或以喪告曰臘未央日且六旬一水非長曠隔如何倏焉載陽有媿匍匐彌深感傷維殯之遷仲月旣朢淺土是依舅姑之傍乃克陳詞薦厥嘉芳魄乎歸安神遊八荒嗚呼尚饗祭沈母周孺人文昔修嫭之來歸當歲行之癸未相中饋於沈痾承和顔以抑畏自遂専於篚筐踰二紀而勤勩遭家難之披猖集衆嚚之如蝟從逺宦於楚南攢百憂以成瘁歸田園之久蕪曽醫藥之能濟熙春陽以幾何旋雪霜而霾曀嗚呼哀哉維夫子之好客每過從之狎至傾百壺以為歡必卜夜而同醉匪尸饔兮有人將鼈長而為詈矧機杼之常盈課僮奴以羣肄夫孰怠而嬉嬉咸相戒以惴惴年向衰而彌勤報未食而奄逝嗚呼哀哉惟鳲鳩之平均撫幼穉於一視逮呻吟之有加曾莫懷夫忮忌有就養而無方脱簪珥於旣匱尤誠信於附身固瞑目而足慰嗚呼哀哉某等辱夫子之素交數醉酒以把臂感今昔以興懷為澘焉而出涕肅肴俎而陳辭庶髣髴其來莅嗚呼尚饗祭呉氏妺文嗚呼予生終鮮女弟三人長者早夭已十八春維仲及季二皆食貧嗟我不遇老於諸生食指為累欲贍不能每以疚心不安寢興妹雖逾衰尚耐艱辛早作夜休夏汗冬龜衣粗食惡終歲長勤其始歸呉纔十四齡有室有堂有萊有㽦婿弱宗强詎容久寧棄之來遷一廢百湮歲無豐儉日須斗升男子之逸婦女之顰積貧焉給積瘁焉勝壯子離居莫侍其親少者稚頑未遂婚姻昨歲維夏兄嫂是因曰予朝晡安然饔飱力之所出薄少可贏俄遘非意鬱與勞并疾痛來乗日以凌兢血之耗矣遂傷其筋廢於牀笫日吟且呻藥物靡效妨其躬身嗚呼哀哉疾之漸亟從容與言貧病之軀何愛生存惟是窀穸無忘其源往從舅姑葬不十旬此有兄在庶幾可瞑迨歿而視有稚煢煢時夜過半殯卜以申頗虞晝昏濕雲屯屯或有雷電震驚其魂旣含且殮長子來奔已而葢棺目光如星豈有憾乎未可以冺嗚呼哀哉自秋涉冬日月沄沄忽已卒哭有殯未墳每一念及此吾所任所不敢専時日宜詢夫子之計一何逡巡四壁蕭然有嫗晨昬誰歟陳饋䑕迹絶塵吾雖慫惥殆於罔聞惻焉傷心五内若焚具以告汝有淚俱傾匪我不信實應且憎嗚呼痛哉尚饗學古緒言巻十八
