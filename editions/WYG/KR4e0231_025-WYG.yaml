body:
  text: 學古緒言巻二十五明婁堅撰題跋十七首題歸母夀詩後右詩凡同賦者皆平日所與厚善不以告餘人故詩止於此子魚謂予齒長屬識其後葢大母之食貧而能甘其勞以朂子之學旣貴而無改其度以成子之名雖士人猶難之非獨閨門之範而已其見於頌且祝者固已焜燿厥詞竊以謂侈言之未若稱其概者之尤簡而核也若長君給諫以孝友恭儉刑於家之人外内無間言至其依依於大母固不以名位之通顯而易其朝夕之養也徒以有仲叔在於法不當請告於私可以自慰葢曰吾一寒士今之為吾親榮者非朝廷之恩寵施於無窮也哉其必將以守官竭節養太母之志也憶昨北上過余為别言吾若幸而得請備官藩臬奉母而行則秦之西楚之南猶吾庭左也語畢因低囘黯然葢其篤於孝若此顧頃者同官寥寥勢未可以請耳然太母春秋雖髙尚康强如始衰之年君即去左右無憂也方今朝廷清明士大夫咸知矜名尚氣然或本伉直也而反類於同本寛平也而時出於訐本一事也而兩人共之是其同乎已者非其異乎已者議論不務求其當而多出於私意此於天下之勢已若趨於可憂他日有竭忠盡言不求異亦不尚同是惟無言言則必天下所未覩其倪衆人所未得其平者也此非君而誰望哉夫如是則立乎朝廷不猶愈於日侍太母之側乎哉是之謂忠君傳曰孝者所以事君也子之竭力臣之致身道一而已為人臣而内顧其私與為子而好貨財私妻子等耳故竊以知君之深期君之逺者因是而一畢其愚若夫不識時宜不原物情妄言之而冀賢者之或然之此野夫之常曷足怪乎書張季脩遊峨睂山記後君子之得其志也功施於當時而名聞於後世葢莫不勞精神疲筋力以圖之固甚瘁也而中有慕焉恒若翹首跂足以俟者雖巖觀川遊追勝概滌煩襟有不足動其心矣及夫事過而追思之孰害其成孰攻其瑕若醉中得醒然後知為憂患之途不如優游田里之為適也於是有逃名匿影謂百年為瞬息希服餌以長生於是有攝心安禪謂形骸之虚幻躭禪悦以證悟此又流俗人之所姍笑而儒者之所不道也若然則婆娑小官有舟車以代步涉登眺絶域指氷雪而洗炎蒸極幽遐之大觀無尸素之内熱孰有如吾季脩之斯遊者乎雖然山川之勝人共領畧而趣或迥殊耳目所窮境即平分而中有獨賞如季脩者雖一丘一壑可也而文詞又足以發之其簡潔也足以發深思其詳核也足以告後來迴環諷誦恍若置身百里之巔而極目萬里之境矣君固形神俱逺而予亦神遊其間不在斯文乎余與君少同志長同不遇晚而君宦遊巴蜀余跧伏菰蘆似不同矣然而君有紀遊之篇必屬其子以見示意其胷懷之果有合歟輙為序而歸之題草書叔達鴈字詩後唐叔達表兄聞時人多賦鴈字詩有會於心率然命筆三四日間得詩二十四首大抵或起興於二社即轉入於六書或取材於字畫即囘盻於鴈羣此亦作者所同也然而用事過多則機神未必能流屬思過苦則采色何由克稱巧旣易纎而難雅質又多顇而少腴非意㝠句先何以極於變化非力饒格外何以妙於合離若此詩可謂備之矣而髙處尤在千四百言之多意到筆無不隨五十六字之中篇終法無不合怪竒超忽響亮昻藏不同體物之拘牽直似寓言之縱恣必非他人之所能及也從子敏恭字伯安紹世業於軒岐託雅尚於㸃畫予旣屢以診視為煩渠亦邀以揮灑為報爰以小草錄一通貽之若非永為家藏即當公之好事云爾書程孟陽詩後孟陽少喜為詩於古人之遺編無所不窺而尤愛少陵之作其在於今嘗稱李獻吉雖規規摹擬而才氣實非餘人所及也甫冠即棄去經生之學而一意讀古詩文久之豁然上自漢魏下逮北宋諸作者靡不窮其所詣至蘇長公往往或斆其體或次其韻若將與之並騖者比壯且衰其為七言近體以清切深穏為主葢得之劉隨州為多若曰杜之雄渾逸宕當令獨立千古善學者正不當求肖於皮毛至其神情所注反或去之逺也家本新安少而遊呉所交江以南知名之士邂逅語合不以别久近為親疎性又嗜古書畫即非力所及一經於目能為人具言其所以妙顧以不善治生數輕去其家有能知其詩文兼重其為人者要與之俱未嘗不從也然足跡所至僅北踰汴渡河至潞西浮江至武昌而已君平生不欲輕刻其詩以示於人至人有欲得其詩或為手錄百千言或取諸腹笥頃刻誦數十篇無倦色當其在潞也乃肯彚次其近作刻以應人之求兼還寄其所知予得而讀之所師法不必同同歸於自得而已近世之論非拘拘步趨求面目之相肖即苟為新異抉摘句字為悟解如是而已昔予嘗聞長者之論凡為詩若文貴在能識真耳苟真也則無古無今有正有竒道一而已矣唐之詩人固多卓然名家而尤以李杜並稱一或較其優劣輙貽譏於不自量以此知昌黎非獨髙文雖其詩間或過於豪放亦不當輕議之也彼有所自得焉耳若北宋諸作者通經學古皆可謂言語妙天下至所自得於詩亦豈尋常之琱繢所可幾及而世乃目之為靡為卑不知其所謂卑且靡者何等也屈原變詩為騷自我作古而或者猶執九歌九章以訾卜居漁父彼不知也曷足怪乎譬之味焉如其衆口同嗜即易牙之調也譬之藥焉如其百疾俱療即盧扁之劑也假令庸醫處方族庖挾匕而曰我易牙我盧扁也將嘔噦僵仆日相尋焉尚何望於適口却疾哉如孟陽之詩叔達論之詳矣而書來亦屬以一言予以為可無贅也則書其自少至今相與共商此道者以塞其請且以示兩家子弟苟有志焉求之於是編有餘師矣書徐汝廉一題六義後題為死生有命富貴在天昔人論魏晉時書至謂結體之變亦非後世所及葢其心手相應巧運法外誠有然者嘗以是求之文辭惟詩歌多有之就一象一事而窮工極微篇各臻妙然實迭出於衆能者之手非一人所能辦也雖李太白杜子美之豪蕩揮霍多至千言若其一題數十篇或古或今要必各有所指與倡和之作異矣惟今之制舉義不然昔日之神竒固今日之臭腐也轉相追逐月異而歲不同以故夸者務多連篇異構以自見其有餘然不過竄易首尾别施面目非真能變也友人徐汝亷為此題七篇毎讀一篇若不復有諸篇者出竒無窮幾無一意相襲當汝亷注思為文時或以離之雙美合之兩傷而又不忍捐其愛也故為是變幻以盡其中之所欲言此與書法之變何異然以汝亷之才如此世未有能知之者所以自託於斯題也歟顧其文辭縱逸蕭散向既戾於拘攣而今復逺於鉤棘或謂盍少貶焉豈猶以世之知汝亷與否固在汝亷也耶撿之篋中偶逸其一刻而傳之人人庶幾有同好焉汪杲叔篆刻題辭予不能作篆及八分書而意乃篤好每覽史籀石鼓皇象國山二刻以謂晉唐名書皆得此意所以為工惜紙素之傳日以湮滅無由得覩鐵畫銀鈎獨幸此二刻時代加逺而猶可想見古人之遺也間有示予漢人印章或金或玉往往見其字法俯仰顧盼與二刻絶相類葢其出於荒塚野田為好事者之所篋藏而傳玩亦已多矣顧其屢變屢下寢逺於古自頃百餘年之内世之留意於篆刻者不少獨新安何震長卿上窺漢氏下逮勝國靡所不考遡其師法得於吾呉文夀承先生而精詣過之矣所未及於漢者於古澹簡逺猶有間耳今年春始識汪君杲叔家本富人愛竒成癖盡耗其資獨以此道自喜髙處殆不減漢而間亦雜出於時之所尚予戲問之曰君既能摹漢矣而終不能不為今何耶則啞然笑應曰始吾之學之以寄吾意也故一意惟漢人是師意所獨愜有嗤為拙弗顧也今者吾貧且衣食其中吾知求合於衆目而已不必於愜吾意也衆且説之即未必合也吾惡得而不然衆且譁之即果有合也吾惡得而復然此吾之所以不能純乎漢也予則又語之凡衆之所為喜而譽憎而誹生於其人之心目耶抑或在其口耳之間耶如其心與目也子患不能為漢安問其他如為其出口入耳也人當論衆寡耶抑論其知不知耶其始也知者之口不能勝不知者卒也不知者之和終不能勝知者子姑守子之自信焉舍此而欲為子之衣食謀吾恐夫衆之誹譽不以子之技而以子之所黙有制自今以往將有謿子之不純乎漢者則如之何若予者葢所謂不能篆與八分而獨好石鼓國山之刻畫者也又以為漢氏之摹印與此二刻合者也子且以為知之耶其不知之也耶自題草書巻後草書不難於放縱而難於簡澹逸少書見於閣帖者宜其為百代所宗也獨張懷瓘之論小異此與文皇過貶子敬或皆未足全慿耳伯髙藏真相繼以狂草名世張書不多見所見或多贋本米元章以伯英虎丘帖謂本伯髙差可髣髴素之自叙雖姿態縱逸而法度森然比之晉人獨少韻耳米論真書微不滿於顔栁挑踼即此可以論草書矣自魯直極推揚少師往往以奴書為誚而晉唐典刑未免掃地宋人之草惟薛道祖謹守前規元章臨本時露本色葢草書之法自是幾不傳於世矣今人薄解怒張便自號為顛素人亦以是稱之如祝京兆筆力非不矯矯求之伯髙藏真尚多乖少合况於晉人之遠韻乎予少而好書尤躭於草頗從淳化太清窺見古人之概然恨刻本止存形模絶無神采平生見蘇米真迹雖率意之筆亦自爛然世人遂欲以趙呉興壓之此似是而非呉興勝場當在小楷其最合作亦非若今世所傳石本也然此三君子者特多真行未覩其草草書獨藏真題曹娥絹本後小字運筆如遊絲最為竒蹟又見逸少十月卄七數行乃知古今人不相及若經塵刦此或謂唐人雙鉤則不可知要必非後之君子所辦耳予自獲覩此尤喜作草書時於題扇得數行合而不知者往往索真不得乃及於行又次及於草殊可笑也今日偶書此巻雖筆不逮意亦差賢於世俗之豪放矣因巻有餘紙信筆漫題胡禹聲篆刻題辭新安胡禹聲工於篆刻而為賈人遊數東至海濱嘗為予言何翁長卿其所從受學也自頃年好事多收漢人印意至摹刻而傳之視勝國吾子衍諸人所見不啻數倍矣長卿晚年益精其法殆無遺憾其始葢得之吾呉文助教夀承文之篆刻學漢淳古而自出新意盡掃國初以來師承模範長卿學之凡刻白文一稟於漢而朱文則間用近代所尚務為竒詭然予嘗聞何非獨刀法精詣於繆篆尤不苟也每遇其難至累日叅考加以覃思必無一畫不惬於中所獨知然後刻之葢雖一藝之工其用心勤力必非人所及知類如此矣世之苟售欺於一時而不顧識者之笑者豈少哉禹聲既領悟師傳予將從容叩其所得於何者必有異焉而未暇也題手書金山詩後昨歲庚戌仲秋之初侍御韓公以視鹺還朝某與二三子追送京口期晤金山因得先渡為信宿留上髙臺臨絶壁緬想舊遊有如昨日於時秋暑未退相與露頂跣足徘徊浮圖之側招逺風而散煩歊驚濤暮颭涼雨晨飛晦霧明霞之變危檣短艓之過目之所接心為􅋏然散歩囘廊讀嵌壁詩或謂新安方君四篇差為贍麗然未極性情之致也歸舟笑言小間各賦七字句數亦如之將刻石送寺僧而未暇也倏忽便已歲餘念日月之遄邁知頽暮其幾何因楷書繭紙一本奉寄侍御公留為他年故事云爾辛亥重陽日題書募緣造經册今年春浮屠悟凡來自天台國清謁予而言將造經數十函載之還山終老持誦以莊嚴佛事非得善信檀施則弗克以為有兆焉告以吾緣在兹所以來也今者日捧一函行於道塗顧未有遇焉聞子儒也而託於禪請為我一言以先之予應之曰子之師為一大事因緣出現於世且得無言乎苟為之徒且得無誦而講乎其言教理行果與儒之言文行忠信一也然吾嘗怪儒生誦法孔氏而􅆥考其行葢求與之合者鮮矣豈非以身世為之累而名利為之誘哉惟爾浮屠去其父母妻子凡生人之所重若蔑如也是宜守其師説獨愈於儒生而吾求其人乃亦未可多得者何歟或其始之所由入信未具而輕闖其籓乎今子之稱也非少而髠中歲始有慕焉信其空幻之説以為實然故決然捨去生人之所重則可謂已信矣信既具而不由十二部經入恐其途之無從也子從深山來無所望於世而惟經是求人之聞之有不捐所愛以為施乎然令得之於文句而不能契之於身心將與俗之儒無異已捨其所甚重而或逐逐焉於其所不足戀則無乃捐髓腦而獲爪髪歟吾知其必不出於此矣夫國清智者之所創也彼葢以判教為宗般舟三昧為證傳之其徒自灌頂而後深於義學者代有人焉吾不知今之與子為侣者有能紹明焉否耶歸而求之以持誦為入門可也既與之言遂書以授之為募緣僧題疏簿人生百年朝晡所需纔米一升歲不過三石許而足也設有富人能捨百石為施足以贍三十人矣若有父子再世至於百年凡所贍給葢三千餘人之多天下大矣富家厚積不為少矣輕財厚施以此一人推之何可縷數所活困乏下至操瓢乞丐之流不可訾省則其為福德豈可量哉况以供赤髭白足使梵唄之聲日滿人耳喜捨之德日熏人心凡佛氏所稱浄土及妙莊嚴世界曾有一言句之非真諦實相歟然而世之居髙享厚謗佛毁祖而滅無因果者為不少矣則以溺於有相忘其宿植業日深而根日削故也盍試於鐘梵聲中思積於無用遺所不知等歸於空因於光明藏内捐我所贏濟人所乏不足樂乎則法報化三身同於一實去來今三際總是真空即以證檀波羅蜜可也題無隠師巻若直以晦堂長老與山谷居士問荅一段謂是無隱則法師今日開堂演説脩多羅了義經從教麈尾盡落不識有隠與不若猶未也自向世尊拈花微笑處領取正恐茫然墮在此老雲霧中後來棒喝法門與維摩黙然同一罏錘㸃化不少如何三𤣥五要還從口授竊聽盜法元屬耳聞恰又似觀世音圓通今實不欲更以語言相質却有一句商量直心是道場可是無隠大意不題月印師刺血寫報恩經後學佛者多以苦行作佛事若刺血寫經其尤也非大願力非深心慈豈能積成巻袠使人於一展誦間知皮肉髓腦盡屬可捐陽燄空華總無足戀於區區百齡俄頃見歴歴三身顯現豈不死生僅同蟬蛻而譽誹等是蛙鳴乎一字即五大乗一念即萬億刦雖欲以言語讚歎亦了不可得矣題西域僧左吉古魯巻釋氏末法有教理而無行果然行亦多有之其不成果者以心未了故也予嘗疑捐篤沙門不知視此中何如又不知達摩東來以後五家禪宗彼亦或聞其説否自漢至今度流沙而東者代不乏人其自震旦而往𤣥裝一人而已世尊拈花迦葉心領彼土自有正傳千七百則葛藤或不須耳吾東土以講誦作佛事而西域純以呪力加持皆未知於明心見性何如頃者左吉師缾錫至呉獲與之接惜其為漢音不甚了了無從而得其詳也但聞其國人皆慈心不喜鬬争而四國服從無敢抗者豈釋種宿緣已畢於流離之屠戮乎唐史言中天竺兵精最强四國皆臣之而右衛長史王𤣥策借兵吐蕃泥婆與連戰三日俘其王阿羅那順以歸史氏之言或亦非誣豈今昔之習固有殊歟并識之以俟卓識題汪杲叔印式後予嘗竊歎生乎百世之下而得與古人接者經史之外獨有鐘鼎所鑄碑碣所刻之遺文然而秦漢以來之僅存者欲一覩其遺固已鮮矣况其精神之寓於紙墨者乎獨公私印章尚有存者而唐宋迄今多不能髙古自刋行印藪一編而好事者葢多收藏古印或玉或金水湮土蝕之遺往往出於人間其篤好而極力追倣之者歙之汪君杲叔其尤也然亦間為時俗所尚别出纎姸工巧以投其好葢時有之譬如士人好古博學而未免為應俗之文誠有不得已焉耳友人李長蘅論此極當然而杲叔貧甚藉以餬其口焉决不應違時乃爾予是以嘉其好古念其困甚而又為之解也有字為非予者戲題其巻後諸君子之言非予美矣而閑馭更請題其後夫事之入於非者舉不欲其在我也事之出於我者又鮮能知其為非也汪君之以非予自命貴其能知之也苟能知非則雖無予可也予且無也而非安從生雖然吾試言其近者是非之相形理之所是衆之所同與也而自謂是者則其非必多矣理之所非衆之所同去也而自謂非者則其是亦必多矣葢君子之所貴於自知者如此題手書陶詩冊子後陶詩所以妙絶古今正在胷中超然非聞道者决不能為此語也區區以文字求之抑末矣如唐世詩人最多獨推李杜豈止才力豪健凌跨一代而已葢二公之所自負讀其詩可以想見焉唐以詩取士其較量工拙直在句字之間不復見其人之性情失詩之本來矣世人以詞格論詩正如以形模論書若然則王著當在蘇米之上耶龔石巖方伯致素冊索書為錄陶詩因題數語以質之學古緒言巻二十五
